<script>
"use strict";

var DATA;
try {
  DATA = JSON.parse(document.getElementById('data').textContent);
} catch (e) {
  document.getElementById('main').innerHTML = '<div class="error">Datenfehler: ' + e.message + '</div>';
  throw e;
}

var STORAGE_KEY = 'pflege2026_v1';
var state = { view: 'home', cat: null, topic: null, mode: null, history: [], cardIdx: 0, flipped: false, quizAnswers: [], quizSubmitted: false };
var progress = loadProgress();

function loadProgress() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return {};
}

function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
}

function progKey(catKey, topicKey, mode) {
  return catKey + '|' + topicKey + '|' + mode;
}

function markDone(catKey, topicKey, mode) {
  progress[progKey(catKey, topicKey, mode)] = { done: true, ts: Date.now() };
  saveProgress();
  updateProgressPill();
}

function isDone(catKey, topicKey, mode) {
  var p = progress[progKey(catKey, topicKey, mode)];
  return p && p.done;
}

function totalProgress() {
  var total = 0, done = 0;
  DATA.categories.forEach(function(c) {
    c.topics.forEach(function(t) {
      // Mind-Map-Topics: nur ein Modus (mindmap)
      if (t.branches && t.branches.length) {
        total++;
        if (isDone(c.key, t.key, 'mindmap')) done++;
        return;
      }
      ['cheat','cards','quiz'].forEach(function(m) {
        if (m === 'cards' && (!t.cards || !t.cards.length)) return;
        if (m === 'quiz' && (!t.quiz || !t.quiz.length)) return;
        total++;
        if (isDone(c.key, t.key, m)) done++;
      });
    });
  });
  return total === 0 ? 0 : Math.round(done / total * 100);
}

function updateProgressPill() {
  document.getElementById('progress-pill').textContent = totalProgress() + '%';
}

function topicDoneCount(catKey, topic) {
  // Mind-Map-Topics
  if (topic.branches && topic.branches.length) {
    var d = isDone(catKey, topic.key, 'mindmap') ? 1 : 0;
    return { done: d, total: 1 };
  }
  var modes = [];
  modes.push('cheat');
  if (topic.cards && topic.cards.length) modes.push('cards');
  if (topic.quiz && topic.quiz.length) modes.push('quiz');
  var done = modes.filter(function(m){ return isDone(catKey, topic.key, m); }).length;
  return { done: done, total: modes.length };
}

function relLabel(rel) {
  if (rel === 'vh') return 'Sehr hoch';
  if (rel === 'h') return 'Hoch';
  if (rel === 'm') return 'Mittel';
  return 'Grundlagen';
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, function(m) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
  });
}

function navigate(newState) {
  state.history.push({ view: state.view, cat: state.cat, topic: state.topic, mode: state.mode, cardIdx: state.cardIdx, flipped: state.flipped, quizAnswers: state.quizAnswers, quizSubmitted: state.quizSubmitted, _openBranches: state._openBranches });
  Object.assign(state, newState);
  if (newState.mode === 'cards') { state.cardIdx = 0; state.flipped = false; }
  if (newState.mode === 'quiz') { state.quizAnswers = []; state.quizSubmitted = false; }
  if (newState.mode === 'mindmap' || newState.view === 'mindmap') { state._openBranches = {}; }
  render();
}

function goHome() {
  state = { view: 'home', cat: null, topic: null, mode: null, history: [], cardIdx: 0, flipped: false, quizAnswers: [], quizSubmitted: false };
  render();
}

function goBack() {
  if (state.history.length === 0) { goHome(); return; }
  var prev = state.history.pop();
  Object.assign(state, prev);
  render();
}

function render() {
  var main = document.getElementById('main');
  var back = document.getElementById('back-btn');
  back.style.display = state.view === 'home' ? 'none' : 'inline-block';
  if (state.view === 'home') main.innerHTML = renderHome();
  else if (state.view === 'category') main.innerHTML = renderCategory();
  else if (state.view === 'topic') main.innerHTML = renderTopic();
  else if (state.view === 'cheat') main.innerHTML = renderCheat();
  else if (state.view === 'cards') main.innerHTML = renderCards();
  else if (state.view === 'quiz') main.innerHTML = renderQuiz();
  else if (state.view === 'mindmap') main.innerHTML = renderMindmap();
  document.getElementById('breadcrumb').innerHTML = renderBreadcrumb();
  updateProgressPill();
  window.scrollTo(0, 0);
}

function renderBreadcrumb() {
  if (state.view === 'home') return '<strong>Pflege 2026</strong>';
  var s = '<strong>Pflege 2026</strong>';
  if (state.cat) s += ' › ' + escHtml(state.cat.name);
  if (state.topic) s += ' › ' + escHtml(state.topic.name);
  if (state.mode === 'cheat') s += ' › Lernzettel';
  if (state.mode === 'cards') s += ' › Karten';
  if (state.mode === 'quiz') s += ' › Quiz';
  if (state.mode === 'mindmap' || state.view === 'mindmap') s += ' › Mind Map';
  return s;
}

function renderHome() {
  var totalTopics = 0;
  DATA.categories.forEach(function(c){ totalTopics += c.topics.length; });
  var pct = totalProgress();
  var html = '<div class="hero">';
  html += '<h1>Pflege 2026</h1>';
  html += '<p class="subtitle">Prüfungstrainer Pflegefachmann · Saarland</p>';
  html += '<div class="hero-stats">';
  html += '<div class="hero-stat">📚 ' + totalTopics + ' Themen</div>';
  html += '<div class="hero-stat">📊 Fortschritt ' + pct + '%</div>';
  html += '<div class="hero-stat">📅 Klausuren 1.–3. Juli 2026</div>';
  html += '</div></div>';
  html += '<h2>Kategorien wählen</h2>';
  html += '<div class="rel-legend">';
  html += '<span class="rel-badge rel-vh">Sehr hoch</span>';
  html += '<span class="rel-badge rel-h">Hoch</span>';
  html += '<span class="rel-badge rel-m">Mittel</span>';
  html += '<span class="rel-badge rel-g">Grundlagen</span>';
  html += '</div>';
  html += '<div class="cat-grid">';
  DATA.categories.forEach(function(c) {
    var totalDone = 0, totalSlots = 0;
    c.topics.forEach(function(t) {
      var d = topicDoneCount(c.key, t);
      totalDone += d.done; totalSlots += d.total;
    });
    var catPct = totalSlots ? Math.round(totalDone/totalSlots*100) : 0;
    html += '<div class="cat-card" onclick="navigate({view:\'category\',cat:' + JSON.stringify(c).replace(/"/g,'&quot;') + '})">';
    html += '<div class="icon">' + escHtml(c.icon) + '</div>';
    html += '<div class="name">' + escHtml(c.name) + '</div>';
    html += '<div class="desc">' + escHtml(c.desc) + '</div>';
    html += '<div class="count">' + c.topics.length + ' Themen · ' + catPct + '% gemeistert</div>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="tools-row">';
  html += '<button class="tool-btn" onclick="exportProgress()">📤 Export</button>';
  html += '<button class="tool-btn" onclick="importProgress()">📥 Import</button>';
  html += '<button class="tool-btn" onclick="resetProgress()">🔄 Reset</button>';
  html += '</div>';
  return html;
}

function renderCategory() {
  var c = state.cat;
  var topics = c.topics.slice();
  var query = (state._search || '').toLowerCase();
  if (query) {
    topics = topics.filter(function(t){ return t.name.toLowerCase().indexOf(query) !== -1; });
  }
  var relOrder = { vh:0, h:1, m:2, g:3 };
  topics.sort(function(a,b){ return (relOrder[a.rel]||9) - (relOrder[b.rel]||9); });
  var html = '<h1>' + escHtml(c.icon) + ' ' + escHtml(c.name) + '</h1>';
  html += '<p class="subtitle">' + escHtml(c.desc) + '</p>';
  html += '<input class="search-box" placeholder="Suchen…" value="' + escHtml(query) + '" oninput="onSearchInput(this.value)">';
  if (topics.length === 0) {
    html += '<div class="empty">Keine Treffer.</div>';
  } else {
    html += '<div class="topic-list">';
    topics.forEach(function(t) {
      var d = topicDoneCount(c.key, t);
      html += '<div class="topic-card" onclick="openTopic(\'' + t.key + '\')">';
      html += '<span class="rel-badge rel-' + t.rel + '">' + relLabel(t.rel) + '</span>';
      html += '<span class="name">' + escHtml(t.name) + '</span>';
      html += '<span class="progress">' + d.done + '/' + d.total + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }
  return html;
}

function onSearchInput(v) {
  state._search = v;
  document.getElementById('main').innerHTML = renderCategory();
  // Restore focus
  var box = document.querySelector('.search-box');
  if (box) { box.focus(); box.setSelectionRange(v.length, v.length); }
}

function openTopic(topicKey) {
  var t = state.cat.topics.find(function(x){ return x.key === topicKey; });
  if (!t) return;
  // Mind-Map-Topics: direkt in die Mindmap-Ansicht springen
  if (t.branches && t.branches.length) {
    navigate({ view: 'mindmap', topic: t, mode: 'mindmap' });
  } else {
    navigate({ view: 'topic', topic: t });
  }
}

function renderTopic() {
  var t = state.topic, c = state.cat;
  var html = '<h1>' + escHtml(t.name) + '</h1>';
  html += '<p class="subtitle"><span class="rel-badge rel-' + t.rel + '">Prüfungsrelevanz: ' + relLabel(t.rel) + '</span></p>';
  html += '<div class="mode-grid">';
  var modes = [
    { key:'cheat', icon:'📋', label:'Lernzettel', avail: !!(t.cheat && t.cheat.length) },
    { key:'cards', icon:'🃏', label:'Karten', avail: !!(t.cards && t.cards.length) },
    { key:'quiz', icon:'❓', label:'Quiz', avail: !!(t.quiz && t.quiz.length) }
  ];
  modes.forEach(function(m) {
    if (!m.avail) return;
    var done = isDone(c.key, t.key, m.key);
    html += '<div class="mode-btn' + (done ? ' done' : '') + '" onclick="navigate({view:\'' + m.key + '\',mode:\'' + m.key + '\'})">';
    html += '<span class="icon">' + m.icon + '</span>';
    html += '<div class="label">' + m.label + '</div>';
    if (done) html += '<div class="progress">✓ erledigt</div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderCheat() {
  var t = state.topic, c = state.cat;
  var html = '<h1>📋 ' + escHtml(t.name) + '</h1>';
  html += '<p class="subtitle">Lernzettel · ' + relLabel(t.rel) + ' Prüfungsrelevanz</p>';
  if (t.cheat && t.cheat.length) {
    t.cheat.forEach(function(s) {
      html += '<div class="section">';
      html += '<h3>' + escHtml(s.h) + '</h3>';
      html += '<ul>';
      s.li.forEach(function(li){ html += '<li>' + escHtml(li) + '</li>'; });
      html += '</ul></div>';
    });
  } else {
    html += '<div class="empty">Noch keine Lernzettel verfügbar.</div>';
  }
  if (!isDone(c.key, t.key, 'cheat')) {
    html += '<button class="btn-primary" onclick="markDone(state.cat.key, state.topic.key, \'cheat\'); render();">✓ Lernzettel als gelesen markieren</button>';
  } else {
    html += '<button class="btn-secondary" onclick="render()">✓ Bereits abgeschlossen</button>';
  }
  return html;
}

function renderCards() {
  var t = state.topic, c = state.cat;
  if (!t.cards || !t.cards.length) return '<div class="empty">Keine Karten verfügbar.</div>';
  var idx = state.cardIdx;
  var card = t.cards[idx];
  var html = '<h1>🃏 ' + escHtml(t.name) + '</h1>';
  html += '<p class="subtitle">Karte ' + (idx+1) + ' von ' + t.cards.length + '</p>';
  html += '<div class="flashcard-container">';
  html += '<div class="flashcard' + (state.flipped ? ' flipped' : '') + '" onclick="state.flipped=!state.flipped;render();">';
  html += '<div class="flashcard-face flashcard-front">';
  html += '<div class="flashcard-label">FRAGE</div>';
  html += '<div class="flashcard-text">' + escHtml(card.q) + '</div>';
  html += '<div class="flashcard-hint">Tippen zum Umdrehen</div>';
  html += '</div>';
  html += '<div class="flashcard-face flashcard-back">';
  html += '<div class="flashcard-label">ANTWORT</div>';
  html += '<div class="flashcard-text">' + escHtml(card.a) + '</div>';
  html += '<div class="flashcard-hint">Tippen zum Umdrehen</div>';
  html += '</div>';
  html += '</div></div>';
  html += '<div class="card-controls">';
  html += '<button class="card-btn" ' + (idx===0 ? 'disabled' : '') + ' onclick="state.cardIdx--;state.flipped=false;render();">‹ Zurück</button>';
  html += '<span class="card-counter">' + (idx+1) + '/' + t.cards.length + '</span>';
  if (idx < t.cards.length - 1) {
    html += '<button class="card-btn" onclick="state.cardIdx++;state.flipped=false;render();">Weiter ›</button>';
  } else {
    html += '<button class="card-btn" onclick="markDone(state.cat.key, state.topic.key, \'cards\');alert(\'Alle Karten durch! 👏\');goBack();">✓ Fertig</button>';
  }
  html += '</div>';
  return html;
}

function renderQuiz() {
  var t = state.topic, c = state.cat;
  if (!t.quiz || !t.quiz.length) return '<div class="empty">Kein Quiz verfügbar.</div>';
  var html = '<h1>❓ ' + escHtml(t.name) + ' · Quiz</h1>';
  html += '<p class="subtitle">' + t.quiz.length + ' Fragen · klicken um zu antworten</p>';
  if (state.quizSubmitted) {
    var correct = 0;
    state.quizAnswers.forEach(function(a, i) { if (a === t.quiz[i].correct) correct++; });
    var pct = Math.round(correct / t.quiz.length * 100);
    var msg = pct >= 80 ? '🎉 Hervorragend! Note 1' :
              pct >= 60 ? '👍 Gut! Solide Leistung' :
              pct >= 40 ? '📚 Bestanden – noch wiederholen' :
              '🔁 Wiederholung empfohlen';
    html += '<div class="quiz-result">';
    html += '<div>Ergebnis</div>';
    html += '<div class="score">' + correct + '/' + t.quiz.length + '</div>';
    html += '<div>' + pct + ' %</div>';
    html += '<div class="msg">' + msg + '</div>';
    html += '<button onclick="state.quizSubmitted=false;state.quizAnswers=[];render();">🔄 Nochmal</button>';
    html += '<button onclick="goBack()">‹ Zurück</button>';
    html += '</div>';
  }
  t.quiz.forEach(function(q, qi) {
    html += '<div class="quiz-q">';
    html += '<div class="num">FRAGE ' + (qi+1) + '</div>';
    html += '<div class="text">' + escHtml(q.q) + '</div>';
    html += '<div class="quiz-opts">';
    q.opts.forEach(function(opt, oi) {
      var classes = 'quiz-opt';
      var disabled = '';
      if (state.quizSubmitted) {
        disabled = 'disabled';
        if (oi === q.correct) classes += ' correct';
        else if (state.quizAnswers[qi] === oi) classes += ' wrong';
      } else if (state.quizAnswers[qi] === oi) {
        classes += ' correct';
      }
      html += '<button class="' + classes + '" ' + disabled + ' onclick="selectAnswer(' + qi + ',' + oi + ')">' + escHtml(opt) + '</button>';
    });
    html += '</div>';
    if (state.quizSubmitted && q.exp) {
      html += '<div class="quiz-explain"><strong>Erklärung:</strong> ' + escHtml(q.exp) + '</div>';
    }
    html += '</div>';
  });
  if (!state.quizSubmitted) {
    var allDone = state.quizAnswers.length === t.quiz.length && state.quizAnswers.every(function(a){ return a !== undefined; });
    html += '<button class="btn-primary" ' + (allDone ? '' : 'disabled') + ' onclick="submitQuiz()">Quiz auswerten</button>';
  }
  return html;
}

function renderMindmap() {
  var t = state.topic, c = state.cat;
  if (!state._openBranches) state._openBranches = {};
  var html = '<h1>🗺️ ' + escHtml(t.name) + '</h1>';
  if (t.sub) html += '<p class="subtitle">' + escHtml(t.sub) + '</p>';
  html += '<div class="mm-hint">Tippe auf einen Bereich zum Aufklappen</div>';
  var allOpen = t.branches.every(function(_, i){ return state._openBranches[i]; });
  html += '<div class="mm-toolbar">';
  html += '<button class="mm-tool-btn" onclick="toggleAllBranches(' + (allOpen ? 'false' : 'true') + ')">' + (allOpen ? '▾ Alle einklappen' : '▸ Alle aufklappen') + '</button>';
  html += '</div>';
  html += '<div class="mm-list">';
  t.branches.forEach(function(b, i) {
    var isOpen = !!state._openBranches[i];
    var col = b.color || 'blue';
    html += '<div class="mm-branch mm-c-' + col + (isOpen ? ' mm-open' : '') + '">';
    html += '<button class="mm-head" onclick="toggleBranch(' + i + ')">';
    html += '<span class="mm-dot"></span>';
    html += '<span class="mm-label">' + escHtml(b.label) + '</span>';
    html += '<span class="mm-arrow">' + (isOpen ? '▾' : '▸') + '</span>';
    html += '</button>';
    if (isOpen) {
      html += '<ul class="mm-leaves">';
      b.leaves.forEach(function(lv){
        html += '<li>' + escHtml(lv) + '</li>';
      });
      html += '</ul>';
    }
    html += '</div>';
  });
  html += '</div>';
  if (!isDone(c.key, t.key, 'mindmap')) {
    html += '<button class="btn-primary" onclick="markDone(state.cat.key, state.topic.key, \'mindmap\'); render();">✓ Mind Map durchgegangen</button>';
  } else {
    html += '<button class="btn-secondary" onclick="goBack()">✓ Bereits abgeschlossen</button>';
  }
  return html;
}

function toggleBranch(i) {
  if (!state._openBranches) state._openBranches = {};
  state._openBranches[i] = !state._openBranches[i];
  render();
}

function toggleAllBranches(open) {
  if (!state.topic || !state.topic.branches) return;
  state._openBranches = {};
  if (open) {
    state.topic.branches.forEach(function(_, i){ state._openBranches[i] = true; });
  }
  render();
}

function selectAnswer(qi, oi) {
  if (state.quizSubmitted) return;
  state.quizAnswers[qi] = oi;
  render();
}

function submitQuiz() {
  state.quizSubmitted = true;
  var t = state.topic, c = state.cat;
  var correct = 0;
  state.quizAnswers.forEach(function(a, i) { if (a === t.quiz[i].correct) correct++; });
  var pct = correct / t.quiz.length;
  if (pct >= 0.6) markDone(c.key, t.key, 'quiz');
  render();
}

function exportProgress() {
  var data = JSON.stringify(progress, null, 2);
  var blob = new Blob([data], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'pflege2026-fortschritt-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importProgress() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var imported = JSON.parse(ev.target.result);
        progress = imported;
        saveProgress();
        alert('Fortschritt importiert!');
        render();
      } catch (err) { alert('Fehler beim Import: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetProgress() {
  if (confirm('Fortschritt wirklich zurücksetzen?')) {
    progress = {};
    saveProgress();
    render();
  }
}

document.getElementById('home-btn').onclick = goHome;
document.getElementById('back-btn').onclick = goBack;

// Make navigate / openTopic / etc. globally accessible
window.navigate = navigate;
window.openTopic = openTopic;
window.markDone = markDone;
window.render = render;
window.state = state;
window.goBack = goBack;
window.selectAnswer = selectAnswer;
window.submitQuiz = submitQuiz;
window.exportProgress = exportProgress;
window.importProgress = importProgress;
window.resetProgress = resetProgress;
window.onSearchInput = onSearchInput;
window.toggleBranch = toggleBranch;
window.toggleAllBranches = toggleAllBranches;

render();
</script>
</body>
</html>
