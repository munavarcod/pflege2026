<html lang="de">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Pflege 2026 · Prüfungstrainer Saarland</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0f4f8;--surface:#fff;--primary:#2c5282;--primary-dark:#1e3a5f;--primary-light:#4a6fa5;
  --accent:#38a169;--text:#1a202c;--text-muted:#4a5568;--border:#e2e8f0;
  --shadow:0 2px 8px rgba(44,82,130,.08);--shadow-md:0 4px 16px rgba(44,82,130,.12);
  --shadow-lg:0 8px 32px rgba(44,82,130,.16);
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
  --rel-vh:#c53030;--rel-vh-bg:#fff5f5;--rel-h:#dd6b20;--rel-h-bg:#fffaf0;
  --rel-m:#3182ce;--rel-m-bg:#ebf8ff;--rel-g:#38a169;--rel-g-bg:#f0fff4;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#app{max-width:900px;margin:0 auto;min-height:100vh;min-height:100dvh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);display:flex;flex-direction:column}
.topbar{position:sticky;top:0;background:rgba(240,244,248,.92);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);z-index:100;padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.nav-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;font-size:14px;font-weight:600;color:var(--primary);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:active{transform:scale(.96)}
.nav-btn:hover{background:var(--primary);color:#fff}
.nav-btn.home{background:var(--primary);color:#fff}
.breadcrumb{flex:1;font-size:13px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.breadcrumb strong{color:var(--primary)}
.progress-pill{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--primary)}
main{flex:1;padding:18px;padding-bottom:40px}
h1{font-size:26px;font-weight:800;color:var(--primary-dark);margin-bottom:6px;letter-spacing:-.5px}
h2{font-size:20px;font-weight:700;color:var(--primary-dark);margin:18px 0 10px}
h3{font-size:16px;font-weight:700;color:var(--primary);margin:12px 0 6px}
.subtitle{color:var(--text-muted);font-size:14px;margin-bottom:18px}
.hero{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:#fff;border-radius:var(--radius-lg);padding:24px 22px;margin-bottom:18px;box-shadow:var(--shadow-md)}
.hero h1{color:#fff;font-size:24px}
.hero .subtitle{color:rgba(255,255,255,.85);font-size:14px;margin-bottom:14px}
.hero-stats{display:flex;gap:14px;flex-wrap:wrap}
.hero-stat{background:rgba(255,255,255,.15);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600}
.cat-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:600px){.cat-grid{grid-template-columns:1fr 1fr}}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.cat-card:active{transform:scale(.98)}
.cat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--primary-light)}
.cat-card .icon{font-size:32px;margin-bottom:4px}
.cat-card .name{font-weight:700;font-size:17px;color:var(--primary-dark)}
.cat-card .desc{font-size:13px;color:var(--text-muted);line-height:1.5}
.cat-card .count{margin-top:8px;font-size:12px;color:var(--primary);font-weight:600}
.topic-list{display:flex;flex-direction:column;gap:8px}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:var(--shadow)}
.topic-card:active{transform:scale(.98)}
.topic-card:hover{box-shadow:var(--shadow-md);border-color:var(--primary-light)}
.topic-card .name{font-weight:600;font-size:15px;flex:1;color:var(--text)}
.topic-card .progress{font-size:11px;color:var(--text-muted);min-width:42px;text-align:right;font-weight:600}
.rel-badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.2px}
.rel-vh{background:var(--rel-vh-bg);color:var(--rel-vh)}
.rel-h{background:var(--rel-h-bg);color:var(--rel-h)}
.rel-m{background:var(--rel-m-bg);color:var(--rel-m)}
.rel-g{background:var(--rel-g-bg);color:var(--rel-g)}
.rel-legend{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 18px;font-size:11px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:18px 0}
.mode-btn{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:18px 10px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.mode-btn:active{transform:scale(.96)}
.mode-btn:hover{border-color:var(--primary);box-shadow:var(--shadow-md)}
.mode-btn .icon{font-size:28px;margin-bottom:6px;display:block}
.mode-btn .label{font-size:13px;font-weight:700;color:var(--primary-dark)}
.mode-btn .progress{font-size:11px;color:var(--text-muted);margin-top:4px}
.mode-btn.done{background:linear-gradient(135deg,#f0fff4,#fff);border-color:var(--accent)}
.mode-btn.done .label{color:var(--accent)}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.section h3{margin-top:0;font-size:15px;color:var(--primary-dark);display:flex;align-items:center;gap:6px}
.section ul{list-style:none;padding:0;margin:8px 0 0}
.section ul li{padding:6px 0 6px 22px;position:relative;font-size:14px;line-height:1.55;color:var(--text)}
.section ul li::before{content:"▸";position:absolute;left:6px;top:6px;color:var(--primary);font-weight:bold}
.flashcard-container{perspective:1200px;margin:14px 0}
.flashcard{position:relative;width:100%;min-height:240px;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1);cursor:pointer}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);padding:24px 22px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow-md);overflow:auto}
.flashcard-front{background:linear-gradient(135deg,#fff,#f7fafc);border:1px solid var(--border)}
.flashcard-back{background:linear-gradient(135deg,#ebf8ff,#fff);border:1px solid #bee3f8;transform:rotateY(180deg)}
.flashcard-label{font-size:11px;letter-spacing:1.5px;color:var(--primary);font-weight:700;margin-bottom:10px}
.flashcard-text{font-size:16px;line-height:1.55;color:var(--text)}
.flashcard-front .flashcard-text{font-weight:600}
.flashcard-hint{position:absolute;bottom:10px;right:14px;font-size:11px;color:var(--text-muted);font-style:italic}
.card-controls{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px}
.card-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;font-weight:600;color:var(--primary);cursor:pointer;transition:all .15s}
.card-btn:active{transform:scale(.96)}
.card-btn:hover:not(:disabled){background:var(--primary);color:#fff}
.card-btn:disabled{opacity:.4;cursor:not-allowed}
.card-counter{font-size:13px;color:var(--text-muted);font-weight:600;text-align:center;min-width:54px}
.quiz-q{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.quiz-q .num{font-size:11px;letter-spacing:1.5px;color:var(--primary);font-weight:700;margin-bottom:6px}
.quiz-q .text{font-size:16px;font-weight:600;margin-bottom:12px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;text-align:left;cursor:pointer;font-size:14px;line-height:1.5;color:var(--text);transition:all .15s;font-family:inherit}
.quiz-opt:hover:not(:disabled){border-color:var(--primary);background:#f7fafc}
.quiz-opt:active{transform:scale(.99)}
.quiz-opt.correct{background:#f0fff4;border-color:var(--accent);color:var(--accent);font-weight:600}
.quiz-opt.wrong{background:#fff5f5;border-color:var(--rel-vh);color:var(--rel-vh);font-weight:600}
.quiz-opt:disabled{cursor:not-allowed}
.quiz-explain{margin-top:12px;padding:12px 14px;background:#ebf8ff;border-left:3px solid var(--primary);border-radius:var(--radius-sm);font-size:13.5px;line-height:1.55;color:var(--text)}
.quiz-explain strong{color:var(--primary-dark)}
.btn-primary{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;transition:all .15s}
.btn-primary:active{transform:scale(.98)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:var(--surface);color:var(--primary);border:2px solid var(--primary);border-radius:var(--radius-sm);padding:13px 20px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-secondary:hover{background:var(--primary);color:#fff}
.quiz-result{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:#fff;border-radius:var(--radius-lg);padding:28px 24px;text-align:center;box-shadow:var(--shadow-md)}
.quiz-result .score{font-size:42px;font-weight:800;margin:8px 0}
.quiz-result .msg{font-size:15px;opacity:.9;margin-bottom:16px}
.quiz-result button{background:#fff;color:var(--primary);border:none;border-radius:var(--radius-sm);padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;margin:4px}
.search-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;width:100%;font-size:15px;font-family:inherit;color:var(--text);margin-bottom:14px;outline:none;transition:border-color .15s}
.search-box:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(44,82,130,.1)}
.tools-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.tools-row .tool-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:12px;font-weight:600;color:var(--primary);cursor:pointer;min-width:90px}
.tools-row .tool-btn:hover{background:var(--primary);color:#fff}
.empty{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:14px}
.error{background:#fff5f5;border:1px solid var(--rel-vh);color:var(--rel-vh);padding:14px;border-radius:var(--radius-sm);margin:14px 0}
.mm-hint{font-size:12px;color:var(--text-muted);margin:6px 0 14px;font-style:italic}
.mm-toolbar{display:flex;justify-content:flex-end;margin-bottom:10px}
.mm-tool-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;font-weight:600;color:var(--primary);cursor:pointer}
.mm-tool-btn:hover{background:var(--primary);color:#fff}
.mm-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.mm-branch{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow);overflow:hidden;transition:all .15s}
.mm-branch.mm-open{box-shadow:var(--shadow-md)}
.mm-head{display:flex;align-items:center;gap:10px;width:100%;padding:14px 16px;border:none;background:transparent;cursor:pointer;text-align:left;font-family:inherit;font-size:15px;font-weight:600;color:var(--text);transition:background .12s}
.mm-head:hover{background:#f7fafc}
.mm-head:active{background:#edf2f7}
.mm-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;background:var(--mm-dot,var(--primary))}
.mm-label{flex:1;line-height:1.3}
.mm-arrow{font-size:14px;color:var(--text-muted);transition:transform .2s}
.mm-leaves{list-style:none;padding:4px 16px 14px 38px;margin:0;border-top:1px solid var(--border);background:var(--mm-bg,#f7fafc)}
.mm-leaves li{padding:7px 0;font-size:14px;line-height:1.5;color:var(--text);position:relative;padding-left:14px}
.mm-leaves li::before{content:"›";position:absolute;left:0;top:7px;color:var(--mm-dot,var(--primary));font-weight:bold}
.mm-c-blue{--mm-dot:#185fa5;--mm-bg:#eff6fb}
.mm-c-teal{--mm-dot:#0f6e56;--mm-bg:#ecfaf3}
.mm-c-amber{--mm-dot:#ba7517;--mm-bg:#fdf6e7}
.mm-c-purple{--mm-dot:#534ab7;--mm-bg:#f1f0fe}
.mm-c-coral{--mm-dot:#993c1d;--mm-bg:#fcf0eb}
.mm-c-green{--mm-dot:#3b6d11;--mm-bg:#f1f7e6}
.mm-c-pink{--mm-dot:#993556;--mm-bg:#fdeff4}
.mm-c-red{--mm-dot:#a32d2d;--mm-bg:#fdeeee}
</style>
</head>

"Manifestation der Arteriosklerose an den Koronararterien","Verengung → Missverhältnis zwischen O₂-Bedarf und -Angebot des Herzmuskels","Stabile Angina pectoris vs. instabile AP / akutes Koronarsyndrom"]},{"h":"Risikofaktoren","li":["Beeinflussbar: Rauchen, Hypertonie, Diabetes, Hyperlipidämie, Adipositas, Bewegungsmangel, Stress","Nicht beeinflussbar: Alter, männliches Geschlecht, familiäre Disposition"]},{"h":"Symptome","li":["Stabile AP: retrosternaler Druck/Schmerz bei Belastung, Besserung in Ruhe / nach Nitro <20 min","Ausstrahlung: linker Arm, Hals, Unterkiefer, Oberbauch","Frauen, Diabetiker, Ältere oft atypisch: Übelkeit, Schwäche, Dyspnoe"]},{"h":"Diagnostik","li":["Anamnese · Ruhe-EKG · Belastungs-EKG · Echokardiografie","Koronarangiografie (Goldstandard) · Labor (Troponin bei ACS)"]},{"h":"Therapie","li":["Lebensstil: Nikotinkarenz, Bewegung, Ernährung, Gewichtsreduktion","Medikamente: ASS, Statine, Betablocker, Nitrate, ACE-Hemmer","Interventionell: PCI mit Stent · operativ: Bypass (ACVB)"]},{"h":"Pflegerische Maßnahmen","li":["Vitalzeichen, Schmerzbeobachtung (PQRST), EKG-Monitoring","Anfall: Ruhe, Oberkörper hoch, Nitro nach AVO, Arzt informieren","Patientenschulung: Risikofaktoren, Medikamente, Notfallzeichen"]},{"h":"Komplikationen","li":["Akutes Koronarsyndrom: instabile AP, NSTEMI, STEMI","Plötzlicher Herztod · Herzinsuffizienz · Rhythmusstörungen"]}],"cards":[{"q":"Welche 5 wichtigsten beeinflussbaren Risikofaktoren?","a":"Rauchen, Hypertonie, Diabetes mellitus, Hyperlipidämie, Adipositas / Bewegungsmangel."},{"q":"Stabile vs. instabile AP – was unterscheidet?","a":"Stabil: reproduzierbar bei Belastung, Besserung in Ruhe / nach Nitro. Instabil: in Ruhe, neu aufgetreten oder Crescendo-Charakter → Notfall (ACS)."},{"q":"Was sind atypische Symptome – und bei wem?","a":"Übelkeit, Schwäche, Dyspnoe, Oberbauchschmerz – häufig bei Frauen, Diabetikern, Älteren."},{"q":"Was ist eine KHK?","a":"Koronare Herzkrankheit – Verengung der Koronararterien durch Atherosklerose mit Folge der Myokard-Minderdurchblutung (Ischämie)."},{"q":"Stabile vs. instabile Angina pectoris?","a":"Stabil: belastungsabhängig, reproduzierbar, Besserung in Ruhe/durch Nitro. Instabil: in Ruhe oder bei kleinster Belastung, neu, zunehmend → Notfall, Infarktvorstufe!"},{"q":"Welche Risikofaktoren sind beeinflussbar?","a":"Rauchen, Hypertonie, Hyperlipidämie, Diabetes, Adipositas, Bewegungsmangel, Stress – Lebensstilberatung zentral."},{"q":"Begründen Sie die Gabe von Nitroglycerin bei AP.","a":"Nitro wirkt vasodilatatorisch, senkt die Vorlast und erweitert Koronararterien → bessere O₂-Versorgung des Myokards, Schmerzlinderung."}],"quiz":[{"q":"Was ist die häufigste Ursache der KHK?","opts":["Vitien","Arteriosklerose der Koronarien","Bakterielle Entzündung","Genetische Mutation"],"correct":1,"exp":"KHK ist die Manifestation der Arteriosklerose an den Herzkranzgefäßen."},{"q":"Welche Maßnahme ist bei akutem Angina-pectoris-Anfall korrekt?","opts":["Patient hinlegen, Beine hochlagern","Oberkörper hochlagern, Nitro nach AVO, Arzt informieren","Sofort mobilisieren","Wärmeapplikation"],"correct":1,"exp":"Oberkörperhochlagerung entlastet das Herz, Nitro erweitert die Koronarien, Arzt informieren ist Standard."},{"q":"Herr Lang (62) bekommt seit 10 Min. Brustschmerz in Ruhe – neu. Was vermuten Sie?","opts":["Stabile AP","Instabile AP / akutes Koronarsyndrom – Notfall!","Sodbrennen","Muskelkater"],"correct":1,"exp":"Ruheschmerz neu = instabile AP/ACS. Notarzt, EKG, Troponin, ASS, O₂ nach AVO – nicht abwarten!"},{"q":"Welche Maßnahme gehört NICHT zur Erstversorgung bei AP?","opts":["Oberkörperhoch","Nitro nach AVO sublingual","Schnelle körperliche Aktivität","Beruhigen, Vitalzeichen"],"correct":2,"exp":"Belastung erhöht Sauerstoffbedarf – kontraindiziert. Ruhe + Nitro + Vitalzeichen + Notruf bei Persistenz."},{"q":"Welcher Wert ist bei Verdacht auf akutes Koronarsyndrom besonders aussagekräftig?","opts":["Hämoglobin","Troponin (kardiales)","Bilirubin","Kalium"],"correct":1,"exp":"Troponin steigt bei Myokardschaden und ist hochspezifisch für Herzinfarkt."}]},{"key":"herzinfarkt","name":"Herzinfarkt (STEMI / NSTEMI)","rel":"vh","cheat":[{"h":"Definition","li":["Ischämische Nekrose von Herzmuskelgewebe durch Verschluss einer Koronararterie","STEMI: ST-Hebungsinfarkt – transmuraler Infarkt, sofortige Reperfusion!","NSTEMI: Nicht-ST-Hebungsinfarkt – Troponin-positiv, ohne ST-Hebung","Teil des akuten Koronarsyndroms (ACS)"]},{"h":"Symptome","li":["Anhaltender retrosternaler Vernichtungsschmerz >20 min, nicht nitrolöslich","Ausstrahlung: linker Arm, Hals, Unterkiefer, Rücken, Oberbauch","Vegetativ: Kaltschweiß, Übelkeit, Erbrechen, Todesangst","Atypisch (Frauen, Diabetiker, Ältere): Dyspnoe, Schwäche, Übelkeit"]},{"h":"Diagnostik","li":["12-Kanal-EKG sofort: ST-Hebung? Q-Zacken? T-Negativierung?","Labor: Troponin T/I (Goldstandard), CK-MB, Myoglobin","Echokardiografie · Koronarangiografie (auch therapeutisch)"]},{"h":"Therapie / Erstmaßnahmen","li":["MONA-BH: Morphin, Oxygen (nur bei SpO₂<90%), Nitro, ASS – plus Betablocker, Heparin","Reperfusion: PCI innerhalb 90–120 min (Goldstandard) oder Lyse","Sekundärprävention: ASS + P2Y12-Hemmer (DAPT), Statin, Betablocker, ACE-Hemmer"]},{"h":"Pflegerische Maßnahmen","li":["Sofort: Notruf, Oberkörper hoch, beruhigen, Vitalzeichen, EKG, venöser Zugang","Strenge Bettruhe initial, dann stufenweise Mobilisation","Schmerzerfassung (NRS), Monitoring (RR, Puls, EKG, SpO₂)","Bilanzierung, Ernährung leicht, Stuhlregulierung (kein Pressen!)","Psychische Begleitung – Todesangst ernst nehmen"]},{"h":"Komplikationen","li":["Herzrhythmusstörungen (häufigste Frühkomplikation, v.a. Kammerflimmern)","Kardiogener Schock · Herzinsuffizienz · Reinfarkt","Mechanisch: Papillarmuskelabriss, Septumruptur, Herzwandruptur"]}],"cards":[{"q":"Was bedeutet MONA-BH?","a":"Morphin, Oxygen (bei SpO₂<90%), Nitro, ASS – plus Betablocker, Heparin. Erstmaßnahmen beim akuten Herzinfarkt."},{"q":"Welcher Laborwert ist Goldstandard zur Infarktdiagnose?","a":"Troponin T/I – herzmuskelspezifisch, steigt nach 3–6 h, Maximum nach 24 h, bleibt bis 14 Tage erhöht."},{"q":"Innerhalb welcher Zeit sollte eine PCI erfolgen?","a":"Bei STEMI innerhalb von 90–120 Minuten ab Erstkontakt – Time is muscle."},{"q":"Häufigste Frühkomplikation?","a":"Herzrhythmusstörungen, insbesondere Kammerflimmern – deshalb engmaschiges EKG-Monitoring."},{"q":"Was ist der Unterschied zwischen STEMI und NSTEMI?","a":"STEMI: ST-Hebung im EKG, kompletter Verschluss → sofortige Intervention (PCI <90 Min). NSTEMI: keine ST-Hebung, Troponin↑ → Diagnostik und Therapie nach Risiko."},{"q":"Welche atypischen Infarktsymptome bei Frauen und Diabetikern?","a":"Übelkeit/Erbrechen, Atemnot, Müdigkeit, Schmerzen in Oberbauch/Rücken/Kiefer – KEIN klassischer linksseitiger Brustschmerz! Häufig nicht erkannt."},{"q":"Welche Sofortmaßnahmen (MONA-Schema)?","a":"M Morphin (Schmerz), O Oxygen (bei SpO₂<90%), N Nitro (sublingual), A ASS (Aggregationshemmer). Plus Heparin nach AVO. Notarzt sofort!"},{"q":"Welche Komplikationen drohen in den ersten 24–48 h?","a":"Herzrhythmusstörungen (v.a. Kammerflimmern!), Linksherzversagen, kardiogener Schock, Perikarderguss – kontinuierliches EKG/Monitoring."},{"q":"Begründen Sie die schnelle Reperfusion (door-to-balloon <90 Min).","a":"„Time is muscle\" – jede Minute Ischämie führt zum Untergang weiterer Herzmuskelzellen. Frühe Reperfusion = bessere Pumpfunktion und Überleben."}],"quiz":[{"q":"Herr Müller (68) klagt über seit 30 Min anhaltenden retrosternalen Schmerz, kaltschweißig, Todesangst. Welche Maßnahme zuerst?","opts":["Nitrospray geben","Notruf absetzen, Oberkörper hoch, Vitalzeichen, beruhigen","Schmerzmittel oral","Patient mobilisieren"],"correct":1,"exp":"Verdacht auf Herzinfarkt – Notruf hat oberste Priorität, parallel Lagerung und Vitalzeichenkontrolle. Nitro nur nach AVO und nicht bei niedrigem RR."},{"q":"Welche Aussage zum Troponin trifft zu?","opts":["Steigt sofort nach Infarkt","Ist unspezifisch","Steigt nach 3–6 h, Maximum nach 24 h","Sinkt bei Infarkt"],"correct":2,"exp":"Troponin-Anstieg verzögert (3–6 h), deshalb Verlaufskontrollen und initiale negative Werte schließen Infarkt nicht aus."},{"q":"Warum strenge Stuhlregulierung nach Herzinfarkt?","opts":["Wegen Inkontinenzgefahr","Pressen erhöht O₂-Verbrauch und Reinfarktrisiko","Wegen Diuretika","Wegen Bettlägerigkeit"],"correct":1,"exp":"Pressen beim Stuhlgang (Valsalva) erhöht Herzbelastung – Laxantien nach AVO, Obstipationsprophylaxe."},{"q":"Patient klagt über retrosternalen Vernichtungsschmerz, kalter Schweiß, Übelkeit. Was tun ZUERST?","opts":["Brustkompression","Notarzt + EKG + Vitalzeichen + halbsitzende Lagerung + ASS nach AVO","Patient laufen lassen","Erst abwarten"],"correct":1,"exp":"Verdacht Infarkt → Notarzt, EKG, Vitalzeichen, halbsitzend, ASS 250–500 mg nach AVO."},{"q":"Welche Lagerung bei Verdacht auf Herzinfarkt?","opts":["Schocklage (Beine hoch)","Halbsitzende Position (Oberkörper 30–45° hoch)","Bauchlage","Linksseitenlage"],"correct":1,"exp":"Halbsitzend entlastet das Herz. Schocklage ist KONTRAINDIZIERT (mehr Volumen zum schon geschwächten Herzen!)."},{"q":"Frau Berger (68, Diabetikerin) klagt über Übelkeit, Erschöpfung, Druck im Oberbauch seit 1 h. Welche Diagnose IMMER mitdenken?","opts":["Magenschleimhautentzündung","Atypischer Herzinfarkt – bei Frauen + Diabetikern oft ohne Brustschmerz","Migräne","Verstopfung"],"correct":1,"exp":"Bei Frauen, Älteren, Diabetikern Infarkt häufig ATYPISCH – EKG und Troponin sichern Diagnose."},{"q":"Welche Komplikation ist die HÄUFIGSTE Todesursache in den ersten Stunden nach Infarkt?","opts":["Sepsis","Kammerflimmern / maligne Herzrhythmusstörungen","Lungenembolie","Pneumonie"],"correct":1,"exp":"Kammerflimmern in den ersten 4 h ist häufigste Todesursache – Defi-Bereitschaft, Monitoring sind Pflicht."},{"q":"Welche Pflegemaßnahme ist in der Akutphase besonders wichtig?","opts":["Vollständige Frühmobilisation","Bettruhe + kontinuierliches Monitoring + ruhige Atmosphäre + emotionale Begleitung","Belastungs-EKG","Aktive Bewegung"],"correct":1,"exp":"Akutphase: Schonung des Herzmuskels, Monitoring, Stressreduktion. Mobilisation nach AVO stufenweise."}]},{"key":"rhythmus","name":"Herzrhythmusstörungen","rel":"m","cheat":[{"h":"Definition","li":["Abweichung von normalem Sinusrhythmus (60–100/min)","Bradykardie <60/min · Tachykardie >100/min","Vorhof- vs. Kammerursprung · regelmäßig vs. unregelmäßig"]},{"h":"Häufige Formen","li":["Vorhofflimmern (häufigste Rhythmusstörung) – absolute Arrhythmie, Embolierisiko!","Vorhofflattern · supraventrikuläre Tachykardie","Ventrikuläre Extrasystolen · ventrikuläre Tachykardie · Kammerflimmern (Reanimation!)","Bradyarrhythmie · AV-Block I–III"]},{"h":"Symptome","li":["Palpitationen, Herzstolpern, Schwindel, Synkopen","Dyspnoe, Brustenge, Leistungsminderung","Bei Kammerflimmern: Bewusstlosigkeit, Atemstillstand → Reanimation!"]},{"h":"Diagnostik","li":["EKG · Langzeit-EKG (24h-Holter) · Event-Recorder","Echokardiografie · Elektrolyte · Schilddrüse (TSH)"]},{"h":"Therapie","li":["Antiarrhythmika (z.B. Amiodaron, Betablocker)","Vorhofflimmern: Antikoagulation (CHA₂DS₂-VASc-Score) zur Schlaganfallprävention","Kardioversion, Ablation, Schrittmacher, ICD"]},{"h":"Pflegerische Maßnahmen","li":["Pulskontrolle (Frequenz + Rhythmus), EKG-Monitoring","Symptomerfassung, Sturzprophylaxe bei Synkopenneigung","Antikoagulation: Blutungszeichen beobachten, INR-Kontrolle bei Marcumar","Patientenedukation: Pulsmessung, Notfallzeichen"]}],"cards":[{"q":"Warum ist Vorhofflimmern so gefährlich?","a":"Risiko thrombembolischer Ereignisse (v.a. Schlaganfall) durch Thrombenbildung im Vorhof bei fehlender koordinierter Kontraktion. Daher Antikoagulation nach CHA₂DS₂-VASc."},{"q":"Wann sofortige Reanimation?","a":"Bei Kammerflimmern und pulsloser ventrikulärer Tachykardie – Defibrillation + CPR (30:2)."},{"q":"Wie erkennt man Vorhofflimmern am Puls?","a":"Absolute Arrhythmie – völlig unregelmäßiger Puls, oft mit Pulsdefizit (Herzfrequenz > Pulsfrequenz)."},{"q":"Was ist Vorhofflimmern und welches Hauptrisiko?","a":"Unkoordinierte Vorhofkontraktion → unregelmäßiger Herzrhythmus. Hauptrisiko: Thrombenbildung im Vorhof → Schlaganfall. Therapie: Antikoagulation (NOAK/Marcumar)."},{"q":"Welche Bradykardie braucht Notfallversorgung?","a":"Symptomatische Bradykardie <40/min mit Schwindel, Synkope, RR-Abfall – ggf. Atropin nach AVO, Schrittmachertherapie."}],"quiz":[{"q":"Welche Rhythmusstörung erfordert sofortige Defibrillation?","opts":["Vorhofflimmern","AV-Block I","Kammerflimmern","Bradykardie"],"correct":2,"exp":"Kammerflimmern ist lebensbedrohlich – sofort Reanimation und Defibrillation."},{"q":"Welcher Score bestimmt das Schlaganfallrisiko bei Vorhofflimmern?","opts":["NYHA","CHA₂DS₂-VASc","Glasgow Coma Scale","Braden-Skala"],"correct":1,"exp":"CHA₂DS₂-VASc-Score: ab 2 Punkten Indikation zur oralen Antikoagulation."},{"q":"Welche Maßnahme hat bei Vorhofflimmern höchste Priorität langfristig?","opts":["Bettruhe","Antikoagulation zur Schlaganfallprophylaxe","Diät","Strenge Salzrestriktion"],"correct":1,"exp":"Schlaganfallprophylaxe (CHA₂DS₂-VASc-Score) – meist NOAK, alternativ Marcumar mit INR-Kontrolle."},{"q":"Wie kontrollieren Sie den Puls bei Vorhofflimmern?","opts":["Nur am EKG-Monitor","Manuell volle Minute zählen – Pulsdefizit prüfen","Reicht 15 Sek.","Gar nicht"],"correct":1,"exp":"Bei VHF: volle Minute zählen, Pulsdefizit (Herzfrequenz vs. Pulsfrequenz) erfassen – periphere Pulswelle nicht jeder Schlag."}]},{"key":"hypertonie","name":"Arterielle Hypertonie & hypertensive Krise","rel":"vh","cheat":[{"h":"Definition","li":["Dauerhaft erhöhter Blutdruck ≥140/90 mmHg (in Praxis); ≥135/85 mmHg (Heimmessung)","Primär (essenziell, 90%) vs. sekundär (z.B. renal, endokrin)","Hypertensive Krise: >180/120 mmHg ohne Endorganschaden","Hypertensiver Notfall: mit Organschaden (Hirn, Herz, Niere) → Notfall!"]},{"h":"Risikofaktoren","li":["Übergewicht, Bewegungsmangel, Salzkonsum, Alkohol, Rauchen","Stress, familiäre Disposition, Alter","Diabetes, Hyperlipidämie, Schlafapnoe"]},{"h":"Symptome","li":["Oft asymptomatisch (silent killer)","Kopfschmerzen (v.a. morgens occipital), Schwindel, Ohrensausen","Krise: starke Kopfschmerzen, Sehstörungen, Übelkeit, Nasenbluten, Brustenge"]},{"h":"Komplikationen / Endorganschäden","li":["Hirn: Schlaganfall, hypertensive Enzephalopathie","Herz: KHK, Herzinsuffizienz, Hypertrophie","Niere: Niereninsuffizienz","Auge: Retinopathie · Gefäße: Aortendissektion, pAVK"]},{"h":"Therapie","li":["Lebensstil: Gewichtsreduktion, salzarm <6g/d, Bewegung, Alkoholreduktion, Nichtrauchen","Medikamente (5 Hauptgruppen): ACE-Hemmer, AT1-Blocker, Diuretika, Calciumantagonisten, Betablocker","Kombinationstherapie häufig nötig"]},{"h":"Pflegerische Maßnahmen","li":["RR-Messung standardisiert: sitzend, nach 5 min Ruhe, beide Arme","Selbstmessung schulen, Blutdruckpass führen","Medikamentenadhärenz fördern, NW erkennen (Schwindel → Sturz)","Bei Krise: Ruhe, Oberkörper hoch, Arzt, RR engmaschig, AVO umsetzen","Lebensstilberatung: Ernährung, Bewegung, Stressmanagement"]}],"cards":[{"q":"Ab welchem Wert spricht man von Hypertonie?","a":"≥140/90 mmHg in der Praxismessung; ≥135/85 mmHg in der Selbst-/Heimmessung; ≥130/80 mmHg im 24-h-Mittel."},{"q":"Was ist der Unterschied zwischen Krise und Notfall?","a":"Krise: RR >180/120 mmHg ohne Endorganschaden. Notfall: mit Endorganschaden (Schlaganfall, Lungenödem, Aortendissektion etc.) – Klinik!"},{"q":"Nenne die 5 Hauptgruppen der Antihypertensiva.","a":"ACE-Hemmer, AT1-Blocker (Sartane), Diuretika, Calciumantagonisten, Betablocker."},{"q":"Welche Lebensstilmaßnahme senkt den RR am meisten?","a":"Gewichtsreduktion: bis zu 5–10 mmHg pro 10 kg. Plus salzarme Kost, Bewegung, Alkoholreduktion, Nichtrauchen."},{"q":"Welche Blutdruck-Grenzwerte gelten als Hypertonie?","a":"≥140/90 mmHg in der Praxis, Heimblutdruck ≥135/85, ABDM-Mittelwert ≥130/80. Optimal <120/80."},{"q":"Was ist eine hypertensive Krise vs. Entgleisung?","a":"Krise: RR >180/120 mit Endorganschäden (Sehstörung, Krampfanfall, akute LV-Insuff., Hirnblutung) → Notfall! Entgleisung: hohe Werte ohne Endorganschäden – orale Senkung möglich."},{"q":"Welche Lebensstilmaßnahmen senken den RR?","a":"Salzreduktion (<5 g/d), Bewegung, Gewicht, kein Alkohol/Rauchen, mediterrane Ernährung, Stressreduktion – auch DASH-Diät."},{"q":"Welche 4 Hauptklassen Antihypertensiva?","a":"ACE-Hemmer/ARB, Betablocker, Calciumantagonisten, Diuretika. Oft Kombinationstherapie für besseren Effekt + weniger NW."},{"q":"Wie wird der Blutdruck korrekt gemessen?","a":"5 Min Ruhe sitzend, Manschette auf Herzhöhe, beide Arme initial vergleichen, 2 Messungen im Abstand von 1–2 Min, Mittelwert nehmen, kein Sprechen."}],"quiz":[{"q":"Frau Schmidt hat einen RR von 195/115 mmHg, klagt über starke Kopfschmerzen und Sehstörungen. Wie reagieren Sie?","opts":["Patientin mobilisieren","Arzt informieren, Ruhe, Oberkörper hoch, RR-Kontrolle, Notfall!","Patientin abwarten lassen","Schmerzmittel geben"],"correct":1,"exp":"Symptome (Sehstörung) sprechen für hypertensiven Notfall mit Endorganschaden – sofortige ärztliche Versorgung notwendig."},{"q":"Welche Lebensstilmaßnahme ist am wirksamsten zur RR-Senkung?","opts":["Vitamin C","Gewichtsreduktion","Tee statt Kaffee","Mehr Schlaf"],"correct":1,"exp":"Gewichtsreduktion senkt den RR am stärksten – ca. 1 mmHg pro kg Gewichtsverlust."},{"q":"Frau Schmidt (72) hat plötzlich RR 220/115, Sehstörung, Kopfschmerzen. Was ist das?","opts":["Normal beim Älteren","Hypertensive Krise – Notfall, sofort Arzt","Kreislauflabilität, abwarten","Hypotonie"],"correct":1,"exp":"RR>180/120 + Endorganschäden = hypertensive Krise. Notfall, Arzt sofort, langsame Senkung (zu schnelle Senkung gefährlich!)."},{"q":"Bei welchem Patienten ist Salzreduktion besonders wirksam?","opts":["Junge Sportler","Salzsensitive Hypertoniker (oft Ältere, Afroamerikaner, Diabetiker)","Kinder","Hypotoniker"],"correct":1,"exp":"Salzsensitivität ist nicht bei allen gleich, aber besonders bei genannten Gruppen sinkt der RR durch Salzreduktion deutlich."},{"q":"Welche Aussage zur Selbstmessung ist KORREKT?","opts":["Direkt nach dem Aufstehen messen","5 Min Ruhe sitzend, Arm auf Herzhöhe, 2 Messungen, Mittelwert","Stehend ohne Pause","Nur einmal pro Woche"],"correct":1,"exp":"Korrekte Messung ist Voraussetzung für Therapieentscheidungen – sonst falsche Werte und Über-/Unterbehandlung."},{"q":"Welche Pflegemaßnahme bei hypertensiver Entgleisung?","opts":["Patient laufen lassen","Ruhig lagern, Vitalzeichen kontrollieren, Medikation nach AVO, beruhigen","Forciert mobilisieren","Kalt duschen"],"correct":1,"exp":"Ruhe + Monitoring + AVO. Stress und Anstrengung erhöhen RR weiter."}]},{"key":"hypotonie","name":"Hypotonie & Schock","rel":"h","cheat":[{"h":"Definition","li":["Hypotonie: RR <100/60 mmHg","Orthostatische Hypotonie: RR-Abfall >20 mmHg systolisch beim Aufstehen","Schock: Kreislaufversagen mit Minderperfusion und O₂-Mangel der Organe"]},{"h":"Schockformen","li":["Hypovolämisch: Blutung, Verbrennung, Dehydratation","Kardiogen: Herzinfarkt, Herzinsuffizienz, Rhythmusstörung","Septisch: Infektion → Vasodilatation","Anaphylaktisch: allergische Reaktion · Neurogen: spinale Verletzung"]},{"h":"Symptome","li":["Hypotonie: Schwindel, Synkope, Müdigkeit","Schock: Tachykardie, Hypotonie, blasse/kalte/schweißige Haut","Bewusstseinsstörung, Oligurie/Anurie, Dyspnoe","Schockindex (Puls/RRsys) >1 = Hinweis auf Schock"]},{"h":"Erstmaßnahmen Schock","li":["Notruf, Vitalzeichen, Lagerung: Schocklagerung (Beine hoch) – außer bei kardiogenem Schock!","Kardiogener Schock: Oberkörper hoch","Anaphylaxie: Allergen weg, Adrenalin i.m. nach AVO","Volumensubstitution, O₂-Gabe nach AVO, warm halten"]},{"h":"Pflegerische Maßnahmen","li":["Vitalzeichen engmaschig (RR, Puls, AF, SpO₂, Temp, Bewusstsein)","Bilanzierung (Urinausscheidung als Schockparameter)","Sturzprophylaxe bei orthostatischer Hypotonie: langsam aufstehen","Kompressionsstrümpfe, ausreichend trinken, Salz nicht reduzieren"]}],"cards":[{"q":"Bei welchem Schock NICHT die Beine hochlagern?","a":"Beim kardiogenen Schock – hier Oberkörper hoch, sonst Volumenüberlastung des Herzens. Auch bei Lungenödem keine Schocklage."},{"q":"Was ist der Schockindex?","a":"Pulsfrequenz / systolischer RR. Werte >1 (z.B. Puls 120 bei RR 100) sind verdächtig auf Schock."},{"q":"Was tun bei Synkope durch orthostatische Hypotonie?","a":"Hinlegen, Beine hochlagern, Vitalzeichen, ausreichend trinken; präventiv: langsam aufstehen, Kompressionsstrümpfe, ausreichende Trinkmenge."},{"q":"Was ist orthostatische Hypotonie?","a":"RR-Abfall ≥20 mmHg systolisch oder ≥10 mmHg diastolisch innerhalb 3 Min nach Aufstehen → Schwindel, Synkope, Sturzgefahr."},{"q":"Welche Gegenmaßnahmen bei Orthostase?","a":"Langsam aufstehen, Beine bewegen vor Aufstehen, Kompressionsstrümpfe, ausreichend trinken, Salzzufuhr, kein heißes Bad, Mahlzeiten teilen."},{"q":"Welche 3 Schockformen sind häufigste Notfälle?","a":"Hypovolämischer (Blutung/Volumenverlust), kardiogener (Pumpversagen, z.B. Infarkt), septischer (Infektion). Plus anaphylaktischer (Allergie)."},{"q":"Welche Lagerung bei Schock (außer kardiogener)?","a":"Schocklage: Beine 30° hoch → mehr Blutvolumen zum Herzen. KONTRAINDIZIERT bei kardiogenem Schock und Schädel-Hirn-Trauma!"}],"quiz":[{"q":"Welche Lagerung ist beim hypovolämischen Schock indiziert?","opts":["Oberkörperhochlagerung","Schocklage (Beine hoch)","Bauchlage","Stabile Seitenlage"],"correct":1,"exp":"Schocklage (Beine 30°) verbessert Rückstrom zum Herzen. Ausnahme: kardiogener Schock und Lungenödem."},{"q":"Welcher Parameter ist beim Schockmonitoring besonders wichtig?","opts":["Hautturgor","Stündliche Urinausscheidung","BMI","Pupillenreaktion allein"],"correct":1,"exp":"Urinausscheidung <0,5 ml/kg/h zeigt Minderperfusion der Niere → Schockfortschritt. Plus RR, Puls, Bewusstsein."},{"q":"Herr Klein (84) wird beim Aufstehen schwindlig und stürzt. RR liegend 130/80, stehend 95/60. Was haben Sie erfasst?","opts":["Hypertonie","Orthostatische Hypotonie – Sturzursache!","Hyperventilation","Demenz"],"correct":1,"exp":"RR-Abfall systolisch >20 mmHg beim Aufstehen = Orthostase. Sturzprophylaxe: langsam aufstehen, Strümpfe, Trinken."},{"q":"Welche Schocklage ist bei kardiogenem Schock RICHTIG?","opts":["Beine hoch","Oberkörper hoch (Herzbett)","Bauchlage","Linksseitenlage"],"correct":1,"exp":"Schocklage mit Beinen hoch ist bei kardiogenem Schock KONTRAINDIZIERT (mehr Volumen belastet das schon insuffiziente Herz)."}]},{"key":"thrombose","name":"Thrombose (TVT)","rel":"vh","cheat":[{"h":"Definition","li":["Bildung eines Blutgerinnsels in einem Blutgefäß, meist tiefe Beinvenen (TVT)","Gefahr: Lösung des Thrombus → Lungenembolie!"]},{"h":"Virchow-Trias (Risikofaktoren)","li":["1. Verlangsamter Blutfluss: Immobilität, Bettruhe, Reise, OP","2. Endothelschädigung: Verletzung, Katheter, Entzündung","3. Hyperkoagulabilität: Pille, Schwangerschaft, Tumor, Thrombophilie","Weitere: Adipositas, Rauchen, Alter, Z.n. Thrombose"]},{"h":"Symptome (TVT)","li":["Schwellung, Rötung, Überwärmung, Schmerz (v.a. Wadenkompression)","Glanzhaut, gestaute oberflächliche Venen, Spannungsgefühl","Klassische Zeichen: Homans-Zeichen, Payr-Zeichen, Meyer-Zeichen (heute eher unspezifisch)","Cave: 50% verlaufen klinisch stumm!"]},{"h":"Diagnostik","li":["Anamnese, Wells-Score · D-Dimere (Ausschluss)","Kompressionssonografie (Goldstandard) · Phlebografie"]},{"h":"Therapie","li":["Antikoagulation: NMH (z.B. Enoxaparin) oder NOAK initial","Langzeit: Marcumar / NOAK (3–6 Monate, ggf. länger)","Kompressionstherapie (medizinischer Kompressionsstrumpf Klasse II)","Mobilisation – früher Bettruhe, heute Mobilisation unter Antikoagulation"]},{"h":"Pflegerische Maßnahmen","li":["Frühmobilisation, Bewegungsübungen, Bettfahrrad","ATS / MTPS (Anti-Thrombose-Strümpfe) – richtig anlegen, Druck prüfen","Ausreichend trinken (>1,5 L/Tag, sofern nicht kontraindiziert)","Antikoagulation: Injektion s.c., Wirkung/NW beobachten, Blutungszeichen","Lungenembolie-Beobachtung: plötzliche Dyspnoe, Thoraxschmerz → Notfall!"]},{"h":"Prophylaxen","li":["Mobilisation · Bewegungsübungen · ATS","Ausreichende Hydratation","Medikamentös: NMH s.c. nach AVO bei Risiko"]}],"cards":[{"q":"Was ist die Virchow-Trias?","a":"Drei Faktoren der Thromboseentstehung: 1) verlangsamter Blutfluss, 2) Endothelschädigung, 3) Hyperkoagulabilität."},{"q":"Warum heute Frühmobilisation statt Bettruhe?","a":"Mobilisation unter wirksamer Antikoagulation reduziert Thrombuswachstum und Lungenembolierisiko nicht – im Gegenteil verhindert weitere Thrombenbildung. Bettruhe ist obsolet."},{"q":"Welche 4 Säulen der TVT-Prophylaxe?","a":"Frühmobilisation, Bewegungsübungen, ATS/Kompressionsstrümpfe, ausreichende Hydratation – plus medikamentös NMH bei Risiko."},{"q":"Welche Komplikation ist akut lebensbedrohlich?","a":"Lungenembolie – plötzliche Dyspnoe, Thoraxschmerz, Tachykardie, ggf. Synkope. Sofort Notruf!"},{"q":"Was ist die Virchow-Trias?","a":"Drei Faktoren begünstigen Thrombose: 1. Endothelschaden, 2. veränderte Strömung (Stase), 3. Hyperkoagulabilität."},{"q":"Welche Symptome bei TVT (tiefe Venenthrombose)?","a":"Einseitige Schwellung, Schmerz, Rötung, Wärme, Spannungsgefühl, Meyer-Zeichen, Payr-Zeichen, Homans-Zeichen – aber: viele TVT verlaufen oligo-/asymptomatisch!"},{"q":"Welche Komplikation der TVT ist lebensgefährlich?","a":"Lungenembolie – losgelöster Thrombus verschließt Lungenarterien. Symptome: plötzliche Dyspnoe, Brustschmerz, Tachykardie, ggf. Schock."},{"q":"Welche Prophylaxen bei Thromboserisiko?","a":"Frühmobilisation, Bewegungsübungen aktiv/passiv, ausreichend trinken, ATS/MTPS, NMH s.c. nach AVO, ggf. IPK (intermittierende pneumatische Kompression)."},{"q":"Wie werden ATS korrekt angelegt?","a":"Morgens vor dem Aufstehen (kein Ödem), bis zu Knöchel/Knie, faltenfrei, richtige Größe (Wadenumfang messen!), tagsüber tragen, Hautkontrollen."},{"q":"Begründen Sie die NMH-Gabe bei immobilen Patienten.","a":"Immobilität führt zu venöser Stase → erhöhtes Thromboserisiko. NMH (z.B. Enoxaparin) hemmt Faktor Xa und verhindert Thrombenbildung."}],"quiz":[{"q":"Frau Klein (74) ist nach Hüft-OP bettlägerig. Welche Prophylaxe ist NICHT Standard?","opts":["NMH s.c.","ATS","Bewegungsübungen","Strenge Bettruhe für 7 Tage"],"correct":3,"exp":"Strenge Bettruhe ist kontraproduktiv – Frühmobilisation senkt Thromboserisiko. NMH, ATS, Bewegungsübungen sind Standard."},{"q":"Welches Symptom spricht akut für eine Lungenembolie?","opts":["Beinschwellung","Plötzliche Dyspnoe + Thoraxschmerz","Bauchschmerz","Hautjucken"],"correct":1,"exp":"Plötzliche Dyspnoe, Thoraxschmerz, Tachykardie sind klassisch für LE – Notfall!"},{"q":"Herr Roth (postoperativ Hüft-TEP, Tag 3) klagt über zunehmenden Wadenschmerz links + Schwellung. Was tun?","opts":["Massieren","Ruhigstellen, KEIN Massieren, Arzt informieren – Verdacht TVT, Embolierisiko!","Lauftraining","Wärme auflegen"],"correct":1,"exp":"TVT-Verdacht: Massage gefährdet → Embolie. Bein hochlagern (nicht abknicken), ruhig halten, Arzt informieren, Diagnostik (D-Dimer, Sono)."},{"q":"Welche Maßnahme ist KEINE Thromboseprophylaxe?","opts":["Frühmobilisation","Ausreichend trinken","Wadenmassage bei akuter TVT-Symptomatik","ATS"],"correct":2,"exp":"Wadenmassage bei akuter TVT-Symptomatik ist KONTRAINDIZIERT – Embolierisiko! Massage nicht zur Prophylaxe."},{"q":"Wann werden ATS angelegt?","opts":["Abends vor dem Schlafen","Morgens vor dem Aufstehen, bevor sich Ödeme bilden","Beliebig","Erst nach Mobilisation"],"correct":1,"exp":"Morgens vor Aufstehen, weil Beine noch unödematös – Strümpfe wirken besser, ohne einzuschnüren."},{"q":"Welche 3 Faktoren der Virchow-Trias?","opts":["Hitze, Kälte, Stress","Endothelschaden, Stase, Hyperkoagulabilität","Schmerz, Schwellung, Rötung","Druck, Reibung, Feuchtigkeit"],"correct":1,"exp":"Virchow-Trias: 3 Faktoren der Thrombosebildung – Endothelschaden, Stase, Gerinnungsneigung."}]},{"key":"copd","name":"COPD","rel":"vh","cheat":[{"h":"Definition","li":["Chronisch obstruktive Lungenerkrankung – nicht vollständig reversible Atemwegsobstruktion","Zusammensetzung aus chronischer Bronchitis + Lungenemphysem","GOLD-Stadien I–IV nach FEV1 (Spirometrie)"]},{"h":"Ursachen / Risikofaktoren","li":["Rauchen (90% der Fälle, Hauptursache)","Berufliche Schadstoffexposition (Stäube, Dämpfe)","Luftverschmutzung · genetisch: Alpha-1-Antitrypsin-Mangel"]},{"h":"Symptome – AHA","li":["Auswurf (chronisch, morgens, weißlich-zäh)","Husten (chronisch, >3 Monate in 2 aufeinanderfolgenden Jahren)","Atemnot (initial bei Belastung, später in Ruhe)","Lippenbremse, Fassthorax, Zyanose, Trommelschlegelfinger im Spätstadium"]},{"h":"Diagnostik","li":["Spirometrie: FEV1/FVC <70% nach Bronchodilatator = obstruktiv","Anamnese (Pack Years), Bodyplethysmografie, BGA","Röntgen-Thorax, ggf. CT"]},{"h":"Therapie","li":["Rauchstopp (wichtigste Maßnahme!)","Bronchodilatatoren: kurzwirksam (SABA, SAMA) für Bedarf, langwirksam (LABA, LAMA) Dauertherapie","Inhalative Kortikoide bei Exazerbationen / hohem Risiko","Sauerstofflangzeittherapie bei chronischer Hypoxämie","Atemphysiotherapie, pulmonale Rehabilitation, Impfungen (Grippe, Pneumokokken)"]},{"h":"Pflegerische Maßnahmen","li":["Atemerleichternde Stellungen: Kutschersitz, Torwartstellung, Lippenbremse","Inhalation schulen (Spacer, korrekte Anwendung)","Sekretolyse: ausreichend trinken (>1,5 L), Klopfmassage, Vibrax","O₂-Gabe vorsichtig titrieren – Ziel SpO₂ 88–92% (CO₂-Narkose-Gefahr!)","Pneumonieprophylaxe, Mobilisation, Ernährungsberatung (oft Kachexie)","Patientenedukation: Selbstmanagement, Exazerbationszeichen erkennen"]},{"h":"Komplikationen","li":["Akute Exazerbation (AE-COPD)","Pneumonie · Cor pulmonale · respiratorische Insuffizienz","Pneumothorax · Depression"]}],"cards":[{"q":"Was bedeutet AHA bei COPD?","a":"Auswurf, Husten, Atemnot – die Leitsymptome."},{"q":"Warum vorsichtige O₂-Gabe bei COPD?","a":"Bei chronischer Hyperkapnie kann zu hoher O₂-Spiegel den hypoxischen Atemantrieb dämpfen → CO₂-Narkose. Ziel-SpO₂ 88–92%, Titration nach AVO."},{"q":"Was ist die Lippenbremse?","a":"Atmung gegen leicht gespitzte Lippen – erzeugt PEEP, verhindert Bronchialkollaps, erleichtert Ausatmung."},{"q":"Warum Kutschersitz?","a":"Aufstützen der Arme entlastet Atemhilfsmuskulatur, vergrößert Thoraxvolumen, erleichtert die Atmung."},{"q":"Was ist COPD?","a":"Chronisch obstruktive Lungenerkrankung – chronische Bronchitis + Emphysem mit irreversibler Atemwegsobstruktion. Hauptursache: Rauchen."},{"q":"Welche 4 GOLD-Stadien?","a":"Anhand FEV1: I leicht ≥80% · II mittel 50–79% · III schwer 30–49% · IV sehr schwer <30%. Symptome bei Belastung steigend."},{"q":"Was ist die Lippenbremse?","a":"Ausatmen gegen leicht geschlossene Lippen → Druck in Atemwegen erhöht → verhindert Bronchialkollaps, längere Ausatmung, weniger Atemnot."},{"q":"Warum ist hohe O₂-Gabe bei COPD GEFÄHRLICH?","a":"Bei chronischer Hyperkapnie steuert der O₂-Mangel die Atmung. Hohe O₂-Gabe → Atemantrieb sinkt → CO₂-Narkose, Bewusstlosigkeit. Ziel-SpO₂ 88–92%."},{"q":"Welche atemerleichternden Stellungen?","a":"Kutschersitz, Torwartstellung, Reitsitz – Schultergürtel fixieren, Atemhilfsmuskulatur aktivieren."},{"q":"Welche Inhalationsmedikamente?","a":"Bronchodilatatoren: kurzwirksam (SABA z.B. Salbutamol – Bedarf), langwirksam (LABA, LAMA – Dauer). Kombinationen + ICS bei Exazerbationen."}],"quiz":[{"q":"Herr Berg (69, COPD GOLD III) wird mit 5 L/min O₂ aufgenommen, wird zunehmend schläfrig. Was vermuten Sie?","opts":["Schlafmangel","CO₂-Narkose durch zu viel O₂","Diabetes","Hypoglykämie"],"correct":1,"exp":"Bei COPD vermindert hoher O₂ den hypoxischen Atemantrieb → CO₂ steigt → Bewusstseinsstörung. SpO₂ 88–92% Ziel."},{"q":"Welche Maßnahme erleichtert Frau Schmidt mit COPD die Atmung am meisten?","opts":["Flachlagerung","Kutschersitz mit Lippenbremse","Bauchlage","Schocklage"],"correct":1,"exp":"Kutschersitz entlastet Atemhilfsmuskulatur, Lippenbremse verhindert Bronchialkollaps – klassisch bei COPD."},{"q":"Welche Impfung ist bei COPD besonders wichtig?","opts":["Tetanus jährlich","Grippe + Pneumokokken","Hepatitis A","Tollwut"],"correct":1,"exp":"Influenza- und Pneumokokken-Impfung reduzieren Exazerbationen und Pneumonien."},{"q":"Herr Wagner (68, COPD GOLD III) bekommt im KH 6 L O₂ und wird im Verlauf zunehmend schläfrig. Was vermuten Sie?","opts":["Normaler Schlaf","CO₂-Narkose durch zu hohe O₂-Gabe – Atemantrieb supprimiert","Schlaganfall","Hypoglykämie"],"correct":1,"exp":"Bei COPD: Ziel-SpO₂ 88–92%. Hohe O₂-Gabe unterdrückt den Atemantrieb (CO₂-Narkose) → BGA, Reduktion, ggf. NIV."},{"q":"Welche Atemtechnik hilft bei COPD-Atemnot?","opts":["Schnelles Hecheln","Lippenbremse + atemerleichternde Stellung (z.B. Kutschersitz)","Tiefes pressen","Luft anhalten"],"correct":1,"exp":"Lippenbremse hält Atemwege offen, Kutschersitz aktiviert Atemhilfsmuskulatur – Standard bei COPD-Akutphase."},{"q":"Welche Aussage zur COPD-Therapie ist FALSCH?","opts":["Rauchstopp ist wichtigste Maßnahme","Inhalation muss korrekt durchgeführt werden","Hohe O₂-Gabe immer sicher","Pneumokokken- und Grippeimpfung empfohlen"],"correct":2,"exp":"Hohe O₂-Gabe kann bei COPD CO₂-Narkose auslösen – kontrollierte Gabe nach SpO₂-Ziel 88–92%."},{"q":"Welche Komplikation ist bei COPD häufig?","opts":["Cor pulmonale (Rechtsherzbelastung)","Diabetes Typ 1","Hyperthyreose","Anämie"],"correct":0,"exp":"Chronische Hypoxie führt zu pulmonaler Hypertonie und Rechtsherzbelastung (Cor pulmonale)."}]},{"key":"asthma","name":"Asthma bronchiale","rel":"h","cheat":[{"h":"Definition","li":["Chronisch-entzündliche Atemwegserkrankung mit anfallsweiser, reversibler Obstruktion","Allergisch (extrinsisch) vs. nicht-allergisch (intrinsisch)","Bronchiale Hyperreagibilität auf Trigger"]},{"h":"Trigger","li":["Allergene (Pollen, Hausstaubmilben, Tiere)","Infekte, Anstrengung, Kälte, Rauch, Stress","Medikamente (ASS, Betablocker), berufliche Stoffe"]},{"h":"Symptome","li":["Anfallsweise Atemnot mit verlängertem Exspirium","Giemen, Brummen, Pfeifen (exspiratorischer Stridor)","Trockener Reizhusten, Engegefühl in der Brust","Status asthmaticus: schwerer, therapieresistenter Anfall – Notfall!"]},{"h":"Diagnostik","li":["Spirometrie mit Reversibilitätstest (FEV1-Anstieg >12% nach Bronchodilatator)","Peak-Flow-Messung (Verlauf), Allergietests, FeNO"]},{"h":"Therapie – Stufenschema","li":["Bedarf: SABA (kurzwirksame Beta-2-Sympathomimetika, z.B. Salbutamol)","Dauer: ICS (inhalative Kortikoide), bei Bedarf LABA, LTRA","Schwer: Biologika, orale Kortikoide","Anfall: O₂, Salbutamol-Inhalation, Kortikoide systemisch"]},{"h":"Pflegerische Maßnahmen","li":["Im Anfall: Ruhe, Oberkörper hoch, Lippenbremse, Notfallspray, Arzt","Inhalationstechnik schulen (Spacer!), Peak-Flow-Tagebuch","Triggervermeidung, Allergenexposition reduzieren","Asthma-Aktionsplan (Ampelschema) erklären"]}],"cards":[{"q":"Wie unterscheidet sich Asthma von COPD?","a":"Asthma: anfallsweise, reversibel, oft jüngere Patienten, allergisch. COPD: chronisch progredient, nicht vollständig reversibel, meist Raucher >40 Jahre."},{"q":"Was ist der Status asthmaticus?","a":"Schwerer, anhaltender Asthmaanfall, der nicht auf die übliche Therapie anspricht – lebensbedrohlich, Klinik!"},{"q":"Was ist beim Inhalieren mit Spacer wichtig?","a":"Spacer verbessert die Lungendeposition – Spray einsprühen, langsam tief einatmen, kurz halten, ausatmen. Nach ICS Mund spülen."},{"q":"Was ist Asthma bronchiale?","a":"Anfallsartige, REVERSIBLE Atemwegsobstruktion durch Hyperreagibilität, Entzündung, Bronchospasmus, Schleimhautschwellung. Allergisch oder nicht-allergisch."},{"q":"Asthma vs. COPD – Unterschiede?","a":"Asthma: anfallsartig, REVERSIBEL, oft jung, allergisch. COPD: progressiv, IRREVERSIBEL, oft Raucher, ab 40."},{"q":"Welche Sofortmaßnahmen bei Asthmaanfall?","a":"Atemerleichternde Stellung, Lippenbremse, Bedarfsspray (SABA z.B. Salbutamol) inhalieren lassen, bei Verschlechterung Notarzt + O₂."},{"q":"Welche Medikamentenklassen bei Asthma?","a":"Reliever: SABA (Salbutamol) bei Akutbeschwerden. Controller: ICS (inhal. Steroide) zur Dauertherapie, LABA, Leukotrienantagonisten, Biologika bei schwerem Asthma."}],"quiz":[{"q":"Maria (16) bekommt im Anfall Salbutamol. Wie wirkt es?","opts":["Entzündungshemmend","Bronchodilatatorisch über Beta-2-Rezeptoren","Schleimlösend","Antiallergisch"],"correct":1,"exp":"Salbutamol = SABA, kurzwirksamer Beta-2-Agonist → schnelle Bronchodilatation."},{"q":"Warum nach ICS-Inhalation Mund spülen?","opts":["Wegen Geschmack","Vermeidung von Mundsoor und Heiserkeit","Bessere Wirkung","Pflicht durch Hersteller"],"correct":1,"exp":"Inhalative Kortikoide begünstigen Soor (Candida) – immer mit Wasser spülen oder essen/trinken."},{"q":"Welche Aussage zur Asthma-Inhalation ist KORREKT?","opts":["ICS nur im Anfall","ICS regelmäßig täglich – auch beschwerdefrei","Salbutamol immer 4× täglich","Inhalation egal"],"correct":1,"exp":"Inhalative Steroide (ICS) wirken antiinflammatorisch – nur regelmäßig wirksam. Salbutamol ist Bedarfs-Reliever."},{"q":"Welcher Patient hat REVERSIBLE Atemwegsobstruktion?","opts":["COPD GOLD IV","Asthma bronchiale","Lungenfibrose","Pleuraerguss"],"correct":1,"exp":"Asthma ist die klassische reversible Obstruktion – nach Bronchodilatator deutliche Besserung im FEV1."},{"q":"Welche Auslöser können Asthmaanfälle triggern?","opts":["Pollen, Tierhaare, Hausstaubmilben, Tabakrauch, Anstrengung, Infekte","Nur Pollen","Nur Stress","Keine"],"correct":0,"exp":"Multiple Trigger – allergen und unspezifisch. Trigger-Anamnese hilft bei Vermeidungsstrategie."}]},{"key":"pneumonie","name":"Pneumonie","rel":"vh","cheat":[{"h":"Definition","li":["Akute Entzündung des Lungenparenchyms (Alveolen, Interstitium)","Erreger: Bakterien (häufigster: Pneumokokken), Viren, Pilze","CAP (community-acquired) vs. HAP (hospital-acquired) vs. VAP (ventilator-associated)"]},{"h":"Risikofaktoren","li":["Hohes Alter, Immobilität, Bettlägerigkeit","COPD, Herzinsuffizienz, Diabetes, Immunsuppression","Aspiration (Dysphagie, Bewusstseinsstörung), Beatmung, OP, Rauchen"]},{"h":"Symptome","li":["Plötzliches Fieber, Schüttelfrost, produktiver Husten (eitrig, ggf. blutig)","Tachypnoe, Dyspnoe, Pleuraschmerz, abgeschwächtes Atemgeräusch","Bei alten Menschen oft atypisch: Verwirrtheit, Schwäche, kein Fieber"]},{"h":"Diagnostik","li":["Auskultation, Perkussion, Vitalzeichen, SpO₂","Röntgen-Thorax (Goldstandard), Labor (CRP, Leukos), BGA","Sputum-/Blutkultur, Erregernachweis"]},{"h":"Therapie","li":["Antibiotika (kalkuliert: z.B. Amoxicillin/Clavulansäure), nach Antibiogramm","O₂-Gabe nach AVO, Antipyretika, Mukolytika, ausreichende Flüssigkeit","Bei schwerer Pneumonie: stationär, ggf. Beatmung"]},{"h":"Pflegerische Maßnahmen","li":["Pneumonieprophylaxe (siehe unten) auch in Therapie!","Vitalzeichen, SpO₂, Atembeobachtung, Bewusstsein","Atemerleichternde Lagerung (V-A-T-Lagerung, Oberkörper hoch)","Atemtherapie: Triflo, Lippenbremse, Atemübungen, Klopfmassage","Sekretmobilisation: ausreichend trinken (2 L), Inhalation","Mund-/Schleimhautpflege, Mobilisation, Ernährung kalorienreich"]},{"h":"Pneumonieprophylaxe","li":["Atemstimulation (Triflo, Pari-Boy)","Mobilisation, Oberkörper hoch","Mundpflege, Aspirationsschutz bei Dysphagie","Sekretolyse, Nichtraucher-Beratung, Impfungen (Pneumokokken, Influenza)"]}],"cards":[{"q":"Was ist die V-A-T-Lagerung?","a":"Lagerungsdrainage: V-Lage (beide Seiten unterpolstert, Brustkorb hoch), A-Lage (asymmetrisch), T-Lage – fördert Belüftung schlecht ventilierter Areale."},{"q":"Atypische Symptome bei älteren Patienten?","a":"Statt Fieber: Verwirrtheit, Schwäche, Appetitlosigkeit, Sturz – immer auf Pneumonie denken!"},{"q":"Wichtigste 5 Pneumonieprophylaxe-Maßnahmen?","a":"Atemstimulation, Mobilisation, Oberkörperhochlagerung, Mund-/Schleimhautpflege, Sekretolyse + Aspirationsschutz."},{"q":"Welche typischen Symptome bei Pneumonie?","a":"Hohes Fieber mit Schüttelfrost, produktiver Husten (eitriger Auswurf), Thoraxschmerz beim Husten, Tachypnoe, Tachykardie, RGs. Bei Älteren oft atypisch (Verwirrtheit, Inappetenz)."},{"q":"Ambulant vs. nosokomiale Pneumonie?","a":"Ambulant erworbene (CAP): Pneumokokken häufig, milder. Nosokomial (HAP): >48h nach Aufnahme, multiresistente Erreger möglich (Pseudomonas, MRSA), schwerer."},{"q":"Welche Risikofaktoren für Pneumonie?","a":"Hohes Alter, Immobilität, Schluckstörung (Aspiration!), COPD/Herzinsuff., Bewusstseinsstörung, Beatmung, Mangelernährung, schlechte Mundhygiene."},{"q":"Pflegerische Pneumonieprophylaxe (4 Säulen)?","a":"Atemstimulation (Triflo, Kontaktatmung), Mobilisation/Lagerung, Mundpflege (orale Keime!), Aspirationsprophylaxe, Sekretolyse (trinken, inhalieren)."},{"q":"Welche Lagerung bei einseitiger Pneumonie?","a":"Kranke Seite oben → bessere Belüftung der gesunden Lunge, Sekretdrainage. Bei beidseitig: oberkörperhoch, regelmäßiger Wechsel."},{"q":"Begründen Sie die Mundpflege als Pneumonieprophylaxe.","a":"Orale Bakterien werden mikroaspiriert → wandern in Lunge. Gute Mundpflege senkt nachweislich nosokomiale Pneumonien (besonders bei intubierten/sondernährten Patienten)."}],"quiz":[{"q":"Herr Bauer (82) ist nach Schenkelhalsfraktur immobil. Welche Pneumonieprophylaxe-Maßnahme ist falsch?","opts":["Mobilisation in den Sessel","Atemübungen mit Triflo","Strenge Bettruhe und Flachlagerung","Mundpflege"],"correct":2,"exp":"Bettruhe + Flachlagerung erhöhen Pneumonierisiko – Oberkörper hoch + Mobilisation sind Standard."},{"q":"Warum bei alten Patienten besonders wachsam bei Pneumonie?","opts":["Sie husten mehr","Symptome oft atypisch (Verwirrtheit statt Fieber)","Sie haben keine Lunge","Es gibt keine Pneumonien bei Alten"],"correct":1,"exp":"Atypische Symptomatik (Delir, Schwäche, kein Fieber) – verzögerte Diagnose, höhere Mortalität."},{"q":"Frau Lange (82, demenzkrank) ist seit 1 Tag verwirrt, Atemfrequenz 24/min, T 38,5°C. Was vermuten Sie?","opts":["Demenzverschlechterung","Pneumonie – bei Älteren oft atypisch (Verwirrtheit, Tachypnoe statt Husten)","Sturz","Hypertonie"],"correct":1,"exp":"Bei Älteren Pneumonie häufig ohne klassische Symptome – Verwirrtheit, Tachypnoe, Inappetenz als Hinweis. Diagnostik: Labor, Rö, BGA."},{"q":"Welche Maßnahme ist NICHT Pneumonieprophylaxe?","opts":["Mundpflege","Mobilisation","Strenge Bettruhe ohne Atemtraining","Atemstimulation mit Triflo"],"correct":2,"exp":"Bettruhe ohne Mobilisation/Atemtraining FÖRDERT Pneumonie – Hypoventilation, Sekretretention."},{"q":"Bei welchem Patienten ist die Aspirationsprophylaxe besonders wichtig?","opts":["Junge Sportler","Patienten mit Schluckstörung (z.B. Apoplex, fortgeschrittene Demenz)","Schwangere","Gesunde"],"correct":1,"exp":"Schluckstörungen → Aspirationsrisiko → Aspirationspneumonie (bes. bakterielle Mundflora!). Schluckscreening zentral."},{"q":"Welche 4 Säulen der Pneumonieprophylaxe?","opts":["Bettruhe, Sondenkost, Antibiotika, Sauerstoff","Atemstimulation, Mobilisation, Mundpflege, Aspirationsschutz","Massage, Wärme, Trinken, Schlaf","Nur Inhalation"],"correct":1,"exp":"Diese 4 Säulen sind evidenzbasierter Standard zur Vermeidung nosokomialer Pneumonien."}]},{"key":"lungenembolie","name":"Lungenembolie (LE)","rel":"vh","cheat":[{"h":"Definition","li":["Plötzlicher Verschluss einer oder mehrerer Lungenarterien durch Embolus (meist aus TVT)","Lebensbedrohlicher Notfall!"]},{"h":"Risikofaktoren","li":["Identisch mit TVT: Immobilität, OP, Adipositas, Rauchen, Pille, Tumor, Schwangerschaft","Z.n. TVT, Thrombophilie"]},{"h":"Symptome","li":["Plötzliche Dyspnoe, Tachypnoe, Tachykardie","Akuter Thoraxschmerz (atemabhängig), Husten, Hämoptyse","Schwindel, Synkope, Todesangst, Zyanose","Bei massiver LE: Schock, Kreislaufstillstand"]},{"h":"Diagnostik","li":["Wells-Score, D-Dimere","CT-Angiografie (Goldstandard), Echokardiografie, BGA","EKG (S1Q3-Typ), Troponin, NT-proBNP"]},{"h":"Therapie","li":["Sofort: Notruf, Oberkörper hoch, O₂, beruhigen, Vitalzeichen","Antikoagulation: Heparin, NMH, NOAK","Bei schwerer LE: Lyse, ggf. Embolektomie"]},{"h":"Pflegerische Maßnahmen","li":["Strenge Beobachtung: Vitalzeichen, SpO₂, Bewusstsein, Atemmuster","Bettruhe initial, Schmerzerfassung","Antikoagulation: Blutungszeichen!","Psychische Begleitung – Todesangst","Folge-TVT-Prophylaxe konsequent umsetzen"]}],"cards":[{"q":"Wo entsteht der Embolus meist?","a":"Aus tiefer Beinvenenthrombose (TVT) – wandert über V. cava, rechtes Herz in die Lungenarterien."},{"q":"Welche 3 Leitsymptome?","a":"Plötzliche Dyspnoe, atemabhängiger Thoraxschmerz, Tachykardie. Plus: Husten, Hämoptyse, Synkope."},{"q":"Welche Lagerung?","a":"Oberkörper hochlagern (atemerleichternd), KEINE Schocklage – verschlechtert die Situation."},{"q":"Was ist eine Lungenembolie?","a":"Plötzlicher Verschluss einer Lungenarterie meist durch verschleppten Thrombus aus tiefer Beinvene → Lungeninfarkt, Rechtsherzbelastung. Lebensbedrohlich!"},{"q":"Welche Symptom-Trias spricht typisch für LE?","a":"Plötzliche Dyspnoe + Thoraxschmerz + Tachykardie. Plus: Husten, Hämoptysen, Synkope, ggf. Schock. ABER: Symptome variabel, oft unspezifisch!"},{"q":"Welche Sofortmaßnahmen?","a":"Notruf, Oberkörper hoch (NICHT flach!), O₂, Vitalzeichen, Antikoagulation nach AVO (Heparin i.v.), Bettruhe absolut, ruhig stellen → Embolie nicht weiter verschleppen."},{"q":"Welche Diagnostik?","a":"D-Dimer (sensitiv aber unspezifisch), CT-Pulmonalisangiographie (Goldstandard), EKG (S₁Q₃-Muster), Echo bei kreislaufinstabilen Patienten."},{"q":"Welcher Risikoscore wird verwendet?","a":"Wells-Score (klinische LE-Wahrscheinlichkeit) oder Geneva-Score – kombiniert mit D-Dimer-Testung zur Therapiestratifikation."}],"quiz":[{"q":"Frau Schulze (60), 3. Tag postoperativ Hüft-TEP, klagt plötzlich über Atemnot und Brustschmerz, ist tachykard. Verdacht?","opts":["Pneumonie","Lungenembolie","Reflux","Asthmaanfall"],"correct":1,"exp":"Klassische LE-Symptomatik nach OP – sofort Notruf, O₂, Oberkörper hoch."},{"q":"Herr Voss (5 Tage post-OP) klagt plötzlich über Atemnot + Brustschmerz + Tachykardie 130/min. Was tun ZUERST?","opts":["Beruhigend zureden, abwarten","Notarzt + Oberkörperhochlagerung + O₂ + Vitalzeichen + Bettruhe ABSOLUT – Verdacht LE","Spazierengehen","Nitroglycerin sublingual"],"correct":1,"exp":"Klassische LE-Symptomatik nach OP. Sofortmaßnahmen + KEINE Mobilisation (Embolie nicht weiter verschleppen!)."},{"q":"Welche Lagerung bei Lungenembolie?","opts":["Flach","Oberkörper hoch (30–45°)","Schocklage Beine hoch","Bauchlage"],"correct":1,"exp":"Oberkörperhoch entlastet das Herz und verbessert Atmung. KEINE Schocklage (mehr Volumen zum Herzen)."},{"q":"Welche Aussage ist KORREKT?","opts":["LE entsteht meist im Herzen","LE entsteht meist als verschleppte tiefe Beinvenenthrombose","LE und TVT sind völlig getrennt","LE betrifft nur Ältere"],"correct":1,"exp":"TVT und LE sind dieselbe Erkrankung an verschiedenen Stellen (VTE = venöse Thromboembolie)."}]},{"key":"diabetes","name":"Diabetes mellitus Typ 1 & 2","rel":"vh","cheat":[{"h":"Definition","li":["Chronische Stoffwechselerkrankung mit Hyperglykämie","Typ 1: Autoimmune Zerstörung der Betazellen → absoluter Insulinmangel (oft jung)","Typ 2: Insulinresistenz + relativer Insulinmangel (meist >40, Adipositas)","Gestationsdiabetes, MODY u.a. Sonderformen"]},{"h":"Symptome","li":["Polyurie, Polydipsie, Gewichtsverlust (v.a. Typ 1)","Müdigkeit, schlechte Wundheilung, Infektanfälligkeit","Hyperglykämie: BZ >250, Müdigkeit bis Coma diabeticum","Hypoglykämie: BZ <70, Schwitzen, Zittern, Heißhunger, Bewusstseinsstörung"]},{"h":"Diagnostik","li":["Nüchternblutzucker ≥126 mg/dl (7,0 mmol/l) – mehrfach","HbA1c ≥6,5% (langfristiger BZ-Wert, letzte 2–3 Monate)","OGTT: 2-h-Wert ≥200 mg/dl"]},{"h":"Therapie","li":["Typ 1: Insulin lebenslang (Basis-Bolus, ICT, Pumpe)","Typ 2: Lebensstil → Metformin → weitere OAD → ggf. Insulin","Antidiabetika: Metformin, SGLT2-Hemmer, GLP-1-Analoga, DPP-4-Hemmer, Sulfonylharnstoffe","Insulinarten: Normalinsulin (kurz), Analoga, NPH (Verzögerung), Mischinsuline"]},{"h":"Pflegerische Maßnahmen","li":["BZ-Messung (4 R: richtige Zeit, richtige Stelle, richtiges Gerät, richtige Hygiene)","Insulingabe: Spritz-Ess-Abstand, Bauchgewebe rotierend (Nicht-OP-Seite)","Diabetisches Fußsyndrom: tägliche Inspektion, Hautpflege, geeignete Schuhe","Schulung: BZ-Selbstkontrolle, Insulinanpassung, Hypo-Erkennung","Ernährungsberatung: BE/KE-Berechnung, gesunde Mischkost"]},{"h":"Hypoglykämie (BZ <70)","li":["Symptome: Schwitzen, Zittern, Heißhunger, Konzentration↓, Aggression, Bewusstlosigkeit","Bewusst: Traubenzucker, Saft (15–20 g schnelle KH), nach 15 min messen","Bewusstlos: stabile Seitenlage, Glukagon i.m. nach AVO, Notruf, KEINE orale Gabe!"]},{"h":"Hyperglykämie / Coma diabeticum","li":["Ketoazidotisch (Typ 1): BZ >250, Übelkeit, Kussmaul-Atmung, Acetongeruch","Hyperosmolar (Typ 2): BZ >600, Exsikkose, Bewusstseinsstörung","Beide: Notfall – Insulin, Flüssigkeit, Elektrolyte i.v., Klinik"]},{"h":"Komplikationen","li":["Mikrovaskulär: Retinopathie, Nephropathie, Polyneuropathie","Makrovaskulär: KHK, Schlaganfall, pAVK","Diabetisches Fußsyndrom · Coma diabeticum · Hypoglykämie"]}],"cards":[{"q":"Hauptunterschied Typ 1 vs. Typ 2?","a":"Typ 1: absoluter Insulinmangel (Autoimmun), insulinpflichtig, oft jung, schlank. Typ 2: Insulinresistenz, oft Adipositas, später ggf. Insulin."},{"q":"Welche Maßnahme bei BZ 50, Patient ansprechbar?","a":"20 g schnelle KH (Saft, Traubenzucker), nach 15 min BZ messen, ggf. wiederholen, dann komplexe KH (Brot)."},{"q":"Welche Maßnahme bei bewusstlosem Patienten mit Hypoglykämie?","a":"Stabile Seitenlage, KEINE orale Gabe (Aspiration!), Glukagon i.m. nach AVO, Notruf."},{"q":"Was ist HbA1c?","a":"Glykiertes Hämoglobin – Marker für mittleren BZ der letzten 8–12 Wochen. Zielwert meist <7%."},{"q":"Diabetisches Fußsyndrom – 3 Vorbeugemaßnahmen?","a":"Tägliche Fußinspektion, Hautpflege ohne Mazeration, geeignete Schuhe; nicht barfuß laufen, Nägel feilen statt schneiden."},{"q":"Diabetes Typ 1 vs. Typ 2 – Pathophysiologie?","a":"Typ 1: autoimmune Zerstörung der β-Zellen → ABSOLUTER Insulinmangel. Typ 2: Insulinresistenz + relativer Mangel, oft Lebensstil/Übergewicht."},{"q":"Welche BZ-Grenzwerte für Diabetes?","a":"Nüchtern ≥126 mg/dl (zwei Mal), HbA1c ≥6,5%, oGTT 2-h-Wert ≥200 mg/dl, Gelegenheits-BZ ≥200 mg/dl mit Symptomen."},{"q":"Symptome Hypoglykämie?","a":"Adrenerg: Schwitzen, Zittern, Heißhunger, Tachykardie. Neuroglyk.: Konzentration, Verwirrtheit, Sehstörung, Aggressivität, bis Krampf/Bewusstlosigkeit. <50 mg/dl."},{"q":"Sofortmaßnahmen bei Hypoglykämie?","a":"Wach: schnelle KH (Traubenzucker, Saft) + langsame KH danach. Bewusstlos: KEINE orale Gabe! Glukagon i.m./s.c. nach AVO oder G40 i.v., Notarzt."},{"q":"Symptome Hyperglykämie / Ketoazidose?","a":"Polyurie, Polydipsie, Müdigkeit, Sehstörung. Ketoazidose: Übelkeit, Erbrechen, Bauchschmerz, Kußmaul-Atmung, Aceton-Atem, Bewusstseinsstörung – Notfall!"},{"q":"Welche Insulinarten gibt es?","a":"Schnellwirksam (Bolus zum Essen): Lispro, Aspart, Glulisin. Normal-/Altinsulin. Verzögerungsinsulin (Basal): NPH, Glargin, Detemir, Degludec. Mischinsuline."},{"q":"Welche Pflege beim diabetischen Fußsyndrom?","a":"Tägl. Inspektion (Druckstellen, Risse), keine harten Pediküre-Tools, geeignete Schuhe, gute Hautpflege, Mykosen behandeln, Wunden ernst nehmen, Nichtraucher."},{"q":"Wie wird Insulin korrekt s.c. injiziert?","a":"Bauch (schnellste Resorption) oder Oberschenkel/Gesäß. Hautfalte bilden bei dünnen Patienten/kurzer Nadel, 90° injizieren, 10 Sek. halten, Spritzstellen rotieren."}],"quiz":[{"q":"Herr Klein (68, Typ 2) wird zunehmend zittrig, kaltschweißig, BZ 52 mg/dl. Erste Maßnahme?","opts":["Insulin geben","Glukose i.v.","20 g schnelle KH oral, BZ in 15 min kontrollieren","Patient mobilisieren"],"correct":2,"exp":"Klassische Hypoglykämie bei wachem Patient – orale schnelle KH (Traubenzucker, Saft), BZ-Kontrolle nach 15 min."},{"q":"Warum Insulin in den Bauch und nicht in den Oberschenkel beim selben Patienten täglich an gleicher Stelle?","opts":["Schmerzhafter","Bauch ist hygienischer","Lipohypertrophie verhindern und gleichmäßige Resorption","Es gibt keinen Unterschied"],"correct":2,"exp":"Wechselnde Spritzstellen verhindern Lipohypertrophie und sorgen für vorhersagbare Resorption."},{"q":"Welcher Wert spricht für gute Langzeit-BZ-Einstellung?","opts":["Nüchtern-BZ 80","HbA1c <7%","Postprandialer BZ 200","Urinzucker negativ"],"correct":1,"exp":"HbA1c <7% (individuell <6,5–7,5%) ist der Zielparameter für die Langzeit-Einstellung."},{"q":"Herr Klein (Typ 1) ist plötzlich verwirrt, schwitzt, BZ 42 mg/dl. Was tun?","opts":["Insulin geben","Schnelle KH oral (z.B. Traubenzucker, Saft) + dann langsame KH (Brot)","Wasser trinken","Abwarten"],"correct":1,"exp":"Hypoglykämie wach: schnelle + langsame KH. Insulin würde Hypo verschlimmern (lebensgefährlich!)."},{"q":"Patientin (Typ 2) BZ 540 mg/dl, Atem süßlich, Bewusstsein getrübt. Was vermuten Sie?","opts":["Hypoglykämie","Hyperglykämische Entgleisung mit Ketoazidose – Notfall!","Pneumonie","Schlaganfall"],"correct":1,"exp":"Aceton-Atem + hoher BZ + Bewusstseinsstörung = Ketoazidose. Notfall, Volumen, Insulin i.v., Elektrolyte, Intensivstation."},{"q":"Welche Aussage zur Insulin-Injektion ist KORREKT?","opts":["Immer dieselbe Stelle nutzen","Spritzstellen rotieren – sonst Lipohypertrophie und unzuverlässige Resorption","Nur intramuskulär","Direkt nach dem Essen"],"correct":1,"exp":"Wechsel der Spritzstellen verhindert Lipohypertrophie (Verhärtungen) und sichert konstante Wirkung."},{"q":"Welche Komplikation gehört zu den diabetischen Spätschäden?","opts":["Retinopathie, Nephropathie, Neuropathie, diabetischer Fuß, KHK","Nur Sehstörung","Nur Karies","Keine"],"correct":0,"exp":"Diabetes ist Systemerkrankung – die Spätschäden begründen die strenge Stoffwechselkontrolle."},{"q":"Frau Berg (78, Typ 2) hat einen Druckulkus an der Ferse. Was ist die wichtigste Pflege?","opts":["Massieren","Druckentlastung + Wundversorgung + BZ-Kontrolle + Schuhwerk anpassen + Diabetiker-Fußschulung","Wärmflasche","Fußbad heiß"],"correct":1,"exp":"Heiße Bäder/Wärmflaschen kontraindiziert (Sensibilität↓, Verbrennungsgefahr). Druckentlastung + Wundbehandlung sind zentral."}]},{"key":"anaemie","name":"Anämie","rel":"m","cheat":[{"h":"Definition","li":["Verminderung von Hämoglobin / Erythrozyten / Hämatokrit","Frauen Hb <12 g/dl, Männer <13 g/dl","Häufigste Form: Eisenmangelanämie"]},{"h":"Ursachen","li":["Eisenmangel: Blutverlust (Menstruation, GI-Blutung), Mangelernährung, Resorptionsstörung","Vitamin-B12-Mangel: perniziöse Anämie, Veganer, Atrophie","Folsäuremangel: Schwangerschaft, Alkohol","Renale Anämie: EPO-Mangel bei Niereninsuffizienz","Hämolytisch, aplastisch, Tumor"]},{"h":"Symptome","li":["Allgemein: Müdigkeit, Leistungsschwäche, Blässe (Haut, Schleimhäute, Konjunktiven)","Tachykardie, Belastungsdyspnoe, Schwindel, Kopfschmerz","Bei Eisenmangel: brüchige Nägel, Mundwinkelrhagaden, Haarausfall","B12-Mangel: neurologisch (Kribbeln, Gangunsicherheit), Glossitis"]},{"h":"Diagnostik","li":["BB: Hb, Erythrozyten, MCV, MCH","Eisenstatus: Ferritin, Transferrin-Sättigung","B12, Folsäure, Retikulozyten, ggf. KMP"]},{"h":"Therapie","li":["Eisenmangel: Eisensubstitution oral (nüchtern, mit Vit C) oder i.v.","B12: i.m./oral Substitution","Folsäure: oral","Renal: EPO-Substitution","Ursachensuche! (z.B. okkulte GI-Blutung)"]},{"h":"Pflegerische Maßnahmen","li":["Sturzprophylaxe (Schwindel, Schwäche)","Energiemanagement, ausreichende Pausen","Eisengabe: nüchtern + Vitamin C, schwarzer Stuhl, GI-NW","Ernährungsberatung: rotes Fleisch, Hülsenfrüchte, Vit C, Tee/Kaffee meiden zur Mahlzeit","Beobachtung Hämatome, Blutungen"]}],"cards":[{"q":"Häufigste Anämieform?","a":"Eisenmangelanämie – mikrozytär hypochrom (MCV↓, MCH↓), niedriges Ferritin."},{"q":"Warum Eisen mit Vitamin C einnehmen?","a":"Vitamin C reduziert Eisen zur besser resorbierbaren Form (Fe2+) und steigert die Aufnahme."},{"q":"Welche typische NW von Eisenpräparaten?","a":"Schwarzfärbung des Stuhls, Obstipation, Übelkeit, metallischer Geschmack – Patienten aufklären."},{"q":"Welche Anämieformen gibt es?","a":"Eisenmangel (häufigste!), Vit-B12-Mangel (perniziös), Folsäuremangel, hämolytisch, renal, aplastisch, Tumor-bedingt."},{"q":"Welche Symptome sprechen für Anämie?","a":"Müdigkeit, Blässe (Konjunktiven, Schleimhäute), Tachykardie, Belastungsdyspnoe, Schwindel, brüchige Nägel, Mundwinkelrhagaden (bei Eisenmangel)."},{"q":"Wie wird Eisen oral korrekt eingenommen?","a":"Nüchtern (1 h vor Essen), mit Vit-C-Saft (bessere Resorption), KEIN Kaffee/Tee/Milch (hemmt). NW: schwarzer Stuhl, GI-Beschwerden."}],"quiz":[{"q":"Frau Lange (45) klagt über Müdigkeit, Hb 9 g/dl, MCV 70 fl. Welche Diagnose ist wahrscheinlich?","opts":["Vitamin-B12-Mangel","Eisenmangelanämie","Folsäuremangel","Hämolyse"],"correct":1,"exp":"Mikrozytäre (MCV niedrig) Anämie spricht für Eisenmangel. B12/Folsäuremangel wäre makrozytär."},{"q":"Patientin nimmt Eisentabletten. Welcher Hinweis ist KORREKT?","opts":["Mit Milch zur Magenschonung","Nüchtern mit Vit C, kein Kaffee/Tee","Abends mit Cola","Egal wann"],"correct":1,"exp":"Resorption hängt von Vit C, Milch/Kaffee/Tee hemmen. Schwarzer Stuhl ist normale NW."},{"q":"Welche Anämieform ist am häufigsten?","opts":["Hämolytisch","Eisenmangel","Perniziös","Aplastisch"],"correct":1,"exp":"Eisenmangelanämie ist mit Abstand häufigste Form weltweit."}]},{"key":"ernaehrung","name":"Adipositas & Mangelernährung","rel":"h","cheat":[{"h":"Adipositas – BMI","li":["BMI = Gewicht (kg) / Größe² (m)","Übergewicht: 25–29,9 · Adipositas Grad I: 30–34,9","Grad II: 35–39,9 · Grad III: ≥40 (morbide Adipositas)"]},{"h":"Adipositas – Risiken","li":["Diabetes, Hypertonie, KHK, Schlaganfall","Schlafapnoe, Arthrose, Tumoren, Fettleber","Psychisch: Depression, Stigmatisierung"]},{"h":"Mangelernährung – Definition","li":["Ungewollter Gewichtsverlust >5% in 3 Monaten oder >10% in 6 Monaten","BMI <18,5 (bei Älteren <20) ist Risiko","MUST-Score, NRS-2002 zur Erfassung"]},{"h":"Risikofaktoren Mangelernährung","li":["Hohes Alter, Demenz, Depression, Schluckstörung","Tumor, Polypharmazie, Zahnstatus","Soziale Isolation, Armut"]},{"h":"Symptome","li":["Gewichtsverlust, Muskelabbau (Sarkopenie)","Müdigkeit, Leistungsabfall, schlechte Wundheilung","Infektanfälligkeit, Hautveränderungen, Ödeme"]},{"h":"Pflegerische Maßnahmen","li":["Erfassung: Wiegen, BMI, MUST, NRS-2002","Ernährungsanamnese, Vorlieben/Abneigungen, Kulturelles","Energie- und eiweißreich anreichern (Maltodextrin, Eiweißpulver, Trinknahrung)","Mahlzeiten gestalten: Häppchenformat, ansprechend, Gesellschaft","Hilfe beim Essen, Hilfsmittel, ggf. Sondennahrung","Adipositas: Ernährungsumstellung, Bewegung, Verhaltenstherapie, ggf. bariatrische Chirurgie"]}],"cards":[{"q":"Wann gilt jemand als mangelernährt?","a":"Ungewollter Gewichtsverlust >5% in 3 Monaten oder >10% in 6 Monaten, BMI <18,5 (bei Älteren <20), oder MUST-Score ≥2."},{"q":"Was ist Sarkopenie?","a":"Altersbedingter Muskelabbau – führt zu Schwäche, Stürzen, Pflegebedürftigkeit. Gegenmaßnahmen: Bewegung + Eiweiß."},{"q":"5 Methoden zur Anreicherung der Nahrung?","a":"Sahne/Butter zugeben, Maltodextrin/Eiweißpulver, Trinknahrung, mehrere kleine Mahlzeiten, Lieblingsspeisen."},{"q":"BMI-Klassifikation Erwachsene?","a":"<18,5 Untergewicht · 18,5–24,9 Normal · 25–29,9 Übergewicht · 30–34,9 Adipositas Grad I · 35–39,9 Grad II · ≥40 Grad III. Bei Älteren BMI 22–29 als Normal."},{"q":"Was misst die MUST-Skala?","a":"Malnutrition Universal Screening Tool: BMI, ungewollter Gewichtsverlust 3–6 Monate, akute Krankheit ohne Nahrungsaufnahme >5 Tage. Ergibt Risikoscore."},{"q":"Welche Pflegemaßnahmen bei Mangelernährung?","a":"Wunschkost, Mahlzeiten anreichern, kleine häufige Portionen, Trinknahrung, Esshilfen, Atmosphäre, Mundhygiene, Zähne kontrollieren, Ursache klären."},{"q":"Begründen Sie eiweißreiche Kost im Alter.","a":"Sarkopenie (Muskelabbau) durch Alterung – Eiweißbedarf 1,0–1,2 g/kg/d, bei Krankheit höher. Wichtig für Mobilität, Sturzprävention, Wundheilung."}],"quiz":[{"q":"Herr Maier (84, Demenz) hat in 3 Monaten 6 kg verloren. Erste Maßnahme?","opts":["Sondennahrung","Ernährungserfassung mit MUST/NRS, Essbiografie, Anreicherung","Diät","Antidepressiva"],"correct":1,"exp":"Erst systematisch erfassen, dann individuelle Maßnahmen ableiten – Anreicherung vor Sondennahrung."},{"q":"Frau Berg (84) hat in 3 Monaten 5 kg abgenommen, BMI 19. Was tun?","opts":["Diät","Strukturierte Erfassung mit MUST/MNA, Ursachenanalyse, Maßnahmen ableiten","Sondenkost sofort","Ignorieren"],"correct":1,"exp":"Strukturiertes Vorgehen nach Expertenstandard – Ursache (Schluckstörung? Soziales? Depression? Krankheit?) bestimmt Maßnahmen."},{"q":"Welche Aussage zum Eiweißbedarf älterer Menschen ist KORREKT?","opts":["Bedarf sinkt mit dem Alter","Bedarf bleibt konstant bei 1,0–1,2 g/kg/d, bei Krankheit höher – wichtig für Muskelerhalt","Bedarf ist beliebig","Eiweiß ist im Alter schädlich"],"correct":1,"exp":"Höherer relativer Bedarf wegen anaboler Resistenz. Gute Eiweißversorgung erhält Muskeln und Selbstständigkeit."}]},{"key":"niereninsuff","name":"Niereninsuffizienz","rel":"h","cheat":[{"h":"Definition","li":["Eingeschränkte Nierenfunktion mit Anstieg harnpflichtiger Substanzen","Akut (ANV / AKI) – meist reversibel","Chronisch (CNI / CKD) – Stadien 1–5 nach GFR (1: ≥90 / 5: <15 = dialysepflichtig)"]},{"h":"Ursachen","li":["Akut: Schock, Nephrotoxine, postrenale Obstruktion","Chronisch: Diabetes (häufigste Ursache!), Hypertonie, Glomerulonephritis, polyzystische Niere"]},{"h":"Symptome","li":["Frühstadien oft asymptomatisch","Spät: Müdigkeit, Übelkeit, Ödeme, Juckreiz, Anämie, Hypertonie","Urämie: Foetor, Verwirrtheit, Krämpfe, Perikarditis","Oligurie/Anurie, später Polyurie (CNI Stadium 4)"]},{"h":"Diagnostik","li":["Kreatinin, Harnstoff, GFR (eGFR)","Urinstatus (Proteinurie, Hämaturie)","Sono Niere, ggf. Biopsie"]},{"h":"Therapie","li":["Ursache behandeln (Diabetes, RR einstellen)","Eiweißarme Diät, Phosphatbinder, Vitamin D","EPO bei renaler Anämie","Nierenersatztherapie: Hämodialyse, Peritonealdialyse, Transplantation"]},{"h":"Pflegerische Maßnahmen","li":["Bilanzierung Ein-/Ausfuhr, Gewicht täglich, RR-Kontrolle","Trinkmenge nach AVO begrenzen, Ödeme beobachten","Diät: kalium-, phosphat-, eiweißarm – Schulung wichtig","Hautpflege bei Juckreiz, Mundpflege","Dialysezugang (Shunt) schützen: keine RR-Messung/Punktion am Shunt-Arm","Medikamente nierenadaptiert, Nephrotoxine meiden"]},{"h":"Komplikationen","li":["Urämie, Hyperkaliämie (Herzrhythmusstörungen!), Anämie, Knochenstoffwechsel","Kardiovaskuläre Erkrankungen (Hauptmortalität)"]}],"cards":[{"q":"Häufigste Ursache der CNI?","a":"Diabetes mellitus (diabetische Nephropathie) – gefolgt von arterieller Hypertonie."},{"q":"Warum kein RR/Punktion am Shunt-Arm?","a":"Risiko Shuntverschluss – lebenswichtiger Dialysezugang. Fließgeräusch (Schwirren) regelmäßig prüfen."},{"q":"Welche Diät bei dialysepflichtiger CNI?","a":"Kalium-, phosphat- und natriumarm; Trinkmenge begrenzt; Eiweiß bedarfsgerecht (an Dialysetagen mehr)."},{"q":"Was misst die GFR?","a":"Glomeruläre Filtrationsrate – Maß für die Nierenfunktion. Normal >90 ml/min. Stadien: G1 normal · G2 leicht 60–89 · G3 mittelgradig 30–59 · G4 schwer 15–29 · G5 terminal <15."},{"q":"Welche Symptome bei Niereninsuffizienz?","a":"Müdigkeit, Anämie (Erythropoetin↓), Ödeme, Hypertonie, Pruritus, Übelkeit, Foetor uremicus, Polyurie zu Beginn, Oligurie/Anurie spät."},{"q":"Welche Diät bei chron. NI?","a":"Eiweißmoderat (Stadium 3–4), kaliumarm (keine Banane, Tomate), phosphatarm, salzreduziert, Trinkmenge nach Diurese und Stadium."},{"q":"Hämodialyse vs. Peritonealdialyse – Unterschiede?","a":"HD: 3×/Woche im Zentrum, Shunt nötig, schnell wirksam. PD: zuhause täglich, Bauchfell als Membran, Katheter, mehr Selbstständigkeit, Peritonitis-Risiko."},{"q":"Pflege bei Shunt?","a":"Shuntarm schonen: keine Blutdruckmessung/Blutentnahme/Infusionen am Shuntarm. Schwirren prüfen (Funktion), Hautpflege, beobachten auf Komplikationen (Aneurysma, Stenose)."}],"quiz":[{"q":"Frau Wagner (72, CNI Stadium 4) klagt über Juckreiz und Übelkeit. Welcher Wert ist wahrscheinlich erhöht?","opts":["Harnstoff/Kreatinin","Glucose","Hämoglobin","Kalium niedrig"],"correct":0,"exp":"Urämische Symptome durch Anstieg harnpflichtiger Substanzen (Kreatinin, Harnstoff)."},{"q":"Welche Aussage zum Shunt-Arm ist richtig?","opts":["Dort regelmäßig Blut abnehmen","Dort RR messen für genaue Werte","Keine RR-Messung, keine Punktion, Schwirren prüfen","Dort Kompressionsverband"],"correct":2,"exp":"Shunt schützen: keine Manipulationen, keine RR-Messung, keine Punktion am Shunt-Arm."},{"q":"Welche Aussage zum Shuntarm ist KORREKT?","opts":["RR und Blutentnahme am Shuntarm sind unproblematisch","Shuntarm wird geschont – KEIN RR, KEINE Punktion, KEINE Infusion an diesem Arm","Schwere Lasten erlaubt","Egal welcher Arm"],"correct":1,"exp":"Shunt ist Lebenslinie für HD-Patienten – Druck/Punktion gefährdet Funktion. Strenge Schonung."},{"q":"Welcher Wert sollte bei Niereninsuffizienz besonders überwacht werden?","opts":["Cholesterin","Kalium (Hyperkaliämie kann tödliche HRST verursachen)","Vitamin C","Bilirubin"],"correct":1,"exp":"Hyperkaliämie ist gefährlichste Akutkomplikation bei NI – kann zu Kammerflimmern führen."},{"q":"Welche Lebensmittel sollte ein Patient mit chronischer NI Stadium 4 meiden?","opts":["Brot","Kaliumreiche Lebensmittel wie Banane, Tomate, Trockenobst","Karotten","Reis"],"correct":1,"exp":"Kaliumreiche Lebensmittel können Hyperkaliämie verursachen – diätische Beratung essentiell."}]},{"key":"hwi","name":"Harnwegsinfekt (HWI)","rel":"vh","cheat":[{"h":"Definition","li":["Bakterielle Infektion der Harnwege","Unterer HWI: Zystitis · oberer HWI: Pyelonephritis","Häufigster Erreger: E. coli (80%)"]},{"h":"Risikofaktoren","li":["Frauen (kurze Harnröhre), Schwangerschaft","Dauerka
