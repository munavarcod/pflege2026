theter (KAUTI – katheterassoziierter HWI)","Diabetes, Immunsuppression, Inkontinenz","Harnabflussstörung (Prostatahyperplasie, Steine)"]},{"h":"Symptome","li":["Zystitis: Dysurie, Pollakisurie, Algurie, suprapubischer Schmerz","Pyelonephritis: Fieber, Flankenschmerz, Klopfschmerz Nierenlager, AZ↓","Bei alten Menschen: Verwirrtheit, Sturz, Inkontinenz – atypisch!"]},{"h":"Diagnostik","li":["Urinstreifentest (Leuko, Nitrit, Blut)","Urinsediment, Urinkultur (Antibiogramm)","Bei Pyelonephritis: Labor, Sono, ggf. CT"]},{"h":"Therapie","li":["Antibiotika kalkuliert (Fosfomycin, Nitrofurantoin), nach Antibiogramm","Ausreichend trinken (>2 L), Wärme","Pyelonephritis: stationär, i.v. Antibiose"]},{"h":"Pflegerische Maßnahmen / Prophylaxe","li":["Ausreichende Trinkmenge (>2 L, sofern erlaubt)","Intimhygiene: von vorne nach hinten wischen","Toilettengang nach Geschlechtsverkehr","Katheterhygiene: Indikation prüfen, geschlossenes System, Beutel unterhalb Blase","DK frühestmöglich entfernen!","Mobilisation, Miktion fördern, Sturzprophylaxe (Drang)"]}],"cards":[{"q":"Häufigster Erreger und warum?","a":"E. coli (80%) – stammt aus Darmflora, gelangt über kurze Harnröhre (v.a. Frauen) in die Blase."},{"q":"5 Maßnahmen zur Katheter-HWI-Prophylaxe?","a":"Indikation streng, geschlossenes System, Beutel unter Blasenniveau, kein Diskonnektieren, frühestmöglich entfernen + Hygiene."},{"q":"Atypische Symptome bei alten Menschen?","a":"Verwirrtheit, Sturz, plötzliche Inkontinenz, Inappetenz – immer an HWI denken bei akuter AZ-Verschlechterung."},{"q":"Symptome bei Harnwegsinfekt?","a":"Dysurie (Schmerz beim Wasserlassen), Pollakisurie (häufiges Wasserlassen kleiner Mengen), Nykturie, suprapubischer Druck, ggf. Hämaturie. Oben Pyelonephritis: Fieber, Flankenschmerz, Klopfschmerz."},{"q":"Wer ist besonders gefährdet für HWI?","a":"Frauen (kurze Urethra), Schwangere, Diabetiker, Postmenopausal, Bettlägerige, Katheterträger, Patienten mit Restharn / urolog. Erkrankungen."},{"q":"Was sind die wichtigsten Maßnahmen bei Dauerkatheter zur HWI-Prophylaxe?","a":"Sterile Anlage, geschlossenes Ableitungssystem, Beutel UNTER Blasenniveau und nicht am Boden, regelmäßige Mundpflege Genitalpflege, KEIN routinemäßiger Wechsel, frühzeitig entfernen!"},{"q":"Wann wird ein Dauerkatheter gewechselt?","a":"Nach Bedarf (Verkrustung, Defekt) und Herstellerangabe (meist alle 4–12 Wochen). KEIN routinemäßiger \"Wechsel zur Prophylaxe\" – nur ggf. bei Symptomen."},{"q":"Welche allgemeinen HWI-Prophylaxen?","a":"Trinkmenge >1,5 L/d, Genital-Hygiene (von vorne nach hinten), Miktion nach Geschlechtsverkehr, Cranberry (Evidenz schwach), keine reizenden Seifen."}],"quiz":[{"q":"Frau Becker (87) wird nachts plötzlich verwirrt, läuft umher. Was prüfen Sie zuerst?","opts":["Demenz vermuten und nichts tun","Vitalzeichen, Urinstix, Schmerzfragen, Trinkmenge – an HWI/Delir denken","Beruhigungsmittel geben","Fixierung"],"correct":1,"exp":"Akute Verwirrtheit bei Älteren ist oft Delir – häufige Ursachen: HWI, Exsikkose, Schmerzen, Medikamente."},{"q":"Welche Maßnahme ist KEINE Standard-HWI-Prophylaxe?","opts":["Ausreichend trinken","Geschlossenes Kathetersystem","Routine-Antibiotikaprophylaxe für alle Patienten","Frühe Katheterentfernung"],"correct":2,"exp":"Routine-AB-Prophylaxe wird nicht empfohlen – Resistenzentwicklung. Nur in Sonderfällen."},{"q":"Frau Schmidt (78, Dauerkatheter) hat seit 1 Tag Fieber 39°C, Verwirrtheit. Was vermuten Sie?","opts":["Pneumonie","Urosepsis – ausgehend vom Katheter","Demenz","Magen-Darm-Infekt"],"correct":1,"exp":"Dauerkatheter ist häufigster Sepsisfokus bei Älteren. Verwirrtheit + Fieber = Sepsis bis Beweis des Gegenteils."},{"q":"Welche Maßnahme verhindert KEINEN katheterassoziierten HWI?","opts":["Geschlossenes Ableitungssystem","Beutel unter Blasenniveau","Routinemäßiger Katheterwechsel alle 7 Tage","Hygienische Händedesinfektion"],"correct":2,"exp":"Routinewechsel erhöht das HWI-Risiko durch wiederholte Manipulation. Nur bei Bedarf wechseln."},{"q":"Welche Trinkmenge wird bei HWI-Prophylaxe empfohlen?","opts":["<1 L","1,5–2 L (außer bei Trinkmengenbeschränkung)","5 L","Nur Tee"],"correct":1,"exp":"Ausreichende Diurese spült Bakterien aus, individuell anzupassen (Niereninsuff., HI können Trinkbeschränkung erfordern)."}]},{"key":"inkontinenz","name":"Harninkontinenz","rel":"h","cheat":[{"h":"Definition / Formen","li":["Unwillkürlicher Urinabgang","Belastungsinkontinenz: bei Husten/Niesen (geschwächter Beckenboden)","Dranginkontinenz: imperativer Harndrang (überaktive Blase)","Mischinkontinenz, Überlaufinkontinenz, funktionelle und Reflexinkontinenz"]},{"h":"Ursachen","li":["Beckenbodenschwäche (Geburten, Adipositas)","Prostatahyperplasie, Operationen","Neurologisch: MS, Schlaganfall, Demenz","Medikamente, Diabetes, Mobilität↓"]},{"h":"Diagnostik / Assessment","li":["Anamnese, Miktionstagebuch (3 Tage)","Urodynamik, Urinstatus","Restharnbestimmung (Sono / Katheterismus)"]},{"h":"Therapie","li":["Belastung: Beckenbodentraining, Biofeedback, OP","Drang: Toilettentraining, Anticholinergika, Beta-3-Agonisten","Überlauf: Ursache (Prostata!) behandeln, ggf. ISK"]},{"h":"Pflegerische Maßnahmen (Expertenstandard Kontinenz)","li":["Kontinenzprofil erfassen (kontinent, abhängig kontinent, unabhängig erreichte Kontinenz, abhängig erreichte K., nicht kompensierte/kompensierte Inkontinenz)","Toilettengangbegleitung, Toilettentraining, Miktionsplan","Hilfsmittel: Vorlagen, Hosen, Kondom-Urinal (Männer)","Hautpflege Intimbereich (Inkontinenzdermatitis vorbeugen)","Beckenbodentraining bei kognitiv möglich"]}],"cards":[{"q":"Wodurch unterscheidet sich Belastungs- und Dranginkontinenz?","a":"Belastung: Urinverlust bei Druckerhöhung (Husten, Niesen, Heben), kein Drang. Drang: imperativer Drang, schafft es nicht zur Toilette."},{"q":"Welche Kontinenzprofile kennt der Expertenstandard?","a":"1. Kontinent · 2. Unabhängig erreichte K. · 3. Abhängig erreichte K. · 4. Unabhängig kompensierte Ink. · 5. Abhängig kompensierte Ink. · 6. Nicht kompensierte Ink."},{"q":"Warum Miktionstagebuch?","a":"Erfassung von Trinkmenge, Miktionszeiten, -mengen und Inkontinenzepisoden – Grundlage für individuellen Plan."},{"q":"Welche Inkontinenzformen gibt es?","a":"Belastungsinkontinenz (bei Druck, z.B. Husten), Dranginkontinenz (überaktive Blase), Mischform, Überlaufinkontinenz (Restharn), Reflexinkontinenz (neurologisch), funktionelle Inkontinenz."},{"q":"Was hilft bei Belastungsinkontinenz?","a":"Beckenbodentraining (Kegel-Übungen), Gewichtsreduktion, Vermeidung schwerer Lasten, ggf. OP (TVT-Band), Pessar, lokale Östrogene postmenopausal."},{"q":"Was ist Toilettentraining?","a":"Strukturierte Toilettengänge alle 2–3 h (auch ohne Drangsignal) – „prompted voiding\" – für demente, immobile Patienten zur Erhaltung der Kontinenz."}],"quiz":[{"q":"Frau Roth (78) verliert Urin beim Lachen und Husten. Welche Form?","opts":["Dranginkontinenz","Belastungsinkontinenz","Überlaufinkontinenz","Reflexinkontinenz"],"correct":1,"exp":"Klassisch für Belastungsinkontinenz – durch Druckerhöhung bei geschwächtem Beckenboden."},{"q":"Welche Maßnahme bei Inkontinenz ist FALSCH?","opts":["Trinkmenge bedarfsgerecht","Toilettentraining strukturiert","Trinkmenge stark reduzieren, um trocken zu bleiben","Hautpflege intensiv"],"correct":2,"exp":"Trinkbeschränkung fördert HWI, Obstipation, Exsikkose – KEIN sinnvoller Ansatz."}]},{"key":"osteoporose","name":"Osteoporose & Wirbelkörperfraktur","rel":"h","cheat":[{"h":"Definition","li":["Systemische Skeletterkrankung mit verminderter Knochenmasse und gestörter Mikroarchitektur","Folge: erhöhtes Frakturrisiko (Wirbelkörper, Schenkelhals, Radius)","Diagnose über DXA: T-Score ≤ -2,5"]},{"h":"Risikofaktoren","li":["Alter, weibliches Geschlecht, Postmenopause","Familiäre Disposition, Untergewicht, Bewegungsmangel","Rauchen, Alkohol, Kalzium-/Vit-D-Mangel","Sekundär: Kortison, Hyperthyreose, Malabsorption"]},{"h":"Symptome","li":["Lange asymptomatisch","Rückenschmerz, Größenabnahme, Witwenbuckel (Kyphose)","Frakturen ohne adäquates Trauma (v.a. Wirbel, Schenkelhals)"]},{"h":"Diagnostik","li":["DXA-Knochendichtemessung (T-Score)","Labor: Kalzium, Phosphat, 25-OH-Vit-D, Knochenstoffwechselmarker","Röntgen bei Verdacht auf Fraktur"]},{"h":"Therapie","li":["Basis: Kalzium 1000 mg/d + Vitamin D 800–1000 IE/d","Bisphosphonate (Alendronat, Ibandronat) – nüchtern, aufrecht, mit Wasser","Denosumab (Antikörper), Teriparatid bei schwerer Form","Bewegung, Sturzprophylaxe, Ernährung, Nikotin/Alkohol reduzieren"]},{"h":"Pflegerische Maßnahmen","li":["Sturzprophylaxe: Umgebung, Hilfsmittel, Beleuchtung, Sehhilfen","Hüftprotektoren bei Hochrisiko","Schmerzmanagement bei Frakturen, Mobilisation, Pneumonie-/Thromboseprophylaxe","Patientenedukation: Bewegung, Ernährung (Milchprodukte), Sonne","Bisphosphonate korrekt einnehmen (nüchtern, aufrecht 30 min)"]}],"cards":[{"q":"Welcher T-Score definiert Osteoporose?","a":"T-Score ≤ -2,5 (gemessen mit DXA an Hüfte/LWS). -1 bis -2,5 = Osteopenie."},{"q":"Wie nimmt man Bisphosphonate richtig ein?","a":"Morgens nüchtern, mit viel Wasser, danach mind. 30 Min aufrecht bleiben und nichts essen/trinken – sonst Resorptionsverlust und Ösophagusreizung."},{"q":"5 Hauptkomponenten der Sturzprophylaxe?","a":"Umgebung sichern, Hilfsmittel, Beleuchtung/Brille, Schuhe, Medikamentenreview, Krafttraining."},{"q":"Was ist Osteoporose?","a":"Systemische Skeletterkrankung mit verminderter Knochenmasse und gestörter Mikroarchitektur → erhöhte Frakturanfälligkeit, schon bei Bagatelltrauma."},{"q":"Welche Risikofaktoren?","a":"Postmenopause, hohes Alter, Bewegungsmangel, Rauchen, Alkohol, Glucocorticoide, niedriges Körpergewicht, familiäre Belastung, Calcium-/Vit-D-Mangel."},{"q":"Welche Frakturen sind typisch?","a":"Wirbelkörperfrakturen (Sintering), Schenkelhalsfraktur, distale Radiusfraktur, proximale Humerusfraktur. Folge: Größenverlust, Kyphose, chronischer Schmerz."},{"q":"Welche Therapie und Prophylaxe?","a":"Basis: Calcium 1000–1200 mg + Vit D 800–1000 IE, Bewegung (Krafttraining, Balance). Spezifisch: Bisphosphonate, Denosumab. Sturzprophylaxe!"},{"q":"Wie werden Bisphosphonate (z.B. Alendronat) eingenommen?","a":"Morgens nüchtern mit Leitungswasser (kein Mineralwasser), 30 Min aufrecht bleiben, dann erst essen → verhindert Ösophagitis. Nicht mit Kalzium/Eisen kombinieren."}],"quiz":[{"q":"Frau Hoffmann (78) bricht beim Heben einer Tasche eine Wirbelkörperfraktur. Hauptursache?","opts":["Tasche zu schwer","Osteoporose mit verminderter Knochenstabilität","Sport","Erkältung"],"correct":1,"exp":"Frakturen ohne adäquates Trauma sind klassisch für Osteoporose – Diagnostik (DXA) anstoßen."},{"q":"Frau Lang (78, Osteoporose) klagt über plötzliche Rückenschmerzen, kann sich kaum bewegen. Was vermuten Sie?","opts":["Lumbago","Wirbelkörperfraktur (Sinterung) – typisch bei Osteoporose, oft ohne adäquates Trauma","Bandscheibenvorfall","Muskelkater"],"correct":1,"exp":"Plötzlicher Rückenschmerz bei Osteoporose = Sinterungsfraktur bis Beweis. Bildgebung indiziert. Schmerztherapie + ggf. Vertebroplastie."},{"q":"Welche Maßnahme ist KEINE Sturzprophylaxe bei Osteoporose?","opts":["Beleuchtung","Hüftprotektoren","Strenge Bettruhe ohne Mobilisation","Krafttraining + Balance"],"correct":2,"exp":"Bettruhe verschlechtert Osteoporose UND erhöht Sturzrisiko durch Muskelabbau. Bewegung ist wichtig."},{"q":"Welche Maßnahme bei Osteoporose ist Basistherapie?","opts":["Hochdosis Vitamin K","Calcium + Vitamin D + Bewegung","Strenge Bettruhe","Salzarme Kost"],"correct":1,"exp":"Calcium und Vit D sind Basisversorgung des Knochens, Bewegung stimuliert Osteoblasten."}]},{"key":"rheuma","name":"Rheumatoide Arthritis (RA)","rel":"m","cheat":[{"h":"Definition","li":["Chronisch-entzündliche Autoimmunerkrankung mit Synovialitis","Symmetrischer Befall, vor allem kleine Gelenke (Hände, Füße)","Häufigste entzündlich-rheumatische Erkrankung"]},{"h":"Symptome","li":["Morgensteifigkeit >60 min","Symmetrische Schwellung, Schmerz, Überwärmung kleiner Gelenke","Spät: Gelenkdeformitäten (Schwanenhals, Knopfloch, Ulnardeviation)","Allgemein: Müdigkeit, subfebrile Temperatur, Gewichtsverlust"]},{"h":"Diagnostik","li":["Rheumafaktor (RF), Anti-CCP-AK (spezifischer)","Entzündungsparameter (BSG, CRP)","Sonografie/MRT der Gelenke, Röntgen (späte Erosionen)"]},{"h":"Therapie","li":["DMARDs: Methotrexat (Standard), Sulfasalazin, Leflunomid","Biologika (TNF-Blocker, IL-6-Hemmer) bei unzureichender Wirkung","NSAR und kurzfristig Glucocorticoide gegen Schub","Physio-/Ergotherapie, Bewegung"]},{"h":"Pflegerische Maßnahmen","li":["Schmerzerfassung (NRS), Aktivität anpassen","Gelenkschutz: Hilfsmittel, große Griffe, kein einseitiges Heben","Wärme/Kälte – Wärme bei chronischem Schmerz, Kälte im Schub","Bewegung: regelmäßig, schonend (Wassergymnastik)","Hautbeobachtung Methotrexat (Haarausfall, Schleimhäute, Leberwerte – Arzt!)"]}],"cards":[{"q":"Wie lange dauert typische Morgensteifigkeit bei RA?","a":">60 Minuten – Unterscheidung zu Arthrose (Steifigkeit <30 min)."},{"q":"Welcher Antikörper ist hochspezifisch?","a":"Anti-CCP (cyclisches citrulliniertes Peptid) – spezifischer als Rheumafaktor."},{"q":"Was ist die rheumatoide Arthritis?","a":"Chronisch-entzündliche Autoimmunerkrankung mit symmetrischer Polyarthritis, v.a. der kleinen Gelenke. Morgensteifigkeit >1 h, Schmerz, Schwellung, Deformierung."},{"q":"Welche Pflege bei akutem Schub?","a":"Gelenkschonung, Lagerung in Funktionsstellung, Kälte (akut entzündet), Schmerzmittel nach AVO, Ruhe, ggf. Hilfsmittel (große Knöpfe, Greifhilfen)."},{"q":"Welche Medikamente?","a":"Akut: NSAR, Steroide. Basistherapie: MTX (Standard), Sulfasalazin, Hydroxychloroquin. Bei schwerem Verlauf: Biologika (TNF-α-Hemmer)."}],"quiz":[{"q":"Frau Klein klagt über morgendliche Steifigkeit der Fingergelenke >1 Stunde. Symmetrisch. Welche Verdachtsdiagnose?","opts":["Arthrose","Rheumatoide Arthritis","Gicht","Karpaltunnelsyndrom"],"correct":1,"exp":"Symmetrische Polyarthritis kleiner Gelenke + Morgensteifigkeit >60 min = klassisch RA."},{"q":"Welche Anwendung ist im akuten RA-Schub geeignet?","opts":["Wärme","Kälte (Cool Pack lokal) und Schonung","Massage","Krafttraining"],"correct":1,"exp":"Kälte wirkt entzündungshemmend in akuter Phase. Wärme erst in Remission."}]},{"key":"arthrose","name":"Arthrose","rel":"m","cheat":[{"h":"Definition","li":["Degenerative Gelenkerkrankung mit Knorpelabbau und Knochenveränderungen","Häufigste Gelenkerkrankung, v.a. Knie (Gonarthrose) und Hüfte (Coxarthrose)","Primär (Verschleiß) vs. sekundär (nach Trauma, Achsfehlstellung, RA)"]},{"h":"Symptome","li":["Anlaufschmerz (nach Ruhe, bessert sich bei Bewegung)","Belastungsschmerz, später Ruhe- und Nachtschmerz","Bewegungseinschränkung, Gelenkknirschen (Krepitation)","Morgensteifigkeit <30 min (im Gegensatz zu RA)"]},{"h":"Diagnostik","li":["Röntgen: Gelenkspaltverschmälerung, Osteophyten, subchondrale Sklerose, Geröllzysten","Klinische Untersuchung, Anamnese"]},{"h":"Therapie","li":["Konservativ: NSAR, Bewegung, Physiotherapie, Gewichtsreduktion","Hilfsmittel: Gehstock, Einlagen","Operativ: Gelenkersatz (Hüft-/Knie-TEP) im Endstadium"]},{"h":"Pflegerische Maßnahmen","li":["Schmerzmanagement (NRS), Bewegung in Ruhephasen","Postoperativ TEP: Mobilisation nach Schema, Luxationsprophylaxe (Hüft-TEP: keine Adduktion über Mittellinie, keine Flexion >90°)","Hilfsmittelschulung (Greifzange, Strumpfanzieher, Toilettensitzerhöhung)","Sturzprophylaxe, Gewichtsreduktion fördern"]}],"cards":[{"q":"Wie unterscheidet sich Anlaufschmerz von Entzündungsschmerz?","a":"Anlaufschmerz (Arthrose): nach Ruhe, bessert sich bei Bewegung. Entzündung (RA): Morgensteifigkeit lang, Schmerz auch in Ruhe."},{"q":"Welche 3 Bewegungen nach Hüft-TEP vermeiden?","a":"1) Adduktion über Mittellinie, 2) Flexion >90°, 3) Außenrotation – Luxationsgefahr in den ersten 6–12 Wochen."},{"q":"Arthrose vs. Arthritis – Unterschied?","a":"Arthrose: degenerativ (Knorpelverschleiß), Anlaufschmerz, Belastungsschmerz, Morgensteife <30 Min. Arthritis: entzündlich, Ruheschmerz, Morgensteife >1 h, Wärme, Schwellung."},{"q":"Welche Maßnahmen bei Arthrose?","a":"Bewegung (Schwimmen, Radfahren), Gewichtsreduktion, Physiotherapie, Wärme/Kälte je nach Phase, Hilfsmittel, Schmerztherapie. OP (Endoprothese) bei schwerem Befund."}],"quiz":[{"q":"Welches Symptom ist für Arthrose typisch?","opts":["Morgensteifigkeit >60 min","Anlaufschmerz mit Besserung bei Bewegung","Symmetrischer Befall kleiner Gelenke","Hochfrequenter Fieberanstieg"],"correct":1,"exp":"Anlaufschmerz ist klassisch – Knorpelmangel, der sich durch Bewegung mit Synovialflüssigkeit befeuchtet."},{"q":"Welche Aussage zur Arthrose ist KORREKT?","opts":["Bettruhe ist beste Therapie","Bewegung ist therapeutisch – aber gelenkschonend (Schwimmen, Radfahren)","Gewicht spielt keine Rolle","Wärme immer kontraindiziert"],"correct":1,"exp":"Bewegung erhält Knorpel und Muskelmasse. Schwimmen und Radfahren entlasten. Bettruhe schadet."}]},{"key":"praeop","name":"Prä- & postoperative Pflege","rel":"vh","cheat":[{"h":"Präoperative Pflege – Aufgaben","li":["Aufklärungsgespräch sicherstellen (durch Arzt), Einwilligung dokumentiert","Anamnese, Vitalzeichen, Größe/Gewicht, Allergien, Medikamente","Nüchternheit: 6 h für feste Nahrung, 2 h für klare Flüssigkeit","Hautvorbereitung (Rasur unmittelbar präop, OP-Feld), Antiseptik","Thromboseprophylaxe (NMH, ATS)","Prämedikation nach AVO, OP-Hemd, Schmuck/Prothesen entfernen"]},{"h":"Postoperative Pflege – Aufgaben","li":["Vitalzeichen engmaschig (RR, Puls, AF, SpO₂, Temp, Bewusstsein, Schmerz)","Wundkontrolle, Drainagen, Verband, Nachblutung beobachten","Schmerzmanagement (NRS, Stufenschema)","Bilanzierung, Erbrechensprophylaxe","Mobilisation früh nach AVO, Atemtherapie, Thromboseprophylaxe","Ernährungskostaufbau nach AVO"]},{"h":"Postoperative Komplikationen","li":["Nachblutung (Tachykardie, Hypotonie, Verbandsdurchblutung)","Atelektase, Pneumonie","Thrombose, Lungenembolie","Wundinfektion, Wundheilungsstörung, Dehiszenz","Harnverhalt, Ileus, Delir (v.a. Ältere)"]},{"h":"Mobilisation","li":["So früh wie möglich (oft am OP-Tag)","Schritt für Schritt: Bett → Bettkante → Stehen → Gehen","Vor Mobilisation: Schmerzen, Kreislauf, Drainagen sichern"]}],"cards":[{"q":"Wie lange präop nüchtern?","a":"6 h für feste Nahrung, 2 h für klare Flüssigkeit (Wasser, klarer Tee). Vermeidung Aspiration in Narkose."},{"q":"5 wichtige postop Komplikationen?","a":"Nachblutung, Pneumonie/Atelektase, Thrombose/LE, Wundinfektion, Delir."},{"q":"Warum frühe Mobilisation?","a":"Senkt Pneumonie-, Thrombose-, Dekubitusrisiko, fördert Darmperistaltik, reduziert Krankenhausaufenthalt."},{"q":"Was umfasst die präoperative Pflege?","a":"Aufklärung dokumentieren, Nüchternheit, Hautvorbereitung (ggf. Rasur unmittelbar präop), OP-Hemd, Identitätsbändchen, Schmuck/Zahnersatz entfernen, Thromboseprophylaxe, Vitalzeichen, präop. Medikation."},{"q":"Wie lange muss der Patient nüchtern sein?","a":"Feste Nahrung 6 h, klare Flüssigkeit 2 h vor Narkose – verhindert Aspiration bei Narkoseeinleitung."},{"q":"Was beobachten Sie postoperativ in den ersten 24 h?","a":"Vitalzeichen (RR, Puls, AF, SpO₂, Temp), Schmerzen (NRS), Bewusstsein, Wunde (Nachblutung!), Drainagen, Ausscheidung (Miktion!), Übelkeit, Mobilisation."},{"q":"Welche Komplikationen drohen postoperativ?","a":"Nachblutung, Wundinfektion, Pneumonie, Thrombose/LE, Harnverhalt, Ileus, Delir bei Älteren, Druckulkus, Schmerzdekompensation."},{"q":"Begründen Sie die Frühmobilisation.","a":"Vermindert Thrombose, Pneumonie, Atelektasen, Obstipation, Muskelabbau – beschleunigt Genesung. Heute „fast track\" Konzepte."},{"q":"Was beinhaltet eine OP-Checkliste (WHO)?","a":"Sign in (vor Narkose), Time out (vor Schnitt), Sign out (vor OP-Ende). Identitätskontrolle, OP-Stelle markiert, Allergien, kritische Schritte besprechen."}],"quiz":[{"q":"Frau Lang ist 4 h post Hüft-OP. Verband durchgeblutet, RR 90/55, Puls 110. Verdacht?","opts":["Normal post-op","Nachblutung, Schockgefahr → sofort Arzt informieren","Schmerzen","Hunger"],"correct":1,"exp":"Tachykardie + Hypotonie + Blutung = Schockgefahr durch Nachblutung. Sofortmeldung."},{"q":"Welche Maßnahme ist KEINE Standard-postop-Aufgabe?","opts":["Vitalzeichen","Schmerzmanagement","Patient sofort entlassen","Frühmobilisation"],"correct":2,"exp":"Postop steht Beobachtung und Stabilisierung im Vordergrund, nicht Entlassung."},{"q":"Patient nach Knie-TEP, 6 h post-OP. Hat noch nicht uriniert. Was tun?","opts":["Sofort Katheter","Blasenscan, Mobilisation falls möglich, Toilettenangebot, Wasser laufen lassen, ggf. Einmalkatheter bei großer Restmenge","Abwarten bis morgen","Trinken verbieten"],"correct":1,"exp":"Postoperativer Harnverhalt häufig. Erst nicht-invasive Maßnahmen, Blasenscan zur Quantifizierung, dann ggf. Einmalkatheter."},{"q":"Welche Aussage zur Nüchternheit präoperativ ist KORREKT?","opts":["24 h alles","Feste Nahrung 6 h, klare Flüssigkeit 2 h","Nur 30 Min","Egal"],"correct":1,"exp":"ESA/DGAI-Empfehlung: 6/2-Regel. Längere Nüchternheit ist sogar nachteilig."},{"q":"Welche Komplikation ist 5–10 Tage postoperativ besonders zu beachten?","opts":["Aspirationspneumonie direkt nach OP","Tiefe Beinvenenthrombose / Lungenembolie","Verbrühung","Verstauchung"],"correct":1,"exp":"TVT-Risiko bleibt 4–6 Wochen erhöht. Frühmobilisation und NMH-Prophylaxe zentral."},{"q":"Welche Wundbeobachtung ist postoperativ wichtig?","opts":["Größe, Rötung, Wärme, Schwellung, Schmerz, Sekretion, Wundränder","Nur Größe","Nur Schmerz","Nichts"],"correct":0,"exp":"Wundinspektion umfasst alle Entzündungszeichen plus Sekretmenge/-art – Frühe Erkennung von Wundinfektionen."}]},{"key":"wunden","name":"Wundversorgung & Wundheilungsphasen","rel":"vh","cheat":[{"h":"Wundheilungsphasen","li":["1. Exsudationsphase (0–3 Tage): Reinigung, Entzündung, Hämostase","2. Granulationsphase (3–7 Tage): Granulationsgewebe, Gefäßneubildung","3. Epithelisierungsphase (8.+ Tag): Wundverschluss, Narbenbildung"]},{"h":"Wundarten","li":["Akut: traumatisch (Schnitt, Stich), OP-Wunde","Chronisch: Ulcus cruris (venös/arteriell), Diabetisches Fußsyndrom, Dekubitus","Primäre vs. sekundäre Wundheilung"]},{"h":"Wundbeurteilung (TIME)","li":["T – Tissue (Gewebe: Nekrose, Fibrin, Granulation, Epithel)","I – Infection/Inflammation (Infektzeichen)","M – Moisture (Feuchtigkeitsbalance)","E – Edges (Wundränder)","Plus: Lokalisation, Größe, Tiefe, Geruch, Schmerz"]},{"h":"Wundbehandlung – Phasengerecht","li":["Reinigungsphase: Spülung (NaCl 0,9% oder Ringer), Débridement","Granulation: Hydrokolloid, Alginat, Hydrofaser, Schaumstoff","Epithelisierung: Hydrogel, dünner Schaumstoff, Hydrofilm","Feucht-warmes Wundmilieu beschleunigt Heilung"]},{"h":"Pflegerische Maßnahmen","li":["Aseptische Verbandwechsel, Händedesinfektion, Einmalmaterial","Wunddokumentation: Größe, Tiefe, Beschaffenheit, Foto","Schmerzmanagement vor Verbandwechsel","Ernährung: ausreichend Protein, Vit C, Zink","Ursache behandeln (Druck, Diabetes, Durchblutung)"]},{"h":"Infektzeichen","li":["Klassisch: Rubor (Rötung), Calor (Wärme), Tumor (Schwellung), Dolor (Schmerz), Functio laesa","Eitriges Sekret, Geruch, Fieber, Wundrandmazeration"]}],"cards":[{"q":"Welche 3 Phasen der Wundheilung?","a":"1. Exsudationsphase (Reinigung), 2. Granulationsphase, 3. Epithelisierungsphase."},{"q":"Was bedeutet TIME?","a":"Tissue, Infection, Moisture, Edges – systematisches Schema zur Wundbeurteilung."},{"q":"Warum feuchte Wundbehandlung?","a":"Feucht-warmes Milieu fördert Zellmigration, Granulation, schnellere Heilung; weniger Schmerz beim Verbandwechsel."},{"q":"5 klassische Infektzeichen?","a":"Rubor, Calor, Tumor, Dolor, Functio laesa – plus Geruch und Eiter."},{"q":"Welche 4 Wundheilungsphasen?","a":"1. Exsudationsphase (Tag 1–4): Hämostase, Entzündung. 2. Granulation (Tag 3–10): neues Gewebe. 3. Epithelisierung (Tag 7–21). 4. Reifung/Remodellierung (Wochen–Monate)."},{"q":"Primäre vs. sekundäre Wundheilung?","a":"Primär: glatte, sauber adaptierte Wundränder, schnell, schöne Narbe (z.B. OP-Naht). Sekundär: offene/infizierte Wunde, heilt aus der Tiefe (Granulation), längere Heilung."},{"q":"Was ist phasengerechte Wundversorgung?","a":"Exsudation: saugfähig (Schaum, Alginat). Granulation: feucht halten (Hydrokolloid, Hydrogel). Epithelisierung: schützen (dünne Folien, Hydrokolloid)."},{"q":"Welche Zeichen einer infizierten Wunde?","a":"Calor, Rubor, Dolor, Tumor, Functio laesa + eitriges Sekret, übler Geruch, Fieber, schlechte Heilung – Abstrich entnehmen, Arzt informieren."},{"q":"Warum FEUCHT halten?","a":"Feuchte Wundheilung beschleunigt: Zellen wandern besser, Wachstumsfaktoren bleiben aktiv, weniger Schmerz beim Verbandwechsel, weniger Narbenbildung. Standard seit den 60ern."},{"q":"Welche Faktoren verzögern Wundheilung?","a":"Alter, Diabetes, Mangelernährung (Eiweiß, Vit C, Zink), schlechte Durchblutung, Immunsuppression, Rauchen, Steroide, Infektion, Druck/Reibung."}],"quiz":[{"q":"Sie versorgen ein Ulcus cruris in der Granulationsphase. Welcher Verband eignet sich?","opts":["Trockener Wickelverband","Hydrokolloid oder Schaumstoff (feucht)","Mullbinde nur","Pflasterverband"],"correct":1,"exp":"In Granulationsphase: feuchte Wundbehandlung mit Hydrokolloid/Schaumstoff – fördert Heilung."},{"q":"Was ist KEIN Zeichen einer Wundinfektion?","opts":["Rötung","Wärme","Trockene saubere Wundränder","Eitriges Sekret"],"correct":2,"exp":"Infektionszeichen: Calor, Rubor, Dolor, Tumor, Functio laesa, eitrige Sekretion. Trockene saubere Ränder sprechen für gute Heilung."},{"q":"Welche Versorgung passt zur Granulationsphase?","opts":["Trockener Verband","Feuchte Wundauflage (z.B. Hydrokolloid, Hydrogel)","Antibiotikum lokal","Trockene Mullkompresse"],"correct":1,"exp":"Feuchte Wundheilung in Granulationsphase – fördert Zellmigration, weniger Schmerz, schnellere Heilung."},{"q":"Welche Vitamine/Spurenelemente fördern Wundheilung?","opts":["Vit A, Vit B12, Vit D","Vit C, Zink, ausreichend Eiweiß","Eisen allein","Keine"],"correct":1,"exp":"Vit C (Kollagensynthese), Zink (Zellteilung), Eiweiß (Bausteine) sind essentiell."},{"q":"Welche Maßnahme bei chronischer Wunde ist NICHT empfehlenswert?","opts":["Phasengerechte Versorgung","Druck-/Ursachenbehandlung","Routinemäßiges Spülen mit alkoholischen Antiseptika","Schmerzmanagement"],"correct":2,"exp":"Alkoholische Antiseptika schädigen Granulationsgewebe und Zellen. Stattdessen: Octenisept, NaCl 0,9%, Polyhexanid."}]},{"key":"stoma","name":"Stomaversorgung","rel":"h","cheat":[{"h":"Stoma-Arten","li":["Kolostoma (Dickdarm): festere Stuhlkonsistenz, weniger häufig wechseln","Ileostoma (Dünndarm): flüssig-breiig, hohe Volumina, Hautreizung↑","Urostoma: Harnableitung","Endständig (dauerhaft) vs. doppelläufig (passager)"]},{"h":"Versorgungssysteme","li":["Einteilig: Beutel mit Hautschutzplatte verbunden","Zweiteilig: Platte + abnehmbarer Beutel (Wechsel ohne Plattenabnahme)","Geschlossen vs. ausstreifbar"]},{"h":"Pflegerische Maßnahmen","li":["Beutelwechsel: Material vorbereiten, Inspektion Stoma + Haut","Reinigung mit Wasser (kein Alkohol/Desinfektion!), abtupfen","Hautschutzplatte passgenau zuschneiden (1–2 mm größer als Stoma)","Haut gut abtrocknen, Platte fest andrücken (Körperwärme)","Beobachtung: Stomafarbe (rosig = gut, blass/livide = Durchblutungsstörung), Sekret, Hautzustand"]},{"h":"Komplikationen","li":["Hautreizung, allergische Reaktion","Stomaprolaps, -retraktion, parastomale Hernie","Stomanekrose (livide-schwarz!)","Ileus, Diarrhö, Elektrolytverluste (v.a. Ileostoma)"]},{"h":"Patientenedukation","li":["Selbstversorgung schrittweise, Familie einbeziehen","Ernährung: Anfangs leicht, später normal – meiden bei Geruchsbildung Zwiebel/Kohl","Trinken ausreichend, v.a. Ileostoma (3 L)","Aktivität, Sport, Sexualität sind möglich","Selbsthilfegruppen, Stomatherapeut"]}],"cards":[{"q":"Welche Farbe sollte ein gesundes Stoma haben?","a":"Rosig-rot, feucht-glänzend. Blass/livide → Durchblutungsstörung, dunkel-schwarz → Nekrose, sofort Arzt!"},{"q":"Warum kein Alkohol/Desinfektionsmittel zur Stomareinigung?","a":"Reizt die Schleimhaut und schädigt die Haut – nur klares Wasser ohne Seife verwenden."},{"q":"Welche Stomaarten gibt es?","a":"Kolostoma (Dickdarm, festeren Stuhl), Ileostoma (Dünndarm, dünnflüssig + aggressiv), Urostoma (Harnableitung). Endständig oder doppelläufig (passager)."},{"q":"Wie wird die Stomaversorgung durchgeführt?","a":"Hautkontrolle (Rötung, Reizung), Reinigung mit Wasser (keine Cremes!), Hautschutzplatte mit korrekter Stomaöffnung, Beutelwechsel je nach Bedarf, frische Beutel zur Schulung anbieten."},{"q":"Welche Komplikationen können auftreten?","a":"Hautschäden, Stomastenose, Prolaps, Retraktion, parastomale Hernie, Ileus, Diarrhö (Dehydrierung Ileostoma!), psychosoziale Probleme."},{"q":"Welche Beratung benötigt der Stomaträger?","a":"Selbstpflege erlernen, Ernährung anpassen (keine blähenden Speisen, ausreichend trinken), Sport ja, Sexualität, Reisen (Beutel im Handgepäck), Stomaberater vermitteln."}],"quiz":[{"q":"Frau Bach hat ein Ileostoma. Welche besondere Aufmerksamkeit?","opts":["Trinkmenge reduzieren","Hohe Trinkmenge (>3 L), Elektrolyte beobachten","Nur weiche Kost","Stoma täglich verschließen"],"correct":1,"exp":"Ileostoma führt zu hohen Flüssigkeits- und Elektrolytverlusten – ausreichend trinken, Werte überwachen."},{"q":"Welcher Patient hat das höchste Dehydrationsrisiko?","opts":["Kolostoma (Sigma)","Endständiges Ileostoma – flüssiger Stuhl, hohe Verluste","Urostoma","Doppelläufiges Kolostoma"],"correct":1,"exp":"Ileostoma verliert viel Flüssigkeit und Elektrolyte – ausreichendes Trinken und Salzersatz wichtig."},{"q":"Welche Hautpflege ist beim Stoma KORREKT?","opts":["Mit Alkohol desinfizieren","Mit Wasser reinigen, keine fettenden Cremes","Mit Seife schrubben","Mit Öl"],"correct":1,"exp":"Wasser reicht; Cremes, Öle, Seifen verhindern das Haften der Platte und reizen die Haut."}]},{"key":"peg","name":"PEG-Sonde & enterale Ernährung","rel":"h","cheat":[{"h":"Definition","li":["Perkutane endoskopische Gastrostomie – Sonde durch Bauchwand in den Magen","Indikation: längerfristige enterale Ernährung (>4 Wochen) bei Schluckstörung, Tumor, Demenz","Alternative: nasogastrale Sonde (kurzfristig)"]},{"h":"Pflegerische Maßnahmen","li":["Eintrittsstelle: tägliche Inspektion, Reinigung mit NaCl/sterilem Wasser, trocken halten","Mobilisation der äußeren Halteplatte 1x/Woche (Drehen + Vorschieben + Zurückziehen) – Buried-Bumper-Syndrom verhindern","Lagekontrolle vor jeder Gabe (aufgezogene Magenflüssigkeit, pH<5,5)","Nahrungsgabe: langsam, Oberkörper hoch (mind. 30°) während und 30 min danach","Nach Gabe Spülen mit 30–50 ml stillem Wasser","Mundpflege weiterhin, Geschmack/Geruch (z.B. Lieblingstee) gestatten"]},{"h":"Komplikationen","li":["Lokal: Infektion, Hautirritation, Granulationsgewebe","Buried-Bumper-Syndrom (innere Halteplatte wächst ein) – Mobilisation!","Aspiration, Diarrhö, Verstopfung, Refluxerkrankung","Sondenokklusion, Dislokation"]},{"h":"Wichtige Regeln","li":["Medikamente NIE über die gleiche Sonde mit Nahrung – vor und nach Gabe spülen","Tabletten zerkleinern, fragen ob teilbar/mörserbar (Retard nicht!)","Bei Verstopfung der Sonde: warmes Wasser, milde mechanische Spülung – kein Druck"]}],"cards":[{"q":"Was ist das Buried-Bumper-Syndrom?","a":"Einwachsen der inneren Halteplatte in die Magenwand – Schmerzen, Sondendysfunktion. Prävention: wöchentliche Mobilisation der äußeren Platte."},{"q":"Mindestlagerung während/nach Sondenkostgabe?","a":"Oberkörper mind. 30° hochlagern, mindestens 30 min nach Gabe – Aspirationsprophylaxe."},{"q":"Warum trotz PEG Mundpflege?","a":"Speichelfluss reduziert, Soor/Karies/Foetor – regelmäßige Mundpflege ist unverzichtbar; ggf. Lieblingsspeisen zum Schmecken."},{"q":"Was ist eine PEG?","a":"Perkutane endoskopische Gastrostomie – Sonde durch die Bauchwand in den Magen für enterale Ernährung bei längerfristiger Schluckunfähigkeit (>4 Wochen)."},{"q":"Welche Pflege in der ersten Woche nach Anlage?","a":"Tägl. Verbandwechsel mit aseptischer Versorgung, Sonde nicht drehen/zurückziehen die ersten 7–10 Tage. Danach: 1×/Tag drehen, leichten Zug, mobilisieren – keine Verklebung."},{"q":"Wie wird Sondenkost gegeben?","a":"Oberkörper hoch (30°+), zimmerwarme Kost, langsam (Pumpe oder Schwerkraft), 30 Min nach Mahlzeit aufrecht bleiben. Mit 20 ml Wasser vor und nach jeder Gabe spülen."},{"q":"Was tun bei verstopfter Sonde?","a":"Mit warmem Wasser spülen (20–30 ml mit Druck/Sog), Cola oder Pankreasenzyme nicht evidenzbasiert. KEINE spitzen Gegenstände einführen – Sondenwechsel falls keine Lösung."},{"q":"Welche Medikamentengabe über PEG?","a":"Nur flüssige Form oder gut zerkleinerte Tabletten. KEINE Retardtabletten, KEINE magensaftresistenten Tabletten zerkleinern! Vor und nach Spülen mit Wasser."}],"quiz":[{"q":"Wie verhindern Sie das Buried-Bumper-Syndrom?","opts":["Sonde fest fixieren","Wöchentliche Mobilisation der Halteplatte (Drehen, Vorschieben)","Nie bewegen","Täglich reinigen"],"correct":1,"exp":"Wöchentliche Mobilisation verhindert Einwachsen der inneren Halteplatte."},{"q":"Welche Aussage zur PEG ist KORREKT?","opts":["Patient muss flach liegen bei Sondenkost","Oberkörperhoch lagern (30°+) zur Aspirationsprophylaxe","Egal wie","Auf der linken Seite"],"correct":1,"exp":"Aspirationsprophylaxe: Oberkörperhoch während und 30 Min nach Mahlzeit – sonst Reflux- und Aspirationsgefahr."},{"q":"Welche Tablette darf NICHT zerkleinert über PEG gegeben werden?","opts":["Schmerztabletten","Retardtabletten und magensaftresistente Tabletten","Vitamin C","Tabletten mit Bruchrille"],"correct":1,"exp":"Retard-/MSR-Tabletten verlieren ihre Eigenschaften beim Zerkleinern – Wirkstoffrelease zerstört, Magenreizung möglich."}]},{"key":"schlaganfall","name":"Schlaganfall (Apoplex)","rel":"vh","cheat":[{"h":"Definition","li":["Akute neurologische Ausfälle durch Minderversorgung des Gehirns mit O₂","Ischämisch (80%): Verschluss durch Thrombus/Embolus","Hämorrhagisch (20%): Blutung (intrazerebral oder Subarachnoidalblutung)","Time is brain – jede Minute zählt!"]},{"h":"Risikofaktoren","li":["Hypertonie (wichtigster!), Vorhofflimmern, Diabetes, Hyperlipidämie","Rauchen, Adipositas, Alkohol, Bewegungsmangel","Z.n. TIA / Schlaganfall, Karotisstenose, Alter"]},{"h":"Symptome – BE-FAST","li":["B – Balance: plötzliche Gangunsicherheit","E – Eyes: Sehstörungen, Doppelbilder, Gesichtsfeldausfall","F – Face: Gesichtshälfte hängt herab","A – Arms: einseitige Lähmung","S – Speech: Sprachstörung (Aphasie, Dysarthrie)","T – Time: sofort Notruf 112!"]},{"h":"Diagnostik","li":["Sofort: cCT (Blutung ausschließen!), ggf. cMRT","EKG (Vorhofflimmern?), Labor, Doppler-Sono Karotis"]},{"h":"Therapie","li":["Ischämisch: Lyse (rtPA) innerhalb 4,5 h, ggf. Thrombektomie bis 6 h (selten 24)","Hämorrhagisch: KEINE Lyse, RR-Senkung, ggf. neurochirurgisch","Stroke Unit, Sekundärprävention (ASS, Statin, RR-Einstellung, Antikoagulation bei VHF)"]},{"h":"Pflegerische Maßnahmen","li":["Akut: Vitalzeichen, NIHSS, Bobath-Lagerung (betroffene Seite betont)","Schluckscreening (Dysphagie, Aspirationsgefahr) vor erster Nahrungsgabe!","Aktivierende, therapeutische Pflege (Bobath-Konzept) – Ressourcen nutzen","Anleitung zum Eigentraining, Pflege auf der betroffenen Seite stimulieren","Pneumonie-, Thrombose-, Dekubitus-, Kontrakturprophylaxe","Kommunikation bei Aphasie: einfach, Bilder, Geduld","Frührehabilitation, Logopädie, Physiotherapie, Ergotherapie"]},{"h":"Komplikationen","li":["Hirnödem mit Hirndruckanstieg","Aspirationspneumonie, Dekubitus, Kontrakturen","Re-Insult, Depression, Fatigue"]}],"cards":[{"q":"Was bedeutet BE-FAST?","a":"Balance, Eyes, Face, Arms, Speech, Time – moderne Erweiterung des FAST-Schemas zur schnellen Schlaganfallerkennung."},{"q":"Warum cCT vor jeder Lyse?","a":"Hämorrhagischer Schlaganfall (Blutung) muss ausgeschlossen werden – Lyse wäre tödlich."},{"q":"Warum Schluckscreening vor erster Nahrungsgabe?","a":"Bis zu 50% der Schlaganfallpatienten haben Dysphagie → Aspirationsgefahr → Pneumonie. Erst nach Screening orale Kost."},{"q":"Was ist die Bobath-Lagerung?","a":"Therapeutisches Lagerungskonzept, das die betroffene Seite stimuliert und integriert. Lagerung wechselt zwischen gesunder und betroffener Seite."},{"q":"Was bedeutet FAST?","a":"F Face (Mund hängt), A Arms (Arm sinkt), S Speech (Sprache verwaschen/Aphasie), T Time (Zeit ist Hirn – sofort 112). Standard-Erkennungsschema."},{"q":"Ischämischer vs. hämorrhagischer Schlaganfall?","a":"Ischämisch (~85%): Gefäßverschluss, Therapie Lyse <4,5 h oder Thrombektomie <6–24 h. Hämorrhagisch (~15%): Hirnblutung, Lyse KONTRAINDIZIERT, ggf. neurochirurgische OP."},{"q":"Welche Leitsymptome je nach Hemisphäre?","a":"Linkshemisphärisch: rechtsseitige Hemiparese, Aphasie. Rechtshemisphärisch: linksseitige Hemiparese, Neglect, Anosognosie (Verkennen der Lähmung)."},{"q":"Was ist Bobath-Konzept?","a":"Therapeutische Pflege bei Hemiparese: physiologische Bewegungsmuster fördern, Eingliederung der betroffenen Seite, Spastik vermeiden, Lagerung in Funktionsstellung."},{"q":"Welche Pflege bei Halbseitenlähmung?","a":"Bobath: Lagerung A-Lagerung, V-Lagerung, kranke Seite einbeziehen (alles von dort anbieten/anreichen), Sturzprophylaxe, Schluckscreening, Aphasie-Kommunikation, Frühreha."},{"q":"Welche Schluckdiagnostik nach Apoplex?","a":"GUSS (Gugging Swallowing Screen) oder Wasserschlucktest VOR erster oraler Aufnahme. Bei Aspirationszeichen → nüchtern, Logopädie, ggf. PEG bei längerfristiger Dysphagie."},{"q":"Welche Sekundärprävention?","a":"Antikoagulation (bei VHF), Antihypertensiva, Lipidsenker (Statine), Lifestyle (Rauchstopp, Bewegung, Diät), Diabeteskontrolle. ASS bei nicht-kardioembolisch."}],"quiz":[{"q":"Frau Vogel (74) wird mit Halbseitenlähmung links und Sprachstörung eingeliefert. Akut wichtig?","opts":["Frühstück geben","Sofort cCT, NIHSS, Stroke Unit – Time is brain","Patientin schlafen lassen","Mobilisieren"],"correct":1,"exp":"Schlaganfallverdacht – sofortige Diagnostik (cCT) entscheidet über Lyse-Möglichkeit. Schluckscreening vor Essen."},{"q":"Welche Maßnahme ist Teil der Bobath-Pflege?","opts":["Pflege nur von der gesunden Seite","Pflege betont auf der betroffenen Seite – Stimulation und Integration","Gar keine Mobilisation","Nur passive Bewegungen"],"correct":1,"exp":"Bobath aktiviert die betroffene Seite – Stimulation durch Pflegeansprache, Berührung, Bewegung von dieser Seite."},{"q":"Frau Mark (74) hängt rechter Mundwinkel, rechter Arm sinkt, spricht verwaschen. Was tun?","opts":["Beruhigung und Hausarzt morgen","Sofort 112 + Zeit der Symptombeginns festhalten + Lagerung halbsitzend + nicht trinken/essen lassen","Aspirin geben","Spazieren gehen"],"correct":1,"exp":"FAST positiv → Schlaganfall. Time is brain – jede Minute zählt. Symptombeginn ist entscheidend für Lyse-Fenster (<4,5 h)."},{"q":"Welche Maßnahme ist im akuten Schlaganfall KONTRAINDIZIERT?","opts":["Halbsitzende Lagerung","Nüchtern lassen bis Schluckscreening","Orale Aspirin-Gabe ohne CT","Vitalzeichen-Überwachung"],"correct":2,"exp":"Vor CT-Diagnostik weiß man nicht, ob ischämisch oder hämorrhagisch. ASS bei Hirnblutung GEFÄHRLICH."},{"q":"Patient mit Apoplex hat eine Aphasie. Welche Kommunikation hilft?","opts":["Lautes Schreien","Klare einfache Sätze, ausreden lassen, Zeit geben, Bilder/Gesten, ja/nein-Fragen","Möglichst viel reden","Schreiben verlangen"],"correct":1,"exp":"Sprachverständnis oft erhalten – einfach + Geduld + alternative Kommunikation. Niemals laut werden!"},{"q":"Welche Lagerung wird nach Bobath-Konzept gefördert?","opts":["Patient nur auf gesunder Seite","Wechsel zwischen A-Lagerung, V-Lagerung, betroffene Seite einbeziehen","Strikte Rückenlage","Bauchlage"],"correct":1,"exp":"Bobath fördert physiologische Bewegung – betroffene Seite immer einbeziehen, sonst „Vernachlässigung\"."},{"q":"Welche Sekundärprävention bei Apoplex aufgrund von Vorhofflimmern?","opts":["ASS allein","Orale Antikoagulation (NOAK oder Marcumar) – verhindert weitere Embolien","Nichts","Vitamin C"],"correct":1,"exp":"Bei kardioembolischem Apoplex (VHF) ist Antikoagulation evidenzbasiert wirksam."}]},{"key":"parkinson","name":"Morbus Parkinson","rel":"h","cheat":[{"h":"Definition","li":["Neurodegenerative Erkrankung mit Dopaminmangel in der Substantia nigra","Idiopathisch (häufigste Form), sekundäre Formen","Beginn meist nach 60. Lj"]},{"h":"Symptome – TRAP","li":["T – Tremor (Ruhetremor, „Pillendrehen\")","R – Rigor (erhöhter Muskeltonus, Zahnradphänomen)","A – Akinese / Bradykinese (Bewegungsverlangsamung, kleinschrittiger Gang, Maskengesicht)","P – Posturale Instabilität (Stand- und Gangunsicherheit)","Plus: Schluckstörung, Speichelfluss, Schriftbild kleiner (Mikrographie), Depression, Demenz im Verlauf"]},{"h":"Diagnostik","li":["Klinisch! Anamnese und neurologische Untersuchung","L-Dopa-Test, Bildgebung (MRT) zum Ausschluss"]},{"h":"Therapie","li":["L-Dopa (Goldstandard, mit Decarboxylasehemmer kombiniert)","Dopaminagonisten, MAO-B-Hemmer, COMT-Hemmer","Tiefe Hirnstimulation (DBS) bei fortgeschrittener Erkrankung","Physiotherapie, Ergotherapie, Logopädie"]},{"h":"Pflegerische Maßnahmen","li":["Sturzprophylaxe (Festination, Freezing, posturale Instabilität)","Medikamente PÜNKTLICH (Wirkschwankungen, On/Off-Phasen)","Mahlzeiten anreichen wenn nötig, Aspirationsschutz, Kost angepasst","Bewegungsförderung, Hilfsmittel (Rollator, festes Schuhwerk)","Kommunikation: Geduld, Augenkontakt, klare Sprache","Psychische Begleitung – Depression häufig"]},{"h":"Komplikationen","li":["Stürze, Aspirationspneumonie","Demenz, Depression, Halluzinationen (medikamentös)","Dyskinesien (L-Dopa-Spätfolge), Wirkschwankungen"]}],"cards":[{"q":"Was bedeutet TRAP?","a":"Tremor, Rigor, Akinese, Posturale Instabilität – die 4 Kardinalsymptome bei Parkinson."},{"q":"Warum müssen Parkinson-Medikamente exakt zur Uhrzeit gegeben werden?","a":"L-Dopa hat ein enges Wirkfenster – verspätete Gabe führt zu Off-Phasen mit Bewegungsblockaden, Sturz- und Schluckstörungen."},{"q":"Was ist Freezing?","a":"Plötzliches motorisches Blockieren („wie festgewachsen\") beim Gehen, v.a. an Türen/Engstellen – hohes Sturzrisiko."},{"q":"Was ist die TRAP-Symptomatik?","a":"T Tremor (Ruhetremor), R Rigor (Steifigkeit), A Akinese/Bradykinese (Bewegungsarmut), P Posturale Instabilität (Sturzgefahr). Klassische 4 Symptome."},{"q":"Welche pflegerischen Maßnahmen?","a":"Sturzprophylaxe (häufige Stürze!), genug Zeit für Bewegungen, Mobilisation, Schluckdiagnostik (Aspirationsrisiko!), Sprachübungen, Mimik trainieren, Lebensstil aktiv."},{"q":"Warum ist L-Dopa-Einnahme zeitkritisch?","a":"Wirkfenster eng – pünktliche Einnahme (oft alle 4–6 h). Mit Eiweiß konkurriert L-Dopa um Resorption → 30 Min vor proteinreicher Mahlzeit. \"On-Off\"-Phänomene bei Wirkungsende."},{"q":"Welche Komplikationen?","a":"Stürze, Aspirationspneumonie, Mangelernährung, Depression, Demenz im Verlauf (50%), L-Dopa-NW (Dyskinesien, Halluzinationen, Impulskontrollstörungen)."}],"quiz":[{"q":"Herr Kraus (72, Parkinson) bekommt L-Dopa um 8:00 Uhr. Sie haben es vergessen und überlegen, es um 11:00 Uhr zu geben. Was tun?","opts":["Nachgeben mit Dosis verdoppeln","Sofort den Arzt informieren – Off-Phasen drohen, Sturzgefahr","Bis zur nächsten Dosis warten","Nichts tun"],"correct":1,"exp":"Pünktliche Einnahme ist essentiell – Off-Phasen mit Bewegungsblockaden und Sturz drohen. Arzt informieren."},{"q":"Welche Aussage zur L-Dopa-Therapie ist KORREKT?","opts":["Mit Eiweißmahlzeit einnehmen","30 Min vor proteinreicher Mahlzeit – Eiweiß hemmt Resorption","Egal wann","Mit Milch"],"correct":1,"exp":"L-Dopa konkurriert mit Aminosäuren um Transporter. Pünktliche Gabe vor Mahlzeit verbessert Wirkung."},{"q":"Welches Symptom gehört NICHT zur TRAP-Trias?","opts":["Tremor","Rigor","Diarrhö","Akinese"],"correct":2,"exp":"TRAP = Tremor, Rigor, Akinese, posturale Instabilität. Diarrhoe gehört nicht dazu (eher Obstipation häufig)."},{"q":"Welche Pflegemaßnahme bei Parkinson hat höchste Priorität?","opts":["Strenge Bettruhe","Sturzprophylaxe + Schluckdiagnostik + Mobilisation","Strenge Diät","Strikte Schweigsamkeit"],"correct":1,"exp":"Stürze und Aspiration sind häufigste Komplikationen – aktive Prophylaxe zentral."}]},{"key":"ms","name":"Multiple Sklerose","rel":"m","cheat":[{"h":"Definition","li":["Chronisch-entzündliche Autoimmunerkrankung des ZNS mit Demyelinisierung","Schubförmig oder progredient","Beginn meist 20–40 Jahre, Frauen häufiger"]},{"h":"Symptome","li":["Visuell: Optikusneuritis (Sehstörung, Augenschmerz)","Motorisch: Paresen, Spastik, Ataxie","Sensibel: Parästhesien, Hypästhesie","Vegetativ: Blasen-/Darmstörung, Sexualfunktion","Fatigue (sehr häufig, einschränkend), Depression, kognitive Defizite"]},{"h":"Diagnostik","li":["MRT (multiple Läsionen, räumlich + zeitlich verstreut)","Liquoruntersuchung (oligoklonale Banden)","Evozierte Potenziale, Anamnese (McDonald-Kriterien)"]},{"h":"Therapie","li":["Schub: Methylprednisolon i.v.","Verlaufsmodifizierend: Interferon-Beta, Glatirameracetat, Dimethylfumarat, Natalizumab, Ocrelizumab u.v.m.","Symptomatisch: Spastik, Schmerz, Blase, Fatigue"]},{"h":"Pflegerische Maßnahmen","li":["Energiemanagement bei Fatigue (Pacing): Pausen, Prioritäten, Vereinfachen","Sturzprophylaxe, Hilfsmittel","Kontinenzförderung, Hautpflege","Hitzevermeidung (Uhthoff-Phänomen), klimatisierte Räume","Psychische Begleitung – chronische Erkrankung mit unsicherem Verlauf"]}],"cards":[{"q":"Was ist das Uhthoff-Phänomen?","a":"Verschlechterung der MS-Symptome unter Wärme (heißes Bad, Sport, Fieber). Patient sollte kühl bleiben."},{"q":"Was ist Fatigue?","a":"Erschöpfung – nicht durch Schlaf zu beseitigen. Häufigstes Symptom bei MS, oft am stärksten einschränkend. Pflege: Energiemanagement (Pacing)."},{"q":"Was ist Multiple Sklerose?","a":"Chronisch-entzündliche Autoimmun-Demyelinisierung im ZNS. Schubförmig oder progredient. Frühe Diagnose, frühe Immuntherapie."},{"q":"Welche Symptome (Multilokulär)?","a":"Sehstörung (Optikus-Neuritis), Sensibilitätsstörung, Paresen, Spastik, Ataxie, Blasenstörung, Fatigue (Erschöpfung), kognitive Probleme. Symptome variabel!"},{"q":"Was ist das Uhthoff-Phänomen?","a":"Verschlechterung der Symptome bei Wärme (Sonne, heißes Bad, Fieber, körperliche Anstrengung) – wegen verlangsamter Nervenleitung in entmarkten Fasern. Kühlung hilft."}],"quiz":[{"q":"Welche Maßnahme empfiehlt sich bei Fatigue?","opts":["Mehr Sport bis zur Erschöpfung","Energiemanagement (Pacing): Pausen, Prioritäten setzen","Stimulanzien","Bettruhe"],"correct":1,"exp":"Pacing = bewusster Wechsel von Aktivität und Pause, Aufgaben priorisieren – wirksamste nicht-medikamentöse Strategie."},{"q":"Welche Symptomatik ist typisch bei MS-Schub?","opts":["Plötzlich beidseitige Beinparese ohne Vorgeschichte","Optikus-Neuritis mit Sehverlust + Sensibilitätsstörung in Beinen + Spastik","Brustschmerz","Fieber"],"correct":1,"exp":"Multilokuläre Symptome (verschiedene Stellen ZNS) typisch – disseminiert in Zeit und Ort."},{"q":"Welche Pflegemaßnahme hilft bei Fatigue?","opts":["Strenge Bettruhe","Energie-Management: Pausen einplanen, kühle Räume, Aktivitäten dosieren","Forciertes Training","Heiße Bäder"],"correct":1,"exp":"Fatigue ist häufigstes Symptom. Energiehaushalt optimieren, Hitze vermeiden (Uhthoff)."}]},{"key":"epilepsie","name":"Epilepsie & Anfallsmanagement","rel":"h","cheat":[{"h":"Definition","li":["Wiederkehrende Anfälle durch übersynchrone neuronale Entladungen","Fokal (von einer Hirnregion) vs. generalisiert (gesamtes Hirn)","Status epilepticus: Anfall >5 min oder rezidivierend ohne Erholung – Notfall!"]},{"h":"Anfallsformen","li":["Generalisiert tonisch-klonisch (Grand Mal): Bewusstlosigkeit, Sturz, Versteifung, Zucken","Absencen: kurze Bewusstseinspausen, v.a. Kinder","Fokal mit/ohne Bewusstseinsstörung: motorische, sensorische, autonome Symptome"]},{"h":"Auslöser / Trigger","li":["Schlafmangel, Alkohol, Drogen, Fieber","Flackerlicht, Stress, Medikamente","Vergessene Antiepileptika"]},{"h":"Akutmaßnahmen während des Anfalls","li":["Patient vor Verletzungen schützen (Polster, scharfe Gegenstände weg)","NICHTS in den Mund stecken (kein Beißkeil!) – Atemwege beachten","Keine Fixierung, Anfall nicht unterbrechen","Notruf bei: erstem Anfall, Anfall >5 min, Serien, Verletzung","Nach Anfall: stabile Seitenlage, Vitalzeichen, Beruhigung, Orientierung"]},{"h":"Pflegerische Maßnahmen","li":["Antiepileptika regelmäßig und pünktlich","Anfallsdokumentation: Beginn, Dauer, Verlauf, Bewusstsein, postiktal","Aufklärung: Trigger meiden, Schlaf, Alkoholverzicht","Sicherheit: Sturzprophylaxe, Bettgitter, sicheres Baden (Dusche statt Wanne)"]}],"cards":[{"q":"Was darf man im Anfall NICHT tun?","a":"Nichts in den Mund stecken (Beißkeil verboten!), nicht festhalten, Anfall nicht unterbrechen wollen. Patient schützen, Zeit messen."},{"q":"Wann Notruf?","a":"Bei erstem Anfall, Anfall >5 min, mehreren Anfällen ohne Erholung, Verletzung, Atemprobleme – Status epilepticus ist lebensbedrohlich."},{"q":"Was wird nach Anfall dokumentiert?","a":"Beginn, Dauer, Anfallsart, Bewusstsein, motorische/sensorische Symptome, Inkontinenz, Verletzungen, postiktale Phase."},{"q":"Welche Anfallsformen unterscheidet man?","a":"Fokal (lokal beginnend, mit/ohne Bewusstseinsverlust) und generalisiert (von Anfang an beidseitig, z.B. tonisch-klonisch, Absencen, Myoklonien)."},{"q":"Was ist ein Status epilepticus?","a":"Anfall >5 Min oder mehrere Anfälle ohne Wiedererlangen des Bewusstseins zwischendurch. Lebensbedrohlich → Notfall, Diazepam-Rektiole/i.v., Notarzt."},{"q":"Welche Maßnahmen während eines tonisch-klonischen Anfalls?","a":"Patient nicht festhalten, Verletzungsschutz (Polster unter Kopf, Brille ab), NICHTS in den Mund, Zeit messen, nach Anfall stabile Seitenlage, beruhigen."},{"q":"Welche Anfallsdokumentation ist wichtig?","a":"Beginn (Aura?), Dauer, Art (welche Körperteile), Bewusstsein, Atmung, Inkontinenz, Zungenbiss, postiktale Phase. Hilft bei Diagnose und Therapieanpassung."},{"q":"Welche Antiepileptika sind häufig?","a":"Valproat, Lamotrigin, Levetiracetam, Carbamazepin, Topiramat. Spiegelkontrollen, NW (Sedierung, Schwindel, Allergie, Leberwerte) – pünktliche Einnahme!"}],"quiz":[{"q":"Patient hat einen Grand-Mal-Anfall. Was tun Sie?","opts":["Beißkeil zwischen Zähne","Patient festhalten, ruhigstellen","Schützen vor Verletzung, Zeit messen, NICHTS in Mund, Notruf bei >5 min","Wasser geben"],"correct":2,"exp":"Schutz vor Verletzungen, Atemwege beobachten, Zeit messen. Beißkeil ist obsolet (Verletzungsgefahr)."},{"q":"Patient hat einen tonisch-klonischen Anfall. Was tun?","opts":["Mund öffnen, Beißkeil","Verletzungsschutz, NICHTS in Mund, Zeit messen, Notruf bei >5 Min","Festhalten","Wadenwickel"],"correct":1,"exp":"Wichtigste Maßnahme: Verletzungen verhindern, Atemwege sichern, NICHT in Mund. Bei langem Anfall = Status → Notfall."},{"q":"Wie lange darf ein Anfall maximal dauern bevor man von Status epilepticus spricht?","opts":["1 Min","2 Min","5 Min","30 Min"],"correct":2,"exp":"Status epilepticus = Anfall >5 Min oder mehrere Anfälle ohne Erholung. Lebensbedrohlich, sofort behandeln."},{"q":"Welche Aussage zur Anfallsdokumentation?","opts":["Reicht „Anfall gehabt\"","Detaillierte Beobachtung (Beginn, Dauer, Art, Bewusstsein, postiktal) ist wichtig für Therapie","Nur Dauer wichtig","Egal"],"correct":1,"exp":"Differenzierte Dokumentation hilft bei der Diagnose, Therapieanpassung und Verlaufsbeurteilung."}]},{"key":"demenz","name":"Demenz","rel":"vh","cheat":[{"h":"Definition / Formen","li":["Erworbenes Syndrom mit fortschreitendem Verlust kognitiver Fähigkeiten","Alzheimer (60–70%): schleichend, Plaques + Tangles","Vaskuläre Demenz: nach Schlaganfällen, stufenweise","Lewy-Body-Demenz: Halluzinationen, Parkinson-Symptome","Frontotemporal: Persönlichkeitsveränderung"]},{"h":"Symptome – Stadien (Alzheimer)","li":["Frühstadium: Vergesslichkeit (Kurzzeitgedächtnis), Wortfindung","Mittelstadium: Orientierungsstörung, ADL-Einschränkung, Sprachverarmung","Spätstadium: vollständige Pflegeabhängigkeit, Bettlägerigkeit, Verlust verbaler Kommunikation"]},{"h":"Diagnostik","li":["MMST, Uhrentest, DemTect","Anamnese (Fremdanamnese!), Labor, Bildgebung","Ausschluss: Depression, Delir, Hypothyreose, B12-Mangel"]},{"h":"Therapie","li":["Acetylcholinesterasehemmer (Donepezil, Rivastigmin) bei leichter bis mittlerer Alzheimer-Demenz","Memantin bei mittlerer bis schwerer Form","Nicht-medikamentös: Aktivierung, Biographiearbeit, Validation, Milieugestaltung","Antipsychotika nur bei schweren Verhaltensauffälligkeiten – cave Sturz, Mortalität"]},{"h":"Pflegerische Maßnahmen","li":["Validation (Naomi Feil): Gefühle bestätigen, nicht korrigieren","Biographiearbeit: vertraute Lieder, Gerüche, Geschichten","Tagesstrukturierung, gleichbleibende Bezugspersonen","Milieu: orientierungsfreundlich, ruhig, gut beleuchtet","Kommunikation: kurze Sätze, Augenkontakt, Berührung, Geduld","Sturzprophylaxe, Ernährung (Fingerfood, anreichern), Mundpflege"]},{"h":"Herausforderndes Verhalten","li":["Hinlauftendenz: nicht festhalten, sondern begleiten, Ursache suchen","Aggression: Ruhe, Sicherheit, Trigger meiden","Depression vs. Apathie: aktivieren, Tagesstruktur"]},{"h":"Rechtliches","li":["Einwilligungsfähigkeit prüfen, gesetzliche Betreuung bei Bedarf","Patientenverfügung beachten","Freiheitseinschränkende Maßnahmen nur mit richterlicher Genehmigung"]}],"cards":[{"q":"Was ist Validation nach Naomi Feil?","a":"Methode der wertschätzenden Kommunikation mit dementiell veränderten Menschen: Gefühle und Wirklichkeit des Patienten anerkennen statt korrigieren – schafft Sicherheit und reduziert Stress."},{"q":"Wichtigste Differentialdiagnose zur Demenz beim alten Menschen?","a":"Delir (akut, fluktuierend, oft Aufmerksamkeitsstörung) und Depression (Stimmung, Klage über Gedächtnis ohne objektive Defizite). Klären, bevor Demenz angenommen wird."},{"q":"Wie sollte die Umgebung gestaltet werden?","a":"Reizarm aber orientierungsfreundlich: gut beleuchtet, klare Beschilderung, vertraute Gegenstände, ruhig, gleiche Bezugspersonen, regelmäßige Strukturen."},{"q":"Welche Demenzformen sind häufig?","a":"Alzheimer (~60%): schleichend, Gedächtnis zuerst. Vaskulär (~20%): nach Apoplex, stufenweise. Lewy-Body: Halluzinationen, Parkinsonismus, fluktuierende Wachheit. Frontotemporal: Persönlichkeitsänderung."},{"q":"Was ist die MMST?","a":"Mini-Mental-Status-Test: 30 Punkte, screent Orientierung, Merkfähigkeit, Aufmerksamkeit, Sprache, visuokonstruktiv. <26: kognitive Beeinträchtigung. Demenzdiagnostik-Standard."},{"q":"Was ist Validation nach Naomi Feil?","a":"Wertschätzender Umgang mit Demenzkranken: Realität nicht korrigieren, Gefühle anerkennen, biografisch arbeiten, mitgehen statt gegenan – fördert Beziehung und Wohlbefinden."},{"q":"Welche Pflegekonzepte bei Demenz?","a":"Personzentrierte Pflege (Kitwood), Validation (Feil), Mäeutik (van der Kooij), basale Stimulation, Erinnerungspflege, Biographiearbeit, Snoezelen."},{"q":"Welche pflegerischen Tipps bei herausforderndem Verhalten?","a":"Ursache suchen (Schmerz? Hunger? Toilette? Reizüberflutung?), ruhige Atmosphäre, klare einfache Sprache, Routine, NICHT korrigieren, validieren, ablenken, Sicherheit."},{"q":"Welche medikamentöse Therapie?","a":"Antidementiva: Donepezil, Rivastigmin, Galantamin (Cholinesterase-Hemmer) bei leicht-mittel. Memantin bei mittel-schwer. Verzögern, heilen nicht. Bei BPSD nur sehr restriktiv Antipsychotika!"},{"q":"Begründen Sie die Vermeidung von Antipsychotika bei BPSD.","a":"Neuroleptika erhöhen das Mortalitätsrisiko (kardiovaskulär, Sturz, Pneumonie) bei Demenz. Ursachensuche und nicht-medikamentöse Maßnahmen sind erste Wahl."}],"quiz":[{"q":"Frau Berg (84, Alzheimer) verlangt nach ihrer verstorbenen Mutter. Welche Reaktion ist angemessen?","opts":["Direkt sagen: Ihre Mutter ist tot","Validierend: nach den Gefühlen fragen, an gemeinsame Erinnerungen anknüpfen","Ablenken mit TV","Beruhigungsmittel geben"],"correct":1,"exp":"Validation: Gefühle ernst nehmen („Sie vermissen Ihre Mutter sehr?\"), in die Welt der Patientin eintreten – schafft Vertrauen, reduziert Stress."},{"q":"Welche Maßnahme ist KEIN Bestandteil der personenzentrierten Demenzpflege?","opts":["Biographiearbeit","Validation","Routinemäßige Fixierung zur Sturzvermeidung","Milieugestaltung"],"correct":2,"exp":"Fixierung ist freiheitseinschränkend, nur mit richterlicher Genehmigung; meist Verschlechterung. Andere Maßnahmen sind personenzentriert."},{"q":"Frau Schmidt (84) glaubt, ihre verstorbene Mutter besucht sie. Was tun?","opts":["Realität korrigieren („Ihre Mutter ist tot\")","Validierend mitgehen, Gefühle anerkennen, ggf. nach Mutter fragen","Anschreien","Antipsychotikum geben"],"correct":1,"exp":"Realitätskorrektur verletzt und ist sinnlos. Validation: emotionalen Inhalt aufgreifen, Würde wahren."},{"q":"Welche Maßnahme bei nächtlicher Unruhe ist KEINE gute Lösung?","opts":["Tagesstrukturierung","Schlafhygiene","Körperliche Aktivität tagsüber","Bettgitter zur Sicherung als Routine"],"correct":3,"exp":"Bettgitter sind freiheitseinschränkend, fördern Stürze (Patient klettert) und Verwirrtheit. Ursachen suchen."},{"q":"Welche Aussage zu Antipsychotika bei Demenz ist KORREKT?","opts":["Antipsychotika sind erste Wahl bei jedem Auffälligen Verhalten","Antipsychotika erhöhen Mortalität – nur bei Eigen-/Fremdgefährdung restriktiv einsetzen","Wirken zuverlässig","Ohne Risiko"],"correct":1,"exp":"FDA-Warnung: erhöhte Mortalität. Nicht-medikamentöse Maßnahmen + Ursachenklärung zuerst."},{"q":"Patient mit Demenz wird beim Waschen aggressiv. Was tun?","opts":["Festhalten","Pause, später erneut versuchen, mit ruhiger Stimme erklären, biographische Vorlieben einbeziehen","Sedierung","Strafen"],"correct":1,"exp":"Aggression ist Ausdruck von Überforderung/Angst. Geduld, alternative Strategien, Triggervermeidung."},{"q":"Wofür steht der MMST?","opts":["Mobile Mental State Test","Mini-Mental-Status-Test (Demenz-Screening)","Multimorbidity Score","Mood Score"],"correct":1,"exp":"MMST nach Folstein: 30-Punkte-Screening. <26 → Verdacht auf kognitive Beeinträchtigung. Plus Uhrentest."}]},{"key":"depression","name":"Depression","rel":"h","cheat":[{"h":"Definition","li":["Affektive Störung mit gedrückter Stimmung, Antriebsmangel, Interessenverlust","Leicht / mittelschwer / schwer · mit oder ohne psychotische Symptome","Episode (>2 Wochen) vs. rezidivierend"]},{"h":"Symptome (ICD-10)","li":["Hauptsymptome: gedrückte Stimmung, Interessenverlust, Antriebsmangel","Zusatzsymptome: Konzentration↓, Selbstwert↓, Schuldgefühle, Schlafstörung, Appetit↓, Suizidgedanken, hoffnungslose Zukunftsperspektive","Somatisch: Müdigkeit, Schmerzen, GI-Beschwerden","Bei Älteren oft als kognitive Einschränkung („Pseudodemenz\")"]},{"h":"Diagnostik","li":["Anamnese, Beobachtung, ICD-10-Kriterien","Skalen: PHQ-9, GDS (Geriatrie), BDI","Suizidalität immer erfragen!"]},{"h":"Therapie","li":["Psychotherapie (kognitive VT, IPT)","Antidepressiva: SSRI (Citalopram, Sertralin), SNRI, trizyklisch","Schwere/therapieresistent: EKT","Lichttherapie (saisonal), Sport, Schlafentzug"]},{"h":"Pflegerische Maßnahmen","li":["Beziehung aufbauen, Akzeptanz signalisieren – nicht „aufmuntern\"","Tagesstruktur, kleine Aktivitäten, Erfolgserlebnisse","Selbstversorgung unterstützen, ggf. anleiten","Suizidalität: aktiv ansprechen, im Blick behalten – fragen schadet nicht!","Medikamentenadhärenz, NW beobachten (Wirkung erst nach 2–3 Wochen)","Ressourcen aktivieren, soziale Kontakte fördern"]},{"h":"Suizidalität – Stufen","li":["Lebensmüdigkeit / passive Todesgedanken","Aktive Suizidgedanken ohne Plan","Suizidgedanken mit Plan","Suizidale Handlung","Sofort Arzt informieren bei jedem Hinweis – keine Versprechen über Stillschweigen"]}],"cards":[{"q":"Welche 3 Hauptsymptome nach ICD-10?","a":"Gedrückte Stimmung, Interessen-/Freudlosigkeit, Antriebsmangel – mind. 2 davon + 2 Zusatzsymptome >2 Wochen für leichte Episode."},{"q":"Wann wirkt ein SSRI?","a":"Stimmungsaufhellende Wirkung erst nach 2–3 Wochen – initial kann der Antrieb vor der Stimmung wiederkehren → erhöhtes Suizidrisiko in dieser Phase!"},{"q":"Wie spricht man Suizidalität an?","a":"Direkt und ruhig: „Haben Sie Gedanken, sich das Leben zu nehmen?\" – Fragen schützt, schadet nicht. Bei jeder Bejahung: Arzt informieren, nicht alleine lassen."},{"q":"Welche Hauptsymptome bei Depression (ICD)?","a":"3 Hauptsymptome: gedrückte Stimmung, Interessensverlust/Freudlosigkeit, Antriebsminderung. Plus Schlafstörung, Konzentration, Schuld, Suizidgedanken, Appetit/Gewicht, Selbstwert. Mind. 2 Wochen Dauer."},{"q":"Was ist Antriebssteigerung – Wann gefährlich?","a":"Antrieb kehrt unter Antidepressiva oft VOR der Stimmungsbesserung zurück → höchstes Suizidrisiko in dieser Phase, weil Energie für Suizid wieder vorhanden, aber Verzweiflung bleibt. ENGE Beobachtung!"},{"q":"Welche Antidepressiva-Klassen?","a":"SSRI (Citalopram, Sertralin) – erste Wahl. SNRI (Venlafaxin). Trizyklika (Amitriptylin) – mehr NW. NaSSA (Mirtazapin – schlafanstoßend, appetitsteigernd). Wirkung nach 2–4 Wochen."},{"q":"Welche Pflege bei depressiven Patienten?","a":"Strukturierter Tag, Aktivierung in kleinen Schritten, validierend (nicht „aufmuntern\"), Schlafhygiene, Suizidalität konkret erfragen, Beziehung aufbauen, Bezugspflege, Selbstwert stärken."},{"q":"Was ist eine somatische Depression?","a":"Depression mit körperlichen Beschwerden im Vordergrund: Müdigkeit, Schmerzen, GI-Beschwerden – häufig bei Älteren, oft als „Befindlichkeitsstörung\" verkannt. Daher gezielte Anamnese."}],"quiz":[{"q":"Herr Maier (68) wirkt seit 4 Wochen niedergeschlagen, schläft schlecht, hat keinen Appetit, weint oft. Erste pflegerische Maßnahme?","opts":["Versuchen ihn aufzuheitern","Ruhig nachfragen, zuhören, Suizidalität erfragen, Arzt informieren","Nicht ansprechen","Schlaftablette geben"],"correct":1,"exp":"Empathische Beziehung, aktives Zuhören, Suizidalität direkt ansprechen ist Standard. Keine Tabubildung."},{"q":"Warum erhöhte Suizidgefahr bei beginnender SSRI-Wirkung?","opts":["Tabletten machen aggressiv","Antrieb steigt vor Stimmung – Patient hat wieder Energie für Suizid","Nebenwirkung Aggression","Bekannte Allergie"],"correct":1,"exp":"Antriebssteigerung kommt vor Stimmungsaufhellung – Patient kann seine bisher unrealisierten Suizidpläne nun umsetzen."},{"q":"Patient hat seit 1 Woche Antidepressivum. Stimmung noch schlecht, Antrieb gesteigert. Was beachten?","opts":["Therapie ist gescheitert","Höchstes Suizidrisiko – Antrieb steigt vor Stimmung. Engmaschig beobachten und Suizidalität konkret erfragen","Dosis sofort senken","Egal"],"correct":1,"exp":"Klassische gefährliche Phase: Energie für Suizid vor Stimmungsbesserung. Patient nicht allein lassen, regelmäßige Gespräche."},{"q":"Welche Frage zur Suizidalität ist RICHTIG?","opts":["Sie wollen sich doch nicht umbringen, oder?","Direkt und konkret: \"Haben Sie Gedanken, sich das Leben zu nehmen? Haben Sie einen Plan?\"","Nicht ansprechen, Sie könnten Idee säen","Vermeiden"],"correct":1,"exp":"Direktes Erfragen suizidaler Gedanken hilft – es macht NICHT suizidal. Anschließend Schutzfaktoren, Plan, Mittelverfügbarkeit klären."},{"q":"Welche Pflegehaltung bei depressivem Patienten ist FALSCH?","opts":["Validation","„Reißen Sie sich zusammen, anderen geht es schlimmer\"","Strukturierter Tag","Beziehung aufbauen"],"correct":1,"exp":"Bagatellisierung verstärkt Schuldgefühle. Validierend, nicht verharmlosend; auf Augenhöhe, Hoffnung anbieten."}]},{"key":"angst","name":"Angststörungen","rel":"m","cheat":[{"h":"Formen","li":["Generalisierte Angststörung (GAS): unspezifische, dauerhafte Sorgen","Panikstörung: rezidivierende Panikattacken (Herzrasen, Atemnot, Todesangst)","Phobien: spezifisch (Tiere, Höhen), Sozial-, Agoraphobie","Posttraumatische Belastungsstörung"]},{"h":"Symptome","li":["Psychisch: Furcht, Sorge, Anspannung, Vermeidung","Vegetativ: Tachykardie, Schwitzen, Zittern, Atemnot, Schwindel, Übelkeit","Panikattacke: plötzlich, max. nach 10 min Höhepunkt, klingt nach 30 min ab"]},{"h":"Therapie","li":["Psychotherapie (kognitive VT, Konfrontation/Exposition)","SSRI/SNRI als Medikament der ersten Wahl","Benzodiazepine nur kurzfristig (Suchtgefahr!)","Entspannungsverfahren: PMR, Atemübungen"]},{"h":"Pflegerische Maßnahmen","li":["Bei Panikattacke: ruhig bleiben, Patient ansprechen, beruhigen","Atemtechnik anleiten (langsam in Bauch atmen)","Sicheren Raum schaffen, nicht alleine lassen","Beziehungsaufbau, Konfrontation in kleinen Schritten","Information über Erkrankung, Selbsthilfegruppen"]}],"cards":[{"q":"Wie lange dauert eine typische Panikattacke?","a":"Plötzlich, Höhepunkt nach 10 min, klingt meist nach 30 min ab. Patienten fürchten oft Herzinfarkt – körperliche Ursachen ausschließen."},{"q":"Warum Benzodiazepine nicht als Dauertherapie?","a":"Hohe Abhängigkeitsgefahr, kognitive NW, Sturzgefahr. Nur kurzfristig (max. 2–4 Wochen)."},{"q":"Welche Angststörungen unterscheidet man?","a":"Generalisierte Angststörung (Sorgen über alles), Panikstörung (Panikattacken), Phobien (spezifisch / sozial / Agoraphobie), Zwangsstörung (verwandt), PTBS (verwandt)."},{"q":"Was hilft bei akuter Panikattacke?","a":"Ruhe ausstrahlen, Anwesenheit, einfache Atemanleitung (4 Sek ein – 6 Sek aus), Bodenkontakt fühlen, Realität versichern (nicht lebensgefährlich), evtl. kurzer Lorazepam nach AVO."},{"q":"Welche Therapie ist erste Wahl?","a":"Kognitive Verhaltenstherapie (KVT) mit Expositionsübungen. Medikamentös SSRI (Citalopram, Sertralin). Benzodiazepine NUR kurzfristig wegen Abhängigkeitsrisiko."}],"quiz":[{"q":"Frau Klein hat akut Panik, hyperventiliert. Erste Maßnahme?","opts":["Sauerstoff","Ruhe, Sicherheit, Atemtechnik anleiten (in Tüte oder bewusst langsam)","Sofort Notarzt","Patient alleine lassen"],"correct":1,"exp":"Hyperventilation bei Panik: ruhig anleiten, langsam atmen lassen, Sicherheit vermitteln. Tüten-Rückatmung ist umstritten – moderne Empfehlung: bewusste Atemkontrolle."},{"q":"Patientin hat Panikattacke mit Hyperventilation. Was tun?","opts":["Sauerstoff hochdosiert","Ruhe ausstrahlen, Anwesenheit, langsame Atemanleitung, ggf. CO₂-Rückatmung","Beruhigungsmittel sofort i.v.","Aufregung verstärken"],"correct":1,"exp":"Anwesenheit + Atemtechnik beruhigen meist. CO₂-Rückatmung bei Tetanie hilfreich. Benzo nur als Reserve."}]},{"key":"suizid","name":"Suizidalität & Krisenintervention","rel":"h","cheat":[{"h":"Risikogruppen","li":["Männer (3x höhere Vollendete), ältere Menschen","Depression, Sucht, Schizophrenie, Borderline","Schwere körperliche Erkrankung, soziale Isolation, Z.n. Suizidversuch"]},{"h":"Warnsignale","li":["Direkte oder indirekte Äußerungen („Ich kann nicht mehr...\")","Plötzliche Beruhigung nach Krise (kann Entscheidung signalisieren)","Verschenken von Besitz, Verabschiedung","Konkrete Pläne, Hortung von Medikamenten","Sozialer Rückzug, hoffnungslose Zukunftsperspektive"]},{"h":"Pflegerische Maßnahmen","li":["Direkt und einfühlend ansprechen: „Haben Sie Gedanken, sich etwas anzutun?\"","Ernst nehmen, nicht bagatellisieren oder belehren","Aktiv zuhören, Akzeptanz, keine schnellen Lösungen","Nicht alleine lassen, Sicherheit gewährleisten","Arzt informieren – immer, jeder Verdacht zählt","Bei akuter Selbstgefährdung: ggf. Unterbringung nach PsychKG / BGB"]},{"h":"Was NICHT tun","li":["Versprechen abnehmen lassen („Sie tun das nicht, oder?\")","Verschwiegenheit zusichern – Schutz hat Vorrang","Banalisieren („Anderen geht es doch auch schlecht\")","Ratschläge geben, ohne zugehört zu haben"]}],"cards":[{"q":"Warum direkt nach Suizidgedanken fragen?","a":"Forschung zeigt: Fragen erhöht NICHT das Risiko, sondern entlastet, ermöglicht Hilfe. Tabu schützt nicht."},{"q":"Was bedeutet plötzliche Beruhigung in suizidaler Krise?","a":"Kann ein Warnsignal sein – Entscheidung getroffen, innere Ruhe vor der Tat. Erhöhte Wachsamkeit erforderlich."},{"q":"Wie wird Suizidalität klassifiziert?","a":"Passive Lebensmüdigkeit (Wunsch tot zu sein), Suizidideen (allgemein), konkrete Suizidgedanken (Plan), Suizidvorbereitungen, Suizidversuch. Eskalierender Risikograd."},{"q":"Warnzeichen für akute Suizidalität?","a":"Plötzliche Ruhe nach längerer Verzweiflung, Verschenken von Gegenständen, Verabschieden, konkrete Pläne, Vorbereitungen, Hoffnungslosigkeit, fehlende Zukunftsperspektive."},{"q":"Welche Schutzfaktoren beachten?","a":"Soziale Bindungen (Familie, Freunde), Verantwortung (Kinder, Tiere), religiöse Bindung, frühere Bewältigungserfahrungen, Therapeut. Beziehung – Schutzfaktoren aktivieren."},{"q":"Was ist ein Non-Suizidvertrag?","a":"Mündliche/schriftliche Absprache: Patient verpflichtet sich, vor Suizidhandlung erst Hilfe zu rufen. NICHT überschätzen – KEIN Ersatz für Schutz und engmaschige Beobachtung."},{"q":"Welche Maßnahmen bei akuter Suizidalität?","a":"Patient nicht allein lassen, Mittel entfernen (Medikamente, Schnüre), psychiatrische Vorstellung, ggf. PsychKG-Aufnahme bei Selbstgefährdung, klare Absprachen, Bezugspflege."}],"quiz":[{"q":"Patient sagt: „Ich will, dass das alles aufhört.\" Reaktion?","opts":["Ablenken","Direkt nachfragen: „Meinen Sie, dass Sie nicht mehr leben wollen?\"","Ignorieren","Belehren, dass das Leben schön ist"],"correct":1,"exp":"Direktes Ansprechen ist evidenzbasiert beste Reaktion – ermöglicht Klärung und weitere Hilfe."},{"q":"Welche Frage hilft bei der Suizidalitäts-Einschätzung?","opts":["Pflegen Sie sich gut?","Direkt: „Haben Sie Gedanken, sich das Leben zu nehmen? Haben Sie einen konkreten Plan?\"","„Sie sind doch nicht so dumm, oder?\"","Vermeiden, Patient nicht aufregen"],"correct":1,"exp":"Direktes Erfragen entlastet, macht NICHT suizidal. Klären: Gedanken, Pläne, Mittel, Zeitrahmen, Schutzfaktoren."},{"q":"Welche Aussage zur Suizidprävention ist KORREKT?","opts":["Wer redet, tut es nicht","Reden über Suizid SCHÜTZT, nicht ansprechen wäre fahrlässig","Nicht ansprechen","Egal"],"correct":1,"exp":"Mythos „Wer drüber spricht, tut es nicht\" ist FALSCH und gefährlich. Offenes Gespräch entlastet."}]},{"key":"alkohol","name":"Alkoholabhängigkeit & Entzug","rel":"vh","cheat":[{"h":"ICD-10-Kriterien (≥3 in 1 Jahr)","li":["Starker Wunsch / Zwang zu konsumieren","Kontrollverlust","Toleranzentwicklung","Entzugssymptome","Vernachlässigung anderer Interessen","Konsum trotz schädlicher Folgen"]},{"h":"Diagnostik","li":["CAGE-Fragebogen: Cut down, Annoyed, Guilty, Eye-opener (≥2 = verdächtig)","AUDIT, Labor: γ-GT↑, MCV↑, CDT↑"]},{"h":"Entzugssyndrom – Symptome","li":["6–12 h: Tremor, Schwitzen, Tachykardie, Hypertonie, Übelkeit, Unruhe","12–24 h: Halluzinationen, Krampfanfälle möglich","48–72 h: Delirium tremens (Vollbild) – akute Lebensgefahr!","Symptome: Desorientierung, Halluzinationen (Spinnen, kleine Tiere), vegetative Entgleisung, Krampfanfälle"]},{"h":"Therapie","li":["Akut: stationär, Clomethiazol (Distraneurin) oder Benzodiazepine","Vitamin B1 (Thiamin) prophylaktisch – Verhinderung Wernicke-Korsakow!","Hydratation, Elektrolyte, Vitalzeichen","Postakut: Entwöhnung, Selbsthilfegruppen (AA), Anti-Craving (Naltrexon, Acamprosat)"]},{"h":"Pflegerische Maßnahmen","li":["Engmaschige Vitalzeichen (RR, Puls, Temp), Bewusstsein","Sturz- und Verletzungsprophylaxe (Bett tief, Polsterung)","Reizarme Umgebung bei Halluzinationen, Realitätsorientierung","Empathisch, nicht moralisieren – Sucht ist Erkrankung","Flüssigkeit, Ernährung, Mundpflege","Beobachtung: Krampfanfälle, Delirzeichen → Arzt"]},{"h":"Folgeerkrankungen","li":["Leber: Steatosis, Hepatitis, Zirrhose","Pankreatitis, Gastritis, Ösophagusvarizen","Polyneuropathie, Wernicke-Korsakow (Thiaminmangel)","Kardiomyopathie, Tumoren, Demenz"]}],"cards":[{"q":"Was ist der CAGE-Fragebogen?","a":"4 Screening-Fragen: Cut down (reduzieren?), Annoyed (verärgert?), Guilty (Schuldgefühl?), Eye-opener (morgens trinken?). ≥2 ja = Verdacht auf Alkoholproblem."},{"q":"Warum Vitamin B1 bei Alkoholabhängigkeit?","a":"Thiaminmangel kann zu Wernicke-Enzephalopathie (Augenmuskelparese, Ataxie, Verwirrtheit) führen – irreversibel als Korsakow-Syndrom. Prophylaxe lebenswichtig."},{"q":"Wann ist das Delirium tremens am gefährlichsten?","a":"48–72 h nach letztem Alkoholkonsum. Akute Lebensgefahr durch vegetative Entgleisung, Krampfanfälle, Aspiration. Stationäre Überwachung!"},{"q":"Was ist der CAGE-Fragebogen?","a":"4 Fragen: Cut down? Annoyed? Guilty? Eye-opener? ≥2 Ja-Antworten = Verdacht auf Alkoholproblem. Schnelles Screening-Tool, einfach in Praxis."},{"q":"Welche Symptome im Alkoholentzug?","a":"Beginn 6–12 h nach letztem Trinken: Tremor, Schwitzen, Tachykardie, Hypertonie, Übelkeit, Unruhe, Schlafstörung. Schwer: Krampfanfälle (12–48 h), Delirium tremens (48–96 h)."},{"q":"Was ist Delirium tremens?","a":"Schwerster Alkoholentzug: Bewusstseinstrübung, optische Halluzinationen (\"weiße Mäuse\"), psychomotorische Unruhe, vegetative Entgleisung, Krampfanfälle. Lebensgefährlich (Mortalität bis 15% unbehandelt)."},{"q":"Welche Medikamente im Entzug?","a":"Benzodiazepine (Diazepam, Clomethiazol = Distraneurin) – Standard. Beta-Blocker bei vegetativen Symptomen. Vit B1 (Thiamin!) zur Wernicke-Prophylaxe. Symptom-orientierte Dosierung."},{"q":"Warum Thiamin (Vit B1) im Entzug?","a":"Alkoholiker haben oft B1-Mangel → Wernicke-Enzephalopathie (Augenmuskellähmung, Ataxie, Verwirrtheit) → Korsakow-Syndrom (irreversibler Gedächtnisverlust). Thiamin VOR Glukose!"},{"q":"Welche Pflege im Entzug?","a":"Ruhige reizarme Umgebung, klare Tagesstruktur, Realitätsorientierung, Vitalzeichen-Monitoring, Sturzprophylaxe (verwirrt!), Flüssigkeit/Elektrolyte, ggf. Fixierung NUR rechtlich abgesichert, Suchtberatung."},{"q":"Was sind Korsakow-Spätfolgen?","a":"Anterograde Gedächtnisstörung (Neues nicht behalten), Konfabulationen (Lückenfüller), Orientierungsstörung. Pflegeerfordernis dauerhaft, oft Heimunterbringung."}],"quiz":[{"q":"Herr Lang (52) wird mit Alkoholentzug aufgenommen. Nach 36 h: Tremor, Tachykardie, Halluzinationen, RR 180/110, desorientiert. Verdacht?","opts":["Schlaganfall","Delirium tremens","Demenz","Schizophrenie"],"correct":1,"exp":"Klassisches Delirium tremens – stationäre intensive Behandlung, Sedierung, Vitalzeichen, Vit B1, Krampfanfallschutz."},{"q":"Was sollten Sie als Pflegekraft NICHT tun?","opts":["Vitalzeichen kontrollieren","Empathisch zuhören","Moralisieren und Vorwürfe machen","Sturzprophylaxe"],"correct":2,"exp":"Sucht ist Erkrankung. Moralische Vorwürfe schaden Therapiebeziehung; nicht-wertende Haltung ist Standard."},{"q":"Patient (52) ist 2 Tage nüchtern, plötzlich agitiert, halluziniert „kleine Tiere\", Tachykardie 130, RR 180/110. Was vermuten Sie?","opts":["Schizophrenie","Delirium tremens – Notfall, Klinik, Benzo, Vit B1","Migräne","Allergie"],"correct":1,"exp":"Klassisches Delirium tremens. Lebensgefährlich – stationäre Behandlung, Benzodiazepine, Thiamin, Monitoring."},{"q":"Wann beginnt typischerweise das Entzugssyndrom?","opts":["Sofort","6–12 h nach letztem Trinken","Erst nach 2 Wochen","Nie"],"correct":1,"exp":"Frühentzug 6–12 h, Krampfanfälle 12–48 h, DT 48–96 h. Engmaschige Beobachtung in dieser Zeit."},{"q":"Welche Vitamingabe ist im Alkoholentzug ZWINGEND?","opts":["Vit C","Vit B1 (Thiamin) zur Wernicke-Prophylaxe","Vit D","Vit K"],"correct":1,"exp":"Thiamin vor jeder Glukosegabe – Glukose ohne B1 kann Wernicke-Enzephalopathie auslösen!"},{"q":"Welche Aussage zum CAGE-Test ist KORREKT?","opts":["Diagnostisches Tool","Screening-Tool – ≥2 Ja-Antworten weisen auf Alkoholproblem hin","Nur für Männer","Genauer als Labor"],"correct":1,"exp":"CAGE ist Screening, nicht Diagnose. ≥2 = weitere Diagnostik."}]},{"key":"drogen","name":"Drogenabhängigkeit & Substitution","rel":"h","cheat":[{"h":"Substanzgruppen","li":["Opioide (Heroin): Pupille eng, Atemdepression, Euphorie","Stimulanzien (Kokain, Crystal): Pupille weit, Tachykardie, Aggressivität, Schlaflosigkeit","Cannabis: Konjunktivitis, Heißhunger, Antriebsminderung","Halluzinogene, Designerdrogen, Medikamenten-Missbrauch"]},{"h":"Opioidintoxikation – Notfall!","li":["Trias: Bewusstlosigkeit, Atemdepression (<10/min), Miosis","Sofort: Notruf, Atemwege, Naloxon i.v./i.m.","Vitalzeichen-Monitoring – Naloxon kürzer wirksam als Heroin → Rebound!"]},{"h":"Substitutionstherapie","li":["Methadon, Buprenorphin (Subutex), Polamidon","Ziel: Beigebrauch reduzieren, soziale Stabilisierung, Hepatitis-/HIV-Prävention","Beigebrauchskontrollen, psychosoziale Begleitung"]},{"h":"Pflegerische Maßnahmen","li":["Wertfreie, respektvolle Haltung","Vitalzeichen, Bewusstsein, Pupillenkontrolle","Hygiene: Hep B/C, HIV – Schutzhandschuhe, Kanülenschutz, Stichverletzungen vermeiden","Substitutionsmittel exakt nach AVO, Sichtkontrolle der Einnahme","Ressourcenförderung, Kontakt zur Suchtberatung","Entzugssymptome erkennen (Schwitzen, Tränen, Durchfall, Muskelschmerzen)"]}],"cards":[{"q":"Was ist die Opioidtrias?","a":"Bewusstlosigkeit + Atemdepression + Miosis (enge Pupillen) – charakteristisch für Opioidintoxikation. Antidot: Naloxon."},{"q":"Warum Naloxon-Wirkdauer beachten?","a":"Naloxon wirkt nur 30–90 min, Heroin/Methadon länger – Patient kann nach Naloxonende erneut atemdepressiv werden. Engmaschige Überwachung!"},{"q":"Was ist Substitutionstherapie?","a":"Behandlung der Opioidabhängigkeit mit Methadon, Buprenorphin oder Diamorphin (heroingestützt). Reduziert Beschaffungskriminalität, HIV/HCV-Risiko, ermöglicht psychosoziale Stabilisierung."},{"q":"Welche Komplikationen bei i.v. Drogenkonsum?","a":"HIV, Hepatitis B/C, Endokarditis, Sepsis, Abszesse, Thrombosen, Überdosis (Atemdepression), psychiatrische Komorbidität."},{"q":"Welche Naloxon-Anwendung?","a":"Opiat-Antagonist bei Überdosis (Atemdepression). Schnell wirksam, kurz – Wiederholung kann nötig sein. Take-home-Naloxon (Nasenspray) rettet Leben."}],"quiz":[{"q":"Bewusstloser Patient, Atemfrequenz 5/min, Pupillen eng. Antidot?","opts":["Glukose","Naloxon","Flumazenil","Adrenalin"],"correct":1,"exp":"Klassische Opioidintoxikation – Naloxon i.v./i.m. ist das Antidot."},{"q":"Welcher Notfall bei Opiat-Überdosis?","opts":["Hyperventilation","Atemdepression, Miosis (enge Pupillen), Bewusstseinsstörung – Naloxon-Antidot","Tachykardie","Hypertonie"],"correct":1,"exp":"Klassische Opiat-Trias: Atemdepression + Miosis + Bewusstseinsstörung. Naloxon ist Antidot."},{"q":"Was ist KEIN Ziel der Substitutionsbehandlung?","opts":["Reduktion der Beschaffungskriminalität","Sofortige Entwöhnung von allen Substanzen","HIV-/HCV-Risiko senken","Psychosoziale Stabilisierung"],"correct":1,"exp":"Substitution ist Schadensminderung – Stabilisierung, nicht zwingend Abstinenz."}]},{"key":"anorexie","name":"Anorexia nervosa","rel":"h","cheat":[{"h":"Definition / ICD-10","li":["Selbst herbeigeführter Gewichtsverlust mit BMI <17,5","Körperschemastörung, ausgeprägte Angst vor Gewichtszunahme","Restriktiver Typ vs. Purging-Typ (Erbrechen, Laxantien)","Häufig: junge Frauen, beginnt oft Pubertät"]},{"h":"Symptome","li":["Extremes Untergewicht, Amenorrhö","Kälteempfindlichkeit, Lanugo-Behaarung, brüchige Haare/Nägel","Bradykardie, Hypotonie, Hypothermie","Verleugnung des Untergewichts, übertriebene Bewegung","Soziale Isolation, depressive Symptome"]},{"h":"Komplikationen","li":["Refeeding-Syndrom (Elektrolytverschiebung, v.a. Phosphat – lebensbedrohlich beim Wiederernähren!)","Herzrhythmusstörungen, Herzversagen","Osteoporose, Wachstumsstörung","Letalität bis 10% – hohe psychiatrische Mortalität"]},{"h":"Therapie","li":["Stationär bei BMI <14, vitaler Gefährdung, Suizidalität","Multimodale Therapie: Ernährungsaufbau (langsam!), Psychotherapie, Familientherapie","Verhaltensvertrag, klare Strukturen"]},{"h":"Pflegerische Maßnahmen","li":["Gewicht standardisiert (gleiche Zeit, Kleidung, ohne vorheriges Trinken)","Esssituation begleiten, klare Regeln, kein Verstecken/Erbrechen ermöglichen","Vitalzeichen engmaschig, Elektrolyte besonders bei Refeeding","Beziehung aufbauen, nicht moralisieren, Wertschätzung","Bewegung kontrolliert, Selbstschädigung verhindern","Ressourcen aktivieren, Familie einbeziehen"]}],"cards":[{"q":"Was
