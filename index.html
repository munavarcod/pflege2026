ist das Refeeding-Syndrom?","a":"Lebensbedrohliche Elektrolytstörung (v.a. Hypophosphatämie) bei zu schnellem Nahrungsaufbau nach langer Mangelernährung. Folge: Herzversagen, Krampfanfälle. Prävention: langsamer Aufbau, Phosphat-Substitution, Monitoring."},{"q":"Warum standardisiert wiegen?","a":"Gewichtsmanipulation häufig (Wassertrinken, Kleidung, Verstecken). Standardisiert: morgens nüchtern, gleiche Kleidung, Toilette davor, nach Beobachtung."},{"q":"Was sind Diagnosekriterien Anorexia nervosa?","a":"BMI <17,5 (Erw.) bzw. <10. Perzentile (Kinder), aktive Gewichtsabnahme, Körperschemastörung (Wahrnehmungsstörung), intensive Angst zuzunehmen, Amenorrhoe (klassisch), Verleugnung."},{"q":"Welche somatischen Komplikationen drohen?","a":"Bradykardie, Hypotonie, Elektrolytstörung (Hypokaliämie!), Osteoporose, Amenorrhoe, Nierenversagen, Herzrhythmusstörungen. BMI <13: lebensgefährlich, Hospitalisierung."},{"q":"Was ist das Refeeding-Syndrom?","a":"Bei zu schneller Wiederernährung nach langer Mangelernährung: Verschiebung Phosphat/Kalium/Magnesium → Herzversagen, Krampfanfälle, Tod. Langsam steigern + Elektrolyte ersetzen + monitoren."},{"q":"Welche Therapie?","a":"Multimodal: Gewichtsrehabilitation (langsam!), Psychotherapie (KVT, familienbasiert FBT bei Adoleszenten), körperl. Komplikationen behandeln. Evidenzbasiert: stationäre Therapie bei BMI<15."},{"q":"Welche Pflegehaltung?","a":"Gewichtsstrukturierte Beziehungsarbeit, klare Esspläne (ohne Verhandlung), Beobachtung (Verstecken, Erbrechen), Psychoedukation, Selbstwert stärken, Geduld – Therapie dauert oft Jahre."}],"quiz":[{"q":"Bei welchem BMI ist die Diagnose Anorexia nervosa wahrscheinlich?","opts":["BMI <25","BMI <22","BMI <17,5","BMI <30"],"correct":2,"exp":"ICD-10 fordert BMI <17,5 (Erwachsene) bzw. <10. Perzentile (Kinder)."},{"q":"Bei Refeeding-Syndrom drohen v.a.:","opts":["Hyperglykämie","Hypophosphatämie und Herzrhythmusstörungen","Polyurie","Hypertonie"],"correct":1,"exp":"Phosphat fällt rapide bei wieder einsetzender Insulinausschüttung – Herzrhythmusstörungen, Krampfanfälle. Kontrollen + Substitution."},{"q":"Welche Komplikation bei zu schneller Wiederernährung?","opts":["Übergewicht","Refeeding-Syndrom – Elektrolytverschiebung, lebensgefährlich","Verstopfung","Allergie"],"correct":1,"exp":"Refeeding-Syndrom: Phosphat, Kalium, Magnesium fallen → Herzversagen. Langsam steigern, monitoren, Elektrolyte substituieren."},{"q":"Welche Pflegehaltung ist KONTRAPRODUKTIV?","opts":["Klare Esspläne ohne Verhandlung","„Sie sehen doch normal aus\" – Bagatellisierung der Erkrankung","Beobachtung auf Verstecken","Psychoedukation"],"correct":1,"exp":"Bagatellisierung verkennt die Schwere und verstärkt Verleugnung. Empathisch + klar."}]},{"key":"bulimie","name":"Bulimia nervosa","rel":"h","cheat":[{"h":"Definition","li":["Episoden mit Heißhungeranfällen + kompensatorischen Maßnahmen (Erbrechen, Laxantien, Fasten, Sport)","Mind. 1x/Woche über 3 Monate (DSM-5)","Gewicht meist normal – schwerer zu erkennen als Anorexie"]},{"h":"Symptome","li":["Verstecktes Verhalten, Schamgefühl, Heimlichkeit","Russell-Zeichen (Schwielen am Handrücken durch induziertes Erbrechen)","Zahnerosionen, Karies (Magensäure), Parotisschwellung","Elektrolytstörungen (Hypokaliämie!), Refluxösophagitis","Verzerrtes Körperbild, Selbstwertprobleme, Depression"]},{"h":"Komplikationen","li":["Hypokaliämie → Herzrhythmusstörungen","Mallory-Weiss-Riss, Aspirationspneumonie","Suizidalität, Komorbidität (Sucht, Depression)"]},{"h":"Therapie","li":["Kognitive Verhaltenstherapie (Goldstandard)","SSRI (v.a. Fluoxetin) helfen","Ernährungstherapie, Selbsthilfegruppen"]},{"h":"Pflegerische Maßnahmen","li":["Vertrauensvolle Beziehung, kein Tabu, keine Schamverstärkung","Esssituation strukturieren, regelmäßige Mahlzeiten","Toilettenbeobachtung nach Mahlzeiten (kein Erbrechen ermöglichen)","Elektrolytkontrolle, Mund-/Zahnpflege","Selbstwertstärkung, Ressourcen, Familienarbeit"]}],"cards":[{"q":"Was sind Russell-Zeichen?","a":"Schwielen oder Narben am Handrücken durch das Auslösen von Erbrechen mit den Fingern – Hinweis auf Bulimie."},{"q":"Welche Elektrolytstörung ist gefährlich?","a":"Hypokaliämie durch Erbrechen / Laxantienabusus – Herzrhythmusstörungen bis Kammerflimmern."},{"q":"Welche Symptome bei Bulimia nervosa?","a":"Heißhungerattacken („Binge\"), kompensatorisches Verhalten (Erbrechen, Laxantien, Diuretika, exzessiver Sport), oft normalgewichtig (oder leicht über/unter), Schamgefühle."},{"q":"Welche körperlichen Folgen?","a":"Zahnschäden (Säureerosion), Schwellung der Speicheldrüsen (Hamsterbacken), Russell-Zeichen (Hornhaut auf Knöcheln), Elektrolytstörung (v.a. Hypokaliämie!), GI-Probleme."},{"q":"Welche Therapie?","a":"KVT erste Wahl, plus SSRI (Fluoxetin – einziges für ED zugelassen), Ernährungsberatung. Ambulant meist möglich, stationär bei schweren Komplikationen."}],"quiz":[{"q":"Hauptunterschied zu Anorexie?","opts":["Gewicht meist normal, Heißhungeranfälle + Kompensation","Immer Untergewicht","Keine kognitive Komponente","Nur Männer"],"correct":0,"exp":"Bulimie: meist Normalgewicht, daher länger unentdeckt. Heißhunger + Erbrechen / Laxantien sind Leitsymptome."},{"q":"Welche Komplikation ist bei Bulimie HÄUFIG?","opts":["Hyperkaliämie","Hypokaliämie durch Erbrechen → Herzrhythmusstörungen","Hyperglykämie","Hyperthyreose"],"correct":1,"exp":"Erbrechen führt zu K+-Verlusten → lebensgefährliche HRST. Elektrolytkontrolle wichtig."}]},{"key":"binge","name":"Binge-Eating-Störung","rel":"m","cheat":[{"h":"Definition","li":["Heißhungeranfälle mit Kontrollverlust, OHNE kompensatorische Maßnahmen","Mind. 1x/Woche über 3 Monate","Häufig mit Adipositas verbunden, Männer und Frauen"]},{"h":"Symptome","li":["Schnelles Essen großer Mengen ohne Hunger, alleine","Schamgefühl, Schuld nach dem Anfall","Adipositas, Folgeerkrankungen","Häufig Komorbidität: Depression, Angst"]},{"h":"Therapie","li":["Kognitive Verhaltenstherapie (CBT)","Ernährungstherapie, Bewegung","Antidepressiva (SSRI), ":"Diagnostik","li":["Labor: Leukozyten, CRP, Procalcitonin, Laktat (Schockmarker)","Blutkulturen VOR Antibiotikagabe (mind. 2 Paare)","Fokussuche: Urin, Wundabstrich, Röntgen, Sono"]},{"h":"1-Stunden-Bundle (innerhalb 1 h!)","li":["Laktat messen","Blutkulturen abnehmen (vor Antibiose)","Breitspektrum-Antibiotikum kalkuliert i.v.","Volumengabe 30 ml/kg kristalloid bei Hypotonie/Laktat>2","Vasopressoren bei persistierender Hypotonie (Noradrenalin)"]},{"h":"Pflegerische Maßnahmen","li":["Engmaschiges Vitalzeichen-Monitoring (RR, Puls, AF, SpO₂, Temp, Bewusstsein)","Stündliche Urinausscheidung als Schockindikator","Volumengabe und Vasopressoren nach AVO","Antibiotikagabe ZEITGERECHT, Kulturen VOR Gabe sicherstellen","Aspirations-, Dekubitus-, Thromboseprophylaxe","Hygiene strikt – Sepsis ist häufig nosokomial"]}],"cards":[{"q":"Was ist qSOFA?","a":"Quick SOFA – schneller Bedside-Score: AF≥22, GCS<15, RRsys≤100. ≥2 Punkte → Sepsisverdacht."},{"q":"Warum Blutkulturen VOR Antibiotikagabe?","a":"Um Erreger noch nachweisen zu können – nach Antibiose oft falsch-negativ. Wartezeit verzögert Therapie aber nicht (parallel ablaufen)."},{"q":"Was ist das 1-Stunden-Bundle?","a":"Innerhalb 1 h ab Sepsis-Erkennung: Laktat, Blutkulturen, Antibiotika, Volumengabe, Vasopressoren bei persistierender Hypotonie."},{"q":"Was ist der Unterschied zwischen Sepsis und septischem Schock?","a":"Sepsis: lebensbedrohliche Organdysfunktion durch Infektion (SOFA-Score↑). Septischer Schock: Sepsis + kreislaufunterstützende Therapie + Laktat >2 → höhere Mortalität."},{"q":"Was ist der SOFA-Score?","a":"Sequential Organ Failure Assessment: bewertet Atmung, Kreislauf, Leber, Niere, Gerinnung, ZNS. Anstieg ≥2 Punkte durch Infektion = Sepsis."},{"q":"Welche 4 Hauptinfektionsquellen?","a":"Lunge (~40%), Abdomen (~25%), Harnwege (~10%), Haut/Wunden, Katheter, Endokarditis. Suche und Sanierung des Fokus zentral."},{"q":"Welche Pflege bei Sepsis?","a":"1-h-Bundle (Laktat, Blutkulturen, Antibiose, Volumen, Vasopressoren), engmaschige Vitalzeichen, stündliche Urinausscheidung, Fokus-Sanierung, Hygiene, Aspirationsprophylaxe."},{"q":"Wann ist Sepsis besonders trügerisch?","a":"Bei Älteren oft KEIN Fieber (atypisch). Erstes Zeichen: Verwirrtheit, Sturz, Inappetenz, Schwäche. Hoher Verdacht bei plötzlicher Funktionsverschlechterung."}],"quiz":[{"q":"Frau Klein (76), bekannter HWI, plötzlich Fieber 39°C, RR 85/50, AF 26/min, verwirrt. Verdacht?","opts":["Pneumonie","Sepsis (Urosepsis) – qSOFA positiv","Hypoglykämie","Schlaganfall"],"correct":1,"exp":"qSOFA 3/3 (RR<100, AF≥22, Bewusstsein verändert) – Sepsis-Verdacht. 1-h-Bundle starten."},{"q":"Was ist KEIN Bestandteil des 1-h-Bundles?","opts":["Laktatmessung","Blutkulturen","Antibiose","Reinigender Einlauf"],"correct":3,"exp":"Laktat, Blutkulturen, Antibiose, Volumen, Vasopressoren sind Bundle-Bestandteile."},{"q":"Was beinhaltet das 1-h-Bundle?","opts":["Wadenwickel + Sondenkost","Laktat, Blutkulturen, Breitspektrum-AB, Volumen, Vasopressoren bei Hypotonie","Bettruhe + Tee","Nur Antibiotikum"],"correct":1,"exp":"1-h-Bundle: Diagnostik + Therapie innerhalb 1 h. Verzögerung erhöht Mortalität deutlich."},{"q":"Welche Aussage zur Sepsis bei Älteren ist KORREKT?","opts":["Immer mit Fieber","Häufig OHNE Fieber – Verwirrtheit, Sturz, Inappetenz als Frühzeichen","Selten gefährlich","Antibiotika unnötig"],"correct":1,"exp":"Atypische Präsentation bei Älteren – häufig übersehen. Niedrige Schwelle für Sepsis-Diagnostik."},{"q":"Welcher Wert misst die Gewebshypoxie bei Sepsis?","opts":["Hämoglobin","Laktat (>2 mmol/l = hypoperfusion)","Cholesterin","TSH"],"correct":1,"exp":"Laktat ist Marker für anaerobe Stoffwechsellage = Schock. Verlaufskontrolle wichtig."},{"q":"Welche Maßnahme verhindert NICHT Sepsis?","opts":["Hygienische Händedesinfektion","Frühe Mobilisation und Drainage-/Katheterentfernung","Aseptische Kathetereinlage","Routinemäßiger Antibiotika-Schwall ohne Verdacht"],"correct":3,"exp":"Antibiotika ohne Indikation fördern Resistenzen. Hygiene + Frühentfernung von Devices = beste Prophylaxe."}]},{"key":"mrsa","name":"MRSA & nosokomiale Infektionen","rel":"h","cheat":[{"h":"Definition","li":["Methicillin-resistenter Staphylococcus aureus – multiresistent","Häufig Besiedlung (Nase, Haut), nicht zwingend Infektion","Nosokomial = im Krankenhaus erworben (>48 h nach Aufnahme)"]},{"h":"Risikofaktoren","li":["Antibiotika-Vorbehandlung","Krankenhaus-/Pflegeheimaufenthalt","Wunden, invasive Zugänge, Dialyse","Immunsuppression, Multimorbidität"]},{"h":"Maßnahmen bei MRSA-Nachweis","li":["Einzelzimmer (Kontaktisolation)","Schutzkleidung: Kittel, Handschuhe, ggf. Mundschutz bei aerosolerzeugenden Tätigkeiten","Strikte Händedesinfektion vor + nach Patientenkontakt (5 Momente)","Eigene Pflegeutensilien, Geräte gekennzeichnet","Sanierung: Mupirocin-Nasensalbe, antiseptische Waschungen 5 Tage"]},{"h":"5 Momente der Händedesinfektion","li":["1. Vor Patientenkontakt","2. Vor aseptischer Tätigkeit","3. Nach Kontakt mit potenziell infektiösem Material","4. Nach Patientenkontakt","5. Nach Kontakt mit Patientenumgebung"]},{"h":"Pflegerische Maßnahmen","li":["Pflege im Zimmer bündeln (möglichst wenig Wege)","Materialwirtschaft: was rein, bleibt drin oder wird desinfiziert","Patient/Angehörige aufklären, Stigmatisierung vermeiden","Dokumentation, Übergabe an Folgeinstitutionen","Regelmäßige Abstrich-Kontrollen nach Sanierung"]}],"cards":[{"q":"Was sind die 5 Momente der Händedesinfektion?","a":"1. Vor Patientenkontakt, 2. Vor aseptischer Tätigkeit, 3. Nach Kontakt mit infektiösem Material, 4. Nach Patientenkontakt, 5. Nach Kontakt mit Patientenumgebung."},{"q":"Welche Schutzausrüstung bei MRSA?","a":"Schutzkittel + Handschuhe immer; Mundschutz bei aerosolerzeugenden Tätigkeiten (Absaugen, Inhalation, Verbandwechsel offene Wunde)."},{"q":"Was ist der Unterschied Besiedlung vs. Infektion?","a":"Besiedlung: Erreger nachweisbar ohne Krankheitszeichen (kein AB nötig, ggf. Sanierung). Infektion: Erreger + Symptome + Entzündungszeichen → Therapie indiziert."},{"q":"Welche MRSA-Sanierungsmaßnahmen?","a":"Mupirocin-Nasensalbe 5 Tage 3× tgl., antiseptische Waschungen Körper + Haare täglich, Wäsche/Bett täglich wechseln, Mundspülung, Kontrollabstriche."},{"q":"Welche Risikogruppen für MRSA?","a":"Krankenhausaufenthalt, Pflegeheim, Antibiotika-Vorgeschichte, chronische Wunden, Dialyse, Katheter, Immunsuppression, multimorbid."}],"quiz":[{"q":"Wann ist Händedesinfektion VOR Patientenkontakt nötig?","opts":["Nur bei MRSA-Patienten","Bei jedem Patienten und jedem Kontakt","Nur in der Notaufnahme","Nur bei OP"],"correct":1,"exp":"5 Momente gelten für ALLE Patientenkontakte – Standardhygiene unabhängig vom Erreger."},{"q":"Welche Aussage zu MRSA-Patienten ist KORREKT?","opts":["Strikte Isolation auch beim Spaziergang","Einzelzimmer und Schutzkleidung im Raum, Stigmatisierung vermeiden, Kommunikation und Würde","Egal","Patient nicht informieren"],"correct":1,"exp":"Hygiene + Würde gehen zusammen. Patient aufklären, Stigmatisierung vermeiden."},{"q":"Wofür stehen die 5 Momente der Händedesinfektion?","opts":["Nur vor Patientenkontakt","Vor Patient, vor aseptischer Tätigkeit, nach inf. Material, nach Patient, nach Patientenumgebung","Nur am Eingang","Nur einmal täglich"],"correct":1,"exp":"WHO-Standard für Händehygiene – wichtigste Maßnahme zur Reduktion nosokomialer Infektionen."}]},{"key":"tumor","name":"Tumorerkrankungen & Onkologie","rel":"h","cheat":[{"h":"Grundbegriffe","li":["Benigne (gutartig): langsam, abgekapselt, keine Metastasen","Maligne (bösartig): infiltrierendes Wachstum, Metastasen","TNM-Klassifikation: Tumor – Nodus (Lymphknoten) – Metastasen"]},{"h":"Therapieformen","li":["Operation (kurativ oder palliativ)","Chemotherapie (zytostatisch, oft Kombination)","Strahlentherapie (lokal)","Immuntherapie, Hormontherapie, zielgerichtete Therapie","Palliative Therapie bei nicht heilbarer Erkrankung"]},{"h":"Chemotherapie – Nebenwirkungen","li":["Hämatologisch: Leukozytopenie (Infektion!), Thrombozytopenie (Blutung!), Anämie","GI: Übelkeit, Erbrechen (Antiemetika), Diarrhö, Mukositis","Haut/Haare: Alopezie, Hand-Fuß-Syndrom","Allgemein: Fatigue, Polyneuropathie","Spätfolgen: Kardiotoxizität, Sekundärtumoren"]},{"h":"Pflegerische Maßnahmen","li":["Schmerzmanagement (WHO-Stufen)","Übelkeit/Erbrechen: Antiemetika prophylaktisch, kleine Mahlzeiten, kühle Speisen","Mundpflege bei Mukositis (regelmäßig spülen, weiche Zahnbürste)","Infektionsschutz bei Neutropenie: Umkehrisolation, Mundschutz, kein Rohkost","Hautpflege bei Strahlentherapie (kein Reiben, keine Cremes mit Metall, Sonnenschutz)","Psychosoziale Begleitung, Aufklärung, Selbsthilfe","Sicheres Handling Zytostatika: Schutzkleidung, geschlossene Systeme"]},{"h":"Palliative Pflege & Symptomkontrolle","li":["Schmerz, Atemnot, Übelkeit, Obstipation, Angst, Mundpflege","Lebensqualität im Vordergrund, nicht Lebensverlängerung","Patientenverfügung, Therapiebegrenzung respektieren","Sterbephasen (Kübler-Ross): Nicht-wahrhaben-wollen, Zorn, Verhandeln, Depression, Akzeptanz"]}],"cards":[{"q":"Was bedeutet TNM?","a":"Tumor (Größe), Node (Lymphknotenbefall), Metastasen (Fernmetastasen) – Klassifikationssystem für maligne Tumoren."},{"q":"Welche 3 Hauptnebenwirkungen der Chemo erfordern besondere Aufmerksamkeit?","a":"Knochenmark (Infektion bei Leukopenie, Blutung bei Thrombopenie), Mukositis (Mundpflege), Übelkeit/Erbrechen (Antiemetika prophylaktisch)."},{"q":"5 Sterbephasen nach Kübler-Ross?","a":"Nicht-wahrhaben-wollen, Zorn, Verhandeln, Depression, Akzeptanz – nicht jeder durchläuft alle Phasen linear."},{"q":"Was bedeutet TNM-Klassifikation?","a":"Tumor (Größe T1–T4), Nodes (Lymphknoten N0–N3), Metastasen (M0/M1). Basis für Stadium und Therapieentscheidung."},{"q":"Welche typischen Chemo-NW erfordern besondere Pflege?","a":"Knochenmark (Infektion, Blutung), Mukositis (Mundpflege, weiche Kost), Übelkeit/Erbrechen (Antiemetika prophylaktisch), Alopezie (psychisch belastend), Polyneuropathie (Sturzrisiko)."},{"q":"Welche Sicherheitsmaßnahmen bei Zytostatika?","a":"Persönliche Schutzausrüstung (Doppelhandschuhe, Schutzkittel, Augenschutz, Mundschutz), geschlossene Systeme, Spillkit verfügbar, Abfallentsorgung Sondermüll, ausgebildetes Personal."},{"q":"Welche Pflege bei Neutropenie?","a":"Umkehrisolation, Mundschutz für Personal, Patient meidet Kontakt zu Infizierten, keine Schnittblumen, kein Rohkost, gründliche Mundpflege, Hände-Desinfektion vor/nach Kontakt."},{"q":"Was sind die 5 Sterbephasen nach Kübler-Ross?","a":"1. Nicht-wahrhaben-wollen, 2. Zorn, 3. Verhandeln, 4. Depression, 5. Akzeptanz. NICHT linear, nicht jeder durchläuft alle."}],"quiz":[{"q":"Patient unter Chemotherapie hat Leukozyten 0,8 GPT. Welche Maßnahme?","opts":["Normale Pflege","Umkehrisolation, Mundschutz, kein Rohkost, Infektionsschutz","Antibiotikum prophylaktisch","Patient entlassen"],"correct":1,"exp":"Schwere Neutropenie – hohes Infektionsrisiko. Umkehrisolation und Schutzmaßnahmen sind Standard."},{"q":"Patient unter Chemo, Leukozyten 0,5 GPT, kein Fieber. Welche Maßnahme?","opts":["Normale Pflege","Umkehrisolation, kein Rohkost, Hygiene streng, bei Fieber sofort Arzt","Antibiotikum prophylaktisch","Entlassung"],"correct":1,"exp":"Schwere Neutropenie → höchste Infektionsgefahr. Schon kleinste Fieberanzeichen sind Notfall (febrile Neutropenie)."},{"q":"Welche Mundpflege bei Mukositis?","opts":["Hartborstige Bürste","Weiche Bürste, milde Spülung (z.B. Natriumhydrogencarbonat, Salbei), regelmäßige Pflege","Alkohol-haltige Mundwässer","Keine Pflege"],"correct":1,"exp":"Mukositis verlangt sanfte Pflege. Alkohol verschlimmert. Häufige Pflege beugt Superinfektion vor."}]},{"key":"palliativ","name":"Palliative Pflege & Sterbebegleitung","rel":"vh","cheat":[{"h":"Grundprinzipien (WHO)","li":["Verbesserung der Lebensqualität, nicht Lebensverlängerung","Symptomkontrolle, ganzheitlich (körperlich, psychisch, sozial, spirituell)","Patient und Angehörige im Mittelpunkt","Sterben als natürlicher Prozess – weder beschleunigen noch verzögern"]},{"h":"Symptomkontrolle","li":["Schmerz: WHO-Stufenschema, opioide Basis + Bedarf, Co-Analgetika","Atemnot: Oxygen, Morphin niedrigdosiert, Ventilator/frische Luft","Übelkeit/Erbrechen: Antiemetika nach Ursache","Obstipation: Laxantien immer bei Opioid","Mundtrockenheit: regelmäßige Mundpflege, Eiswürfel","Angst/Unruhe: Lorazepam, Gespräch, Anwesenheit"]},{"h":"Sterbephase – Zeichen","li":["Nahrungs-/Flüssigkeitsverweigerung (normaler Prozess!)","Bewusstseinstrübung, Rückzug, Schlaf","Veränderte Atmung: Cheyne-Stokes, terminale Rasselatmung","Marmorierung, kalte Extremitäten, Inkontinenz","Facies hippocratica"]},{"h":"Pflegerische Maßnahmen Sterbephase","li":["Regelmäßige Mundpflege (auch bei Bewusstlosigkeit)","Lagerung schmerzfrei und bequem (nicht zwanghaft alle 2 h)","Körperpflege reduzieren auf Wesentliches","Hörsinn bleibt lange erhalten – mit Patient sprechen, Lieblingsmusik, Anwesenheit","Angehörige einbeziehen, begleiten, Aufklärung","Rituale ermöglichen, Spiritualität respektieren"]},{"h":"Nach dem Tod","li":["Tod ärztlich feststellen lassen, Zeitpunkt dokumentieren","Letzte Versorgung pietätvoll (waschen, kämmen, Kleidung)","Angehörige Abschied ermöglichen, Zeit geben","Persönliche Gegenstände sichern, Wertgegenstände protokollieren","Eigene Trauerverarbeitung im Team (Debriefing)"]},{"h":"SAPV","li":["Spezialisierte ambulante Palliativversorgung","Multiprofessionelles Team (Arzt, Pflege, Psychologe, Seelsorge)","Ziel: Sterben zu Hause ermöglichen","Verordnung durch Hausarzt"]}],"cards":[{"q":"Was ist SAPV?","a":"Spezialisierte Ambulante PalliativVersorgung – ermöglicht schwerstkranken Menschen Sterben zuhause durch multiprofessionelles Team. Verordnung durch Arzt."},{"q":"Warum Mundpflege so wichtig in Sterbephase?","a":"Mundtrockenheit ist häufigstes belastendes Symptom; Hörsinn und Geschmack bleiben lange. Mundpflege fördert Würde und Komfort."},{"q":"Welche Atemmuster sind in Sterbephase typisch?","a":"Cheyne-Stokes (an-/abschwellende Atmung mit Apnoephasen), terminale Rasselatmung (Sekret in Atemwegen, das nicht mehr abgehustet wird) – kein Leiden für den Patienten."},{"q":"Was ist der Unterschied zwischen kurativ und palliativ?","a":"Kurativ: Heilung der Erkrankung als Ziel. Palliativ: Linderung von Symptomen + Lebensqualität, wenn Heilung nicht möglich – nicht „nichts mehr tun\"."},{"q":"Was beinhaltet ein gutes Symptommanagement?","a":"Schmerz (WHO), Atemnot (Morphin niedrigdosiert), Übelkeit, Obstipation (Laxans bei Opioid!), Mundtrockenheit, Angst, Verwirrtheit, Hautpflege – multidimensional."},{"q":"Was ist die Cheyne-Stokes-Atmung?","a":"Periodisch an-/abschwellende Atmung mit Apnoephasen – häufig in Sterbephase. KEIN Leiden für den Patienten, Angehörige aufklären."},{"q":"Was ist terminale Rasselatmung?","a":"Sekret in den oberen Atemwegen, das nicht mehr abgehustet werden kann. Patient leidet meist NICHT darunter (oft schon bewusstlos). Anticholinergika können helfen, Absaugen vermeiden."},{"q":"Welche Mundpflege in der Sterbephase?","a":"Sehr regelmäßig (alle 30–60 Min), feuchte Watteträger, Lippenpflege, Eiswürfel/Lieblingsgetränk auf Wunsch, Mundbefeuchtung mit Sprühflasche – wichtigstes Komfort-Symptom!"},{"q":"Begründen Sie die Reduktion von Lagerung in den letzten Stunden.","a":"Lagerung kann Schmerz, Unruhe, Atemnot auslösen. Ziel ist Komfort, nicht Schemata. Nur bei eindeutigem Bedarf, mit größtmöglicher Schonung."},{"q":"Welche Aufgaben nach dem Tod?","a":"Tod ärztlich feststellen lassen, Zeitpunkt dokumentieren, Würdige letzte Versorgung (waschen, kleiden), Angehörige Abschied ermöglichen, Wertgegenstände protokollieren, ggf. Trauerkultur respektieren."}],"quiz":[{"q":"Sterbender Patient verweigert seit 2 Tagen Nahrung und Trinken. Was tun?","opts":["Sondennahrung legen","Zwangsernähren","Wunsch respektieren, Mundpflege intensivieren, Familie aufklären","Infusion gegen den Willen"],"correct":2,"exp":"Nahrungs-/Flüssigkeitsverweigerung gehört zur Sterbephase – nicht erzwingen. Mundpflege gegen Durstgefühl, würdiges Sterben ermöglichen."},{"q":"Was bedeutet WHO-Schema in der Schmerztherapie?","opts":["1: Nicht-Opioid · 2: schwaches Opioid · 3: starkes Opioid – plus Co-Analgetika","Nur Paracetamol","Nur Morphin","Nur i.v. Therapie"],"correct":0,"exp":"WHO-Stufenschema: 3 Stufen, Eskalation bei unzureichender Wirkung. Co-Analgetika (z.B. Antikonvulsiva bei Nervenschmerz) auf jeder Stufe möglich."},{"q":"Sterbender Patient hat Rasselatmung. Was tun?","opts":["Aggressiv absaugen","Lagerung leicht anpassen, Mundpflege, ggf. Anticholinergika nach AVO – Patient leidet meist nicht","Sauerstoff hochdosiert","Nichts beachten"],"correct":1,"exp":"Rasselatmung belastet Angehörige mehr als Patient. Sanfte Maßnahmen, Aufklärung der Familie."},{"q":"Welche Aussage zur Sterbephase ist KORREKT?","opts":["Strenge Schmerztherapie verkürzt das Leben","Adäquate Schmerztherapie in der Sterbephase ist ethisch und rechtlich gerechtfertigt – Lebensqualität statt Lebensverlängerung","Patient soll Schmerz erleben","Nur Paracetamol"],"correct":1,"exp":"Adäquate Symptomlinderung gehört zur palliativen Pflege. Mehr-Effekt-Doktrin: Linderung steht im Vordergrund."},{"q":"Welche Pflegehaltung bei Sterbenden ist FALSCH?","opts":["Anwesenheit","Ehrliche Kommunikation","„Es wird schon wieder gut\" – Vertröstung","Mundpflege"],"correct":2,"exp":"Vertröstung ist nicht ehrlich und nimmt Patient die Möglichkeit, sich zu verabschieden. Authentische Begleitung."}]},{"key":"delir","name":"Delir (akuter Verwirrtheitszustand)","rel":"vh","cheat":[{"h":"Definition","li":["Akute, fluktuierende Bewusstseins- und Aufmerksamkeitsstörung","Hyperaktiv (unruhig, agitiert), hypoaktiv (apathisch, übersehen!), gemischt","Häufig bei alten Menschen, postoperativ, im Krankenhaus"]},{"h":"Differenzierung Delir vs. Demenz","li":["Delir: AKUT (Stunden/Tage), FLUKTUIEREND, Aufmerksamkeit gestört, Bewusstsein verändert","Demenz: SCHLEICHEND (Monate/Jahre), STABIL, Gedächtnis primär, Bewusstsein erhalten","Delir ist meist behandelbar! → Ursachensuche!"]},{"h":"Häufige Ursachen","li":["Infektionen (HWI, Pneumonie, Sepsis)","Medikamente (Anticholinergika, Benzodiazepine, Opioide), Polypharmazie","Exsikkose, Elektrolytstörung, Hypoglykämie","Schmerz, Schlafdeprivation, Reizüberflutung","Postoperativ, Drogen-/Alkoholentzug"]},{"h":"Diagnostik","li":["CAM (Confusion Assessment Method): akuter Beginn + fluktuierend, Aufmerksamkeitsstörung, plus Denkstörung ODER Bewusstseinsstörung","Anamnese (Fremd!), Vitalzeichen, Labor (Infektion, Elektrolyte, BZ), Urinstatus, Medikamentenreview"]},{"h":"Pflegerische Maßnahmen","li":["Ursache behandeln (Infektion, Schmerz, Exsikkose, Medikamente)","Reorientierung: Uhr, Kalender, Tageslicht, vertraute Personen","Reizregulation: tagsüber aktiv, nachts ruhig","Brille, Hörgerät bereitstellen","Schlafhygiene, Tag-Nacht-Rhythmus","Vermeidung Fixierung – verschlechtert Delir","Sturzprophylaxe, Anwesenheit, ruhige Stimme"]}],"cards":[{"q":"Wie erkennt man ein hypoaktives Delir?","a":"Patient ist still, apathisch, schläft viel, reagiert wenig – wird oft übersehen! Aufmerksamkeitsstörung trotzdem nachweisbar (CAM)."},{"q":"Welche 5 Ursachen sollten Sie immer prüfen?","a":"Infektion (HWI, Pneumonie), Medikamente, Exsikkose / Elektrolyte, Schmerz, Hypoxie / Hypoglykämie."},{"q":"Wofür steht CAM?","a":"Confusion Assessment Method: 1) Akuter Beginn + Fluktuation, 2) Aufmerksamkeitsstörung, 3) Denkstörung, 4) Bewusstseinsstörung. Delir bei 1+2 + (3 oder 4)."},{"q":"Was ist die CAM-Methode?","a":"Confusion Assessment Method: 4 Kriterien. Delir = (1) akuter Beginn + Fluktuation, (2) Aufmerksamkeitsstörung, (3) Denkstörung ODER (4) Bewusstseinsstörung."},{"q":"Hyperaktiv vs. hypoaktiv – Welches wird übersehen?","a":"HYPOAKTIV wird häufig übersehen (Patient still, schläft viel, scheinbar „brav\"). Aufmerksamkeitsstörung trotzdem nachweisbar. Genauso gefährlich wie hyperaktiv!"},{"q":"Welche häufigsten Auslöser?","a":"Infektion (HWI, Pneumonie!), Medikamente (Benzodiazepine, Anticholinergika, Opioide), Exsikkose, Elektrolyte, Schmerz, postoperativ, Schlafdeprivation, Reizüberflutung."},{"q":"Welche nicht-medikamentösen Maßnahmen?","a":"Reorientierung (Uhr, Kalender, Tageslicht), Brille/Hörgerät, Tagesstruktur, Schlafhygiene, vertraute Bezugsperson, Mobilisation, Schmerztherapie, Reizregulation."},{"q":"Begründen Sie die Vermeidung von Fixierung.","a":"Fixierung verschlimmert Delir (Stress, Reizdeprivation), erhöht Mortalität, Sturzrisiko (Patient kämpft), Druckulkus. Letzter Ausweg, mit richterlicher Genehmigung, kürzest möglich."}],"quiz":[{"q":"Frau Klein (84) ist seit gestern verwirrt, schwankend wach, reißt Zugänge raus. Vor 2 Tagen normal. Was vermuten Sie?","opts":["Demenz neu","Delir – akut, fluktuierend, Ursache suchen!","Schlaganfall","Burnout"],"correct":1,"exp":"Akuter Beginn + Fluktuation = Delir. Ursachen: HWI, Pneumonie, Medikamente, Exsikkose – sofort screenen, behandelbar!"},{"q":"Welche Maßnahme ist beim Delir KONTRAPRODUKTIV?","opts":["Reorientierung","Tagesstruktur","Routine-Fixierung zur Sicherheit","Brille bereitstellen"],"correct":2,"exp":"Fixierung verschlimmert Delir, erhöht Mortalität. Letzte Option, nur richterlich genehmigt – verhaltensorientierte Ansätze zuerst."},{"q":"Welche Aussage über Delir ist FALSCH?","opts":["Akuter Beginn","Fluktuierender Verlauf","Stabil und fortschreitend wie Demenz","Behandelbar bei Ursachenklärung"],"correct":2,"exp":"Delir ist akut und fluktuierend, IM Gegensatz zur Demenz, die schleichend und stabil verläuft."},{"q":"Patient nach Hüft-OP, postoperativer Tag 2, plötzlich verwirrt, sieht Personen, die nicht da sind. Was als ERSTES?","opts":["Antipsychotikum sofort","Ursachensuche: Schmerz? Infektion (HWI?)? Medikamente? Hypoxie? Exsikkose? Elektrolyte?","Fixierung","Entlassung"],"correct":1,"exp":"Postop Delir ist häufig (10–50% bei Älteren). Ursachensuche und Beheben → meist reversibel."},{"q":"Welcher Test screent auf Delir?","opts":["MMST","CAM (Confusion Assessment Method)","Barthel-Index","Glasgow Coma Scale"],"correct":1,"exp":"CAM ist Bedside-Screening für Delir, schnell und validiert."}]},{"key":"dysphagie","name":"Dysphagie (Schluckstörung)","rel":"h","cheat":[{"h":"Definition / Ursachen","li":["Beeinträchtigte Nahrungsaufnahme durch gestörten Schluckakt","Neurologisch (Schlaganfall, Parkinson, Demenz, MS)","Strukturell (Tumor, OP, Strahlen)","Altersbedingt (Presbyphagie)"]},{"h":"Symptome / Warnzeichen","li":["Husten/Räuspern beim Trinken oder Essen","Verschlucken, gurgelnde Stimme nach Schlucken","Speichel-/Nahrungsaustritt, lange Essdauer","Gewichtsverlust, Aspirationspneumonie","Stille Aspiration (KEIN Husten!) – häufig übersehen"]},{"h":"Assessment","li":["Wasserschlucktest (Daniels): 90 ml Wasser in Schlucken, Beobachtung","GUSS-Score (Gugging Swallowing Screen)","FEES (fiberoptische endoskopische Schluckevaluation), Videofluoroskopie","Logopädische Diagnostik"]},{"h":"Pflegerische Maßnahmen","li":["Aufrechte Sitzposition (90° wenn möglich), Kopf leicht nach vorn (Chin Tuck)","Kost angepasst (IDDSI: pürierte/teilfeste Kost, angedickte Flüssigkeiten)","Kleine Bissen, langsames Essen, ungeteilte Aufmerksamkeit","Nach Schlucken nachschlucken lassen, Mund inspizieren","Mundhygiene zur Pneumonieprävention","30 min nach dem Essen aufrecht bleiben","Gespräch beim Essen reduzieren – Konzentration"]},{"h":"Komplikationen","li":["Aspirationspneumonie (häufig!)","Mangelernährung, Dehydratation","Erstickungsangst, soziale Isolation"]}],"cards":[{"q":"Was ist stille Aspiration?","a":"Eindringen von Material in die Luftwege OHNE Husten oder erkennbare Reaktion – häufig bei neurologisch Erkrankten. Hohe Pneumonierate. Erkennung nur mit FEES/Videofluoroskopie."},{"q":"Welche 4 Maßnahmen vor jeder Mahlzeit bei Dysphagie?","a":"Aufrechte Sitzposition, Kost angepasst, Mundhygiene, ungeteilte Aufmerksamkeit – plus Schluckscreening durchgeführt."},{"q":"Warum bleibt der Patient 30 min nach Mahlzeit aufrecht?","a":"Verhinderung von Reflux und Aspiration nach dem Essen – aufrechte Lage stützt unteren Ösophagussphinkter."},{"q":"Welche Folgen drohen bei unerkannter Dysphagie?","a":"Aspirationspneumonie (häufige Todesursache!), Mangelernährung, Dehydratation, Erstickungsangst, soziale Isolation, Lebensqualitätsverlust."},{"q":"Was ist „stille Aspiration\"?","a":"Aspiration ohne Husten oder Würgen – Patient bemerkt nichts. Häufig bei neurologischen Patienten. Erkennung nur durch FEES/Videofluoroskopie. Hohe Pneumonierate!"},{"q":"Welche Speisen-/Getränkekonsistenzen werden eingesetzt (IDDSI)?","a":"Stufen 0 (normal flüssig) bis 7 (normal fest). Häufig: leicht angedickt (1–2), pürierte Kost, weiche Kost. Logopädie bestimmt sichere Konsistenz."},{"q":"Welche Lagerung beim Essen?","a":"90° aufrecht sitzen, Kopf leicht nach vorn (Chin Tuck), nicht zurückgelehnt – schützt Atemweg. 30 Min nach Essen aufrecht bleiben."}],"quiz":[{"q":"Herr Berg (71, n. Apoplex) hustet bei jedem Schluck. Erste Maßnahme?","opts":["Trotzdem essen lassen","Schluckscreening durch geschultes Personal, bis dahin nüchtern","PEG legen lassen","Sondenkost"],"correct":1,"exp":"Schluckscreening (z.B. GUSS) ist Standard nach Apoplex – bei Aspirationszeichen nüchtern bleiben bis professionelle Beurteilung."},{"q":"Welche Maßnahme ist KEIN Schutz vor Aspiration?","opts":["90° Sitzposition","Chin Tuck (Kinn zur Brust)","Liegen während des Essens","Konsistenzanpassung"],"correct":2,"exp":"Liegen erhöht Aspirationsrisiko massiv. Aufrecht ist Pflicht."},{"q":"Was ist der GUSS-Test?","opts":["Sturzrisiko-Skala","Schluckscreening (Gugging Swallowing Screen) – stufenweises Schlucktesten","BMI-Berechnung","Schmerzskala"],"correct":1,"exp":"GUSS ist standardisiertes Schluckscreening, einfach durchführbar bei Akutpatienten."}]},{"key":"mukoviszidose","name":"Mukoviszidose (Cystische Fibrose)","rel":"m","cheat":[{"h":"Definition","li":["Autosomal-rezessive Erbkrankheit mit gestörtem Chloridkanal (CFTR)","Folge: zähes Sekret in Lunge, Pankreas, Darm, Leber, Schweißdrüsen","Häufigste Stoffwechselerkrankung Mitteleuropas"]},{"h":"Symptome","li":["Lunge: chronischer Husten, zäher Schleim, rezidivierende Infektionen, Bronchiektasen","Pankreas: Maldigestion, Fettstühle, Gedeihstörung","Schweiß: salzig (Hauttest)","Darm: Mekoniumileus beim Neugeborenen","Komplikationen: Diabetes, Leberzirrhose, Infertilität"]},{"h":"Diagnostik","li":["Neugeborenenscreening (IRT)","Schweißtest (Cl⁻ ≥60 mmol/l)","Genetische Diagnostik (CFTR-Mutationen)"]},{"h":"Therapie","li":["Atemtherapie täglich (Inhalation, autogene Drainage, Klopfmassage)","Mukolytika (DNase), Antibiotika bei Exazerbation","Pankreasenzyme (Kreon) zu jeder Mahlzeit","Hochkalorische Ernährung, fettlösliche Vitamine A,D,E,K","CFTR-Modulatoren (z.B. Kaftrio) bei bestimmten Mutationen","Lungentransplantation als Ultima Ratio"]},{"h":"Pflegerische Maßnahmen","li":["Atemphysiotherapie täglich","Inhalation vor Physiotherapie","Hygiene strikt (Pseudomonas-Vermeidung), eigene Geräte","Ernährungsberatung, Enzyme korrekt dosieren","Familienzentrierte Pflege, Selbstmanagement schulen"]}],"cards":[{"q":"Welche Organe sind besonders betroffen?","a":"Lunge (chronische Infektionen, zäher Schleim), Pankreas (Maldigestion), Darm, Leber, Schweißdrüsen (Salzverlust)."},{"q":"Warum Pankreasenzyme zu jeder Mahlzeit?","a":"Bei exokriner Pankreasinsuffizienz fehlen Verdauungsenzyme – ohne Substitution: Maldigestion, Fettstühle, Gedeihstörung."},{"q":"Welche Vererbung bei CF?","a":"Autosomal-rezessiv. Beide Eltern müssen Anlageträger sein. Häufigste Mutation: ΔF508. Häufigste Stoffwechselerkrankung Mitteleuropas."},{"q":"Welche Pflege täglich?","a":"Atemtherapie (Inhalation, autogene Drainage, Klopfung), Pankreasenzyme zu jeder Mahlzeit, hochkalorische Kost, fettlösliche Vit A,D,E,K, Hygiene strikt (Pseudomonas!)."}],"quiz":[{"q":"Welche tägliche Maßnahme ist zentral bei CF?","opts":["Krafttraining","Atemtherapie + Inhalation + Sekretmobilisation","Bettruhe","Diät salzarm"],"correct":1,"exp":"Tägliche Atemtherapie ist Säule der Therapie. Salz wird wegen Verlusten sogar zugeführt."},{"q":"Welche neue Therapie ist bei CF revolutionär?","opts":["Schmerzmittel","CFTR-Modulatoren (z.B. Kaftrio) – Korrektur des Defekts an der Wurzel","Massage","Antibiotika allein"],"correct":1,"exp":"CFTR-Modulatoren wirken am Defekt direkt – deutliche Verbesserung von Lebensqualität und -erwartung."}]},{"key":"adhs","name":"ADHS bei Kindern","rel":"m","cheat":[{"h":"Definition","li":["Aufmerksamkeitsdefizit-Hyperaktivitätssyndrom","Trias: Aufmerksamkeitsstörung, Hyperaktivität, Impulsivität","Beginn vor 7. Lj., in mehreren Lebensbereichen"]},{"h":"Symptome","li":["Aufmerksamkeit: leicht ablenkbar, vergesslich, fehleranfällig","Hyperaktivität: zappelig, kann nicht still sitzen, redet viel","Impulsivität: handelt vor Denken, unterbricht, kann nicht warten","Folgen: schulische Probleme, soziale Konflikte, geringes Selbstwertgefühl"]},{"h":"Diagnostik","li":["Anamnese, Verhaltensbeobachtung in mehreren Settings","Eltern- und Lehrerfragebögen (z.B. Conners)","Differentialdiagnose: andere psychiatrische Störungen, Lernstörungen"]},{"h":"Therapie","li":["Multimodal: Verhaltenstherapie, Elterntraining, schulische Hilfen","Medikamentös bei mittelschwerer/schwerer Ausprägung: Methylphenidat (Ritalin)","Atomoxetin als Alternative","Ergotherapie, Logopädie bei Begleiterkrankungen"]},{"h":"Pflegerische Maßnahmen / Familienarbeit","li":["Strukturierter Tagesablauf, klare Regeln, sichtbare Pläne","Positive Verstärkung, kleine Lernschritte","Reizarme Umgebung beim Lernen","Selbstwert stärken, Stärken betonen","Eltern entlasten, Selbsthilfegruppen","Methylphenidat: NW (Appetitminderung, Schlafstörung) beobachten, Wachstum kontrollieren"]}],"cards":[{"q":"Welche 3 Kernsymptome bei ADHS?","a":"Aufmerksamkeitsstörung, Hyperaktivität, Impulsivität. Müssen vor 7. Lj. bestehen und mehrere Lebensbereiche betreffen."},{"q":"Welche Symptomtrias bei ADHS?","a":"Aufmerksamkeitsstörung + Hyperaktivität + Impulsivität. Beginn vor 7. Lj., in mehreren Lebensbereichen (Schule, zuhause), >6 Monate."},{"q":"Welche NW bei Methylphenidat?","a":"Appetitminderung, Schlafstörung, Wachstumsverzögerung möglich, Tics möglich, Tachykardie. Wachstum jährlich kontrollieren, Therapiepausen prüfen."}],"quiz":[{"q":"Welcher Therapieansatz ist bei ADHS evidenzbasiert?","opts":["Nur Medikamente","Nur Verhaltenstherapie","Multimodal: VT + ggf. Medikamente + Elterntraining + schulische Hilfen","Bestrafung"],"correct":2,"exp":"Multimodale Therapie ist Standard – Bausteine je nach Schweregrad und Alter."},{"q":"Welcher Therapieansatz ist bei ADHS evidenzbasiert?","opts":["Nur Medikamente","Multimodal: Verhaltenstherapie + Elterntraining + schulische Hilfen + ggf. Medikamente","Bestrafung","Diät allein"],"correct":1,"exp":"Multimodal ist Standard – bauteinabhängig nach Schweregrad und Alter."}]},{"key":"autismus","name":"Autismus-Spektrum-Störung","rel":"m","cheat":[{"h":"Definition","li":["Tiefgreifende Entwicklungsstörung mit gestörter sozialer Interaktion und Kommunikation","Stereotype, eingeschränkte Verhaltensmuster und Interessen","Spektrum von schwer (frühkindlicher Autismus) bis mild (Asperger)"]},{"h":"Symptome","li":["Soziale Interaktion: kein Blickkontakt, Schwierigkeit Mimik zu lesen","Kommunikation: Sprachentwicklungsverzögerung, wörtliches Verständnis","Verhalten: Stereotypien, Routinen wichtig, Veränderungsangst","Spezialinteressen, Reizüberempfindlichkeit (Lärm, Licht, Berührung)"]},{"h":"Therapie / Förderung","li":["Frühe Intervention: ABA, TEACCH, Frühförderung","Strukturierung der Umwelt (visuelle Pläne)","Logopädie, Ergotherapie, Sozialtraining","Medikamente bei Komorbidität (ADHS, Aggression)"]},{"h":"Pflegerische Maßnahmen","li":["Klare, einfache Sprache, konkret und wörtlich","Visuelle Hilfen (Piktogramme, Tagespläne)","Routinen einhalten, Veränderungen ankündigen","Reizregulation: ruhige Räume, kein Überfluten","Berührung mit Vorsicht, immer ankündigen","Eltern als Experten für ihr Kind einbeziehen"]}],"cards":[{"q":"Warum reizarme Umgebung wichtig?","a":"Viele Autisten haben Reizüberempfindlichkeit – Reizüberflutung führt zu Stress, Meltdowns. Ruhige, strukturierte Umgebung hilft."},{"q":"Was ist Reizüberempfindlichkeit bei Autismus?","a":"Hyper- (oder Hypo-) Reaktivität auf Sinnesreize: Lärm, Licht, Berührung, Geschmack. Reizüberflutung führt zu Stress / „Meltdown\". Reizregulation hilft."},{"q":"Welche Kommunikationshilfen?","a":"Klare einfache Sprache, konkret und wörtlich (kein Sarkasmus), visuelle Hilfen (Piktogramme, Tagesplan), Routinen, Veränderungen ankündigen, Berührung mit Vorsicht."}],"quiz":[{"q":"Welche Kommunikation eignet sich am besten?","opts":["Lange Erklärungen","Klare, konkrete, kurze Sprache + visuelle Hilfen","Ironie und Witze","Stetige Berührung"],"correct":1,"exp":"Konkrete, kurze Sprache mit visuellen Hilfen funktioniert am besten – kein Ironie/Mimik-Verstehen."},{"q":"Welche Pflegehaltung ist bei Autismus KONTRAPRODUKTIV?","opts":["Visuelle Tagesstruktur","Plötzliche Veränderungen ohne Vorwarnung","Reizregulation","Konkrete einfache Sprache"],"correct":1,"exp":"Veränderungen sollten angekündigt werden – sonst Überforderung und Verhaltensauffälligkeiten."}]},{"key":"fieber_kind","name":"Fieber & Fieberkrampf beim Kind","rel":"h","cheat":[{"h":"Fieber – Definition (Kind)","li":["Rektal: ≥38,0°C subfebril, ≥38,5°C Fieber, ≥39,5°C hoch","Oral/axillär ca. 0,5°C niedriger","Bei Säuglingen <3 Monaten ist Fieber immer abklärungsbedürftig!"]},{"h":"Symptome / Warnzeichen","li":["Allgemein: schlapp, weinerlich, Trinkschwäche","Warnzeichen: Hautfarbe (blass, marmoriert), Atemnot, Bewusstsein, Hautausschlag (Petechien!), Nackensteife, Krampfanfall","Sepsisverdacht bei Säuglingen"]},{"h":"Maßnahmen bei Fieber","li":["Trinken anbieten (Dehydratation vermeiden)","Leichte Kleidung, kühle aber nicht kalte Umgebung","Wadenwickel: nur bei warmen, gut durchbluteten Beinen, nicht bei Schüttelfrost!","Fiebersenker: Paracetamol oder Ibuprofen gewichtsadaptiert","Bei kleinen Kindern niedrige Fieberschwelle für Vorstellung"]},{"h":"Fieberkrampf","li":["Häufig 6 Mo – 5 Jahre, meist gutartig","Einfach: <15 min, generalisiert, einmalig in 24 h","Komplex: >15 min, fokal, mehrfach"]},{"h":"Maßnahmen bei Fieberkrampf","li":["Ruhe, Kind seitlich lagern, vor Verletzung schützen","NICHTS in Mund, nicht festhalten, Zeit messen","Nach Anfall stabile Seitenlage, Atmung, Notruf bei langem Anfall","Diazepam-Rektiole nach AVO bei langem Anfall","Eltern beruhigen, aufklären"]}],"cards":[{"q":"Wann sind Wadenwickel KONTRAINDIZIERT?","a":"Bei kalten Füßen/Schüttelfrost (Vasokonstriktion → Wickel verschlimmert), bei Säuglingen, bei Kreislaufstörung."},{"q":"Wann unbedingt Arzt bei Säugling mit Fieber?","a":"Säuglinge <3 Monate IMMER, bei Trinkschwäche, Bewusstseinsstörung, Petechien, Atemnot, anhaltendem Fieber."},{"q":"Welche Wadenwickel-Regeln?","a":"Wadenwickel NUR bei warmen, gut durchbluteten Beinen. KEINE bei kalten Füßen, Schüttelfrost, Säuglingen, Kreislaufstörung. Lauwarm, mit Tüchern, alle 10–15 Min wechseln."},{"q":"Welche Warnzeichen erfordern sofortige ärztliche Vorstellung?","a":"Petechien, Nackensteife, Bewusstseinsstörung, schlechte Hautfarbe (blass, marmoriert), schwere Atemnot, Krampfanfall, Säuglinge <3 Mo mit Fieber, Trinkschwäche."},{"q":"Welche Fiebersenker und Dosierung beim Kind?","a":"Paracetamol 10–15 mg/kg alle 4–6 h (max. 4×/d), Ibuprofen 5–10 mg/kg alle 6–8 h (max. 3×/d). NIE ASS bei Kindern <12 Jahre (Reye-Syndrom!)."},{"q":"Was ist der Unterschied zwischen einfachem und komplexem Fieberkrampf?","a":"Einfach: <15 Min, generalisiert, einmalig in 24 h, Alter 6 Mo–5 J – meist gutartig. Komplex: >15 Min, fokal, mehrfach – braucht weitergehende Diagnostik."}],"quiz":[{"q":"Kind, 2 J., 39,5°C, Krampfanfall mit Versteifung. Was tun?","opts":["Beißkeil","Sicher lagern, Zeit messen, NICHTS in Mund, Notruf bei >5 min","Wadenwickel sofort","Anfall festhalten"],"correct":1,"exp":"Schutz vor Verletzungen, Atemwege beobachten, Zeit messen. Bei langem Anfall Notruf, ggf. Diazepam-Rektiole nach AVO."},{"q":"Welche Aussage zum Wadenwickel ist KORREKT?","opts":["Immer anwenden bei Fieber","Nur bei warmen Füßen, lauwarm, alle 10–15 Min wechseln, nicht bei Säuglingen oder Schüttelfrost","Eiskalt","Nur 1× am Tag"],"correct":1,"exp":"Falsche Anwendung verschlimmert (Vasokonstriktion, Auskühlung). Indikation und Technik beachten."},{"q":"Welche Maßnahme bei Fieberkrampf eines 2-jährigen Kindes ist FALSCH?","opts":["Sicher lagern","Beißkeil in den Mund","Zeit messen","Notruf bei langem Anfall"],"correct":1,"exp":"NIE etwas in den Mund – Verletzungsgefahr für Patient und Helfer. Nur Verletzungsschutz, beobachten."}]},{"key":"multimorbiditaet","name":"Multimorbidität & geriatrische Syndrome","rel":"m","cheat":[{"h":"Definition","li":["Gleichzeitiges Bestehen von ≥2 chronischen Erkrankungen","Bei Älteren typisch: Verlust funktionaler Reserven (Frailty)","Polypharmazie (≥5 Dauer-Medikamente) häufig"]},{"h":"Geriatrische Syndrome (\"5 I\")","li":["Immobilität","Instabilität (Stürze)","Inkontinenz","Intellektueller Abbau","Iatrogene Schäden (Medikamente)","Plus: Mangelernährung, Dekubitus, Schmerz, Depression"]},{"h":"Assessment","li":["Geriatrisches Assessment: Barthel-Index (ADL), IADL, Mini-Mental, GDS","Sturzrisiko: Tinetti, TUG (Timed Up & Go)","Ernährung: MNA, MUST","Schmerz: BESD bei Demenz"]},{"h":"Pflegerische Maßnahmen","li":["Ressourcenorientierte Pflege, Förderung der Selbstständigkeit","Aktivierende Pflege, Mobilisation","Polypharmazie-Review: PRISCUS-Liste (potenziell ungeeignete Medikamente bei Älteren)","Sturzprophylaxe, Sehhilfen, Hörgeräte","Soziale Kontakte, Tagesstruktur","Multidisziplinäre Versorgung"]},{"h":"PRISCUS-Beispiele (problematisch bei Älteren)","li":["Benzodiazepine (Sturz, Verwirrtheit)","Anticholinergika (Verwirrtheit, Obstipation)","NSAR-Dauergabe (Niere, GI-Blutung)","Trizyklische Antidepressiva"]}],"cards":[{"q":"Was sind die 5 geriatrischen I?","a":"Immobilität, Instabilität (Sturz), Inkontinenz, Intellektueller Abbau, Iatrogene Schäden – Kernbereiche der Geriatrie."},{"q":"Was ist die PRISCUS-Liste?","a":"Liste potenziell inadäquater Medikamente für ältere Menschen in Deutschland – dient als Orientierung beim Polypharmazie-Review."},{"q":"Was bedeutet Frailty?","a":"Gebrechlichkeit – verminderte Funktionsreserven mit erhöhter Vulnerabilität. Gewichtsverlust, Muskelschwäche, Erschöpfung, langsames Gehen, geringe Aktivität. Deutlich erhöhtes Risiko für Stürze, Komplikationen, Tod."},{"q":"Was ist die PRISCUS-Liste?","a":"Liste potentiell inadäquater Medikamente bei Älteren in Deutschland. Beispiele: Benzodiazepine (Sturz), Anticholinergika (Verwirrtheit), NSAR-Dauer (Niere). Hilft bei Medikamentenreview."},{"q":"Welcher Score erfasst die Selbstständigkeit im Alltag?","a":"Barthel-Index (0–100): 10 ADL-Bereiche (Essen, Waschen, Anziehen, Toilette, Mobilität u.a.). Niedriger Score = mehr Pflegebedarf. Standard im geriatrischen Assessment."}],"quiz":[{"q":"Welche Aussage trifft zu auf geriatrische Pflege?","opts":["Möglichst alles abnehmen","Ressourcenorientiert, aktivierend, Selbstständigkeit fördern","Nur Bettruhe","Möglichst viele Medikamente"],"correct":1,"exp":"Aktivierende Pflege ist Kern – erhält Selbstständigkeit, beugt Pflegebedürftigkeit vor."},{"q":"Was sind die „5 I\" der Geriatrie?","opts":["Insulin, Infektion, Internist, Information, Innere","Immobilität, Instabilität (Sturz), Inkontinenz, Intellektueller Abbau, Iatrogene Schäden","Italien, Indien, Iran, Israel, Irland","Keine standardisierten Ausdrücke"],"correct":1,"exp":"Die 5 I sind klassische geriatrische Syndrome – wichtige Targets für Assessment und Pflege."}]}]},{"key":"theorien","name":"Pflegetheorien","icon":"📚","desc":"Krohwinkel, Orem, Roper, Henderson, Peplau, Trajekt, Pflegeprozess","topics":[{"key":"krohwinkel","name":"Monika Krohwinkel – ABEDL","rel":"vh","cheat":[{"h":"Grundkonzept","li":["Aktivitäten, Beziehungen und existenzielle Erfahrungen des Lebens (ABEDL)","Erweiterung der AEDL/ATL um Beziehungs- und Existenzaspekte","Ganzheitlich-fördernde Prozesspflege","Häufig Grundlage in deutschen Pflegeeinrichtungen und Pflegedokumentation"]},{"h":"Die 13 ABEDL","li":["1. Kommunizieren","2. Sich bewegen","3. Vitale Funktionen aufrechterhalten","4. Sich pflegen","5. Essen und trinken","6. Ausscheiden","7. Sich kleiden","8. Ruhen, schlafen, sich entspannen","9. Sich beschäftigen, lernen, sich entwickeln","10. Sich als Mann oder Frau fühlen und verhalten","11. Für eine sichere und fördernde Umgebung sorgen","12. Soziale Bereiche des Lebens sichern","13. Mit existenziellen Erfahrungen des Lebens umgehen"]},{"h":"Modellannahmen","li":["Pflege fördert Fähigkeiten und Unabhängigkeit","Pflege ist Beziehungsprozess","Förderung der Selbstpflege im Mittelpunkt","Existenzielle Aspekte (Hoffnung, Glaube, Sterben) gehören zur Pflege"]},{"h":"Anwendung","li":["Strukturierungshilfe für Pflegeanamnese und -planung","Probleme, Ressourcen und Ziele in jedem ABEDL erfassen","Pflegeprozess in 6 Schritten umsetzen"]}],"cards":[{"q":"Was bedeutet ABEDL?","a":"Aktivitäten, Beziehungen und Existenzielle Erfahrungen des Lebens – ein Modell von Monika Krohwinkel mit 13 Bereichen, weit verbreitet in der deutschen Pflegedokumentation."},{"q":"Welche Erweiterung gegenüber den AEDL?","a":"Beziehungen + Existenzielle Erfahrungen werden explizit aufgenommen – Pflege wird ganzheitlich verstanden, inkl. Spiritualität, Sinnfragen, Sterben."},{"q":"Warum ist Krohwinkel praxisrelevant?","a":"Sie bietet eine Strukturhilfe für Pflegeanamnese, Pflegeplanung, Pflegedokumentation und ist in vielen Einrichtungen Grundlage."},{"q":"Wer hat die ABEDL entwickelt?","a":"Monika Krohwinkel – deutsche Pflegewissenschaftlerin. ABEDL ist heute Grundlage vieler Pflegedokumentationssysteme."},{"q":"Welche 4 Modellannahmen liegen dem ABEDL-Modell zugrunde?","a":"1) Pflege fördert Fähigkeiten/Unabhängigkeit, 2) Pflege ist Beziehungsprozess, 3) Selbstpflege im Mittelpunkt, 4) Existenzielle Aspekte gehören zur Pflege."},{"q":"In welchem ABEDL ordnen Sie Schmerzen ein?","a":"ABEDL 3 \"Vitale Funktionen aufrechterhalten\" – Schmerz beeinflusst RR, Puls, Atmung. Auch Bezug zu ABEDL 8 (Ruhen) und ABEDL 13 (existenzielle Erfahrungen)."},{"q":"Welcher ABEDL erfasst die Themen Sucht und Sexualität?","a":"Sexualität: ABEDL 10 \"Sich als Mann oder Frau fühlen\". Sucht-Aspekte: meist ABEDL 13 (existenzielle Erfahrungen) oder ABEDL 12 (soziale Bereiche)."},{"q":"Wie verbindet sich Krohwinkel mit dem Pflegeprozess?","a":"Die 13 ABEDL strukturieren die Informationssammlung (Schritt 1) – pro Bereich werden Probleme, Ressourcen und Ziele formuliert."}],"quiz":[{"q":"In welchem ABEDL würde \"Patient ist gläubig und wünscht Krankenhausseelsorger\" erfasst?","opts":["Kommunizieren","Existenzielle Erfahrungen","Sich pflegen","Soziale Bereiche"],"correct":1,"exp":"Spiritualität, Glaube, Hoffnung, Auseinandersetzung mit dem Tod gehören zu \"Mit existenziellen Erfahrungen umgehen\"."},{"q":"Frau Roth weint, weil sie nicht mehr alleine zur Toilette kann. Welche zwei ABEDL sind hauptsächlich betroffen?","opts":["Ausscheiden + Existenzielle Erfahrungen (Würde/Selbstbild)","Atmen + Schlafen","Essen + Trinken","Sich kleiden + Arbeiten"],"correct":0,"exp":"Inkontinenz/Toilette = ABEDL 6. Verlust der Selbstständigkeit, Schamgefühl = ABEDL 13 (existenziell). ABEDL sind oft kombiniert!"},{"q":"Welche Aussage zu Krohwinkels Modell ist KORREKT?","opts":["Es betrachtet nur körperliche Bedürfnisse","Es erweitert klassische ATL um Beziehung und Existenz","Es hat 10 Bereiche","Es ist nur für die Psychiatrie geeignet"],"correct":1,"exp":"ABEDL = Aktivitäten, BEziehungen, Existenzielle Erfahrungen des Lebens. Bewusste Erweiterung über reine ATL/AEDL hinaus."},{"q":"Im ABEDL 11 \"sichere und fördernde Umgebung\" – was wird hier dokumentiert?","opts":["Glaube und Spiritualität","Sturzrisiken, Hilfsmittel, Wohnsituation, Sicherheit","Mobilität allein","Soziale Kontakte"],"correct":1,"exp":"ABEDL 11 erfasst alle Aspekte einer sicheren, anregenden Umgebung – Sturzgefahren, Orientierungshilfen, Wohnumfeld."}]},{"key":"orem","name":"Dorothea Orem – Selbstpflegedefizit","rel":"h","cheat":[{"h":"Grundkonzept","li":["Pflege wird notwendig, wenn Selbstpflegefähigkeit nicht mehr ausreicht","Drei Theorien: Selbstpflege, Selbstpflegedefizit, Pflegesysteme","Ziel: Selbstpflegekompetenz wiederherstellen / fördern"]},{"h":"Selbstpflegeerfordernisse","li":["Allgemeine: Luft, Wasser, Nahrung, Ausscheidung, Aktivität/Ruhe, Einsamkeit/soziale Kontakte, Sicherheit, Normalsein","Entwicklungsbezogene: in verschiedenen Lebensphasen","Gesundheitsbedingte: bei Erkrankung"]},{"h":"3 Pflegesysteme","li":["Vollständig kompensatorisch: Pflegekraft übernimmt komplett (z.B. Bewusstloser)","Teilweise kompensatorisch: gemeinsam (z.B. Schlaganfall mit Halbseitenlähmung)","Unterstützend-erzieherisch: Anleitung/Beratung (z.B. Diabetiker schulen)"]}],"cards":[{"q":"Welche 3 Pflegesysteme nach Orem?","a":"Vollständig kompensatorisch, teilweise kompensatorisch, unterstützend-erzieherisch."},{"q":"Wann wird Pflege nötig?","a":"Wenn ein Selbstpflegedefizit besteht – die Selbstpflegefähigkeit reicht nicht mehr aus, um den Selbstpflegeerfordernissen zu entsprechen."},{"q":"Was bedeutet \"Selbstpflegekompetenz\" bei Orem?","a":"Die individuelle Fähigkeit, sich selbst zu pflegen – kann durch Krankheit, Alter, Behinderung eingeschränkt sein. Pflege setzt dort an, wo sie nicht ausreicht."},{"q":"Nennen Sie die 8 allgemeinen Selbstpflegeerfordernisse.","a":"Luft, Wasser, Nahrung, Ausscheidung, Aktivität/Ruhe-Balance, Einsamkeit/sozialer Kontakt, Sicherheit, Normalsein."},{"q":"Welches Pflegesystem für einen frisch operierten Patienten Tag 1?","a":"Vollständig oder teilweise kompensatorisch je nach OP-Größe – Patient ist eingeschränkt, Pflege übernimmt zentrale Aufgaben."},{"q":"Wie passt das unterstützend-erzieherische System zur Klausur 2?","a":"Klausur 2 fokussiert auf Beratung/Schulung – Orems unterstützend-erzieherisches System ist hier theoretischer Rahmen für Patientenedukation."}],"quiz":[{"q":"Welches Orem-Pflegesystem entspricht der Diabetesschulung?","opts":["Vollständig kompensatorisch","Teilweise kompensatorisch","Unterstützend-erzieherisch","Keines"],"correct":2,"exp":"Anleitung und Beratung zur Selbstpflege – unterstützend-erzieherisches System."},{"q":"Junge Mutter mit Diabetes lernt erstmals Insulin spritzen. Welches Orem-System?","opts":["Vollständig kompensatorisch","Teilweise kompensatorisch","Unterstützend-erzieherisch","Keines"],"correct":2,"exp":"Anleitung und Schulung zur Selbstinjektion = unterstützend-erzieherisches System – Patientin lernt Selbstpflege."},{"q":"Beatmeter Intensivpatient – welches Orem-System?","opts":["Vollständig kompensatorisch","Teilweise kompensatorisch","Unterstützend-erzieherisch","Selbstpflege"],"correct":0,"exp":"Beatmeter Patient kann keine Selbstpflege leisten – Pflege übernimmt vollständig."},{"q":"Was ist KEIN Selbstpflegeerfordernis nach Orem?","opts":["Luft","Soziale Kontakte","Aktivität-Ruhe-Balance","Markenkleidung"],"correct":3,"exp":"Markenkleidung ist kein Grundbedürfnis. Orem unterscheidet allgemeine, entwicklungsbezogene und gesundheitsbedingte Erfordernisse."}]},{"key":"roper","name":"Roper, Logan, Tierney – 12 Lebensaktivitäten","rel":"m","cheat":[{"h":"Grundkonzept","li":["Pflege orientiert sich an 12 Lebensaktivitäten (LA)","Lebensspanne, Abhängigkeits-Unabhängigkeitskontinuum, Einflussfaktoren, Individualität","Britisches Modell, weit verbreitet in Lehre"]},{"h":"Die 12 LA","li":["Aufrechterhalten einer sicheren Umgebung","Kommunizieren · Atmen · Essen und trinken","Ausscheiden · Persönliche Hygiene und Kleidung","Körpertemperatur regulieren · Mobilisation","Arbeit und Spiel · Sexualität ausdrücken","Schlafen · Sterben"]},{"h":"Einflussfaktoren","li":["Biologisch, psychologisch, soziokulturell, umweltbezogen, politisch-ökonomisch"]}],"cards":[{"q":"Welche 5 Einflussfaktoren auf LA?","a":"Biologisch, psychologisch, soziokulturell, umweltbezogen, politisch-ökonomisch."},{"q":"Welche Besonderheit hat das Modell Roper-Logan-Tierney?","a":"Lebensspanne und Abhängigkeits-Unabhängigkeits-Kontinuum. Pflege betrachtet die Person über die gesamte Lebensspanne mit individuellen Einflussfaktoren."},{"q":"Was sind die 5 Einflussfaktoren auf Lebensaktivitäten?","a":"Biologisch, psychologisch, soziokulturell, umweltbezogen, politisch-ökonomisch."},{"q":"Welche LA fehlt in Roper-Logan-Tierney im Vergleich zu Krohwinkel?","a":"Roper hat \"Sterben\" als eigene LA – Krohwinkel ordnet es unter ABEDL 13 (existenzielle Erfahrungen)."}],"quiz":[{"q":"Wie viele LA umfasst Roper-Logan-Tierney?","opts":["10","12","13","14"],"correct":1,"exp":"Roper, Logan, Tierney definieren 12 Lebensaktivitäten."},{"q":"Welche LA gibt es bei Roper, NICHT bei Henderson?","opts":["Atmen","Sterben als eigene Lebensaktivität","Essen","Kommunizieren"],"correct":1,"exp":"Roper-Logan-Tierney listet Sterben explizit als 12. LA – ein wesentliches Merkmal."},{"q":"Welcher Einflussfaktor erklärt unterschiedliche Schmerzakzeptanz zwischen Kulturen?","opts":["Biologisch","Psychologisch","Soziokulturell","Politisch-ökonomisch"],"correct":2,"exp":"Soziokulturelle Faktoren prägen Schmerzempfinden und -äußerung – wichtig für individuelle Pflegeplanung."}]},{"key":"henderson","name":"Virginia Henderson – 14 Grundbedürfnisse","rel":"m","cheat":[{"h":"Grundkonzept","li":["Definition Pflege: Hilfe zur selbstständigen Befriedigung der Grundbedürfnisse","14 Grundbedürfnisse umfassen physische, psychische, soziale, spirituelle Aspekte","Bei Unfähigkeit übernimmt die Pflege; Ziel: Wiederherstellung der Selbstständigkeit"]},{"h":"Bekannte Grundbedürfnisse (Auswahl)","li":["Atmen · Essen/Trinken · Ausscheiden","Bewegen, Position halten · Schlafen/Ruhen","Sich kleiden · Körpertemperatur regulieren","Sich sauber halten · Gefahren vermeiden","Kommunizieren · Glaubensbekenntnis · Arbeiten · Spielen/Erholung · Lernen"]}],"cards":[{"q":"Wie definiert Henderson Pflege?","a":"Pflege ist die Hilfe für gesunde oder kranke Menschen bei Tätigkeiten, die zur Gesundheit oder Genesung beitragen, die sie ohne Hilfe ausführen würden, hätten sie die nötige Kraft, den Willen oder das Wissen."},{"q":"Wann hat Virginia Henderson ihre 14 Grundbedürfnisse formuliert?","a":"1955 – sie gilt als Pionierin der modernen Pflegetheorie und prägt bis heute das ICN-Verständnis von Pflege."},{"q":"Was meint Henderson mit \"Hilfe zur Selbstständigkeit\"?","a":"Pflege soll Patienten dabei helfen, das zu tun, was sie selbst tun würden, wenn sie könnten – mit Ziel der schnellstmöglichen Unabhängigkeit."},{"q":"Wie erklärt Henderson \"Glaubensbekenntnis\" als Bedürfnis?","a":"Spiritualität/Werte sind Grundbedürfnis – Patient soll seinen Glauben/seine Werte leben können. Heute zentraler Aspekt ganzheitlicher Pflege."}],"quiz":[{"q":"Wie viele Grundbedürfnisse sind bei Henderson definiert?","opts":["12","13","14","15"],"correct":2,"exp":"Henderson nennt 14 menschliche Grundbedürfnisse."},{"q":"Welche Aussage zu Hendersons Pflegeverständnis ist KORREKT?","opts":["Pflege ist nur Versorgung","Pflege hilft bei dem, was Patienten ohne Hilfe selbst tun würden, hätten sie Kraft/Wille/Wissen","Pflege ersetzt den Patienten","Pflege ist nur körperlich"],"correct":1,"exp":"Hendersons Definition – ressourcenorientiert, fördert Selbstständigkeit. Wegweisend für moderne Pflegeverständnisse."},{"q":"Welches Bedürfnis macht Henderson explizit, das in vielen anderen Modellen fehlt?","opts":["Glaube/Religion und Spiele/Erholung","Atmen","Essen","Schlafen"],"correct":0,"exp":"Henderson nennt Glauben (16) und Spiel/Freizeit (13) explizit als Grundbedürfnisse – ganzheitlich."}]},{"key":"peplau","name":"Hildegard Peplau – Beziehungsprozess","rel":"m","cheat":[{"h":"Grundkonzept","li":["Pflege als zwischenmenschlicher therapeutischer Prozess","Pflegekraft-Patient-Beziehung im Zentrum","Wichtig in psychiatrischer Pflege"]},{"h":"4 Phasen der Beziehung","li":["1. Orientierungsphase: Kennenlernen, Problemerkennung","2. Identifikationsphase: Patient identifiziert die helfende Person","3. Nutzungsphase: Patient nutzt die Hilfsangebote","4. Ablösungsphase: Auflösung der Beziehung, Selbstständigkeit"]},{"h":"Rollen der Pflegekraft","li":["Fremde, Beraterin, Lehrerin, Stellvertreterin, Führerin, Ressourcenperson"]}],"cards":[{"q":"4 Phasen der Beziehung nach Peplau?","a":"Orientierung, Identifikation, Nutzung, Ablösung."},{"q":"Wo ist Peplaus Modell besonders relevant?","a":"In der Psychiatrie und Beziehungspflege – die Beziehungsphasen helfen, therapeutische Beziehung systematisch zu gestalten."},{"q":"Welche Pflegerollen beschreibt Peplau?","a":"Fremde, Beraterin, Lehrerin, Stellvertreterin (z.B. für Mutter), Führerin, Ressourcenperson – wechselnde Rollen je nach Situation."},{"q":"Was passiert in der Identifikationsphase?","a":"Patient erkennt die Pflegekraft als helfende Person und beginnt, Vertrauen aufzubauen. Voraussetzung für die Nutzungsphase."}],"quiz":[{"q":"In welcher Phase nutzt der Patient die Hilfsangebote aktiv?","opts":["Orientierung","Identifikation","Nutzungsphase","Ablösung"],"correct":2,"exp":"Nutzungsphase = Patient setzt erlernte Fähigkeiten / nimmt Hilfe aktiv an."},{"q":"In welcher Phase plant der Patient bereits seine Selbstständigkeit?","opts":["Orientierung","Identifikation","Nutzungsphase / Übergang zur Ablösung","Erste Begegnung"],"correct":2,"exp":"In der Nutzungsphase setzt der Patient Erlerntes um, in der Ablösung wird die Beziehung beendet – Patient ist autonom."},{"q":"Warum ist Peplaus Modell für den psychiatrischen Pflegeeinsatz wichtig?","opts":["Es nennt Medikamente","Beziehung wird strukturiert als therapeutisches Werkzeug verstanden","Es regelt Hygiene","Es geht nur um Diagnosen"],"correct":1,"exp":"Peplau definiert die Beziehung selbst als therapeutisches Mittel – zentral in Psychiatrie und Beratung."}]},{"key":"trajekt","name":"Corbin & Strauss – Trajektmodell","rel":"m","cheat":[{"h":"Grundkonzept","li":["Modell für chronische Erkrankungen","Krankheitsverlauf als „Trajekt\" mit Phasen","Drei Arbeitstypen: krankheitsbezogene, alltagsbezogene, biografische Arbeit"]},{"h":"Krankheitsphasen (Auswahl)","li":["Vortrajekt → Trajektbeginn → akute Phase → Krise → Stabilität","Instabilität → Verfall → Sterben"]}],"cards":[{"q":"Welche 3 Arten von „Arbeit\" beschreibt Corbin/Strauss?","a":"Krankheitsbezogene Arbeit (Behandlung, Symptommanagement), alltagsbezogene Arbeit (Beruf, Haushalt), biografische Arbeit (Identität neu definieren)."},{"q":"Wer hat das Trajektmodell entwickelt?","a":"Juliet Corbin und Anselm Strauss – Modell speziell für chronische Erkrankungen mit oft wechselhaften Verläufen."},{"q":"Warum ist biografische Arbeit Teil des Modells?","a":"Chronische Krankheit verändert Identität, Lebensentwürfe, Selbstbild. Patient muss sich neu definieren – diese Arbeit ist Teil der Krankheitsbewältigung."},{"q":"Was ist eine Krise im Trajekt?","a":"Akute Verschlechterung mit lebensbedrohlicher Komponente innerhalb der chronischen Erkrankung – z.B. Lungenembolie bei Krebs, Exazerbation bei COPD."}],"quiz":[{"q":"Auf welche Erkrankungstypen bezieht sich das Trajektmodell besonders?","opts":["Akute Erkrankungen","Chronische Erkrankungen","Verletzungen","Operationen"],"correct":1,"exp":"Trajektmodell ist explizit für chronische Erkrankungen mit langem Verlauf entwickelt."},{"q":"Welcher Patient profitiert besonders von einer Trajekt-Sicht?","opts":["Akute Appendizitis","Patient mit Multiple Sklerose über Jahre","Frischer Knochenbruch","Hauteinsprung"],"correct":1,"exp":"Chronische Erkrankungen mit phasenhaftem Verlauf (MS, COPD, Krebs, Demenz) sind das Anwendungsgebiet."},{"q":"Welche der drei \"Arbeiten\" wird oft übersehen?","opts":["Krankheitsbezogene Arbeit","Alltagsbezogene Arbeit","Biografische Arbeit – Identität neu finden","Keine"],"correct":2,"exp":"Biografische Arbeit (Identitätsarbeit) wird oft übersehen, da nicht direkt sichtbar – aber zentral für Adhärenz und Lebensqualität."}]},{"key":"pflegeprozess","name":"Pflegeprozess (Fiechter & Meier)","rel":"vh","cheat":[{"h":"Grundkonzept","li":["Strukturiertes, kreislaufförmiges Vorgehen in der Pflege","6 Schritte (Fiechter & Meier 1981) – heute oft erweitert","Grundlage des § 4 PflBG (vorbehaltene Tätigkeit Pflegeprozess!)"]},{"h":"Die 6 Schritte","li":["1. Informationssammlung (Pflegeanamnese)","2. Probleme & Ressourcen erkennen","3. Pflegeziele festlegen (SMART)","4. Maßnahmen planen","5. Maßnahmen durchführen","6. Evaluation – Beurteilen, anpassen"]},{"h":"SMART-Ziele","li":["Spezifisch · Messbar · Attraktiv (akzeptiert) · Realistisch · Terminiert","Beispiel: \"Frau X läuft bis 30.05. mit Rollator 20 m ohne Pause.\""]}],"cards":[{"q":"Nennen Sie die 6 Schritte des Pflegeprozesses.","a":"1) Informationssammlung, 2) Probleme/Ressourcen, 3) Ziele, 4) Maßnahmen planen, 5) Maßnahmen durchführen, 6) Evaluation."},{"q":"Was bedeutet SMART?","a":"Spezifisch, Messbar, Attraktiv (akzeptiert), Realistisch, Terminiert – Anforderung an Pflegeziele."},{"q":"Warum ist der Pflegeprozess gesetzlich verankert?","a":"§ 4 PflBG nennt Pflegeprozess (Erhebung, Steuerung, Evaluation) als vorbehaltene Tätigkeit der Pflegefachperson."},{"q":"Welche Schritte sind im Pflegeprozess vorbehaltene Tätigkeit?","a":"Nach §4 PflBG sind Erhebung des Pflegebedarfs (Schritte 1-2), Steuerung (3-5) und Evaluation (6) Pflegefachpersonen vorbehalten."},{"q":"Was unterscheidet eine Pflegediagnose von einem medizinischen Befund?","a":"Pflegediagnose beschreibt die menschliche Reaktion auf Erkrankung/Lebenssituation (z.B. Sturzrisiko, Kommunikationsdefizit). Medizinischer Befund nennt die Erkrankung selbst (Apoplex)."},{"q":"Was ist ein Negativbeispiel für ein SMART-Ziel?","a":"\"Patient soll mehr trinken\" – nicht messbar, nicht spezifisch, nicht terminiert. SMART: \"Patient trinkt bis 30.04. mind. 1,5 L/Tag, dokumentiert über Trinkprotokoll.\""},{"q":"Was bedeutet PES-Format?","a":"Problem-Etiologie-Symptom – Aufbau einer Pflegediagnose: P (welches Problem) – E (Ursache) – S (Anzeichen). NANDA-Standard."},{"q":"Wann wird der Pflegeprozess evaluiert?","a":"Regelmäßig (z.B. wöchentlich), bei Veränderungen, bei Zielerreichung oder am Ende eines Pflegeauftrags – Evaluation ist nicht einmalig."},{"q":"Was unterscheidet Probleme von Ressourcen?","a":"Probleme = Beeinträchtigungen, die Pflege benötigen. Ressourcen = Fähigkeiten/Stärken/Unterstützung, die genutzt werden können – Pflege ist ressourcenorientiert!"},{"q":"Welche Problemarten unterscheidet man?","a":"Aktuelle Probleme (jetzt vorhanden), potenzielle Probleme (Risiken), verdeckte Probleme (vermutet), pflegerische vs. interdisziplinäre Probleme."}],"quiz":[{"q":"Welcher Schritt fehlt: Anamnese – Probleme/Ressourcen – ??? – Maßnahmen – Durchführung – Evaluation?","opts":["Diagnose","Pflegeziele festlegen","Untersuchung","Beratung"],"correct":1,"exp":"Der dritte Schritt ist die Festlegung der Pflegeziele (SMART)."},{"q":"Welche Aussage zum SMART-Ziel ist KORREKT?","opts":["Allgemein und großzügig","Spezifisch, messbar, terminiert","Möglichst lang formuliert","Ohne Datum"],"correct":1,"exp":"SMART = spezifisch, messbar, attraktiv, realistisch, terminiert."},{"q":"Welches Ziel ist SMART formuliert?","opts":["Patient soll besser laufen","Patient mobilisiert sich täglich","Herr Müller geht bis 25.05. mit Rollator 30 m ohne Pause auf der Station","Patient hat keine Schmerzen"],"correct":2,"exp":"Das dritte Ziel ist spezifisch (Rollator/30m), messbar, attraktiv (Selbstständigkeit), realistisch und terminiert."},{"q":"Was gehört zu Schritt 2 \"Probleme und Ressourcen\"?","opts":["Pflegehandlung durchführen","Probleme + vorhandene Stärken erfassen, oft im PES-Format dokumentieren","Medikament geben","Körperpflege"],"correct":1,"exp":"Schritt 2 erfasst Probleme UND Ressourcen – Ressourcen werden in Pflegezielen aktiv genutzt."},{"q":"Im Pflegeprozess: Patient zeigt nicht erwartete Reaktion. Welcher Schritt?","opts":["Maßnahme ignorieren","Evaluation – Plan anpassen, neue Ziele formulieren","Schritte überspringen","Pflege beenden"],"correct":1,"exp":"Pflegeprozess ist kreislaufförmig – bei nicht erreichten Zielen Anpassung über Evaluation, nicht aufgeben."},{"q":"Welche Pflegediagnose ist KORREKT formuliert (PES)?","opts":["Patient ist sturzgefährdet","Sturzrisiko aufgrund von Sehschwäche und Gangunsicherheit, gezeigt durch Tinetti 18 Pkt.","Patient stürzt","Patient ist unsicher"],"correct":1,"exp":"PES: Problem (Sturzrisiko) – Etiologie (Sehschwäche, Gangunsicherheit) – Symptom (Tinetti 18) – vollständig und nachvollziehbar."}]}]},{"key":"experten","name":"Expertenstandards (DNQP)","icon":"⭐","desc":"Dekubitus, Sturz, Schmerz, Kontinenz, Wunden, Ernährung, Entlassung u.a.","topics":[{"key":"dekubitus","name":"Dekubitusprophylaxe","rel":"vh","cheat":[{"h":"Definition Dekubitus","li":["Lokale Schädigung der Haut/Gewebe durch Druck und/oder Scherkräfte","Stadien I–IV (EPUAP/NPIAP)","I: nicht-wegdrückbare Rötung · II: Blase, Hautverlust","III: bis Subkutis · IV: Knochen/Sehne sichtbar"]},{"h":"Risiken / Lokalisationen","li":["Knochenvorsprünge: Sakrum, Fersen, Ellenbogen, Trochanter, Hinterkopf, Schulterblatt","Risikofaktoren: Immobilität, Inkontinenz, Mangelernährung, Hautfeuchtigkeit, Sensibilitätsstörung"]},{"h":"Strukturqualität","li":["Pflegefachkraft hat Wissen zur Druckentlastung und Risikoeinschätzung","Geeignete Hilfsmittel verfügbar (Wechseldruck-/Weichlagerung)","Pflegerisches Versorgungssystem"]},{"h":"Prozessqualität","li":["Risikoeinschätzung bei Aufnahme + bei Veränderungen (Braden-Skala)","Bewegungsförderung individuell, Mikrobewegungen","Druckentlastung (Lagerung), Hilfsmittel angepasst","Hautbeobachtung, Fingertest bei Rötung","Schulung, Anleitung von Patient/Angehörigen"]},{"h":"Ergebnisqualität","li":["Patient hat keinen Dekubitus / kein neuer entstanden","Bewegungsförderung umgesetzt","Hautzustand dokumentiert"]},{"h":"30°-Lagerung","li":["Patient seitlich um 30° gekippt – Sakrum frei","Geringere Druckspitze als Seitenlage 90°","Wechsel nach individuellem Bewegungsplan"]}],"cards":[{"q":"Welche Risikoeinschätzung ist Standard?","a":"Braden-Skala (6 Items: sensorische Wahrnehmung, Feuchtigkeit, Aktivität, Mobilität, Ernährung, Reibung/Scherkräfte). Niedrigere Punktzahl = höheres Risiko."},{"q":"Was ist der Fingertest?","a":"Mit Finger auf gerötete Haut drücken: bleibt Rötung (nicht-wegdrückbar) → Dekubitus Grad I. Wegdrückbare Rötung = noch kein Dekubitus."},{"q":"Warum 30°-Lagerung statt 90°?","a":"30° verteilt Druck besser, geringere Spitzendrücke am Trochanter, weniger Atelektase als Rückenlage."},{"q":"Welche 4 Stadien hat ein Dekubitus nach EPUAP/NPIAP?","a":"I: nicht-wegdrückbare Rötung bei intakter Haut · II: Blase oder offene Hautschicht · III: Schädigung bis Subkutis · IV: Knochen, Sehne, Muskel sichtbar."},{"q":"Welche 6 Items hat die Braden-Skala?","a":"Sensorische Wahrnehmung, Feuchtigkeit, Aktivität, Mobilität, Ernährung, Reibung/Scherkräfte. Niedriger Wert = höheres Risiko (Cut-off oft <18)."},{"q":"Warum keine Massage geröteter Stellen?","a":"Massage schädigt die ohnehin gestörte Mikrozirkulation und kann das Gewebe weiter verletzen. Stattdessen Druckentlastung und Hautbeobachtung."},{"q":"Welche Lokalisationen besonders gefährdet?","a":"Sakrum, Fersen, Trochanter, Sitzbein, Hinterkopf, Schulterblatt, Ellenbogen, Knöchel – Knochenvorsprünge."},{"q":"Was ist Mikrobewegung?","a":"Kleinste Lageveränderungen, vom Patienten oder durch Pflege initiiert – entlasten kurzfristig Druck, fördern Durchblutung."},{"q":"Welche Hilfsmittel zur Druckentlastung?","a":"Wechseldruckmatratzen, Weichlagerungsmatratzen, Fersenkissen/Stiefel, Sitzkissen, Lagerungshilfen aus Schaumstoff."},{"q":"Was zeigt der Fingertest?","a":"Druck mit Finger auf gerötete Haut: bleibt Rötung (nicht-wegdrückbar) → Dekubitus Grad I. Wegdrückbar = noch kein Dekubitus, aber Warnzeichen."}],"quiz":[{"q":"Frau Roth hat eine nicht-wegdrückbare Rötung am Kreuzbein. Stadium?","opts":["I","II","III","IV"],"correct":0,"exp":"Nicht-wegdrückbare Rötung bei intakter Haut = Stadium I."},{"q":"Welche Maßnahme gehört NICHT zur Dekubitusprophylaxe?","opts":["Bewegungsförderung","Hautbeobachtung","Massage geröteter Stellen","Geeignete Hilfsmittel"],"correct":2,"exp":"Massage geröteter Stellen ist obsolet – schädigt Mikrozirkulation. Stattdessen: Druckentlastung."},{"q":"Frau Klein, Braden 12, immobil, inkontinent. Welche Maßnahmen sind PRIORITÄR?","opts":["Bettruhe ohne Mobilisation","Druckentlastung (Lagerung 2-stündlich, geeignete Matratze), Hautbeobachtung, Inkontinenzversorgung, Ernährung optimieren","Massage geröteter Stellen","Fixierung"],"correct":1,"exp":"Hochrisiko (Braden <18). Bündel aus Druckentlastung + Hautschutz + Inkontinenz + Ernährung. Massage kontraindiziert."},{"q":"Welche Aussage zu Dekubitus II ist KORREKT?","opts":["Knochen sichtbar","Teilverlust der Haut, Blase oder oberflächliche Wunde","Nur Rötung","Tiefes Loch"],"correct":1,"exp":"Stadium II = Teilverlust Haut, Blasenbildung, oberflächliche Schürfung – Epidermis und ggf. Dermis betroffen."},{"q":"30°-Lagerung: warum?","opts":["Bessere Atmung als 90°","Geringere Druckspitze als 90° Seitenlage, Sakrum entlastet, Pneumonieprophylaxe","Nur kosmetisch","Keine Begründung"],"correct":1,"exp":"30° verteilt Druck, entlastet Trochanter und Sakrum, hat geringere Spitzendrücke als 90°-Seitenlage."},{"q":"Welche Maßnahme wird in der Dekubitusprophylaxe NICHT MEHR empfohlen?","opts":["Druckentlastung","Hautbeobachtung","Fön/Eis/Massage gerötete Stellen","Bewegungsförderung"],"correct":2,"exp":"Fön, Eis, Massage gerötete Stellen sind veraltete Praxis – schädigen Mikrozirkulation. Aktueller Standard: Druckentlastung + Hautschutz."}]},{"key":"sturz","name":"Sturzprophylaxe","rel":"vh","cheat":[{"h":"Definition","li":["Sturz: jedes ungewollte Niedergehen auf eine tiefere Ebene","Folgen: Frakturen (v.a. Hüft, Handgelenk, Wirbel), Kopfverletzungen, Angst vor erneutem Sturz, Pflegebedürftigkeit"]},{"h":"Sturzrisikofaktoren","li":["Personal: Alter, Stürze in Vergangenheit, Sehstörung, Schwindel, Inkontinenz, Demenz","Medikamentös: Sedativa, Antihypertensiva, Diuretika, Polypharmazie","Umgebung: Stolperfallen, schlechte Beleuchtung, ungeeignete Schuhe, Hilfsmittel"]},{"h":"Strukturqualität","li":["Pflegefachkraft hat Wissen zu Sturzrisiken und Maßnahmen","Geeignete Hilfsmittel (Hüftprotektor, Niederflurbett, Gehhilfen)","Verfahrensregelung im Hause"]},{"h":"Prozessqualität","li":["Systematische Risikoeinschätzung (z.B. Tinetti, TUG, Sturz-Anamnese)","Individueller Maßnahmenplan, Information/Beratung","Sturzprotokoll bei Sturzereignis","Multidisziplinäre Abklärung Mediziner/Therapeuten"]},{"h":"Maßnahmen","li":["Umgebung sichern (Beleuchtung, Stolperfallen, Hilfsmittel im Bett-/Stuhlbereich)","Schuhe rutschfest, gut sitzend","Sehkorrektur, Hörhilfen","Krafttraining, Balanceübungen","Medikamentenreview (PRISCUS)","Toilettenbegleitung (häufige Sturzursache!)","Hüftprotektoren bei Hochrisiko"]},{"h":"Ergebnisqualität","li":["Reduktion Sturzhäufigkeit / Sturzfolgen","Patient kennt seine Risiken und Maßnahmen","Strukturierte Sturzdokumentation"]}],"cards":[{"q":"Was ist der TUG-Test?","a":"Timed Up and Go: aufstehen vom Stuhl, 3 m gehen, umkehren, hinsetzen. >12–14 Sek. = erhöhtes Sturzrisiko."},{"q":"Welche Risikomedikamente besonders beachten?","a":"Benzodiazepine, Antidepressiva, Neuroleptika, Antihypertensiva, Diuretika, Antidiabetika – Polypharmazie generell."},{"q":"Welche Sturzrisiko-Assessments gibt es?","a":"Tinetti-Test (Gleichgewicht + Gangbild), Timed Up & Go (TUG), Berg-Balance-Skala, Sturz-Anamnese (häufigster Indikator: vorangegangener Sturz)."},{"q":"Welcher Cut-off beim TUG-Test deutet auf erhöhtes Sturzrisiko?","a":"Über 12-14 Sekunden für Aufstehen, 3 m Gehen, Umkehren, Hinsetzen weist auf erhöhtes Sturzrisiko hin."},{"q":"Welche Medikamente besonders sturzfördernd?","a":"Sedativa (Benzodiazepine, Z-Substanzen), Antidepressiva, Antipsychotika, Antihypertensiva (Orthostase), Diuretika, Antidiabetika (Hypo)."},{"q":"Welche Umgebungsmaßnahmen senken Sturzrisiko?","a":"Helle Beleuchtung (auch nachts), Stolperfallen entfernen (lose Teppiche), Haltegriffe Bad/WC, rutschfeste Schuhe, Brille/Hörgerät bereit, Bett auf Niedrigstellung."},{"q":"Was sind die 4 Schritte des Sturzprotokolls?","a":"1) Patient untersuchen (Verletzung?), 2) Vitalzeichen + Bewusstsein, 3) Ärztliche Begutachtung anfordern, 4) Sturzprotokoll dokumentieren + Maßnahmen anpassen."}],"quiz":[{"q":"Frau Klein (82) ist im Krankenhaus gestürzt. Was tun?","opts":["Verschweigen","Sturzprotokoll, Patientin untersuchen, Arzt informieren, Maßnahmen anpassen","Strafen","Patientin fixieren"],"correct":1,"exp":"Sturzdokumentation, ärztliche Begutachtung (Fraktur?), Ursachenanalyse, Plan anpassen sind Standard."},{"q":"Patientin (82) mit Z.n. Sturz vor 2 Wochen, nimmt Lorazepam. Welche Maßnahme ist EVIDENZBASIERT?","opts":["Fixierung","Multifaktorielle Intervention: Medikamentenreview + Umgebung + Bewegungstraining + Hilfsmittel","Bettruhe","Mehr Schlafmittel"],"correct":1,"exp":"Multifaktorielle Interventionen sind evidenzbasiert wirksam. Wichtig: Lorazepam (Sturzfaktor!) im Medikamentenreview ansehen."},{"q":"Welche Aussage zum Hüftprotektor ist KORREKT?","opts":["Verhindert Stürze","Senkt Frakturrisiko bei Sturz, verhindert Sturz selbst aber NICHT","Schadet immer","Ist Standard für alle"],"correct":1,"exp":"Hüftprotektor mindert Schwere des Sturzaufpralls (Frakturen) – verhindert den Sturz selbst nicht."},{"q":"Was tun NACH einem Sturz?","opts":["Verschweigen","Patient untersuchen, Vitalzeichen, Arzt informieren, Sturzprotokoll, Plan anpassen","Bestrafen","Sofort fixieren"],"correct":1,"exp":"Strukturiertes Vorgehen ist Standard – Patientenschutz, Dokumentation, Ursachenanalyse zur Prävention zukünftiger Stürze."},{"q":"Welche Toilettengang-Begleitung sinnvoll?","opts":["Niemand sollte begleiten","Bei Sturzrisiko anbieten/begleiten – Toilettenwege sind Hauptsturzort, besonders nachts","Nur tagsüber","Nur Männer"],"correct":1,"exp":"Wege zur Toilette (Eile, Halbschlaf nachts, fehlende Schuhe) sind ein häufiger Sturzort – Begleitung effektiv."}]},{"key":"schmerz","name":"Schmerzmanagement (akut & chronisch)","rel":"vh","cheat":[{"h":"Schmerzeinschätzung","li":["Selbstauskunft ist Goldstandard (NRS 0–10, VAS)","Bei Demenz/Bewusstseinsstörung: Fremdeinschätzung BESD/BISAD","Schmerz erfassen: Lokalisation, Charakter, Stärke, Auslöser, Begleitsymptome"]},{"h":"WHO-Stufenschema","li":["Stufe 1: Nicht-Opioide (Paracetamol, Metamizol, NSAR)","Stufe 2: Schwache Opioide (Tramadol, Tilidin) + Stufe 1","Stufe 3: Starke Opioide (Morphin, Oxycodon, Fentanyl) + Stufe 1","Co-Analgetika auf jeder Stufe (Antikonvulsiva, Antidepressiva, Steroide)"]},{"h":"Strukturqualität","li":["Pflegefachkraft hat Wissen zu Schmerzeinschätzung und -management","Erfassungsinstrumente verfügbar","Hauseigene Verfahrensregelung"]},{"h":"Prozessqualität","li":["Systematische Schmerzeinschätzung bei Aufnahme und im Verlauf","Individueller Behandlungsplan in Absprache mit Arzt","Wirkung und NW dokumentieren","Patientenedukation: Schmerzen mitteilen, Medikamente regelmäßig"]},{"h":"Nicht-medikamentöse Maßnahmen","li":["Wärme/Kälte, Lagerung, Massage","Ablenkung, Entspannung, Atemübungen","TENS, Akupunktur, Physiotherapie"]},{"h":"Opioide – wichtige Punkte","li":["Obstipation IMMER prophylaktisch behandeln (Laxans)!","Übelkeit anfangs, NW: Sedierung, Atemdepression","Toleranz und Abhängigkeit ≠ Sucht – kein Grund Opioid zu verweigern bei Schmerz!","Patientenedukation: Mythen abbauen"]}],"cards":[{"q":"Was ist das WHO-Stufenschema?","a":"3-Stufen-Modell der Schmerztherapie: 1) Nicht-Opioide, 2) schwache Opioide + 1, 3) starke Opioide + 1. Co-Analgetika auf jeder Stufe."},{"q":"Welche NW von Opioiden IMMER prophylaktisch behandeln?","a":"Obstipation – Opioidwirkung am Darm bleibt, keine Toleranz. Laxans (Macrogol, Bisacodyl) immer mitverordnen."},{"q":"Welche Schmerzskala bei dementen Patienten?","a":"BESD (Beurteilung Schmerz bei Demenz) oder BISAD – Fremdeinschätzung über Mimik, Körpersprache, Atmung, Verhalten."},{"q":"Was ist die NRS und wie wird sie genutzt?","a":"Numeric Rating Scale 0-10. Patient gibt Zahl an: 0=kein Schmerz, 10=stärkster vorstellbar. Standard ab Schulalter, einfach, validiert."},{"q":"Welche Skala bei nicht-mitteilungsfähigen Demenz-Patienten?","a":"BESD (Beurteilung Schmerz bei Demenz) oder BISAD – Fremdeinschätzung über Atmung, Mimik, Körpersprache, Lautäußerungen, Trostbedarf."},{"q":"Welche Dokumentation bei Schmerz erforderlich?","a":"Lokalisation, Charakter (stechend, dumpf), Intensität (NRS), Auslöser, Linderung, Dauer, Begleitsymptome, Wirkung der Therapie + NW."},{"q":"Was sind Co-Analgetika?","a":"Medikamente, die nicht primär Schmerzmittel sind, aber Schmerz lindern: Antikonvulsiva (Gabapentin – Nervenschmerz), Antidepressiva (Amitriptylin – chron. Schmerz), Steroide, Bisphosphonate."},{"q":"Welche 3 typischen Opioid-Nebenwirkungen?","a":"Obstipation (kein Toleranzeffekt – immer Laxans!), Übelkeit (anfangs, klingt ab), Sedierung. Selten: Atemdepression bei Überdosis."},{"q":"Was bedeutet \"Schmerz auf Verordnung\" vs. \"Bedarfsmedikation\"?","a":"Basis = nach Plan/Uhr (Retardpräparate). Bedarf = bei Schmerzdurchbruch (schnellwirksam). Kombination: Basis + Reserve, beides VO-Pflicht."},{"q":"Warum bei chronischem Schmerz Retardpräparate?","a":"Konstanter Wirkspiegel verhindert Schmerzspitzen, weniger Suchtgefahr, bessere Lebensqualität. Bedarfsmedikation für Durchbruchschmerz extra."}],"quiz":[{"q":"Patientin auf Stufe 3 (Morphin) klagt über Verstopfung. Was tun?","opts":["Morphin absetzen","Laxans nach AVO geben, Trinken fördern, Bewegung – Obstipation ist erwartete NW","Ignorieren","Klistier sofort"],"correct":1,"exp":"Obstipation ist die häufigste
