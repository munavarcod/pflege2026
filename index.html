 Opioid-NW – Laxans gehört zur Standardverordnung. Kein Grund Opioid abzusetzen."},{"q":"Welche Aussage zum Schmerzassessment ist KORREKT?","opts":["Pflegekraft kennt Schmerzen besser als Patient","Selbstauskunft ist Goldstandard","Bei Demenz keine Erfassung möglich","Schmerz wird nur dokumentiert wenn >5"],"correct":1,"exp":"Selbstauskunft ist Goldstandard. Bei nicht-mitteilungsfähigen Patienten Fremdeinschätzung (BESD)."},{"q":"Herr Bach (78, dement) wirkt unruhig, stöhnt, BESD 6 Punkte. Was vermuten Sie?","opts":["Will mehr Aufmerksamkeit","Schmerz – BESD ≥4 weist auf Schmerz hin, Therapie nach Plan, Arzt informieren","Hunger","Müdigkeit"],"correct":1,"exp":"BESD ≥4 = Hinweis auf relevanten Schmerz. Bei Demenz nicht ignorieren – Schmerz ist häufige Ursache von Unruhe und wird oft übersehen."},{"q":"Welcher Wirkstoff ist auf WHO-Stufe 3?","opts":["Paracetamol","Ibuprofen","Tramadol","Morphin"],"correct":3,"exp":"WHO-3 = starkes Opioid: Morphin, Oxycodon, Fentanyl, Hydromorphon."},{"q":"Patient unter Morphin klagt über Verstopfung. Was tun?","opts":["Morphin reduzieren","Laxans nach AVO geben (sollte standard mitverordnet sein), Trinken/Bewegung fördern","Ignorieren","Klistier sofort"],"correct":1,"exp":"Obstipation ist häufigste Opioid-NW – kein Toleranzeffekt. Laxans gehört zur Standardverordnung mit jedem Opioid."},{"q":"Welche Aussage zu Schmerz ist KORREKT?","opts":["Schmerz ist immer subjektiv – Selbstauskunft ist Goldstandard","Pflegekraft kann Schmerz besser einschätzen","Schmerz unter NRS 5 wird ignoriert","Schmerzen ab 90 Jahren sind normal"],"correct":0,"exp":"Selbstauskunft ist Goldstandard. Schmerz ist immer das, was der Patient sagt – nicht zu unterschätzen, nie als \"normal\" abtun."},{"q":"Welche nicht-medikamentösen Maßnahmen helfen bei Schmerz?","opts":["Nichts hilft ohne Medikamente","Wärme/Kälte, Lagerung, Massage, Ablenkung, Atemtechniken, TENS","Nur Bestrahlung","Nur OP"],"correct":1,"exp":"Multimodale Schmerztherapie kombiniert Medikamente mit nicht-medikamentösen Verfahren – effektiver, weniger NW."}]},{"key":"kontinenz","name":"Förderung Harnkontinenz","rel":"h","cheat":[{"h":"Strukturqualität","li":["Pflegefachkraft hat Wissen zu Inkontinenzformen und Maßnahmen","Hilfsmittel und Materialien verfügbar"]},{"h":"Kontinenzprofile","li":["1. Kontinent","2. Unabhängig erreichte Kontinenz (mit Hilfsmittel selbst)","3. Abhängig erreichte Kontinenz (mit personeller Hilfe trocken)","4. Unabhängig kompensierte Inkontinenz (versorgt sich selbst)","5. Abhängig kompensierte Inkontinenz (Versorgung durch andere)","6. Nicht kompensierte Inkontinenz"]},{"h":"Prozessqualität","li":["Erfassung des aktuellen Kontinenzprofils","Miktionstagebuch, Anamnese","Individuelle Maßnahmen (Toilettentraining, Beckenboden, Hilfsmittel)","Patientenedukation"]},{"h":"Maßnahmen","li":["Toilettentraining, Toilettengangbegleitung","Trinkmenge angemessen (nicht reduzieren!)","Hilfsmittelauswahl bedarfsgerecht","Hautpflege Intimbereich","Beckenbodentraining"]}],"cards":[{"q":"Wie viele Kontinenzprofile gibt es?","a":"6 – von kontinent bis nicht kompensierte Inkontinenz. Ziel: möglichst hohes Profil erreichen."},{"q":"Welche 6 Kontinenzprofile gibt es?","a":"1) Kontinent · 2) Unabhängig erreichte Kontinenz (Hilfsmittel selbst) · 3) Abhängig erreichte Kontinenz (mit Hilfe trocken) · 4) Unabhängig kompensiert (versorgt sich selbst) · 5) Abhängig kompensiert · 6) Nicht kompensiert."},{"q":"Welche Inkontinenzformen gibt es?","a":"Belastungs-/Stressinkontinenz (bei Husten/Heben), Drang-/Urgeinkontinenz (plötzlicher Harndrang), Mischform, Überlauf-, Reflexinkontinenz, extraurethral."},{"q":"Welche pflegerischen Maßnahmen bei Belastungsinkontinenz?","a":"Beckenbodentraining, Gewichtsreduktion bei Adipositas, Vermeidung schwerem Heben, ggf. Elektrostimulation. Hilfsmittel angepasst."},{"q":"Was ist Toilettentraining?","a":"Strukturierter Toilettengang nach Plan (z.B. alle 2 h) zur Wiedererlangung von Kontinenz – besonders bei kognitiv eingeschränkten Patienten effektiv."},{"q":"Warum darf die Trinkmenge bei Inkontinenz NICHT reduziert werden?","a":"Reduktion fördert HWI (konzentrierter Urin), Exsikkose, Obstipation, Verwirrtheit – verschlimmert oft die Inkontinenz."}],"quiz":[{"q":"Welche Aussage zum Trinken bei Inkontinenz ist KORREKT?","opts":["Trinkmenge reduzieren, um Inkontinenz zu vermindern","Trinkmenge bedarfsgerecht beibehalten – Reduktion fördert HWI und Obstipation","Nur abends trinken","Nichts trinken"],"correct":1,"exp":"Reduktion der Trinkmenge bei Inkontinenz ist KONTRAINDIZIERT – fördert HWI, Exsikkose, konzentrierten Urin (Reizung)."},{"q":"Frau Klein verliert beim Husten Urin – welche Form?","opts":["Drang","Belastung/Stress","Überlauf","Reflex"],"correct":1,"exp":"Belastungsinkontinenz: Urinverlust bei Druckerhöhung im Bauch (Husten, Niesen, Heben). Therapie: Beckenboden, Gewicht."},{"q":"Welche Maßnahme ist bei Inkontinenz IMMER richtig?","opts":["Trinkmenge reduzieren","Hautpflege Intimbereich, individuell angepasste Hilfsmittel, Selbstwert wahren","Dauer-DK legen","Patient ignorieren"],"correct":1,"exp":"Hautschutz + Würde + individuelle Versorgung sind Kern der Inkontinenzpflege. DK nur bei klarer Indikation."},{"q":"Welcher Patient hat Profil 3 \"abhängig erreichte Kontinenz\"?","opts":["Hilft sich allein","Mit personeller Unterstützung trocken","Trägt Vorlage und versorgt sich selbst","Komplett inkontinent"],"correct":1,"exp":"Profil 3 = Patient ist trocken, braucht aber Hilfe (Toilettenführung, Erinnerung) – Verbesserung möglich."}]},{"key":"wunden_es","name":"Pflege Menschen mit chronischen Wunden","rel":"h","cheat":[{"h":"Strukturqualität","li":["Pflegefachkraft mit Fortbildung Wundversorgung","Geeignete Materialien, geschulte Wundexperten verfügbar"]},{"h":"Prozessqualität","li":["Wundbeurteilung systematisch (TIME, Lokalisation, Größe)","Wunddokumentation, Foto","Phasengerechte Versorgung","Schmerzmanagement vor Verbandwechsel","Patientenedukation – Selbstpflegekompetenz"]},{"h":"Wichtige Aspekte","li":["Ursachenbehandlung (Druck, Diabetes, Durchblutung)","Ernährungsberatung (Eiweiß, Vit C, Zink)","Lebensqualität und Schmerzen erfragen","Alltagsbewältigung, soziale Aspekte"]}],"cards":[{"q":"Was umfasst die ganzheitliche Versorgung chronischer Wunden?","a":"Wundheilungsförderung + Ursachenbehandlung + Schmerzmanagement + Lebensqualität + Patientenedukation – multidimensional."},{"q":"Was sind chronische Wunden (Definition)?","a":"Wunden, die unter fachgerechter Therapie nach 4-12 Wochen nicht abheilen. Häufig: Ulcus cruris venosum, Dekubitus, diabetisches Fußulcus."},{"q":"Was bedeutet TIME?","a":"Tissue (Gewebe – Débridement), Inflammation/Infection (Entzündung/Infektion), Moisture balance (Feuchtigkeitsmanagement), Edge of wound (Wundrand)."},{"q":"Warum ist Schmerzmanagement bei chronischen Wunden zentral?","a":"Schmerz beeinflusst Lebensqualität, Adhärenz und Heilung. Vor Verbandwechsel Analgetika, atraumatische Verbände, Beratung."},{"q":"Welche Ursachen erst behandeln vor Wundheilung?","a":"Druck (Lagerung), venöse Stauung (Kompression), arterielle Insuffizienz (revaskularisieren), Diabetes (BZ), Mangelernährung – ohne Ursachenbehandlung keine Heilung."}],"quiz":[{"q":"Welche Aussage zur chronischen Wunde ist KORREKT?","opts":["Nur lokale Verbandwechsel reichen","Ursachenbehandlung + Wundversorgung + Lebensqualität sind Bestandteil","Schmerz spielt keine Rolle","Ernährung irrelevant"],"correct":1,"exp":"Ohne Ursachenbehandlung (Druck, Durchblutung, Diabetes) heilt keine chronische Wunde."},{"q":"Welche Voraussetzung ist KEINE bei chronischer Wunde?","opts":["Ursachenbehandlung","Wundbeurteilung","Massage der Wunde","Schmerzmanagement"],"correct":2,"exp":"Massage der Wunde ist nicht Standard und meist kontraindiziert. Ursachenbehandlung + Beurteilung + Schmerzmanagement sind essenziell."},{"q":"Was ist Goldstandard zur Vermessung chronischer Wunden?","opts":["Schätzung","Foto + Wundgrößenmessung mit standardisiertem Lineal/Methode, Dokumentation","Augenmaß","Keine Messung"],"correct":1,"exp":"Strukturierte Dokumentation (Foto + Maß) ermöglicht Verlaufsbeobachtung und Anpassung der Therapie."}]},{"key":"ernaehrung_es","name":"Ernährungsmanagement zur Sicherung Mangelernährung","rel":"h","cheat":[{"h":"Strukturqualität","li":["Pflegefachkraft kennt Risiken für Mangelernährung","Erfassungsinstrumente, Ernährungsteam vorhanden"]},{"h":"Prozessqualität","li":["Risikoeinschätzung (MNA, MUST, NRS-2002)","Differenzierte Ursachenanalyse (somatisch, psychisch, sozial)","Individueller Maßnahmenplan","Evaluation Gewicht, Trinkmenge"]},{"h":"Maßnahmen","li":["Anreicherung Mahlzeiten (Sahne, Maltodextrin, Trinknahrung)","Atmosphäre, Gesellschaft, Wunschkost","Hilfsmittel, Anreichen, Schluckhilfen","Mundpflege, Zahnstatus prüfen","Sondennahrung als letzte Option (Patientenwille!)"]}],"cards":[{"q":"Welcher Score erfasst Mangelernährungsrisiko bei Älteren?","a":"MNA (Mini Nutritional Assessment) – speziell für Geriatrie. Alternativ MUST oder NRS-2002."},{"q":"Was ist der MNA-Score?","a":"Mini Nutritional Assessment – speziell für Geriatrie, erfasst Risiko für Mangelernährung. Werte: ≥24 normal, 17-23,5 Risiko, <17 Mangelernährung."},{"q":"Welche Kennzeichen für Mangelernährung?","a":"BMI <20 kg/m², Gewichtsverlust >5% in 3 Monaten / >10% in 6 Monaten, Kachexie, Sarkopenie, Albumin↓, Wundheilungsstörung."},{"q":"Welche pflegerischen Maßnahmen bei Mangelernährung?","a":"Wunschkost, hochkalorisch anreichern (Sahne, Maltodextrin), Trinknahrung, schöne Atmosphäre, Anreichen, Mundpflege/Zahnstatus prüfen, Hilfsmittel."},{"q":"Wann ist Sondennahrung indiziert?","a":"Bei nicht-deckbarer Energiezufuhr oral und Patientenwillen – nicht primär bei Demenz/Endstadium-Patienten ohne Aussicht auf Besserung. Patientenverfügung beachten!"}],"quiz":[{"q":"Patient mit BMI 17,5 und Gewichtsverlust 8% in 3 Monaten. Erste Maßnahme?","opts":["Sondennahrung","Erfassung mit MNA, Ursachenanalyse, individuelle Maßnahmen","Diät","Ignorieren"],"correct":1,"exp":"Strukturierte Erfassung und Ursachenanalyse sind Grundlage – Maßnahmen davon abgeleitet."},{"q":"Patient (87) BMI 18, isst seit 2 Wochen kaum. Welche Reihenfolge?","opts":["Sofort PEG","Erst Erfassung mit MNA, Ursachenanalyse (Schluckstörung? Depression? Schmerz?), dann Maßnahmen","Zwangsernähren","Nichts tun"],"correct":1,"exp":"Strukturiertes Vorgehen: Erfassung + Ursache + abgestufte Maßnahmen vor invasiven Eingriffen wie PEG."},{"q":"Welche Maßnahme ist bei dementer Patientin mit Esslust-Verlust hilfreich?","opts":["Strenge Vorgaben","Lieblingsspeisen anbieten, Atmosphäre, Fingerfood, kleine häufige Mahlzeiten","PEG sofort","Nichts trinken"],"correct":1,"exp":"Personenzentrierte, biographieorientierte Ernährungsversorgung – Wahlfreiheit, vertraute Speisen, ruhige Umgebung."}]},{"key":"entlassung","name":"Entlassungsmanagement","rel":"h","cheat":[{"h":"Strukturqualität","li":["Klinik hat schriftliches Konzept, Pflegefachkraft koordiniert","Schnittstellenmanagement zu ambulanten Diensten"]},{"h":"Prozessqualität","li":["Initiales Screening – Bedarf Entlassungsmanagement?","Differenziertes Assessment (medizinisch, pflegerisch, psychosozial)","Individuelle Entlassungsplanung","Information/Beratung Patient + Angehörige","Überleitung mit allen Informationen (Pflegeüberleitungsbogen)","Evaluation 48 h nach Entlassung"]},{"h":"Beratungsthemen","li":["Häusliche Pflege (Pflegegrad), Hilfsmittel","Medikamente, Arzttermine, Ernährung","Sozialdienst, Reha, Selbsthilfegruppen"]}],"cards":[{"q":"Was ist die Pflegeüberleitung?","a":"Strukturierte Informationsweitergabe an aufnehmende Einrichtung/ambulanten Dienst – Pflegeprobleme, Maßnahmen, Hilfsmittel, Medikation."},{"q":"Wer hat in Deutschland Anspruch auf Entlassungsmanagement?","a":"Alle gesetzlich versicherten Patienten nach §39 SGB V – Krankenhaus muss Entlassungsmanagement strukturiert anbieten und durchführen."},{"q":"Welche Themen werden im Beratungsgespräch behandelt?","a":"Häusliche Pflege, Pflegegrad, Hilfsmittel, Medikamente, Arzttermine/Kontrollen, Ernährung, Wundversorgung, Sozialdienst, Reha."},{"q":"Was steht in der Pflegeüberleitung?","a":"Diagnosen, aktuelle Pflegeprobleme + Maßnahmen, Pflegegrad, Medikamente, Hilfsmittel, Ressourcen, Ansprechpartner, geplante Folgetermine."}],"quiz":[{"q":"Wann wird Entlassungsmanagement begonnen?","opts":["Am Entlassungstag","Bei Aufnahme – durch initiales Screening","Erst auf Wunsch","Nach Entlassung"],"correct":1,"exp":"Frühzeitig bei Aufnahme – Screening identifiziert Patienten mit Bedarf, Planung läuft parallel zur Behandlung."},{"q":"Wann beginnt Entlassungsmanagement?","opts":["Am Entlassungstag","Bei Aufnahme – Screening, dann strukturierte Planung parallel zur Behandlung","Erst auf Wunsch","Nie"],"correct":1,"exp":"Entlassungsmanagement ist Prozess von Aufnahme bis Nachsorge – frühe Planung verhindert Versorgungslücken."},{"q":"Welche Aussage zur Pflegeüberleitung ist KORREKT?","opts":["Nur Diagnosen reichen","Strukturiert: Diagnose, Pflegeprobleme, Maßnahmen, Hilfsmittel, Medikamente, Ansprechpartner","Telefonisch genügt","Optional"],"correct":1,"exp":"Strukturierte schriftliche Überleitung ist Standard – sichert Versorgungskontinuität."}]},{"key":"mobil","name":"Erhaltung & Förderung der Mobilität","rel":"m","cheat":[{"h":"Strukturqualität","li":["Wissen zu Mobilitätsförderung","Hilfsmittel verfügbar, multidisziplinäre Zusammenarbeit"]},{"h":"Prozessqualität","li":["Mobilitätserfassung (Barthel, TUG, Tinetti)","Individuelle Mobilisationsplanung","Aktivierende Pflege, Bobath, Kinästhetik","Beratung, Anleitung Patient/Angehörige"]},{"h":"Maßnahmen","li":["Hilfe zur Selbsthilfe – nur soviel Hilfe wie nötig","Regelmäßige Mobilisation, Transfers","Bewegungsübungen aktiv und passiv","Hilfsmittel: Rollator, Toilettensitzerhöhung"]}],"cards":[{"q":"Was ist aktivierende Pflege?","a":"Pflege mit Ziel der Selbstständigkeit – fördert Ressourcen, Hilfe zur Selbsthilfe, statt alles abzunehmen."},{"q":"Was sind die 5 Dimensionen der Mobilität nach DNQP?","a":"Lagewechsel im Liegen, Transfers, sich im Sitzen halten, sich Fortbewegen, Treppensteigen – alle Dimensionen erfassen."},{"q":"Was ist der Barthel-Index?","a":"10-Item-Score zu Aktivitäten des täglichen Lebens (max. 100 Punkte). Misst Pflegebedürftigkeit/Selbstständigkeit. Niedriger Wert = höherer Pflegebedarf."},{"q":"Was ist Kinästhetik?","a":"Konzept der Bewegungswahrnehmung und -unterstützung. Pflege bewegt MIT dem Patienten unter Nutzung physiologischer Bewegungsmuster – schont Patient und Pflegekraft."}],"quiz":[{"q":"Welche Pflegetechnik fördert die Bewegungswahrnehmung?","opts":["Bobath / Kinästhetik","Routinepflege ohne Aktivierung","Bettruhe","Fixierung"],"correct":0,"exp":"Bobath (für neurol. Patienten) und Kinästhetik aktivieren physiologische Bewegungsmuster."},{"q":"Patient nach OP, kann allein sitzen, aber nicht stehen. Was tun?","opts":["Bett behalten","Stufenweise Mobilisation: Sitzen → Stehen → Gehen mit Hilfe, Sturzprophylaxe","Aufstehen sofort allein","Fixieren"],"correct":1,"exp":"Stufenweise, sicher und ressourcenorientiert mobilisieren – wichtig für Heilung, Thrombose-, Pneumonie-, Dekubitusprophylaxe."}]},{"key":"mund","name":"Förderung der Mundgesundheit","rel":"m","cheat":[{"h":"Strukturqualität","li":["Pflegefachkraft hat Wissen zur Mundpflege","Geeignete Materialien (weiche Bürste, Mundspüllösung, Zahnseide)"]},{"h":"Prozessqualität","li":["Mundgesundheitsstatus erfassen","Individuelle Mundpflege täglich/mehrfach","Beratung, ggf. zahnärztliche Konsultation"]},{"h":"Bedeutung","li":["Pneumonieprophylaxe (orale Bakterien!)","Wohlbefinden, Geschmack, Kommunikation","Soziale Teilhabe, Selbstwertgefühl"]}],"cards":[{"q":"Warum Mundpflege auch bei nicht oral ernährten Patienten?","a":"Speichelfluss reduziert, Pneumonierisiko durch orale Keime, Mundtrockenheit, Mundsoor – Mundpflege essentiell."},{"q":"Welche 3 Hauptbestandteile der täglichen Mundpflege?","a":"Zähneputzen 2x/Tag, Zwischenraumpflege (Zahnseide/Bürstchen), Spüllösung – plus regelmäßige zahnärztliche Kontrolle."},{"q":"Wann besondere Mundpflege nötig?","a":"Bei Bewusstlosigkeit, Beatmung, Sonde, Sauerstoff, Chemotherapie, Dehydratation, Demenz, Sterbephase – Risiko für Soor, Pneumonie, Trockenheit."},{"q":"Was tun bei Mundsoor?","a":"Ärztliche Vorstellung, Antimykotikum (Nystatin), regelmäßige Mundpflege, Hygiene Zahnprothese, Risikofaktoren mindern (Antibiotika, Diabetes-Einstellung)."}],"quiz":[{"q":"Welcher Zusammenhang ist evidenzbasiert?","opts":["Mundpflege ohne Effekt","Gute Mundpflege senkt Pneumonierisiko","Schadet Zähnen","Nur kosmetisch"],"correct":1,"exp":"Mundpflege reduziert orale Bakterienlast und senkt nachweislich nosokomiale Pneumonien."},{"q":"Welcher Zusammenhang ist evidenzbasiert?","opts":["Mundpflege wirkungslos","Gute Mundpflege senkt nosokomiale Pneumonie deutlich","Schadet den Zähnen","Nur kosmetisch"],"correct":1,"exp":"Mundpflege reduziert orale Bakterienlast – senkt Aspirationspneumonie nachweislich, besonders bei beatmeten/Schluckgestörten."}]},{"key":"demenz_es","name":"Beziehungsgestaltung bei Demenz","rel":"h","cheat":[{"h":"Grundprinzip","li":["Personzentrierte Pflege (Tom Kitwood)","Würde, Autonomie, Wohlbefinden trotz Demenz","Kommunikation an Person anpassen, nicht umgekehrt"]},{"h":"Prozessqualität","li":["Personzentriertes Assessment (Biographie, Vorlieben, Bedürfnisse)","Individuelle Beziehungsgestaltung","Validation, Erinnerungspflege","Angehörige einbeziehen, schulen","Reflexion im Team (Fallbesprechungen)"]},{"h":"Beziehungsfördernde Methoden","li":["Validation (Naomi Feil)","Biografiearbeit","Mäeutik","Snoezelen, basale Stimulation","Erinnerungspflege, Musiktherapie"]},{"h":"Was vermeiden","li":["Korrigieren der Realität des Patienten","Komplexe Sätze, Ironie","Unangekündigte Berührung","Reizüberflutung, Hektik","Routine-Fixierung"]}],"cards":[{"q":"Was ist personzentrierte Pflege nach Kitwood?","a":"Mensch mit Demenz in seiner Einzigartigkeit erkennen und unterstützen – psychische Bedürfnisse: Trost, Bindung, Beschäftigung, Identität, Inklusion."},{"q":"Was ist personzentrierte Pflege nach Tom Kitwood?","a":"Ansatz, der Mensch mit Demenz als ganze Person mit Geschichte, Vorlieben, Bedürfnissen sieht. 5 psychische Bedürfnisse: Trost, Bindung, Beschäftigung, Identität, Inklusion."},{"q":"Was ist Validation nach Naomi Feil?","a":"Methode, die Gefühle und Erleben dementer Menschen anerkennt – nicht korrigieren, sondern verstehen und mitgehen. Reduziert Konflikte und Stress."},{"q":"Welche Methoden bei Beziehungsgestaltung mit Demenzkranken?","a":"Validation, Biografiearbeit, Mäeutik, basale Stimulation, Erinnerungspflege, Musiktherapie, 10-Minuten-Aktivierung."},{"q":"Wieso Biografiearbeit bei Demenz?","a":"Vergangenheit ist oft besser erinnert als Gegenwart. Biografie hilft, Verhalten zu verstehen, Vertrauen aufzubauen, Identität zu wahren."}],"quiz":[{"q":"Welche Haltung entspricht der personzentrierten Pflege?","opts":["Patient an Pflegeroutine anpassen","Pflege an Person und Biographie anpassen","Möglichst viele Medikamente","Strenge Reorientierung"],"correct":1,"exp":"Personzentriert = Pflege passt sich Mensch und Lebensgeschichte an, nicht umgekehrt."},{"q":"Demente Frau sucht ihren \"Mann\" (verstorben vor 20 Jahren). Beste Reaktion?","opts":["Sagen: \"Ihr Mann ist tot\"","Validation: Gefühl spiegeln (\"Sie vermissen ihn\"), Erinnerungen ermöglichen, ablenken","Streng korrigieren","Ignorieren"],"correct":1,"exp":"Validation – Gefühle anerkennen statt Realität korrigieren. Verhindert Trauer und Wutreaktionen."},{"q":"Welche 5 psychischen Bedürfnisse bei Demenz nach Kitwood?","opts":["Geld, Macht, Erfolg, Eigentum, Status","Trost, Bindung, Beschäftigung, Identität, Inklusion","Allein sein","Diät, Sport, Disziplin, Pflicht, Kontrolle"],"correct":1,"exp":"Kitwood: Trost, Bindung, Beschäftigung, Identität, Inklusion – im Zentrum: Liebe und Akzeptanz."}]}]},{"key":"praxis","name":"Pflegepraxis & Recht","icon":"⚖️","desc":"Prophylaxen, 6-R, Patientenverfügung, PflBG, Schweigepflicht, Ethik","topics":[{"key":"prophylaxen","name":"Prophylaxen-Übersicht (LISA-PD)","rel":"vh","cheat":[{"h":"Wichtige Prophylaxen","li":["Dekubitus-, Pneumonie-, Thrombose-, Sturz-, Kontrakturen-Prophylaxe","Soor-/Parotitis- (Mundpflege), Obstipations-, Aspirationsprophylaxe","Intertrigo, Exsikkose, Infektion"]},{"h":"Pneumonieprophylaxe","li":["Atemstimulation: Triflo, Pari-Boy, Kontaktatmung","Mobilisation, Oberkörperhochlagerung","Mundpflege regelmäßig (orale Keime senken Pneumonie!)","Sekretolyse: ausreichend trinken, Inhalation","Aspirationsschutz, Impfungen"]},{"h":"Thromboseprophylaxe","li":["Frühmobilisation, Bewegungsübungen","ATS / MTPS (Anti-Thrombose-Strümpfe)","Ausreichend trinken (>1,5 L)","Medikamentös: NMH s.c. nach AVO bei Risiko"]},{"h":"Kontrakturprophylaxe","li":["Regelmäßige Bewegungsübungen aktiv und passiv","Gelenke in physiologischer Stellung lagern","Mobilisation, Hilfsmittel"]},{"h":"Aspirationsprophylaxe","li":["Aufrechte Sitzposition beim Essen (90°)","Schluckscreening bei Risiko (Apoplex, Demenz)","Kost/Flüssigkeit angepasst (IDDSI)","Mundpflege, langsam essen lassen, Konzentration"]},{"h":"Obstipationsprophylaxe","li":["Ausreichend Trinken (>1,5 L)","Ballaststoffreiche Kost","Bewegung, Bauchmassage","Toilettengang ermöglichen, intim, Zeit","Bei Opioiden: Laxans IMMER mit"]}],"cards":[{"q":"Welche 3 Säulen der Pneumonieprophylaxe?","a":"Atemstimulation + Mobilisation/Lagerung + Mundpflege/Sekretolyse + Aspirationsschutz."},{"q":"Warum Mundpflege gegen Pneumonie?","a":"Orale Bakterien werden bei Aspiration in Lunge transportiert. Gute Mundpflege senkt Bakterienlast und nachweislich nosokomiale Pneumonien."},{"q":"Welche Prophylaxen kommen besonders häufig in der Klausur vor?","a":"Dekubitus, Pneumonie, Thrombose, Sturz – die \"Big Four\". Plus Aspirations-, Obstipations-, Kontrakturen-, Soor-Parotitis-, Intertrigo-, Exsikkose-Prophylaxe."},{"q":"Welche 3 Säulen der Pneumonieprophylaxe?","a":"1) Atemstimulation/Sekretmobilisation, 2) Mobilisation/Lagerung (OK-hoch), 3) Mundpflege/Aspirationsschutz. Plus Impfung."},{"q":"Was ist die VIRCHOW-Trias bei Thromboseentstehung?","a":"Endothelschaden, verlangsamter Blutfluss (Stase), Hyperkoagulabilität – alle 3 Faktoren begünstigen Thrombose."},{"q":"Welche Aspirationsprophylaxe-Maßnahmen?","a":"Aufrechte Sitzposition (90°), angepasste Kost (IDDSI), Schluckscreening (GUSS), kleine Bissen, Mundpflege, 30 min nach Mahlzeit aufrecht bleiben."},{"q":"Welche 4 Maßnahmen Soor-/Parotitisprophylaxe?","a":"Regelmäßige Mundpflege (mehrfach täglich), Speichelfluss anregen (Kauen, Säuern), Mundinspektion, Flüssigkeitshaushalt."},{"q":"Welche Maßnahmen bei Intertrigoprophylaxe?","a":"Hautfalten trocken halten, weiche Tücher zwischen Falten, atmungsaktive Kleidung, Hautpflege, Inkontinenz versorgen."},{"q":"Welche Maßnahmen Kontrakturprophylaxe?","a":"Bewegungsübungen aktiv UND passiv mehrfach täglich, physiologische Lagerung, Mobilisation, Hilfsmittel zur Vermeidung von Spitzfuß (z.B. Schaumstoffrolle)."},{"q":"Wie ist der Unterschied zwischen aktiver und passiver Bewegungsübung?","a":"Aktiv: Patient bewegt selbst (Pflege ggf. begleitet/anleitet). Passiv: Pflege bewegt Gelenke des Patienten ohne dessen Aktivität – z.B. bei Bewusstlosen."}],"quiz":[{"q":"Bei welcher Patientengruppe ist Aspirationsprophylaxe besonders wichtig?","opts":["Junge gesunde","Z.n. Apoplex, Demenz, Bewusstseinsstörung","Sportler","Schwangere"],"correct":1,"exp":"Schluckstörungen sind häufig bei neurologischen und kognitiv beeinträchtigten Patienten."},{"q":"Patient bettlägerig nach OP. Welche 4 Prophylaxen sind STANDARD?","opts":["Nur Dekubitus","Dekubitus, Pneumonie, Thrombose, Kontraktur (mind.)","Nur Lagerung","Keine"],"correct":1,"exp":"Bei Immobilität immer Bündel: Dekubitus + Pneumonie + Thrombose + Kontraktur, plus Mobilisation, Mundpflege, Sturz."},{"q":"Welche Maßnahme zur Pneumonieprophylaxe wird oft VERGESSEN?","opts":["Atemstimulation","Mundpflege – orale Bakterien sind Hauptquelle nosokomialer Pneumonien","Lagerung","Mobilisation"],"correct":1,"exp":"Mundhygiene wird oft unterschätzt – nachweislich pneumoniesenkend bei intubierten und schluckgestörten Patienten."},{"q":"Welche Aspirationsmaßnahme ist FALSCH?","opts":["Aufrechte Sitzposition","Angepasste Kost","Beim Essen liegend","30 min nach Essen aufrecht"],"correct":2,"exp":"Liegen während des Essens fördert Aspiration – immer 90° aufrecht oder so aufrecht wie möglich."},{"q":"Welche Maßnahme gehört NICHT zur Thromboseprophylaxe?","opts":["Frühmobilisation","ATS / MTPS","Massage der Wade","Ausreichend trinken"],"correct":2,"exp":"Massage der Wade ist KONTRAINDIZIERT bei Thromboseverdacht – Embolie-Risiko! Stattdessen Bewegungsübungen, Strümpfe."},{"q":"Wie wirken Anti-Thrombose-Strümpfe (ATS)?","opts":["Wärmen","Erhöhen den Venendruck distal, fördern venösen Rückfluss","Drücken auf Arterien","Sind Placebo"],"correct":1,"exp":"Druckgradient von distal nach proximal beschleunigt venösen Rückfluss, verhindert Stase – ein Pfeiler der Thromboseprophylaxe."}]},{"key":"sechsr","name":"6-R-Regel der Medikamentengabe","rel":"vh","cheat":[{"h":"Die 6 R","li":["Richtiger Patient (Identitätskontrolle)","Richtiges Medikament","Richtige Dosierung","Richtige Applikation (oral, s.c., i.v., i.m.)","Richtiger Zeitpunkt","Richtige Dokumentation"]},{"h":"Erweiterte 7. R","li":["Richtiges Wirkungsmonitoring (Kontrolle der erwarteten Wirkung und Nebenwirkungen)"]},{"h":"Vor jeder Gabe prüfen","li":["Verfallsdatum, Aussehen, Beschriftung","Allergien des Patienten","Wechselwirkungen, Kontraindikationen"]},{"h":"Häufige Fehler","li":["Verwechslung ähnlicher Namen (LASA-Liste!)","Falsche Dosis (Dezimalstellen!)","Vergessene Gabe / Doppelgabe","Tabletten teilen, die nicht teilbar sind (Retard!)"]}],"cards":[{"q":"Welche 6 R bei Medikamentengabe?","a":"Richtiger Patient, Medikament, Dosis, Applikation, Zeitpunkt, Dokumentation."},{"q":"Was bedeutet LASA?","a":"Look Alike – Sound Alike: Medikamente, die ähnlich aussehen oder klingen (z.B. Hydromorphon vs. Hydrocodon) – erhöhtes Verwechslungsrisiko."},{"q":"Warum dürfen Retardtabletten nicht geteilt werden?","a":"Wirkstofffreisetzung wird zerstört → Überdosierung möglich. Außer Hersteller erlaubt es ausdrücklich (Bruchrille gibt nur Hinweis, nicht Erlaubnis)."},{"q":"Welche Konsequenz bei Verstoß gegen 6-R?","a":"Patientengefährdung, Medikationsfehler, ggf. juristische Folgen für Pflegekraft (Fahrlässigkeit). Strenge Dokumentation und Doppelkontrolle bei Hochrisiko-Medis."},{"q":"Was ist die 7. R?","a":"Richtige Wirkung/Reaktion: Wirkungs- und NW-Beobachtung nach Gabe – ist das Mittel wirksam? Treten unerwünschte Wirkungen auf?"},{"q":"Welche Hochrisiko-Medikamente brauchen Doppelkontrolle?","a":"Insulin, Heparin, Opioide (BTM), Zytostatika, Marcumar – Verwechslung kann lebensbedrohlich sein. Hauspolitik beachten."},{"q":"Welche Identitätskontrolle vor Gabe?","a":"Patient nach Namen UND Geburtsdatum fragen ODER Armband prüfen – nicht nur Bett-Nummer. Verwechslungen vermeiden!"},{"q":"Warum keine Tabletten in Apfelmus zerdrücken (oft)?","a":"Retardpräparate, magensaftresistente, sublinguale Tabletten verlieren ihre Wirkung oder werden überdosiert. Nur teilen/mörsern wenn Beipackzettel erlaubt."},{"q":"Was bedeutet richtige Applikation?","a":"Verordnete Verabreichungsform: oral, sublingual, s.c., i.m., i.v., transdermal, rektal. Falsche Applikation kann unwirksam ODER gefährlich sein."}],"quiz":[{"q":"Welcher Schritt fehlt: Richtiger Patient – Medikament – Dosis – Applikation – ??? – Dokumentation?","opts":["Richtiges Wetter","Richtiger Zeitpunkt","Richtige Farbe","Richtige Marke"],"correct":1,"exp":"Richtiger Zeitpunkt ist die 5. R der Medikamentengabe."},{"q":"Patientin bekommt Marcumar. Welche Pflegemaßnahme ist ZENTRAL?","opts":["Keine Kontrolle nötig","INR-Kontrolle, Blutungszeichen beobachten, Patientenedukation, Wechselwirkungen","Nur PTT messen","Sport empfehlen"],"correct":1,"exp":"Marcumar = enges therapeutisches Fenster. Regelmäßiges INR (Ziel 2-3 meist), Blutungsbeobachtung, Diät-/Wechselwirkungsberatung."},{"q":"Welche \"R\" wird oft vergessen?","opts":["Patient","Medikament","Richtige Dokumentation – nach Gabe sofort eintragen, nicht später","Dosis"],"correct":2,"exp":"Dokumentation ist juristisch + organisatorisch zentral – Doppelgaben/Vergessen wird verhindert."},{"q":"Welche Aussage zu Tabletten-Teilung ist KORREKT?","opts":["Alle Tabletten teilbar","Nur teilen wenn Bruchrille UND Hersteller erlaubt – Retard nicht!","Nie teilen","Immer mörsern"],"correct":1,"exp":"Bruchrille ist nicht automatisch Erlaubnis. Retard, magensaftresistente, beschichtete Tabletten dürfen NICHT geteilt werden."},{"q":"Was tun bei Medikationsfehler?","opts":["Verschweigen","Patientensicherheit prüfen, Arzt informieren, Fehler offen dokumentieren, CIRS-Meldung","Schuldzuweisung","Notfall ignorieren"],"correct":1,"exp":"Offene Fehlerkultur – Patientenschutz first, dann transparente Dokumentation und Lernen aus dem Fehler (CIRS)."}]},{"key":"patv","name":"Patientenverfügung & Betreuung","rel":"vh","cheat":[{"h":"Patientenverfügung (§ 1827 BGB)","li":["Schriftliche Festlegung im Voraus, welche Maßnahmen bei Einwilligungsunfähigkeit gewünscht/abgelehnt werden","Tritt in Kraft bei Einwilligungsunfähigkeit – nicht vorher","Konkret formulierte Verfügungen sind bindend","Pflicht zur Beachtung durch Ärzte/Pflegekräfte"]},{"h":"Wichtig: Wann gilt sie?","li":["Patient ist NICHT mehr einwilligungsfähig (z.B. komatös, fortgeschrittene Demenz)","Solange Patient einwilligungsfähig ist → er entscheidet aktuell, NICHT die Verfügung","Aktueller Wille schlägt schriftliche Verfügung"]},{"h":"Vorsorgevollmacht","li":["Bevollmächtigt eine Vertrauensperson, im Falle der Einwilligungsunfähigkeit zu entscheiden","Vermeidet gesetzliche Betreuung","Gilt auch für Vermögensangelegenheiten (je nach Umfang)"]},{"h":"Gesetzliche Betreuung","li":["Bei fehlender Vorsorgevollmacht und Einwilligungsunfähigkeit","Gericht bestellt Betreuer für definierte Aufgabenkreise","Wille des Betreuten ist soweit möglich zu beachten"]},{"h":"Pflegerelevanz","li":["Existenz der Verfügung erfragen, in Akte ablegen","Bei Therapieentscheidungen aktuell informieren","Familienangehörige sind NICHT automatisch entscheidungsbefugt – nur Bevollmächtigte oder Betreuer","Ethische Konflikte im Team besprechen"]}],"cards":[{"q":"Wann tritt eine Patientenverfügung in Kraft?","a":"Erst wenn der Patient nicht mehr einwilligungsfähig ist. Solange er entscheiden kann, gilt sein aktueller Wille – die Verfügung ruht."},{"q":"Können Angehörige für einen einwilligungsunfähigen Patienten entscheiden?","a":"NEIN, nicht automatisch. Nur Bevollmächtigte (Vorsorgevollmacht) oder gerichtlich bestellte Betreuer haben Entscheidungsbefugnis. Familienangehörige müssen ggf. erst Betreuung beantragen."},{"q":"Was ist der Unterschied Vorsorgevollmacht und Patientenverfügung?","a":"Patientenverfügung legt FEST, was im Voraus an Behandlung gewünscht ist. Vorsorgevollmacht bestimmt die PERSON, die entscheidet, wenn Patient nicht mehr kann."},{"q":"Welcher Paragraf regelt die Patientenverfügung in Deutschland?","a":"§1827 BGB (früher §1901a) – schriftliche Festlegung im Voraus, welche Maßnahmen gewünscht/abgelehnt werden bei Einwilligungsunfähigkeit."},{"q":"Wer prüft die Patientenverfügung in der konkreten Situation?","a":"Behandelnder Arzt + Bevollmächtigter/Betreuer prüfen, ob Verfügung auf aktuelle Situation zutrifft. Bei Streit: Betreuungsgericht."},{"q":"Wie unterscheiden sich Vorsorgevollmacht und Betreuungsverfügung?","a":"Vorsorgevollmacht: ich BESTIMME wer entscheidet (vermeidet Gericht). Betreuungsverfügung: WUNSCH wer Betreuer werden soll, falls Gericht Betreuung anordnet."},{"q":"Wann wird Patientenverfügung NICHT angewendet?","a":"Solange Patient selbst entscheiden kann (einwilligungsfähig). Wenn Verfügung NICHT auf aktuelle Situation passt. Bei Suizidversuchen ist die Lage komplex – ärztliche Einzelfallentscheidung."},{"q":"Müssen Pflegekräfte die Patientenverfügung kennen?","a":"Ja – sie ist Teil der Pflegeplanung. Bei Notfall vor Maßnahmen prüfen. Bei Konflikten zwischen Verfügung und Familie: ärztliche Klärung."},{"q":"Welche Voraussetzungen für gültige Patientenverfügung?","a":"Volljährig + einwilligungsfähig zum Zeitpunkt der Erstellung + schriftlich + eigenhändig unterschrieben. Notar nicht zwingend, aber sinnvoll."}],"quiz":[{"q":"Frau Schulz (78, klar) lehnt eine OP ab. Ihre Tochter sagt, sie solle operiert werden – sie ist gesetzlich betreut. Wer entscheidet?","opts":["Tochter (Betreuerin)","Frau Schulz selbst – sie ist einwilligungsfähig","Pflegekraft","Arzt"],"correct":1,"exp":"Solange ein Patient einwilligungsfähig ist, entscheidet ER selbst – auch bei Betreuung. Betreuer/Bevollmächtigter handelt nur bei Einwilligungsunfähigkeit."},{"q":"In einer Patientenverfügung ist „keine künstliche Beatmung\" festgelegt. Patient ist im Endstadium, einwilligungsunfähig. Was gilt?","opts":["Arzt entscheidet eigenmächtig","Verfügung ist bindend – keine Beatmung","Familie entscheidet über Beatmung","Pflegekraft entscheidet"],"correct":1,"exp":"Konkret formulierte Verfügung in passender Situation ist verbindlich – Verstoß wäre Körperverletzung."},{"q":"Bewusstloser Patient mit Patientenverfügung \"keine künstliche Beatmung\". Erleidet Lungenversagen. Was gilt?","opts":["Beatmen, weil Lebensgefahr","Verfügung respektieren – konkret formuliert, passt zur Situation","Familie entscheidet allein","Pflegekraft entscheidet"],"correct":1,"exp":"Konkrete Verfügung in passender Situation ist bindend – Beatmung wäre Körperverletzung. Auch wenn schwer für Team."},{"q":"Sohn behauptet \"Mutter wollte das so\" – sie ist einwilligungsunfähig, KEINE Vorsorgevollmacht. Wer entscheidet?","opts":["Sohn automatisch","Gerichtlich bestellter Betreuer (ggf. ist Sohn dieser, aber nicht automatisch!)","Pflegekraft","Niemand"],"correct":1,"exp":"Familie entscheidet NICHT automatisch in Deutschland. Ohne Vollmacht muss ein Betreuer gerichtlich bestellt werden."},{"q":"Welche Aussage zum Patientenwillen ist KORREKT?","opts":["Aktueller Wille nachrangig","Bei Einwilligungsfähigkeit: aktueller Wille hat Vorrang vor jeder schriftlichen Verfügung","Verfügung gilt immer","Familie hat Vorrang"],"correct":1,"exp":"Solange Patient entscheiden kann, gilt sein AKTUELLER Wille – Verfügung kommt erst zum Tragen bei Einwilligungsunfähigkeit."},{"q":"Welcher Paragraf des BGB regelt Patientenverfügung?","opts":["§203","§1827","§4","§39"],"correct":1,"exp":"§1827 BGB. (§203 StGB = Schweigepflicht, §4 PflBG = vorbehaltene Tätigkeiten, §39 SGB V = Krankenhausbehandlung.)"}]},{"key":"pflbg","name":"PflBG & vorbehaltene Tätigkeiten (§ 4)","rel":"vh","cheat":[{"h":"Pflegeberufegesetz (PflBG)","li":["Gesetz seit 2020 – generalistische Pflegeausbildung","Beruf: Pflegefachfrau / Pflegefachmann","Drei Vertiefungsmöglichkeiten: Allgemeine Pflege, Kinderkrankenpflege, Altenpflege"]},{"h":"Vorbehaltene Tätigkeiten (§ 4 PflBG)","li":["1. Erhebung und Feststellung des individuellen Pflegebedarfs","2. Organisation, Gestaltung und Steuerung des Pflegeprozesses","3. Analyse, Evaluation, Sicherung und Entwicklung der Qualität der Pflege","Diese drei Tätigkeiten dürfen NUR Pflegefachpersonen ausführen"]},{"h":"Bedeutung","li":["Stärkung des Pflegeberufs","Verantwortung der Pflegefachperson für den Pflegeprozess","Pflegehelfer dürfen Tätigkeiten ausführen, aber NICHT planen/steuern/evaluieren"]},{"h":"Weitere Inhalte des PflBG","li":["Ausbildung 3 Jahre, generalistisch + Vertiefung","Praktische Anleitung, staatliche Prüfung","Berufsbezeichnung geschützt"]}],"cards":[{"q":"Welche 3 Tätigkeiten sind nach § 4 PflBG vorbehalten?","a":"1) Pflegebedarf erheben/feststellen, 2) Pflegeprozess steuern, 3) Pflegequalität analysieren/evaluieren – nur durch Pflegefachperson."},{"q":"Was bedeutet \"vorbehalten\"?","a":"Diese Tätigkeiten dürfen ausschließlich Pflegefachpersonen (mit dreijähriger Ausbildung) durchführen – nicht delegierbar an Pflegehilfskräfte."},{"q":"Wann trat das Pflegeberufegesetz (PflBG) in Kraft?","a":"1. Januar 2020 – Beginn der generalistischen Pflegeausbildung. Ersetzt die getrennten Ausbildungen Krankenpflege, Altenpflege, Kinderkrankenpflege."},{"q":"Welche Ausbildungsdauer und welche Vertiefungsmöglichkeiten gibt es?","a":"3 Jahre. Letztes Drittel kann vertieft werden in: Allgemeine Pflege, Altenpflege oder Kinderkrankenpflege – mit entsprechender Berufsbezeichnung."},{"q":"Was sind die 5 Kompetenzbereiche der Ausbildung (PflAPrV)?","a":"I) Pflegeprozesse, II) Kommunikation/Beratung, III) Interprofessionelles Handeln, IV) Recht/Ethik/Reflexion, V) Wissenschaft/Forschung."},{"q":"Welche Konsequenzen hat \"vorbehalten\"?","a":"Nur Pflegefachperson darf eigenverantwortlich Pflegebedarf erheben, Pflegeprozess steuern, Qualität evaluieren – nicht delegierbar an Hilfskräfte. Stärkung der Profession."}],"quiz":[{"q":"Welche Tätigkeit darf eine Pflegehilfskraft NICHT eigenverantwortlich ausführen?","opts":["Mahlzeiten anreichen","Lagerung","Pflegeplan erstellen und steuern","Mobilisation"],"correct":2,"exp":"Pflegeprozesssteuerung ist vorbehaltene Tätigkeit (§ 4 PflBG) – nur durch Pflegefachperson."},{"q":"Welche Tätigkeit darf eine Pflegehilfskraft eigenverantwortlich durchführen?","opts":["Pflegeplan erstellen","Pflegeprozess steuern","Lagerung nach delegiertem Plan, Anreichen, Mundpflege durchführen","Pflegeanamnese eigenverantwortlich"],"correct":2,"exp":"Durchführung delegierbarer Tätigkeiten ja – Steuerung des Pflegeprozesses ist vorbehaltene Tätigkeit (§4 PflBG)."},{"q":"Welche Berufsbezeichnung führt der Generalist?","opts":["Krankenschwester","Pflegefachfrau / Pflegefachmann","Pflegehilfe","Krankenpfleger"],"correct":1,"exp":"Seit 2020 generalistische Bezeichnung. Auch Vorgängerabschlüsse bleiben anerkannt."}]},{"key":"schweigen","name":"Schweigepflicht (§ 203 StGB)","rel":"vh","cheat":[{"h":"Schweigepflicht – Grundsatz","li":["§ 203 StGB: Verletzung von Privatgeheimnissen","Strafe bis 1 Jahr Freiheitsstrafe oder Geldstrafe","Gilt für alle Pflegeberufe – auch nach Beendigung des Beschäftigungsverhältnisses"]},{"h":"Was ist geheim?","li":["Alle Patientendaten: Diagnose, Therapie, persönliche Verhältnisse","Auch die Tatsache der Behandlung selbst","Weitergabe an Dritte nur mit Einwilligung des Patienten"]},{"h":"Ausnahmen / Befugnisse","li":["Patienteneinwilligung (auch konkludent für Behandlungsteam)","Gesetzliche Auskunftspflichten (Infektionsschutzgesetz, Meldepflichten)","Notwehr/Notstand (z.B. drohende Selbst-/Fremdgefährdung)","Strafverfolgungsorgane nur mit richterlicher Anordnung"]},{"h":"Pflegerelevanz","li":["Auskunft an Familie nur mit Patienteneinwilligung","Telefonisch keine Auskunft ohne Identitätsprüfung","Aufzug, Cafeteria – kein Patientenfall besprechen","Soziale Medien: nichts über Patienten posten","Datenschutz auch in Übergaben (geschlossene Räume)"]}],"cards":[{"q":"Welcher Paragraf regelt die Schweigepflicht?","a":"§ 203 StGB – Verletzung von Privatgeheimnissen. Gilt für medizinische und Pflegeberufe."},{"q":"Darf der Ehemann Auskunft über die Diagnose seiner Frau erhalten?","a":"Nur mit ausdrücklicher Einwilligung der Patientin – Ehe begründet KEIN automatisches Auskunftsrecht."},{"q":"Wann darf Schweigepflicht durchbrochen werden?","a":"Bei Patienteneinwilligung, gesetzlicher Pflicht (Meldepflicht IfSG), Notstand (drohende Gefahr), richterlicher Anordnung."},{"q":"Welche Strafe droht bei Schweigepflichtsverletzung?","a":"Bis 1 Jahr Freiheitsstrafe oder Geldstrafe (§203 StGB). Plus arbeitsrechtliche Konsequenzen, ggf. zivilrechtliche Schadensersatzpflicht."},{"q":"Gilt Schweigepflicht auch nach Beendigung des Arbeitsverhältnisses?","a":"Ja – die Schweigepflicht besteht zeitlich unbegrenzt fort. Auch in privaten Gesprächen oder sozialen Medien dürfen keine Patientendaten weitergegeben werden."},{"q":"Welche Auskunftspflichten heben Schweigepflicht auf?","a":"Meldepflichtige Erkrankungen (IfSG §6 + §7), Geschlechtskrankheiten, Geburten/Tod, Verkehrsunfälle bei Polizei, Notstand (Selbst-/Fremdgefährdung)."},{"q":"Darf ich Patienten in der Übergabe öffentlich besprechen?","a":"Nein – Übergabe in geschlossenem Raum oder leise. Aufzug, Cafeteria, Flur sind Tabu. Datenschutz auch im Klinikalltag."},{"q":"Was tun, wenn Polizei nach Patient fragt?","a":"Identität prüfen, NICHT spontan auskunft geben, Vorgesetzten/ärztl. Leitung informieren. Auskunft nur mit richterlicher Anordnung oder Patienteneinwilligung."}],"quiz":[{"q":"Eine Bekannte ruft an und fragt nach dem Zustand ihrer Freundin. Was tun?","opts":["Auskunft geben","Keine Auskunft – Schweigepflicht. Ggf. an Patientin verweisen","Diagnose nennen","Bei nettem Ton schon"],"correct":1,"exp":"Schweigepflicht gilt absolut – ohne Einwilligung der Patientin keine Auskunft, auch nicht über Anwesenheit."},{"q":"Eine Studienkollegin sieht Sie und fragt, wie es ihrem Onkel geht (auf Ihrer Station). Was tun?","opts":["Auskunft geben, sie ist Verwandte","Schweigepflicht – keine Auskunft ohne Einwilligung des Onkels. Höflich verweisen","Nur Diagnose nennen","Tipps geben"],"correct":1,"exp":"Verwandtschaft begründet KEIN Auskunftsrecht. Nur Patient selbst oder Bevollmächtigter darf Auskunft erteilen lassen."},{"q":"Welche Aussage zur Schweigepflicht in Sozialen Medien?","opts":["Erlaubt mit verschlüsselten Daten","Auch anonymisierte Patientenfälle vermeiden – Re-Identifikation oft möglich, juristisch riskant","Posten erlaubt","Egal"],"correct":1,"exp":"Auch \"anonymisierte\" Posts können re-identifizierbar sein – schwere Schweigepflichtsverletzung möglich. NIE über Patienten posten."},{"q":"Welcher Paragraf regelt Schweigepflicht?","opts":["§4 PflBG","§1827 BGB","§203 StGB","§39 SGB V"],"correct":2,"exp":"§203 StGB – Verletzung von Privatgeheimnissen, gilt für Heilberufe. Strafe bis 1 Jahr."}]},{"key":"kommunikation","name":"Kommunikation – Watzlawick & Schulz von Thun","rel":"vh","cheat":[{"h":"Watzlawick – 5 Axiome","li":["1. Man kann nicht nicht kommunizieren (auch Schweigen kommuniziert)","2. Inhalts- und Beziehungsaspekt (was + wie)","3. Interpunktion: Anfang/Ende einer Kommunikation subjektiv","4. Digital (Worte) und analog (Mimik, Gestik)","5. Symmetrisch (gleichberechtigt) oder komplementär (Über-Unterordnung)"]},{"h":"Schulz von Thun – 4 Seiten einer Nachricht","li":["Sachebene: Worüber informiere ich?","Selbstoffenbarung: Was sage ich über mich aus?","Beziehung: Wie stehe ich zu dir?","Appell: Was möchte ich erreichen?","Beispiel \"Die Ampel ist grün\": Sache (Farbe), Selbst (ich sehe sie), Beziehung (du brauchst Hilfe?), Appell (fahr los!)"]},{"h":"Aktives Zuhören (Rogers)","li":["Wertschätzung, Empathie, Echtheit","Nicht bewertend zuhören, paraphrasieren","Gefühle spiegeln, nachfragen, ausreden lassen"]},{"h":"Motivierende Gesprächsführung (Miller & Rollnick)","li":["Empathie, Diskrepanz aufzeigen, Widerstand umlenken, Selbstwirksamkeit fördern","Bei Lebensstilberatung (Rauchstopp, Abnehmen, Adhärenz)"]},{"h":"Kommunikation in der Pflege","li":["Klare, einfache Sprache, Augenhöhe","Nonverbale Signale beachten (Mimik, Berührung, Tonfall)","Aktives Zuhören statt Lösungen anbieten","Bei Demenz: Validation; bei Aphasie: Geduld, Bilder"]}],"cards":[{"q":"Welche 4 Seiten hat eine Nachricht nach Schulz von Thun?","a":"Sachebene, Selbstoffenbarung, Beziehung, Appell."},{"q":"Was bedeutet Watzlawicks erstes Axiom?","a":"„Man kann nicht nicht kommunizieren\" – auch Schweigen, Wegsehen, Distanz sind Kommunikation."},{"q":"Was ist Aktives Zuhören?","a":"Carl Rogers: empathisch, wertschätzend, echt. Paraphrasieren, Gefühle spiegeln, ausreden lassen, keine vorschnellen Lösungen."},{"q":"Erklären Sie das 4-Ohren-Modell mit Beispiel.","a":"Mann zur Frau am Steuer: \"Da vorne ist grün.\" Sache: Ampel grün. Selbstoffenbarung: Ich bin ungeduldig. Beziehung: Du fährst zu langsam. Appell: Fahr los!"},{"q":"Was ist die Interpunktion in Watzlawicks 3. Axiom?","a":"Die Frage, was Anfang und was Reaktion ist. Beispiel: Ehepaar streitet – sie zieht sich zurück, weil er nörgelt; er nörgelt, weil sie sich zurückzieht. Jeder sieht den anderen als Auslöser."},{"q":"Welche Kommunikationsformen sind digital, welche analog?","a":"Digital: Sprache (Wörter mit definierter Bedeutung). Analog: Mimik, Gestik, Tonfall, Körperhaltung – mehrdeutig, oft starke emotionale Botschaft."},{"q":"Welche 3 Kernhaltungen des aktiven Zuhörens nach Rogers?","a":"Empathie (Einfühlung), Wertschätzung (Akzeptanz), Echtheit (Kongruenz). Plus paraphrasieren, Gefühle spiegeln."},{"q":"Was sind die 4 Phasen des Motivational Interviewing?","a":"Engaging (Beziehung), Focusing (Thema), Evoking (Veränderungsmotivation aktivieren), Planning (konkreten Plan)."},{"q":"Wie kommuniziert man mit Aphasiker?","a":"Einfache, kurze Sätze, Schlüsselwörter betonen, Bilder/Symbole, Geduld, ja/nein-Fragen, schreiben/zeigen, nicht überfordern, Patient ausreden lassen."},{"q":"Was ist Validation nach Naomi Feil?","a":"Anerkennung der subjektiven Realität dementer Menschen – Gefühle spiegeln, mitgehen, nicht korrigieren. Beruhigt, vermeidet Konfrontation."}],"quiz":[{"q":"Patient sagt: „Ich kann sowieso nicht mehr.\" Welche Reaktion ist Aktives Zuhören?","opts":["Das wird schon!","Sie wirken sehr erschöpft. Was geht Ihnen durch den Kopf?","Ich kenne das auch","Reißen Sie sich zusammen"],"correct":1,"exp":"Aktives Zuhören: Gefühl spiegeln, einladen zum Erzählen, ohne zu bewerten oder Lösung aufzudrängen."},{"q":"Welche Methode passt zur Lebensstilberatung bei Diabetes?","opts":["Strenge Anweisungen","Motivierende Gesprächsführung – Selbstwirksamkeit fördern","Drohen","Ignorieren"],"correct":1,"exp":"Motivational Interviewing arbeitet mit Empathie und Eigenmotivation – evidenzbasiert effektiv bei Verhaltensänderung."},{"q":"Patient sagt \"Mir ist alles zu viel.\" Welche Reaktion ist Aktives Zuhören?","opts":["Es wird schon","Sie wirken erschöpft. Was belastet Sie gerade besonders?","Reißen Sie sich zusammen","Ich kenne das"],"correct":1,"exp":"Gefühl spiegeln + offene Frage einladen. Keine Bewertung, keine vorschnelle Lösung."},{"q":"Was bedeutet das 1. Axiom von Watzlawick?","opts":["Sprache ist alles","Man kann nicht NICHT kommunizieren – auch Schweigen kommuniziert","Ohne Worte keine Kommunikation","Nur digitale Kommunikation zählt"],"correct":1,"exp":"Verhalten kommuniziert immer – Wegsehen, Distanz, Schweigen sind ebenso Botschaften wie Worte."},{"q":"Welche Methode ist bei Lebensstilberatung evidenzbasiert?","opts":["Strenge Anweisungen","Motivierende Gesprächsführung – fördert Selbstwirksamkeit, Veränderung von innen","Drohen","Manipulation"],"correct":1,"exp":"Motivational Interviewing arbeitet mit Eigenmotivation – nachweislich wirksam bei Adhärenz und Verhaltensänderung."},{"q":"Welche Aussage zu nonverbaler Kommunikation ist KORREKT?","opts":["Macht <10% aus","Mimik, Tonfall, Körperhaltung sind oft entscheidend für Beziehungsebene","Ist unwichtig","Nur Worte zählen"],"correct":1,"exp":"Analog/nonverbal trägt erheblich zur Botschaft bei – v.a. Beziehungsebene. Bei Widerspruch verbale/nonverbale Botschaft glaubt man eher der nonverbalen."}]},{"key":"ethik","name":"Ethik – 4 Prinzipien (Beauchamp & Childress)","rel":"vh","cheat":[{"h":"Die 4 ethischen Prinzipien","li":["Autonomie: Selbstbestimmung des Patienten respektieren","Benefizienz: Gutes tun, Nutzen maximieren","Non-Malefizienz: nicht schaden – \"primum nihil nocere\"","Gerechtigkeit: faire Verteilung von Ressourcen, Gleichbehandlung"]},{"h":"Anwendung in der Pflege","li":["Autonomie: Aufklärung, Einwilligung, Patientenwille respektieren","Benefizienz: Förderung von Wohlbefinden, Genesung","Non-Malefizienz: keine unnötigen Maßnahmen, Schmerzen vermeiden","Gerechtigkeit: gleiche Pflegequalität unabhängig von Status, Religion, Herkunft"]},{"h":"Ethische Konflikte – typische Fälle","li":["Verweigerung lebensnotwendiger Behandlung (Autonomie vs. Benefizienz)","Therapiebegrenzung am Lebensende","Ressourcenmangel (Triage, Personal)","Freiheitseinschränkende Maßnahmen (Schutz vs. Autonomie)"]},{"h":"Ethische Fallbesprechung","li":["Sachverhalt klären","Werte, Interessen, Beteiligte identifizieren","Optionen + ethische Bewertung","Entscheidung + Begründung dokumentieren","Reflexion im Team"]},{"h":"Berufsethos der Pflege","li":["ICN-Ethikkodex: Förderung Gesundheit, Verhinderung Krankheit, Wiederherstellung Gesundheit, Linderung Leiden","Würde, Achtung, Selbstbestimmung als Kernwerte"]}],"cards":[{"q":"Nennen Sie die 4 ethischen Prinzipien.","a":"Autonomie, Benefizienz (Gutes tun), Non-Malefizienz (nicht schaden), Gerechtigkeit. Modell von Beauchamp & Childress."},{"q":"Was bedeutet \"primum nihil nocere\"?","a":"„Vor allem nicht schaden\" – Non-Malefizienz, eines der Grundprinzipien medizinischer und pflegerischer Ethik."},{"q":"Welcher ethische Konflikt entsteht bei Therapieverweigerung?","a":"Autonomie (Patient lehnt ab) gegen Benefizienz (Behandlung würde nutzen). Lösung: Autonomie hat bei einwilligungsfähigem Patient Vorrang."},{"q":"Was bedeutet das Prinzip der Non-Malefizienz konkret in der Pflege?","a":"\"Primum nihil nocere\" – nicht schaden. Beispiele: keine unnötigen invasiven Maßnahmen, Schmerzen minimieren, Risiken aufzeigen, Sturz/Dekubitus vermeiden."},{"q":"Welche Konflikte sind häufig Autonomie vs. Benefizienz?","a":"Patient lehnt OP/Therapie ab, raucht trotz COPD, isst trotz Diabetes Süßes, will nach Hause trotz Pflegebedarf, lehnt Hilfsmittel ab."},{"q":"Was ist eine ethische Fallbesprechung?","a":"Strukturiertes Format zur Klärung schwieriger Entscheidungen: Sachverhalt + Werte + Beteiligte + Optionen + Bewertung + Entscheidung + Dokumentation."},{"q":"Wer ist im Behandlungsteam auf der Beziehungsebene zentral?","a":"Patient + Bezugspersonen + Pflegefachkraft + Arzt + ggf. Therapeuten + Sozialdienst + Seelsorge. Pflege oft \"Anwalt des Patienten\"."},{"q":"Welche Ressourcen helfen bei moralischer Belastung?","a":"Kollegiale Beratung, Supervision, ethische Fallbesprechung, Klinik-Ethikkomitee, Schweigen brechen über belastende Fälle, Selbstfürsorge."},{"q":"Was sagt der ICN-Ethikkodex zu den Aufgaben der Pflege?","a":"4 Aufgaben: Förderung der Gesundheit, Verhinderung von Krankheit, Wiederherstellung von Gesundheit, Linderung von Leiden. Plus Würde und Selbstbestimmung."}],"quiz":[{"q":"Patientin lehnt eine lebensrettende Bluttransfusion ab. Welches Prinzip wiegt am stärksten?","opts":["Benefizienz","Autonomie – einwilligungsfähige Patienten entscheiden selbst","Gerechtigkeit","Schweigepflicht"],"correct":1,"exp":"Autonomie hat bei einwilligungsfähigem Patient Vorrang – auch wenn Entscheidung medizinisch ungünstig erscheint."},{"q":"Welches Prinzip gebietet, allen Patienten gleiche Pflegequalität zukommen zu lassen?","opts":["Autonomie","Benefizienz","Non-Malefizienz","Gerechtigkeit"],"correct":3,"exp":"Gerechtigkeit – faire Verteilung und Gleichbehandlung unabhängig von Status, Herkunft, Religion."},{"q":"Einwilligungsfähiger Patient lehnt Bluttransfusion ab (Glaubensgründe). Welches Prinzip wiegt am stärksten?","opts":["Benefizienz","Autonomie – einwilligungsfähig, informierte Entscheidung respektieren","Non-Malefizienz","Gerechtigkeit"],"correct":1,"exp":"Autonomie hat bei Einwilligungsfähigkeit Vorrang – auch wenn Entscheidung medizinisch ungünstig. Aufklärung, Dokumentation."},{"q":"Welches Prinzip bei Triage in Mangelsituation?","opts":["Autonomie","Gerechtigkeit – faire Verteilung knapper Ressourcen nach medizinischen Kriterien","Non-Malefizienz","Benefizienz"],"correct":1,"exp":"Gerechtigkeit ist hier zentral – Ressourcen werden nach medizinischer Notwendigkeit/Erfolgsaussicht verteilt, nicht nach Status."},{"q":"Welche Aussage zur Ethik in der Pflege ist KORREKT?","opts":["Nur Ärzte entscheiden","Pflege hat eigene ethische Verantwortung – ICN-Kodex, Berufspflichten, Anwaltsfunktion für Patient","Ethik ist optional","Egal"],"correct":1,"exp":"Pflege hat eigene ethische Verantwortung – ICN-Kodex ist berufsethische Grundlage. Pflege ist nicht nur Ausführung."},{"q":"Wann ist eine ethische Fallbesprechung sinnvoll?","opts":["Nie","Bei moralischen Konflikten, am Lebensende, bei Therapiebegrenzung, freiheitsentziehenden Maßnahmen","Nur bei OP","Nur in Psychiatrie"],"correct":1,"exp":"Strukturierte Fallbesprechung hilft bei moralischen Konflikten – breit anwendbar, nicht auf Spezialgebiete beschränkt."}]},{"key":"praevention","name":"Prävention & Gesundheitsförderung (Salutogenese)","rel":"h","cheat":[{"h":"Drei Präventionsebenen","li":["Primär: Krankheitsverhinderung bei Gesunden (Impfung, Aufklärung, Bewegung)","Sekundär: Früherkennung (Screening, Vorsorgeuntersuchung)","Tertiär: Folgeschäden vermindern (Reha, Rückfallprävention)"]},{"h":"Salutogenese (Antonovsky)","li":["Frage: Was hält Menschen gesund? (statt: was macht sie krank)","Sense of Coherence: Verstehbarkeit, Handhabbarkeit, Sinnhaftigkeit","Ressourcen aktivieren statt Defizite betonen"]},{"h":"Settings der Gesundheitsförderung","li":["Schule, Betrieb, Stadtteil, Krankenhaus, Pflegeheim","Ottawa-Charta (1986): Gesundheitsförderung in allen Lebensbereichen"]},{"h":"Pflegerelevanz","li":["Patientenedukation (Diabetes, Asthma, COPD)","Schulung Selbstpflege","Familien-/Bezugspflege einbeziehen","Empowerment, Selbstwirksamkeit"]}],"cards":[{"q":"Was ist Salutogenese?","a":"Konzept von Aaron Antonovsky – Frage: Was hält gesund? Kohärenzgefühl (Verstehbarkeit, Handhabbarkeit, Sinnhaftigkeit) als Schutzfaktor."},{"q":"Unterschied primäre, sekundäre, tertiäre Prävention?","a":"Primär: vor Krankheit (Impfung, Bewegung). Sekundär: Früherkennung (Screening). Tertiär: Folgen vermindern (Reha)."},{"q":"Wer hat die Salutogenese entwickelt?","a":"Aaron Antonovsky – fragt: Was hält Menschen gesund? Konzept Sense of Coherence (Verstehbarkeit, Handhabbarkeit, Sinnhaftigkeit)."},{"q":"Was ist die Ottawa-Charta (1986)?","a":"WHO-Dokument zur Gesundheitsförderung. 5 Handlungsfelder: gesundheitsförderliche Politik, Lebenswelten, Gemeinschaftsaktion, persönliche Kompetenz, Neuorientierung Gesundheitsdienste."},{"q":"Welche Beispiele für primäre, sekundäre, tertiäre Prävention?","a":"Primär: Impfung, Aufklärung, Bewegung. Sekundär: Mammografie, Koloskopie, Blutdruck-Screening. Tertiär: Reha nach Apoplex, Schulung bei Diabetes."},{"q":"Was ist Verhaltens- vs. Verhältnisprävention?","a":"Verhalten: am Individuum (Sport, Diät, Rauchstopp). Verhältnis: an Strukturen (Rauchverbot, Radwege, sichere Arbeitsplätze) – nachhaltiger weil systemisch."},{"q":"Was ist Empowerment in der Gesundheitsförderung?","a":"Befähigung des Einzelnen/von Gruppen, eigenes Leben und Gesundheit aktiv zu gestalten – Selbstwirksamkeit, Wissen, Ressourcen, Mitbestimmung."}],"quiz":[{"q":"Welcher Präventionstyp ist eine Mammografie-Vorsorgeuntersuchung?","opts":["Primär","Sekundär – Früherkennung","Tertiär","Keine Prävention"],"correct":1,"exp":"Sekundärprävention = Früherkennung von Erkrankungen vor klinischer Symptomatik."},{"q":"Diabetes-Schulung nach Diagnose – welche Präventionsstufe?","opts":["Primär","Sekundär","Tertiär – Folgen vermindern bei bestehender Erkrankung","Quartär"],"correct":2,"exp":"Tertiärprävention zielt auf Folge-/Komplikationsverhinderung bei manifest erkrankten – Diabetesschulung verhindert Spätfolgen."},{"q":"Welche Aussage zur Salutogenese ist KORREKT?","opts":["Frage nach Krankheitsursachen","Frage: Was hält gesund? Schutzfaktoren, Kohärenzgefühl","Nur körperlich","Veraltet"],"correct":1,"exp":"Antonovsky kehrt Perspektive um – nicht Pathogenese, sondern Salutogenese (was hält gesund) im Fokus."},{"q":"Welche Maßnahme ist Primärprävention?","opts":["Operation bei Krebs","Impfung gegen HPV","Reha nach Schlaganfall","Diabetes-Schulung"],"correct":1,"exp":"Impfung verhindert Erkrankung bei Gesunden = primäre Prävention."}]}]},{"key":"mindmaps","name":"Mind Maps","icon":"🗺️","desc":"12 Themenkomplexe als klickbare Mind Maps – schneller Überblick","topics":[{"key":"mm_pp","name":"Pflegeprozess & Theorien","rel":"vh","sub":"KB I – Fundament aller Klausuren","branches":[{"label":"6 Schritte (Fiechter & Meier)","color":"blue","leaves":["1. Informationen sammeln","2. Probleme & Ressourcen","3. Ziele (SMART)","4. Maßnahmen planen","5. Durchführung","6. Evaluation"]},{"label":"Pflegetheorien","color":"teal","leaves":["Krohwinkel – ABEDL (13 Bereiche)","Orem – 3 Pflegesysteme","Peplau – 4 Phasen Beziehung","Henderson – 14 Grundbedürfnisse","Trajektmodell (Corbin/Strauss)"]},{"label":"SIS-Dokumentation","color":"amber","leaves":["4 Felder (Selbstbild, Probleme, Themenfelder, Risiken)","6 Themenfelder","Risikomatrix","Selbstauskunft des Patienten"]},{"label":"Pflegediagnose PES","color":"coral","leaves":["P – Problem","E – Etiologie (Ursache)","S – Symptome","NANDA-Format (intern. Klassifikation)"]},{"label":"Rechtliche Dokumentation","color":"green","leaves":["Lückenlos & zeitnah","Beweismittel bei Haftung","Lesbar & unterschrieben","Fehler durchstreichen, NICHT übermalen"]}]},{"key":"mm_komm","name":"Kommunikation & Beratung","rel":"vh","sub":"KB II – Klausur 1 & 2","branches":[{"label":"Watzlawick – 5 Axiome","color":"teal","leaves":["Man kann nicht NICHT kommunizieren","Inhalts- & Beziehungsebene","Interpunktion der Ereignisse","Digital (Sprache) & analog (Mimik/Gestik)","Symmetrisch (gleichberechtigt) / Komplementär"]},{"label":"4-Ohren-Modell (Schulz v. Thun)","color":"blue","leaves":["Sachinhalt","Selbstoffenbarung","Beziehungsebene","Appell"]},{"label":"Validation nach Naomi Feil","color":"amber","leaves":["Einfühlung ohne Korrektur","In Welt der Person eintreten","Biographiearbeit nutzen","Gefühle annehmen","Bei Demenz – kein Widerspruch"]},{"label":"Motivierende Gesprächsführung","color":"purple","leaves":["OARS-Schema (Open, Affirm, Reflect, Summarize)","Offene Fragen","Ambivalenz erkunden","Change Talk fördern","Nicht belehren!"]},{"label":"Beratung §7a SGB XI","color":"green","leaves":["5 Beratungsschritte","Ressourcenorientiert","Ziele gemeinsam setzen","Anspruch ab Pflegegrad","Pflegeberatung SGB XI"]}]},{"key":"mm_ethik","name":"Ethik & Recht","rel":"vh","sub":"KB IV – alle 3 Klausuren","branches":[{"label":"4 ethische Prinzipien (Beauchamp)","color":"purple","leaves":["Autonomie – Selbstbestimmung","Benefizienz – Wohltun","Non-Malefizienz – Nicht schaden","Gerechtigkeit – Faire Verteilung"]},{"label":"Patientenverfügung §1827 BGB","color":"amber","leaves":["Wirksam bei Einwilligungsunfähigkeit + Situation","Betreuer ist GEBUNDEN","PV geht vor Betreuer-Wunsch","Schriftlich + Datum + Unterschrift","Aktueller Wille schlägt schriftliche Verfügung"]},{"label":"§4 PflBG – Vorbehaltene Tätigkeiten","color":"blue","leaves":["Erhebung Pflegebedarf","Planung der Pflege","Steuerung & Organisation","Evaluation der Pflege"]},{"label":"Pflege-Charta (8 Artikel)","color":"coral","leaves":["Art. 1 – Selbstbestimmung","Art. 2 – Körperpflege/Würde","Art. 7 – Sterben in Würde","Art. 8 – Palliative Pflege"]},{"label":"Recht & Haftung","color":"green","leaves":["§203 StGB Schweigepflicht","Dokumentationspflicht","Haftung bei Unterlassen","Delegation vs. Anordnung"]}]},{"key":"mm_pharma","name":"Pharmakologie & 6-R-Regel","rel":"vh","sub":"KB III – Klausur 3 Schwerpunkt","branches":[{"label":"6-R-Regel","color":"amber","leaves":["Richtiger Patient","Richtiges Medikament","Richtige Dosis","Richtiger Weg (Applikation)","Richtige Zeit","Richtige Dokumentation"]},{"label":"Herzmedikamente","color":"red","leaves":["Furosemid – Hypokaliämie!","ACE-Hemmer – Reizhusten","Betablocker – Bradykardie","Digitalis – enge therap. Breite (Puls vor Gabe!)"]},{"label":"Antikoagulantien","color":"blue","leaves":["NMH (Clexane) – Faktor Xa","Heparin i.v. – aPTT-Kontrolle","Marcumar – INR-Kontrolle (2-3)","NOACs – keine Laborkontrolle"]},{"label":"WHO-Schmerzschema","color":"purple","leaves":["Stufe 1 – Nicht-Opioide (Paracetamol, NSAR)","Stufe 2 – Schwache Opioide (Tramadol, Tilidin)","Stufe 3 – Starke Opioide (Morphin, Oxy ss)"]}]},{"key":"mm_psych","name":"Psychiatrie & Demenz","rel":"vh","sub":"Klausur 2 & 3","branches":[{"label":"Demenz Alzheimer","color":"pink","leaves":["Stadien I–III","Amyloid-Plaques + Tau-Fibrillen","Validation nach Naomi Feil","Biographiearbeit + 10-min-Aktivierung"]},{"label":"Depression","color":"purple","leaves":["Schwere Episode (Trias: Antrieb, Stimmung, Denken)","SSRI (z.B. Sertralin, Wirkeintritt 4-6 Wo)","Suizidalität direkt ansprechen","Nicht allein lassen, Tagesstruktur"]},{"label":"Alkohol-Entzug","color":"amber","leaves":["Delir tremens – Lebensgefahr!","Lorazepam – Krampfprophylaxe","Thiamin B1 – Wernicke-Prophylaxe","CAGE-Fragebogen, motiv. Gespräch"]},{"label":"Anorexia nervosa","color":"red","leaves":["BMI <17,5 – Diagnosekriterium","Bradykardie + Hypokaliämie!","Ethik-Dilemma: Autonomie vs. Lebensgefahr","Motivierende Gesprächsführung","Interprofessionelles Team"]},{"label":"Delir vs. Demenz","color":"blue","leaves":["Delir = AKUT, fluktuierend","Demenz = schleichend, progredient","Delir-Ursache suchen (HWI, Med., Exsikkose!)","KEINE Fixierung – verschlimmert!","Reorientierung, Brille/Hörgerät"]}]},{"key":"mm_proph","name":"Prophylaxen & Assessments","rel":"vh","sub":"Dauerbrenner – alle Klausuren","branches":[{"label":"Dekubitusprophylaxe","color":"green","leaves":["Braden-Skala (≤18 = Risiko)","30°-Schräglagerung","Umlagerung individuell (nicht starre 2h-Regel)","Druckentlastung, KEINE Massage!","DNQP-Expertenstandard"]},{"label":"Sturzprophylaxe","color":"teal","leaves":["Morse Fall Scale / Tinetti / TUG","Umgebungsanalyse, Beleuchtung","Hilfsmittel bereitstellen","Anti-Rutsch-Maßnahmen, Schuhe","Rufanlage erreichbar"]},{"label":"Thromboseprophylaxe","color":"blue","leaves":["Frühmobilisation – wichtigste!","Kompressionsstrümpfe (KKL II)","NMH täglich s.c.","Fußgymnastik","Virchow-Trias beachten"]},{"label":"Pneumonieprophylaxe","color":"amber","leaves":["Atemübungen 10x/Stunde","Oberkörper hochlagern","Frühmobilisation","Mundpflege täglich (orale Keime!)","Sekretmobilisation"]},{"label":"Schmerzassessment","color":"purple","leaves":["NRS 0–10 (Erwachsene)","VAS – Visuelle Analogskala","BESD – bei Demenz (5 Indikatoren)","Smiley/Wong-Baker (Kinder ≥4 J.)","WHO-Schema danach"]}]},{"key":"mm_pallia","name":"Palliative Pflege & Schmerz","rel":"vh","sub":"Klausur 3 – sehr hohe Relevanz","branches":[{"label":"WHO-Schmerzschema","color":"purple","leaves":["Stufe 1 – NSAR + Paracetamol","Stufe 2 – Schwache Opioide","Stufe 3 – Starke Opioide","Koanalgetika auf jeder Stufe","Laxans OBLIGAT bei Opioiden!"]},{"label":"Symptomkontrolle","color":"amber","leaves":["Dyspnoe → Morphin + Kutschersitz","Übelkeit → Metoclopramid","Obstipation → Macrogol/Lactulose","Schlaf → Ruhige Umgebung","Mundpflege – täglich intensiv"]},{"label":"Rechtlich & Ethisch","color":"blue","leaves":["Patientenverfügung bindend (§1827 BGB)","SAPV nach §37b SGB V","Hospizdienst §39a SGB V","Doppelwirkungsprinzip","Palliative Sedierung – Voraussetzungen"]},{"label":"Pflege-Charta Art. 7 & 8","color":"coral","leaves":["Art. 7 – Würdevolles Sterben","Art. 8 – Würde bis zum Tod","Autonomie des Sterbenden","Leiden minimieren","Keine lebensverkürzende Absicht"]},{"label":"Angehörigenbegleitung","color":"teal","leaves":["Hospizdienst einbinden","Trauerbegleitung §39a","Seelsorge anbieten","Praktische Entlastung","Gesprächsangebote machen"]}]},{"key":"mm_prev","name":"Prävention, EbN & Interprofession.","rel":"h","sub":"KB II / III / V – Klausur 2 & 3","branches":[{"label":"Ottawa-Charta 1986","color":"green","leaves":["1. Gesundheitspolitik","2. Gesundheitsförderliche Lebenswelt","3. Gemeinschaft stärken","4. Persönliche Kompetenzen","5. Gesundheitsdienste neu orientieren"]},{"label":"Salutogenese (Antonovsky)","color":"teal","leaves":["SOC-Modell (Sense of Coherence)","Verstehbarkeit","Handhabbarkeit","Bedeutsamkeit / Sinnhaftigkeit"]},{"label":"Präventionsebenen","color":"amber","leaves":["Primär – Risiko verhindern (Impfung)","Sekundär – Früherk
